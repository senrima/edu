<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Verifikasi & Pendaftaran Instan - EduLearn</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(226, 232, 240, 0.8); }
    .scan-line {
      height: 4px;
      background: linear-gradient(90deg, transparent, #4f46e5, transparent);
      animation: scan 2s linear infinite;
    }
    @keyframes scan {
      0% { top: 0%; }
      50% { top: 100%; }
      100% { top: 0%; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const _0xDbChunks = [
        "aHR0cHM6Ly9zY3JpcHQuZ29v",
        "Z2xlLmNvbS9tYWNyb3Mvcy9B",
        "S2Z5Y2J4bUpvR0hBLTlJbU12",
        "OTkzVVFVQUlvTlBmdmdSWF9y",
        "ckxSZDM1YjZaS1RUTmFWMFpV",
        "VjBvenlVbHlUMW90U1hjeExX",
        "UkxNVk5ZU2pVdlpYaGxZdz09"
    ];
    const DEFAULT_SHEETS_URL = atob(_0xDbChunks.join(""));

    // Komponen pembantu untuk merender ikon dan loading spinner
    const IconWrapper = ({ name, size = 24, className = "", weight="regular" }) => (
      <i className={`ph${weight === 'fill' ? '-fill' : weight === 'duotone' ? '-duotone' : weight === 'bold' ? '-bold' : ''} ph-${name} ${className}`} style={{ fontSize: size }}></i>
    );
    const Loader2 = (p) => <IconWrapper name="spinner" className="animate-spin" {...p} />;

    // Fungsi pengalihan aman untuk mencegah crash di lingkungan sandbox iframe
    const safeRedirect = (target) => {
        try {
            const currentHref = window.location.href;
            if (currentHref && !currentHref.startsWith('about:') && !currentHref.startsWith('data:') && currentHref !== 'null') {
                const url = new URL(target, currentHref);
                window.location.href = url.href;
            } else {
                console.warn(`[Sandbox Bypass] Navigasi otomatis ke "${target}" diabaikan di dalam Frame Sandbox.`);
            }
        } catch (e) {
            console.error("Gagal melakukan navigasi otomatis:", e);
        }
    };

    // ===============================================================
    // S-TOOLS ID : UNIVERSAL AUTH GUARD INTEGRATION
    // ===============================================================
    const API_ENDPOINT = "https://api.s-tools.id";
    const LOGIN_PORTAL_URL = "https://s-tools.id/app/index.html";

    async function checkEcosystemSession() {
        const localToken = localStorage.getItem('sessionToken');
        const headers = { 'Content-Type': 'application/json' };
        if (localToken) headers['x-auth-token'] = localToken;

        try {
            const response = await fetch(API_ENDPOINT, {
                method: 'POST',
                headers: headers,
                credentials: 'include', 
                body: JSON.stringify({ kontrol: 'proteksi', action: 'getDashboardData' })
            });

            const result = await response.json();

            if (result.status === 'success') {
                return result.userData; 
            } else {
                return null;
            }
        } catch (error) {
            console.warn("Gagal menghubungi S-Tools ID API. Sesi dialihkan ke lokal/tamu.");
            return null;
        }
    }

    function App() {
      const [ssoUser, setSsoUser] = React.useState(null);
      const [ssoChecking, setSsoChecking] = React.useState(true);
      const [loading, setLoading] = React.useState(true);
      const [status, setStatus] = React.useState({ type: "idle", message: "Membaca tautan..." });
      const [db, setDb] = React.useState({ admins: [], courses: [], participants: [], enrollments: [], notifications: [] });
      
      // State Form Manual (Hanya untuk pendaftaran siswa)
      const [showManualForm, setShowManualForm] = React.useState(false);
      const [formData, setFormData] = React.useState({
        name: "",
        email: "",
        courseCode: "",
        instructorUsername: "",
        accessCode: ""
      });

      // 1. Eksekusi Auth Guard S-Tools ID saat pertama dibuka dengan Penanganan Fallback Aman
      React.useEffect(() => {
          async function handleSSO() {
              setSsoChecking(true);
              try {
                  const userData = await checkEcosystemSession();
                  if (userData) {
                      setSsoUser(userData);
                      initializePage(userData);
                  } else {
                      const fallbackUser = { nama: "Operator Lokal", email: "operator@s-tools.id" };
                      setSsoUser(fallbackUser);
                      initializePage(fallbackUser);
                  }
              } catch (err) {
                  console.error("SSO Guard Error:", err);
                  const fallbackUser = { nama: "Operator Lokal (Offline)", email: "operator@s-tools.id" };
                  setSsoUser(fallbackUser);
                  initializePage(fallbackUser);
              } finally {
                  setSsoChecking(false);
              }
          }
          handleSSO();
      }, []);

      // 2. Tarik Database dan baca parameter URL
      const initializePage = (userData) => {
        const queryParams = new URLSearchParams(window.location.search);
        const action = queryParams.get("action") || "enroll";
        const name = queryParams.get("name") || "";
        const email = (queryParams.get("email") || "").trim().toLowerCase(); // Normalisasi email parameter ke lowercase
        const course = queryParams.get("course") || queryParams.get("code") || "";
        const instructor = queryParams.get("instructor") || "";
        const pin = queryParams.get("pin") || queryParams.get("code_akses") || "";

        // JIKA TIDAK ADA PARAMETER REGISTRASI DI URL, LANGSUNG BUKA APLIKASI UTAMA
        if (!course) {
            safeRedirect("edu8.html");
            return;
        }

        // Tampilkan error jika mencoba menggunakan link pembuatan kelas lama
        if (action === "create_course") {
            setLoading(false);
            setStatus({ 
                type: "error", 
                message: "Fitur pendaftaran kelas via link eksternal telah dinonaktifkan. Pembuatan kelas baru sekarang wajib dilakukan secara aman melalui Dashboard Instruktur Anda." 
            });
            return;
        }

        setStatus({ type: "loading", message: "Menghubungkan ke database pusat..." });
        
        fetch(DEFAULT_SHEETS_URL)
          .then(res => { if(!res.ok) throw new Error("Gagal memuat database."); return res.json(); })
          .then(data => {
            setDb(data);
            
            // Pencarian ketat berdasarkan Username Instruktur
            const matchedInstructor = data.admins.find(a => 
              String(a.username || '').toLowerCase() === String(instructor || '').trim().toLowerCase()
            );

            const initialForm = {
              name: name || userData.nama || "",
              email: (email || userData.email || "").trim().toLowerCase(), // Normalisasi email sesi ke lowercase
              courseCode: String(course || '').toUpperCase(),
              instructorUsername: matchedInstructor ? matchedInstructor.username : String(instructor || '').trim().toLowerCase(),
              accessCode: pin || Math.floor(100000 + Math.random() * 900000).toString()
            };
            setFormData(initialForm);

            // Validasi apakah parameter URL sudah lengkap untuk auto-submit
            if ((name || userData.nama) && (email || userData.email) && course && instructor) {
              executeAutoAction(initialForm, data);
            } else {
              setLoading(false);
              setShowManualForm(true);
              setStatus({ type: "input", message: "Silakan lengkapi data pendaftaran di bawah." });
            }
          })
          .catch(err => {
            console.error(err);
            setLoading(false);
            setStatus({ type: "error", message: "Gagal terhubung ke server. Pastikan koneksi internet Anda stabil." });
          });
      };

      // Kirim balik data ke Google Sheets Web App
      const saveToDatabase = async (updatedDb) => {
        return fetch(DEFAULT_SHEETS_URL, {
          method: 'POST',
          body: JSON.stringify(updatedDb)
        });
      };

      // Kirim Notifikasi Email Otomatis via Apps Script
      const triggerEmail = (emailAction) => {
        fetch(DEFAULT_SHEETS_URL, { 
          method: 'POST', 
          body: JSON.stringify({ emailAction }) 
        }).catch(console.error);
      };

      // Eksekusi Pendaftaran otomatis dengan logika validasi kecocokan yang diperketat
      const executeAutoAction = async (form, currentDb) => {
        setLoading(true);
        setStatus({ type: "processing", message: "Sedang memverifikasi data dan mendaftarkan kelas..." });

        try {
          // 1. Cari Instruktur BERDASARKAN USERNAME SECARA KETAT & AMBIL ID NYA
          const instructorObj = currentDb.admins.find(a => 
            String(a.username || '').toLowerCase() === String(form.instructorUsername || '').trim().toLowerCase()
          );

          if (!instructorObj) {
            throw new Error(`Instruktur dengan username "${form.instructorUsername}" tidak ditemukan di database.`);
          }

          // 2. Cari Kursus Berdasarkan Kode Kelas
          const courseObj = currentDb.courses.find(c => 
            String(c.code || '').toUpperCase() === String(form.courseCode || '').toUpperCase()
          );
          if (!courseObj) {
            throw new Error(`Kode Kelas "${form.courseCode}" tidak ditemukan.`);
          }

          // 3. MENCOCOKKAN APAKAH ID INSTRUKTUR DAN KODE KELAS BERADA DI BARIS YANG SAMA
          if (String(courseObj.authorId) !== String(instructorObj.id)) {
            throw new Error("Kelas dan instruktur tidak cocok.");
          }

          // 4. CEK APAKAH PESERTA LAMA ATAU BARU (Email diclean ke lowercase)
          const targetEmail = String(form.email || '').trim().toLowerCase();
          let participantObj = currentDb.participants.find(p => 
            String(p.email || '').toLowerCase() === targetEmail
          );
          let updatedParticipants = [...currentDb.participants];
          let isNewStudent = false;

          if (!participantObj) {
            // Skenario Siswa Baru
            participantObj = {
              id: `p_${Date.now()}`,
              name: form.name,
              email: targetEmail, // Disimpan dalam bentuk lowercase bersih
              accessCode: form.accessCode
            };
            updatedParticipants.push(participantObj);
            isNewStudent = true;
          } else {
            // Skenario Siswa Lama
            participantObj.name = form.name || participantObj.name;
            participantObj.email = targetEmail; // Pastikan terupdate ke lowercase
            
            if (form.accessCode && form.accessCode !== participantObj.accessCode && showManualForm) {
              participantObj.accessCode = form.accessCode;
            }
            
            updatedParticipants = currentDb.participants.map(p => p.id === participantObj.id ? participantObj : p);
          }

          // 5. Daftarkan Peserta ke Kelas (Enrollment)
          const isAlreadyEnrolled = currentDb.enrollments.some(e => 
            e.participantId === participantObj.id && e.courseId === courseObj.id
          );

          if (isAlreadyEnrolled) {
            setStatus({ 
              type: "success", 
              message: `Pemberitahuan: Peserta ${participantObj.name} memang sudah terdaftar aktif di kelas "${courseObj.title}"! Mengalihkan Anda ke portal utama dalam 2 detik...` 
            });
            setLoading(false);
            setTimeout(() => {
                safeRedirect("edu8.html");
            }, 2000);
            return;
          }

          const newEnrollment = {
            id: `e_${Date.now()}`,
            participantId: participantObj.id,
            courseId: courseObj.id,
            completedModules: [],
            isGraduated: false,
            certDownloaded: false,
            examScore: null,
            graduatedAt: null
          };

          const updatedEnrollments = [...currentDb.enrollments, newEnrollment];
          const finalDb = {
            ...currentDb,
            participants: updatedParticipants,
            enrollments: updatedEnrollments
          };

          await saveToDatabase(finalDb);

          // Kirim Email Konfirmasi Kelas Baru
          triggerEmail({
            tujuan: participantObj.email,
            subjek: `Akses Kelas ${courseObj.title} Telah Aktif!`,
            namaPengguna: participantObj.name,
            isiPesanInti: isNewStudent
              ? `Pendaftaran kelas Anda berhasil diverifikasi.<br><br><b>Detail Akses Masuk:</b><br>• Kelas: <b>${courseObj.title}</b><br>• Email: <b>${participantObj.email}</b><br>• PIN Akses Masuk: <b style="font-size: 16px; color: #4f46e5;">${participantObj.accessCode}</b>`
              : `Akun Anda telah berhasil dikaitkan dengan kelas tambahan baru!<br><br><b>Detail Akses Kelas Baru:</b><br>• Kelas Tambahan: <b>${courseObj.title}</b><br>• Email Anda: <b>${participantObj.email}</b><br>• PIN Akses (Tetap Menggunakan PIN Lama Anda): <b style="font-size: 16px; color: #4f46e5;">${participantObj.accessCode}</b>`
          });

          setStatus({ 
            type: "success", 
            message: isNewStudent
              ? `Selamat! ${participantObj.name} berhasil didaftarkan sebagai siswa baru di kelas "${courseObj.title}". Mengalihkan ke aplikasi...`
              : `Berhasil menyelaraskan! Siswa lama (${participantObj.name}) sukses ditambahkan ke kelas baru: "${courseObj.title}". Mengalihkan ke aplikasi...`
          });

          setTimeout(() => {
              safeRedirect("edu8.html");
          }, 3000);

        } catch (error) {
          setStatus({ type: "error", message: error.message });
        } finally {
          setLoading(false);
        }
      };

      const handleSubmitManual = (e) => {
        e.preventDefault();
        executeAutoAction(formData, db);
      };

      // Tampilan Loading Verifikasi Sesi SSO
      if (ssoChecking) {
          return (
              <div className="flex flex-col items-center justify-center h-screen bg-slate-900 text-white">
                  <div className="w-20 h-20 bg-indigo-600 rounded-3xl flex items-center justify-center mb-6 shadow-xl shadow-indigo-600/30 animate-pulse">
                      <IconWrapper name="shield-check" size={40} className="text-indigo-200" weight="fill" />
                  </div>
                  <Loader2 size={36} className="text-indigo-500 mb-4" />
                  <h2 className="text-xl font-bold tracking-wide">Menghubungkan S-Tools ID...</h2>
                  <p className="text-sm text-slate-400 mt-2">Mengamankan Sesi Keamanan Ekosistem Utama</p>
              </div>
          );
      }

      return (
        <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4 relative overflow-hidden">
          {/* Efek Background Estetik */}
          <div className="absolute inset-0 z-0 opacity-20 pointer-events-none">
            <div className="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-indigo-600 blur-[120px]"></div>
            <div className="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-emerald-600 blur-[120px]"></div>
          </div>

          <div className="relative z-10 w-full max-w-xl glass-card rounded-3xl overflow-hidden shadow-2xl p-6 sm:p-10 text-slate-800">
            
            {/* Header */}
            <div className="text-center mb-8">
              <div className="w-16 h-16 bg-gradient-to-br from-indigo-500 to-indigo-600 rounded-2xl flex items-center justify-center text-white mx-auto mb-4 shadow-lg shadow-indigo-500/20">
                <i className="ph-fill ph-shield-check text-3xl"></i>
              </div>
              <h1 className="text-2xl font-black text-slate-900 tracking-tight">Verifikasi & Pendaftaran Instan</h1>
              <p className="text-slate-500 text-sm mt-1">Gerbang Pintar Integrasi Pembelajaran EduLearn</p>
            </div>

            {/* Scanning / Loading Screen */}
            {loading && (
              <div className="py-8 text-center relative">
                <div className="w-24 h-24 border-4 border-slate-200 border-t-indigo-600 rounded-full animate-spin mx-auto mb-6"></div>
                <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-[62px] w-[84px] h-[84px] bg-slate-50 rounded-full flex items-center justify-center">
                  <i className="ph-bold ph-keyhole text-3xl text-indigo-600 animate-pulse"></i>
                </div>
                <p className="text-slate-700 font-bold text-lg animate-pulse">{status.message}</p>
              </div>
            )}

            {/* Status Selesai / Error */}
            {!loading && status.type === "success" && (
              <div className="py-6 text-center animate-[fadeIn_0.5s_ease-out]">
                <div className="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                  <i className="ph-fill ph-check-circle text-5xl"></i>
                </div>
                <h3 className="text-xl font-extrabold text-slate-900 mb-2">Verifikasi Berhasil!</h3>
                <p className="text-slate-600 mb-8 leading-relaxed font-medium bg-emerald-50 border border-emerald-100 p-4 rounded-2xl text-sm text-left">{status.message}</p>
                <div className="flex justify-center items-center gap-2 text-indigo-600 text-sm font-bold animate-pulse">
                    <Loader2 size={18} />
                    <span>Membuka aplikasi LMS utama secara otomatis...</span>
                </div>
              </div>
            )}

            {!loading && status.type === "error" && (
              <div className="py-6 text-center animate-[fadeIn_0.5s_ease-out]">
                <div className="w-20 h-20 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                  <i className="ph-fill ph-warning-octagon text-5xl"></i>
                </div>
                <h3 className="text-xl font-extrabold text-slate-900 mb-2">Pendaftaran Gagal</h3>
                <p className="text-red-700 mb-8 leading-relaxed font-medium bg-red-50 border border-red-100 p-4 rounded-2xl text-sm">{status.message}</p>
                <div className="flex flex-col sm:flex-row gap-3">
                  <button onClick={() => window.location.reload()} className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-3 rounded-xl transition">
                    Coba Lagi
                  </button>
                  <button onClick={() => { setShowManualForm(true); setStatus({type:"input"}); }} className="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-lg transition">
                    Gunakan Form Manual
                  </button>
                </div>
              </div>
            )}

            {/* Form Manual Input */}
            {!loading && showManualForm && (
              <form onSubmit={handleSubmitManual} className="space-y-4 animate-[fadeIn_0.3s_ease-out]">
                
                <div className="bg-indigo-50 border border-indigo-100 p-4 rounded-xl flex items-start mb-4">
                  <IconWrapper name="user-plus" size={20} className="text-indigo-600 mr-2 shrink-0 mt-0.5" weight="fill" />
                  <p className="text-xs text-indigo-900 font-bold leading-relaxed">
                    Form Pendaftaran Siswa Baru/Lama ke Sesi Kelas Utama.
                  </p>
                </div>

                <div className="space-y-1">
                  <label className="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">Nama Lengkap Peserta</label>
                  <input required type="text" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:bg-white focus:border-indigo-500 transition text-sm" placeholder="Contoh: Budi Santoso" />
                </div>
                
                <div className="space-y-1">
                  <label className="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">Alamat Email Aktif</label>
                  {/* MODIFIKASI: Input email otomatis dikonversi ke huruf kecil (lowercase) secara real-time saat diketik */}
                  <input required type="email" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value.toLowerCase()})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:bg-white focus:border-indigo-500 transition text-sm" placeholder="budi@example.com" />
                </div>
                
                <div className="grid grid-cols-2 gap-3">
                  <div className="space-y-1">
                    <label className="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">Kode Kelas Unik</label>
                    <input required type="text" value={formData.courseCode} onChange={e => setFormData({...formData, courseCode: e.target.value.toUpperCase()})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:bg-white focus:border-indigo-500 transition text-sm font-mono font-bold" placeholder="WEB2028" />
                  </div>
                  <div className="space-y-1">
                    <label className="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">PIN login (6 Digit)</label>
                    <div className="flex gap-2">
                      <input required type="text" value={formData.accessCode} onChange={e => setFormData({...formData, accessCode: e.target.value})} className="flex-1 px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:bg-white focus:border-indigo-500 transition text-sm font-mono font-bold" placeholder="123456" />
                      <button type="button" onClick={() => setFormData({...formData, accessCode: Math.floor(100000 + Math.random() * 900000).toString()})} className="w-12 bg-slate-100 hover:bg-slate-200 border rounded-xl flex items-center justify-center text-slate-500" title="Acak PIN"><i className="ph ph-arrows-clockwise text-lg"></i></button>
                    </div>
                  </div>
                </div>

                {/* Dropdown diubah menjadi kolom input teks demi menjaga privasi data instruktur */}
                <div className="space-y-1">
                  <label className="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">Username Instruktur Pengajar</label>
                  <input required type="text" value={formData.instructorUsername} onChange={e => setFormData({...formData, instructorUsername: e.target.value.trim().toLowerCase()})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:bg-white focus:border-indigo-500 transition text-sm font-mono" placeholder="Contoh: sitiaminah (Ketik username unik)" />
                </div>

                <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-indigo-600/20 transition mt-6 text-sm flex items-center justify-center gap-2">
                  <i className="ph-bold ph-user-plus text-lg"></i> Proses Pendaftaran Siswa
                </button>
              </form>
            )}

            <p className="text-center text-xs text-slate-400 mt-8 font-mono tracking-widest">© 2026 S-TOOLS.ID • EDULEARN</p>
          </div>
        </div>
      );
    }

    const rootMounted = ReactDOM.createRoot(document.getElementById('root'));
    rootMounted.render(<App />);
  </script>
</body>
</html>

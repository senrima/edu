<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduLearn by SenTools</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .animate-fade-in-up { animation: fadeInUp 0.5s ease-out forwards; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    let fbApp = null, fbAuth = null, fbDb = null;

    // --- ENKRIPSI URL GOOGLE APPS SCRIPT ---
    const _a = "aHR0cHM6Ly9zY3JpcHQuZ29";
    const _b = "vZ2xlLmNvbS9tYWNyb3Mvcy";
    const _c = "9BS2Z5Y2J4ZXV6OHl5VnNiW";
    const _d = "XZYUktsSmxheHNsdnhXbjM2R";
    const _e = "GNFNHRQeGNXRTVpQ0RWSi1vR";
    const _f = "G9pbFVPaWdibmItbVk2aEo2e";
    const _g = "TkvZXhlYw==";
    // URL Dekripsi berjalan pada memori, tidak bisa disorot pada HTML statis
    const DEFAULT_GAS_URL = atob(_a + _b + _c + _d + _e + _f + _g);

    // --- ICONS SETUP ---
    const IconWrapper = ({ name, size = 24, className = "", weight = "regular" }) => <i className={`ph-${weight === 'fill' ? 'fill' : 'regular'} ph-${name} ${className}`} style={{ fontSize: size }}></i>;
    const Icons = {
      Play: (p) => <IconWrapper name="play-circle" {...p} />, Download: (p) => <IconWrapper name="download" {...p} />,
      Menu: (p) => <IconWrapper name="list" {...p} />, X: (p) => <IconWrapper name="x" {...p} />, Book: (p) => <IconWrapper name="book-open" {...p} />,
      Video: (p) => <IconWrapper name="video" {...p} />, Check: (p) => <IconWrapper name="check-circle" {...p} />,
      Right: (p) => <IconWrapper name="caret-right" {...p} />, Spin: (p) => <IconWrapper name="spinner" className="animate-spin" {...p} />,
      Chat: (p) => <IconWrapper name="chat-circle" {...p} />, Lock: (p) => <IconWrapper name="lock" {...p} />, Key: (p) => <IconWrapper name="key" {...p} />,
      Out: (p) => <IconWrapper name="sign-out" {...p} />, Plus: (p) => <IconWrapper name="plus-circle" {...p} />, Trash: (p) => <IconWrapper name="trash" {...p} />,
      Award: (p) => <IconWrapper name="medal" {...p} />, Bell: (p) => <IconWrapper name="bell" {...p} />, Users: (p) => <IconWrapper name="users" {...p} />,
      Grad: (p) => <IconWrapper name="graduation-cap" {...p} />, Alert: (p) => <IconWrapper name="warning-circle" {...p} />,
      Left: (p) => <IconWrapper name="arrow-left" {...p} />, Sync: (p) => <IconWrapper name="arrows-clockwise" {...p} />, User: (p) => <IconWrapper name="user" {...p} />,
      Shield: (p) => <IconWrapper name="shield-check" {...p} />, Search: (p) => <IconWrapper name="magnifying-glass" {...p} />,
      Coffee: (p) => <IconWrapper name="coffee" {...p} />, Exam: (p) => <IconWrapper name="check-square-offset" {...p} />
    };

    const initialAdmins = [{ id: 'adm_super', username: 'senrima', password: 'Sandy236', name: 'Master System', isSuper: true, donationLink: '' }];
    const emptyExam = { minScore: 70, questions: Array.from({length: 10}, () => ({ q: '', options: ['','','',''], answer: 0 })) };

    function App() {
      // Data Pokok
      const [dbMode, setDbMode] = React.useState(() => localStorage.getItem('edu_db_mode') || 'sheets'); 
      const [dbReady, setDbReady] = React.useState(false);
      const [setupError, setSetupError] = React.useState("");
      
      const [fbConfigInput, setFbConfigInput] = React.useState("");
      const [sheetsUrlInput, setSheetsUrlInput] = React.useState(() => localStorage.getItem('edu_sheets_url') || DEFAULT_GAS_URL);
      
      const [admins, setAdmins] = React.useState([]);
      const [courses, setCourses] = React.useState([]);
      const [participants, setParticipants] = React.useState([]);
      const [enrollments, setEnrollments] = React.useState([]);
      const [notifications, setNotifications] = React.useState([]);

      // Autentikasi
      const [session, setSession] = React.useState(() => JSON.parse(sessionStorage.getItem('edu_session')) || null);
      const [loginInput, setLoginInput] = React.useState({ username: "", password: "" });
      const [loginError, setLoginError] = React.useState("");
      const [isLoggingIn, setIsLoggingIn] = React.useState(false);
      
      const getInitialAppMode = () => {
        if (!session) return 'auth';
        return session.role === 'super_admin' ? 'super_dashboard' : session.role === 'admin' ? 'admin_dashboard' : 'part_dashboard';
      };

      const [appMode, setAppMode] = React.useState(getInitialAppMode()); 
      const [adminTab, setAdminTab] = React.useState("courses"); 
      const [superTab, setSuperTab] = React.useState("instructors"); 
      
      const [searchInst, setSearchInst] = React.useState("");
      const [searchCourse, setSearchCourse] = React.useState("");
      const [searchPart, setSearchPart] = React.useState("");
      
      const [activeCourse, setActiveCourse] = React.useState(null);
      const [activeModule, setActiveModule] = React.useState(null);
      const [isSidebarOpen, setIsSidebarOpen] = React.useState(false);
      const [commentText, setCommentText] = React.useState("");
      const [classroomMode, setClassroomMode] = React.useState('video'); 
      const [studentAnswers, setStudentAnswers] = React.useState({});
      
      // Modals & PIN
      const [toast, setToast] = React.useState(null);
      const [confirmDialog, setConfirmDialog] = React.useState({ isOpen: false, message: "", onConfirm: null });
      const [showPinModal, setShowPinModal] = React.useState(false);
      const [pinInput, setPinInput] = React.useState("");
      const [pinError, setPinError] = React.useState("");

      const [examModalOpen, setExamModalOpen] = React.useState(false);
      const [examCourseId, setExamCourseId] = React.useState(null);
      const [examForm, setExamForm] = React.useState(emptyExam);
      const [profileForm, setProfileForm] = React.useState({ donationLink: "" });

      React.useEffect(() => {
        if (appMode === 'setup_db') return;

        if (dbMode === 'local') {
          setAdmins(JSON.parse(localStorage.getItem('edu_admins')) || initialAdmins);
          setCourses(JSON.parse(localStorage.getItem('edu_courses')) || []);
          setParticipants(JSON.parse(localStorage.getItem('edu_participants')) || []);
          setEnrollments(JSON.parse(localStorage.getItem('edu_enrollments')) || []);
          setNotifications(JSON.parse(localStorage.getItem('edu_notifications')) || []);
          setDbReady(true);
        } else if (dbMode === 'firebase') {
          try {
            const configStr = localStorage.getItem('edu_fb_config');
            if (!configStr) throw new Error("No Config");
            fbApp = initializeApp(JSON.parse(configStr)); fbAuth = getAuth(fbApp); fbDb = getFirestore(fbApp);
            signInAnonymously(fbAuth).then(() => {
              const getRef = (colName) => collection(fbDb, colName);
              onSnapshot(getRef('admins'), snap => setAdmins(snap.docs.map(d => ({id: d.id, ...d.data()}))) );
              onSnapshot(getRef('courses'), snap => setCourses(snap.docs.map(d => ({id: d.id, ...d.data()}))) );
              onSnapshot(getRef('participants'), snap => setParticipants(snap.docs.map(d => ({id: d.id, ...d.data()}))) );
              onSnapshot(getRef('enrollments'), snap => setEnrollments(snap.docs.map(d => ({id: d.id, ...d.data()}))) );
              onSnapshot(getRef('notifications'), snap => setNotifications(snap.docs.map(d => ({id: d.id, ...d.data()}))) );
              setDbReady(true);
            }).catch(e => { setSetupError("Gagal login anonim ke Firebase."); setAppMode('setup_db'); });
          } catch (e) { setSetupError("Konfigurasi Firebase salah/kosong."); setAppMode('setup_db'); }
        } else if (dbMode === 'sheets') {
          const url = localStorage.getItem('edu_sheets_url') || DEFAULT_GAS_URL;
          fetch(url)
            .then(res => { if(!res.ok) throw new Error("API Offline"); return res.json(); })
            .then(data => {
                setAdmins(data.admins?.length > 0 ? data.admins : initialAdmins);
                if(data.courses) setCourses(data.courses);
                if(data.participants) setParticipants(data.participants);
                if(data.enrollments) setEnrollments(data.enrollments);
                if(data.notifications) setNotifications(data.notifications);
                setSetupError(""); setDbReady(true);
            })
            .catch(e => {
                console.warn("Spreadsheet Offline, Fallback Local:", e);
                setSetupError("Mode Cloud Terputus. Menjalankan Mode Offline Lokal.");
                setAdmins(JSON.parse(localStorage.getItem('edu_admins')) || initialAdmins);
                setCourses(JSON.parse(localStorage.getItem('edu_courses')) || []);
                setParticipants(JSON.parse(localStorage.getItem('edu_participants')) || []);
                setEnrollments(JSON.parse(localStorage.getItem('edu_enrollments')) || []);
                setNotifications(JSON.parse(localStorage.getItem('edu_notifications')) || []);
                setDbReady(true);
            });
        }
      }, [dbMode, appMode]);

      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };
      const generateRandomCode = () => Math.random().toString(36).substring(2, 8).toUpperCase();
      const calcProgress = (enr, crs) => (!crs?.modules?.length || !enr?.completedModules) ? 0 : Math.round((enr.completedModules.length / crs.modules.length) * 100);

      // --- SINKRONISASI MULTI-DATABASE ---
      const execDbAction = async (localAction, firebaseAction) => {
        try {
          if (dbMode === 'firebase') { await firebaseAction(); } 
          else if (dbMode === 'sheets') {
              localAction(); 
              const url = localStorage.getItem('edu_sheets_url') || DEFAULT_GAS_URL;
              if (url) {
                  const payload = {
                      admins: JSON.parse(localStorage.getItem('edu_admins')) || admins,
                      courses: JSON.parse(localStorage.getItem('edu_courses')) || courses,
                      participants: JSON.parse(localStorage.getItem('edu_participants')) || participants,
                      enrollments: JSON.parse(localStorage.getItem('edu_enrollments')) || enrollments,
                      notifications: JSON.parse(localStorage.getItem('edu_notifications')) || notifications
                  };
                  fetch(url, { method: 'POST', body: JSON.stringify(payload) }).catch(e => console.warn("Background sync delay", e));
              }
          } else { localAction(); }
        } catch (error) { showToast("Gagal menyimpan data ke server."); }
      };

      const handleSeedDatabase = async () => {
        setIsLoggingIn(true);
        await execDbAction(
          () => { localStorage.setItem('edu_admins', JSON.stringify(initialAdmins)); setAdmins(initialAdmins); showToast("Sistem Diinisialisasi!"); },
          async () => { for(let adm of initialAdmins) await setDoc(doc(fbDb, 'admins', adm.id), adm); showToast("Firebase Diinisialisasi!"); }
        );
        setIsLoggingIn(false);
      };

      const handlePinSubmit = (e) => {
        e.preventDefault();
        // Cipher Key rahasia untuk "236999" (XOR logic with 123)
        const targetHash = [73, 72, 77, 66, 66, 66]; 
        const inputArr = pinInput.split('').map(c => c.charCodeAt(0) ^ 123);
        if (targetHash.join(',') === inputArr.join(',')) {
            setShowPinModal(false); setPinInput(""); setPinError(""); setAppMode('setup_db');
        } else setPinError("Akses Ditolak. PIN Keamanan Salah!");
      };

      const handleLogin = (e) => {
        e.preventDefault(); setIsLoggingIn(true); setLoginError("");
        setTimeout(() => {
          const { username, password } = loginInput;
          const adminFound = admins.find(a => a.username === username && a.password === password);
          if (adminFound) {
            const sessData = { role: adminFound.isSuper ? 'super_admin' : 'admin', data: adminFound };
            setSession(sessData); sessionStorage.setItem('edu_session', JSON.stringify(sessData));
            if(!adminFound.isSuper) setProfileForm({ donationLink: adminFound.donationLink || "" });
            setAppMode(adminFound.isSuper ? 'super_dashboard' : 'admin_dashboard'); setIsLoggingIn(false); return;
          }
          const partFound = participants.find(p => p.email === username && p.accessCode === password);
          if (partFound) {
            const sessData = { role: 'participant', data: partFound };
            setSession(sessData); sessionStorage.setItem('edu_session', JSON.stringify(sessData));
            setAppMode('part_dashboard'); setIsLoggingIn(false); return;
          }
          setLoginError("Kredensial tidak valid."); setIsLoggingIn(false);
        }, 800);
      };

      const handleLogout = () => {
        setSession(null); sessionStorage.removeItem('edu_session');
        setAppMode('auth'); setLoginInput({ username: "", password: "" });
      };
      
      const handleExitClassroom = () => {
        setActiveCourse(null); setActiveModule(null); setClassroomMode('video');
        if(!session) return setAppMode('auth');
        setAppMode(session.role === 'super_admin' ? 'super_dashboard' : session.role === 'participant' ? 'part_dashboard' : 'admin_dashboard');
      };

      const handleRegisterAdmin = async (e) => {
        e.preventDefault(); const fd = new FormData(e.target); const username = fd.get('username');
        if (admins.some(a => a.username === username)) return showToast("Username terpakai!");
        const newAdminData = { id: `adm_${Date.now()}`, name: fd.get('name'), username: username, password: fd.get('password'), isSuper: false, donationLink: '' };
        await execDbAction(
          () => { const updatedA = [...admins, newAdminData]; setAdmins(updatedA); localStorage.setItem('edu_admins', JSON.stringify(updatedA)); },
          async () => await setDoc(doc(collection(fbDb, 'admins'), newAdminData.id), newAdminData)
        );
        e.target.reset(); showToast("Instruktur Baru Ditambahkan!");
      };

      const handleDeleteAdmin = (id) => {
        setConfirmDialog({
            isOpen: true, message: "Hapus instruktur ini? (Kursusnya akan tetap ada tanpa pembuat).",
            onConfirm: async () => {
                setConfirmDialog({ isOpen: false, message: "", onConfirm: null });
                await execDbAction(
                    () => { const updatedA = admins.filter(a => a.id !== id); setAdmins(updatedA); localStorage.setItem('edu_admins', JSON.stringify(updatedA)); },
                    async () => await deleteDoc(doc(fbDb, 'admins', id))
                ); showToast("Instruktur dihapus.");
            }
        });
      };

      const handleDeleteCourseSuper = (courseId) => {
        setConfirmDialog({
            isOpen: true, message: "Peringatan Super Admin: Hapus kursus ini secara permanen?",
            onConfirm: async () => {
                setConfirmDialog({ isOpen: false, message: "", onConfirm: null });
                await execDbAction(
                    () => { const updatedC = courses.filter(c => c.id !== courseId); setCourses(updatedC); localStorage.setItem('edu_courses', JSON.stringify(updatedC)); },
                    async () => await deleteDoc(doc(fbDb, 'courses', courseId))
                ); showToast("Kursus dibrangus.");
            }
        });
      };

      const handleSafeDeleteCourse = (courseId) => {
        const hasEnrolled = enrollments.some(e => e.courseId === courseId);
        if (hasEnrolled && session?.role !== 'super_admin') return showToast("Gagal: Kursus ini sudah ada pesertanya.");
        setConfirmDialog({
            isOpen: true, message: "Kursus kosong. Yakin ingin menghapus?",
            onConfirm: async () => {
                setConfirmDialog({ isOpen: false, message: "", onConfirm: null });
                await execDbAction(
                    () => { const updatedC = courses.filter(c => c.id !== courseId); setCourses(updatedC); localStorage.setItem('edu_courses', JSON.stringify(updatedC)); },
                    async () => await deleteDoc(doc(fbDb, 'courses', courseId))
                ); showToast("Kursus dihapus.");
            }
        });
      };

      const handleCreateCourse = async (e) => {
        e.preventDefault(); const fd = new FormData(e.target); const code = fd.get('code');
        if (courses.some(c => c.code === code)) return showToast("Kode Kursus sudah ada!");
        const courseData = { id: `c_${Date.now()}`, authorId: session.data.id, code, title: fd.get('title'), instructor: fd.get('inst'), modules: [], exam: emptyExam };
        await execDbAction(
          () => { const updated = [...courses, courseData]; setCourses(updated); localStorage.setItem('edu_courses', JSON.stringify(updated)); },
          async () => await setDoc(doc(collection(fbDb, 'courses'), courseData.id), courseData)
        );
        e.target.reset(); showToast("Kursus dibuat!");
      };

      const handleCreateModule = async (e) => {
        e.preventDefault(); const fd = new FormData(e.target); const courseId = fd.get('courseId');
        const course = courses.find(c => c.id === courseId); if(!course) return;
        const newModule = { id: `m_${Date.now()}`, title: fd.get('title'), videoUrl: fd.get('vidUrl'), description: fd.get('desc'), comments: [] };
        await execDbAction(
          () => { const updated = courses.map(c => c.id === courseId ? { ...c, modules: [...(c.modules||[]), newModule] } : c); setCourses(updated); localStorage.setItem('edu_courses', JSON.stringify(updated)); },
          async () => await updateDoc(doc(fbDb, 'courses', courseId), { modules: [...(course.modules||[]), newModule] })
        ); e.target.reset(); showToast("Materi ditambahkan!");
      };

      const handleDeleteModule = (courseId, moduleId) => {
        setConfirmDialog({
            isOpen: true, message: "Hapus materi video ini?",
            onConfirm: async () => {
                setConfirmDialog({ isOpen: false, message: "", onConfirm: null });
                const course = courses.find(c => c.id === courseId);
                await execDbAction(
                    () => { const updated = courses.map(c => c.id === courseId ? { ...c, modules: (c.modules||[]).filter(m => m.id !== moduleId) } : c); setCourses(updated); localStorage.setItem('edu_courses', JSON.stringify(updated)); },
                    async () => await updateDoc(doc(fbDb, 'courses', courseId), { modules: (course.modules||[]).filter(m => m.id !== moduleId) })
                ); showToast("Materi dihapus.");
            }
        });
      };

      const handleUpdateProfile = async (e) => {
        e.preventDefault();
        await execDbAction(
          () => { const updatedA = admins.map(a => a.id === session.data.id ? { ...a, donationLink: profileForm.donationLink } : a); setAdmins(updatedA); localStorage.setItem('edu_admins', JSON.stringify(updatedA)); },
          async () => await updateDoc(doc(fbDb, 'admins', session.data.id), { donationLink: profileForm.donationLink })
        ); showToast("Profil Instruktur diperbarui!");
      };

      const openExamBuilder = (courseId) => {
        const course = courses.find(c => c.id === courseId); setExamCourseId(courseId);
        setExamForm(JSON.parse(JSON.stringify(course?.exam || emptyExam))); setExamModalOpen(true);
      };

      const handleSaveExam = async () => {
        await execDbAction(
          () => { const updated = courses.map(c => c.id === examCourseId ? { ...c, exam: examForm } : c); setCourses(updated); localStorage.setItem('edu_courses', JSON.stringify(updated)); },
          async () => await updateDoc(doc(fbDb, 'courses', examCourseId), { exam: examForm })
        ); setExamModalOpen(false); showToast("Data Ujian disimpan!");
      };

      const handleRegisterParticipant = async (e) => {
        e.preventDefault(); const fd = new FormData(e.target); const email = fd.get('email');
        if (participants.some(p => p.email === email)) return showToast("Gagal: Email terdaftar!");
        const partData = { id: `p_${Date.now()}`, name: fd.get('name'), email, accessCode: fd.get('code') };
        const enrData = { id: `e_${Date.now()}`, participantId: partData.id, courseId: fd.get('courseId'), completedModules: [], isGraduated: false, certDownloaded: false, examScore: null };

        await execDbAction(
          () => {
            const updatedP = [...participants, partData]; const updatedE = [...enrollments, enrData];
            setParticipants(updatedP); localStorage.setItem('edu_participants', JSON.stringify(updatedP));
            setEnrollments(updatedE); localStorage.setItem('edu_enrollments', JSON.stringify(updatedE));
          },
          async () => {
            await setDoc(doc(collection(fbDb, 'participants'), partData.id), partData);
            await setDoc(doc(collection(fbDb, 'enrollments'), enrData.id), enrData);
          }
        ); e.target.reset(); showToast("Peserta dimasukkan kelas!");
      };

      const handleEnrollExisting = async (e) => {
        e.preventDefault(); const fd = new FormData(e.target); const email = fd.get('email'); const cId = fd.get('cId');
        const participant = participants.find(p => p.email === email);
        if (!participant) return showToast("Peserta tidak ditemukan!");
        if(enrollments.some(en => en.participantId === participant.id && en.courseId === cId)) return showToast("Sudah terdaftar!");
        const enrData = { id: `e_${Date.now()}`, participantId: participant.id, courseId: cId, completedModules: [], isGraduated: false, certDownloaded: false, examScore: null };
        await execDbAction(
          () => { const updatedE = [...enrollments, enrData]; setEnrollments(updatedE); localStorage.setItem('edu_enrollments', JSON.stringify(updatedE)); },
          async () => await setDoc(doc(collection(fbDb, 'enrollments'), enrData.id), enrData)
        ); e.target.reset(); showToast("Kursus ditambahkan!");
      };

      const jumpToClassroom = (courseId, targetModuleId = null) => {
        const course = courses.find(c => c.id === courseId);
        if(!course) return showToast("Kursus error!");
        let modToOpen = course?.modules?.[0] || null; setClassroomMode('video');

        if ((session?.role === 'admin' || session?.role === 'super_admin') && targetModuleId) {
          modToOpen = course?.modules?.find(m => m.id === targetModuleId) || modToOpen;
        } else if (session?.role === 'participant') {
          const myEnr = enrollments.find(e => e.participantId === session.data.id && e.courseId === courseId);
          if (myEnr) {
            if(myEnr.isGraduated) { setClassroomMode('result'); }
            else { modToOpen = course?.modules?.find(m => !(myEnr.completedModules||[]).includes(m.id)) || course?.modules?.[(course?.modules?.length||1) - 1]; }
          }
        }
        if(!modToOpen && classroomMode === 'video') return showToast("Belum ada materi di kelas ini!"); 
        setActiveCourse(course); setActiveModule(modToOpen); setAppMode('classroom');
      };

      const handlePostComment = async (e) => {
        e.preventDefault(); if (!commentText.trim()) return;
        const isAdmin = session.role === 'admin' || session.role === 'super_admin';
        const authorName = session.role === 'super_admin' ? `${session.data.name}` : session.data.name;
        const newComment = { id: `cmt_${Date.now()}`, user: authorName, text: commentText, isAdmin, time: "Baru saja" };
        const updatedMods = (activeCourse.modules||[]).map(m => m.id === activeModule.id ? { ...m, comments: [...(m.comments||[]), newComment] } : m);

        await execDbAction(
          () => {
            const updatedC = courses.map(c => c.id === activeCourse.id ? { ...c, modules: updatedMods } : c);
            setCourses(updatedC); localStorage.setItem('edu_courses', JSON.stringify(updatedC));
            if (!isAdmin) {

px; padding-bottom: 5px; } .instructor-name { font-size: 16px; font-weight: bold; color: #0f172a; } .instructor-title { font-size: 14px; color: #64748b; } .website { position: absolute; bottom: 20px; left: 0; right: 0; text-align: center; color: #64748b; font-family: sans-serif; font-size: 12px; letter-spacing: 1px; }</style></head><body><div class="cert-container"><div class="cert-border"><div class="header-logo">EduLearn by SenTools</div><div class="title">Sertifikat Kelulusan</div><div class="subtitle">Diberikan dengan bangga kepada:</div><div class="name">${session.data.name}</div><div class="course-label">Atas dedikasi dan keberhasilannya menyelesaikan:</div><div class="course-name">${activeCourse?.title}</div><div class="footer"><div class="signature-block"><div class="signature">${instName}</div><div class="instructor-name">${instName}</div><div class="instructor-title">Instruktur Utama</div></div><div class="signature-block"><div class="signature">SenTools</div><div class="instructor-name">Sistem Manajemen</div><div class="instructor-title">EduLearn by SenTools</div></div></div><div class="website">https://s-tools.id/edu/</div></div></div></body></html>`;
        const blob = new Blob([certContent], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a'); link.href = url; link.download = `Sertifikat-${activeCourse?.title?.replace(/\s+/g, '-') || 'EduLearn'}.html`;
        document.body.appendChild(link); link.click(); document.body.removeChild(link); URL.revokeObjectURL(url);

              {admins.length === 0 && (<div className="mb-4 bg-amber-50 border border-amber-200 p-4 rounded-xl text-center"><p className="text-sm text-amber-800 mb-3 font-bold">Database kosong!</p><button onClick={handleSeedDatabase} disabled={isLoggingIn} className="bg-amber-600 text-white px-4 py-2 rounded-lg text-sm font-bold w-full">Inisialisasi Master System</button></div>)}

        const allEnrs = enrollments.map(enr => { const p = participants.find(x => x.id === enr.participantId); const c = courses.find(x => x.id === enr.courseId); return { ...enr, pName: p?.name||'', pEmail: p?.email||'', cTitle: c?.title||'', prog: calcProgress(enr,c) }; });

                  <div className="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm border"><div className="flex justify-between items-center mb-6"><h2 className="font-bold text-slate-800"><Icons.Users size={20} className="inline mr-2 text-indigo-600" /> Daftar Instruktur Aktif</h2><input type="text" placeholder="Cari nama/username..." value={searchInst} onChange={e=>setSearchInst(e.target.value)} className="p-2 text-sm border rounded-xl"/></div><div className="overflow-x-auto"><table className="w-full text-left text-sm whitespace-nowrap"><thead className="bg-slate-50 text-slate-600 border-b"><tr><th className="p-4">Nama Lengkap</th><th className="p-4">Username</th><th className="p-4">Kinerja</th><th className="p-4 text-right">Aksi</th></tr></thead><tbody className="divide-y divide-slate-100">{filteredAdmins.map(adm => (<tr key={adm.id} className="hover:bg-slate-50"><td className="p-4 font-bold">{adm.name}</td><td className="p-4 font-mono text-xs text-indigo-600">{adm.username}</td><td className="p-4"><span className="bg-indigo-100 text-indigo-800 px-3 py-1.5 rounded-lg text-xs font-bold">{courses.filter(c => c.authorId === adm.id).length} Kursus</span></td><td className="p-4 text-right"><button onClick={()=>handleDeleteAdmin(adm.id)} className="p-2 text-red-500 hover:bg-red-50 rounded-lg"><Icons.Trash size={20}/></button></td></tr>))}</tbody></table></div></div>
                </div>
              )}
              {superTab === 'courses' && (
                <div className="bg-white p-6 rounded-2xl shadow-sm border animate-fade-in-up"><div className="flex justify-between items-center mb-6"><h2 className="font-bold text-slate-800"><Icons.Book size={20} className="inline mr-2 text-indigo-600" /> Semua Kursus</h2><input type="text" placeholder="Cari..." value={searchCourse} onChange={e=>setSearchCourse(e.target.value)} className="p-2 text-sm border rounded-xl"/></div><div className="overflow-x-auto"><table className="w-full text-left text-sm whitespace-nowrap"><thead className="bg-slate-50 text-slate-600 border-b"><tr><th className="p-4">Kode</th><th className="p-4">Nama Kursus</th><th className="p-4">Instruktur</th><th className="p-4">Total Materi</th><th className="p-4 text-right">Aksi Sistem</th></tr></thead><tbody className="divide-y divide-slate-100">{filteredCourses.map(crs => (<tr key={crs.id} className="hover:bg-slate-50"><td className="p-4 font-mono text-xs font-bold text-slate-500">{crs.code}</td><td className="p-4 font-bold">{crs.title}</td><td className="p-4 text-slate-600">{crs.instructor}</td><td className="p-4 text-slate-600">{crs.modules?.length||0} Materi</td><td className="p-4 text-right space-x-2"><button onClick={() => jumpToClassroom(crs.id)} className="text-xs bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold">Masuk</button><button onClick={() => handleDeleteCourseSuper(crs.id)} className="text-xs bg-red-100 text-red-700 px-4 py-2 rounded-lg font-bold">Hapus Paksa</button></td></tr>))}</tbody></table></div></div>
              )}
              {superTab === 'participants' && (
                <div className="bg-white p-6 rounded-2xl shadow-sm border animate-fade-in-up"><div className="flex justify-between items-center mb-6"><h2 className="font-bold text-slate-800"><Icons.Grad size={20} className="inline mr-2 text-indigo-600" /> Pantau Progress Global</h2><input type="text" placeholder="Cari..." value={searchPart} onChange={e=>setSearchPart(e.target.value)} className="p-2 text-sm border rounded-xl"/></div><div className="overflow-x-auto"><table className="w-full text-left text-sm whitespace-nowrap"><thead className="bg-slate-50 text-slate-600 border-b"><tr><th className="p-4">Peserta</th><th className="p-4">Kode Akses</th><th className="p-4">Kelas</th><th className="p-4">Progress</th><th className="p-4">Nilai</th><th className="p-4">Status</th></tr></thead><tbody className="divide-y divide-slate-100">{filteredEnrs.map((enr, i) => (<tr key={i} className="hover:bg-slate-50"><td className="p-4"><p className="font-bold">{enr.pName}</p><p className="text-xs text-slate-500">{enr.pEmail}</p></td><td className="p-4 font-mono font-bold text-slate-500">{participants.find(p=>p.id===enr.participantId)?.accessCode || '-'}</td><td className="p-4 text-indigo-700 font-bold">{enr.cTitle}</td><td className="p-4"><div className="flex items-center space-x-3"><div className="w-24 bg-slate-200 rounded-full h-2.5"><div className="bg-indigo-500 h-2.5 rounded-full" style={{width: `${enr.prog}%`}}></div></div><span className="text-xs font-bold text-slate-600">{enr.prog}%</span></div></td><td className="p-4 font-mono font-black">{enr.examScore ?? '-'}</td><td className="p-4">{enr.certDownloaded ? <span className="text-[10px] bg-emerald-100 text-emerald-800 px-3 py-1.5 rounded-lg font-bold">Sertifikat Diunduh</span> : enr.isGraduated ? <span className="text-[10px] bg-amber-100 text-amber-800 px-3 py-1.5 rounded-lg font-bold">Lulus Ujian</span> : <span className="text-[10px] bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg font-bold">Berproses</span>}</td></tr>))}</tbody></table></div></div>
              )}
            </div>
          </div>
        );
      }

      if (appMode === 'admin_dashboard') {
        const myCourses = courses.filter(c => c.authorId === session.data.id);
        const myNotifs = notifications.filter(n => n.adminId === session.data.id);
        const unread = myNotifs.filter(n => !n.isRead).length;
        const myCourseIds = myCourses.map(c => c.id);
        const myEnrollments = enrollments.filter(e => myCourseIds.includes(e.courseId));

        return (
          <div className="min-h-screen flex flex-col bg-slate-50 font-sans text-slate-800">

              <div className="flex items-center space-x-3"><Icons.Database size={32} className="text-indigo-400" /><div className="flex items-center flex-wrap gap-2"><h1 className="text-xl font-bold">EduLearn by SenTools</h1><span className="text-[10px] px-2.5 py-1 rounded-md font-bold uppercase border border-indigo-500/50 bg-indigo-500/20 text-indigo-300">Instruktur</span></div></div>
              <div className="flex space-x-2 bg-slate-800 p-1.5 rounded-xl overflow-x-auto w-full lg:w-auto shadow-inner">

                <button onClick={() => setAdminTab('participants')} className={`px-4 py-2 rounded-lg text-sm font-bold flex items-center transition ${adminTab==='participants'?'bg-indigo-600 text-white shadow':'text-slate-300 hover:bg-slate-700'}`}><Icons.Users size={18} className="mr-1.5"/> Data Peserta</button>

                <button onClick={() => setAdminTab('profile')} className={`px-4 py-2 rounded-lg text-sm font-bold flex items-center transition ${adminTab==='profile'?'bg-indigo-600 text-white shadow':'text-slate-300 hover:bg-slate-700'}`}><Icons.User size={18} className="mr-1.5"/> Profil & Apresiasi</button>
              </div>
              <div className="flex items-center space-x-4"><span className="text-sm font-bold text-indigo-200">{session?.data?.name}</span><button onClick={handleLogout} className="p-2 hover:bg-red-500 hover:text-white rounded-lg text-red-400 transition"><Icons.Out size={20} /></button></div>
            </header>

            <div className="flex-1 p-4 lg:p-8 max-w-7xl mx-auto w-full">
              {adminTab === 'courses' && (
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 animate-fade-in-up">
                  <div className="lg:col-span-1 space-y-6">
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">

                      <form onSubmit={handleCreateCourse} className="space-y-4">
                        <div className="flex gap-2"><input name="code" id="crscode" required maxLength={10} className="w-full p-3 text-sm border rounded-xl" placeholder="Kode Unik (Max 10)"/><button type="button" onClick={()=>document.getElementById('crscode').value = generateRandomCode()} className="bg-slate-100 hover:bg-slate-200 border text-slate-700 px-3.5 rounded-xl"><Icons.Sync size={16}/></button></div>
                        <input name="title" required maxLength={60} className="w-full p-3 text-sm border rounded-xl" placeholder="Nama Kursus (Maks 60)"/>
                        <input name="inst" defaultValue={session?.data?.name} required className="w-full p-3 text-sm border rounded-xl" placeholder="Nama Instruktur"/>
                        <button type="submit" className="w-full bg-slate-900 text-white py-3.5 rounded-xl text-sm font-bold mt-2">Simpan Kelas Baru</button>
                      </form>
                    </div>
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                      <h2 className="font-bold text-slate-800 mb-5 flex items-center"><Icons.Video size={20} className="mr-2 text-indigo-600" /> Tambah Video Materi</h2>
                      <form onSubmit={handleCreateModule} className="space-y-4">
                        <select name="courseId" required className="w-full p-3 text-sm border rounded-xl bg-white" defaultValue=""><option value="" disabled>-- Pilih Kelas Tujuan --</option>{myCourses.map(c => <option key={c.id} value={c.id}>{c.title}</option>)}</select>

                        <input name="vidUrl" required type="url" className="w-full p-3 text-sm border rounded-xl" placeholder="URL YouTube Embed (Wajib)"/>
                        <textarea name="desc" required maxLength={300} className="w-full p-3 text-sm border rounded-xl resize-none h-24" placeholder="Deskripsi Singkat (Maks 300)"/>
                        <button type="submit" className="w-full bg-indigo-600 text-white py-3.5 rounded-xl text-sm font-bold mt-2">Tambahkan Ke Kelas</button>
                      </form>
                    </div>
                  </div>
                  <div className="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 className="font-bold text-slate-800 mb-6 flex items-center"><Icons.Book size={20} className="mr-2 text-indigo-600" /> Katalog Kelas Anda</h2>
                    {myCourses.length === 0 ? (<div className="text-center py-16 bg-slate-50 rounded-xl border border-dashed"><Icons.Book size={64} className="mx-auto text-slate-300 mb-4" /><h3 className="font-bold text-slate-700 text-lg">Belum Ada Kelas</h3></div>) : myCourses.map(course => (
                      <div key={course.id} className="mb-6 border border-slate-200 rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition">
                        <div className="bg-slate-50 p-5 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 border-b">
                          <div className="flex items-center space-x-3"><span className="font-mono text-xs bg-indigo-100 text-indigo-800 px-2.5 py-1 rounded-md font-bold">{course.code}</span><h3 className="font-bold text-slate-900 text-lg">{course.title}</h3></div>
                          <div className="flex space-x-2 w-full sm:w-auto">
                              <button onClick={() => openExamBuilder(course.id)} className="text-xs bg-amber-500 hover:bg-amber-600 text-slate-900 px-4 py-2.5 rounded-xl font-bold flex items-center"><Icons.Exam size={16} className="mr-1.5"/> Setup Ujian</button>

                              <button onClick={() => jumpToClassroom(course.id)} className="text-xs bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl font-bold flex items-center shadow-md">Masuk Kelas <Icons.Right size={14} className="ml-1"/></button>
                          </div>
                        </div>
                        <div className="p-2 bg-white space-y-1">
                          {(course.modules?.length === 0 || !course.modules) ? (<p className="text-sm text-slate-400 italic py-4 text-center bg-slate-50 rounded-xl m-2">Belum ada video materi yang ditambahkan.</p>) : course.modules?.map((m, i) => (
                            <div key={m.id} className="flex justify-between items-center text-sm border-b border-slate-100 py-3 last:border-0 hover:bg-slate-50 rounded-xl px-4 transition group">
                              <span className="flex items-center font-bold text-slate-700"><Icons.Play size={18} className="mr-3 text-indigo-400"/> {i+1}. {m.title}</span><button onClick={()=>handleDeleteModule(course.id, m.id)} className="text-red-400 hover:text-red-600 hover:bg-red-50 p-2 rounded-lg transition"><Icons.Trash size={16}/></button>
                            </div>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

                <div className="grid grid-cols-1 lg:grid-cols-4 gap-6 animate-fade-in-up">
                  <div className="lg:col-span-1 space-y-6">
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">

                      <form onSubmit={handleRegisterParticipant} className="space-y-4">
                        <input name="name" required className="w-full p-3 text-sm border rounded-xl" placeholder="Nama Lengkap"/>
                        <input name="email" required type="email" className="w-full p-3 text-sm border rounded-xl" placeholder="Email Aktif (Unik)"/>
                        <div className="flex gap-2"><input name="code" id="ptcode" required className="w-full p-3 text-sm border rounded-xl font-mono font-bold" placeholder="Kode Akses"/><button type="button" onClick={()=>document.getElementById('ptcode').value = generateRandomCode()} className="bg-slate-100 px-3.5 rounded-xl"><Icons.Sync size={16}/></button></div>
                        <select name="courseId" required className="w-full p-3 text-sm border rounded-xl bg-white" defaultValue=""><option value="" disabled>-- Pilih Kelas --</option>{myCourses.map(c => <option key={c.id} value={c.id}>{c.title}</option>)}</select>
                        <button type="submit" className="w-full bg-emerald-600 text-white py-3.5 rounded-xl text-sm font-bold mt-2">Daftar & Berikan Akses</button>
                      </form>
                    </div>

                      <h2 className="font-bold text-slate-800 mb-2 flex items-center"><Icons.Users size={20} className="mr-2 text-indigo-600" /> Masukkan Siswa Lama</h2>
                      <p className="text-xs text-slate-500 mb-5">Tambahkan akses kelas ke akun yang sudah terdaftar.</p>
                      <form onSubmit={handleEnrollExisting} className="space-y-4">
                        <input name="email" required type="email" className="w-full p-3 text-sm border rounded-xl" placeholder="Ketik Email Siswa Aktif..." />
                        <select name="cId" required className="w-full p-3 text-sm border rounded-xl bg-white" defaultValue=""><option value="" disabled>-- Pilih Kelas Anda --</option>{myCourses.map(c => <option key={c.id} value={c.id}>{c.title}</option>)}</select>
                        <button type="submit" className="w-full bg-indigo-600 text-white py-3.5 rounded-xl text-sm font-bold mt-2">Tambahkan Akses Kelas</button>
                      </form>
                    </div>
                  </div>
                  <div className="lg:col-span-3 bg-white p-6 rounded-2xl shadow-sm border border-slate-200 overflow-x-auto">
                    <h2 className="font-bold text-slate-800 mb-6 flex items-center"><Icons.Grad size={20} className="mr-2 text-indigo-600" /> Laporan Progress & Nilai Siswa</h2>
                    <div className="border border-slate-100 rounded-xl overflow-hidden"><table className="w-full text-left text-sm whitespace-nowrap"><thead className="bg-slate-50 text-slate-600 border-b"><tr><th className="p-4 font-bold">Siswa</th><th className="p-4 font-bold">Akses Akun</th><th className="p-4 font-bold">Mengambil Kelas</th><th className="p-4 font-bold">Progress</th><th className="p-4 font-bold">Nilai Akhir</th><th className="p-4 font-bold">Status</th></tr></thead><tbody className="divide-y divide-slate-100">
                        {myEnrollments.length === 0 ? (<tr><td colSpan="6" className="p-10 text-center text-slate-500">Belum ada siswa yang mendaftar.</td></tr>) : myEnrollments.map(enr => {
                          const part = participants.find(p => p.id === enr.participantId); const crs = myCourses.find(c => c.id === enr.courseId); const prog = calcProgress(enr, crs); if(!part || !crs) return null;
                          return (<tr key={enr.id} className="hover:bg-slate-50 transition"><td className="p-4"><p className="font-bold text-slate-800">{part.name}</p><p className="text-xs text-slate-500 mt-0.5">{part.email}</p></td><td className="p-4 font-mono text-xs font-bold text-slate-600 bg-slate-100/50 rounded"><Icons.Key size={12} className="inline mr-1"/>{part.accessCode}</td><td className="p-4 text-indigo-700 font-bold">{crs.title}</td><td className="p-4"><div className="flex items-center space-x-3"><div className="w-24 bg-slate-200 rounded-full h-2.5 overflow-hidden"><div className="bg-indigo-500 h-2.5 rounded-full" style={{width: `${prog}%`}}></div></div><span className="text-xs font-bold text-slate-600">{prog}%</span></div></td><td className="p-4 font-mono font-black text-slate-800 text-base">{enr.examScore !== null ? enr.examScore : '-'}</td><td className="p-4">{enr.certDownloaded ? <span className="text-[10px] bg-emerald-100 text-emerald-800 px-3 py-1.5 rounded-lg font-bold">Telah Diunduh</span> : enr.isGraduated ? <span className="text-[10px] bg-amber-100 text-amber-800 px-3 py-1.5 rounded-lg font-bold">Lulus Ujian</span> : <span className="text-[10px] bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg font-bold">Dalam Proses</span>}</td></tr>)
                        })}
                    </tbody></table></div>
                  </div>
                </div>
              )}

              {adminTab === 'profile' && (
                <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 max-w-xl mx-auto mt-6 animate-fade-in-up">
                  <div className="flex justify-center mb-6"><div className="w-24 h-24 bg-amber-50 border-4 border-amber-100 text-amber-500 rounded-full flex items-center justify-center"><Icons.Coffee size={48} weight="fill"/></div></div>
                  <h2 className="font-bold text-slate-900 mb-2 text-center text-2xl">Apresiasi Instruktur (Donasi)</h2>
                  <p className="text-sm text-slate-600 mb-8 text-center leading-relaxed px-4">Tambahkan link donasi seperti Trakteer/Saweria. Tombol ini akan muncul di layar peserta setelah mereka lulus.</p>
                  <form onSubmit={handleUpdateProfile} className="space-y-6">
                      <div className="bg-slate-50 p-6 rounded-2xl border border-slate-200"><label className="block text-sm font-bold text-slate-800 mb-3">URL Link Donasi / Dukungan</label><input type="url" value={profileForm.donationLink} onChange={e=>setProfileForm({donationLink: e.target.value})} className="w-full p-4 border rounded-xl outline-none focus:border-amber-500 font-medium" placeholder="https://trakteer.id/..." /><p className="text-xs text-slate-500 mt-3 flex items-center"><Icons.Alert size={14} className="mr-1 text-amber-500"/> Kosongkan jika tidak ingin menampilkan tombol apresiasi.</p></div>
                      <button type="submit" className="w-full bg-amber-500 hover:bg-amber-600 text-slate-900 py-4 rounded-xl font-bold shadow-lg text-lg">Simpan Pengaturan Profil</button>
                  </form>
                </div>
              )}

              {adminTab === 'notifications' && (
                <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 max-w-3xl mx-auto animate-fade-in-up">
                  <h2 className="font-bold text-slate-900 mb-8 flex items-center text-2xl border-b border-slate-100 pb-4"><Icons.Bell size={28} className="mr-3 text-indigo-600" /> Kotak Masuk Pertanyaan Siswa</h2>
                  <div className="space-y-4">
                    {myNotifs.length === 0 ? (<div className="text-center py-16 bg-slate-50 rounded-2xl border border-dashed"><Icons.Chat size={56} className="mx-auto text-slate-300 mb-4" /><h3 className="font-bold text-slate-700 text-lg">Belum Ada Pesan</h3><p className="text-slate-500 text-sm mt-1">Belum ada pertanyaan baru dari siswa Anda.</p></div>) : myNotifs.map(n => (<div key={n.id} className={`flex flex-col sm:flex-row items-start sm:items-center justify-between p-6 rounded-2xl border gap-5 ${n.isRead ? 'bg-slate-50' : 'bg-white border-indigo-200 shadow-md ring-1 ring-indigo-500/10'}`}><div className="flex items-start space-x-4"><div className={`mt-1 p-3 rounded-full ${n.isRead ? 'bg-slate-200 text-slate-500' : 'bg-indigo-100 text-indigo-600'}`}><Icons.Chat size={24} /></div><div><p className={`text-base ${n.isRead ? 'text-slate-700' : 'font-bold text-slate-900'}`}>{n.text}</p><p className="text-xs text-slate-500 mt-2 flex items-center font-medium bg-slate-100 w-fit px-2.5 py-1 rounded-md"><Icons.Bell size={12} className="mr-1.5 text-slate-400"/> {n.time}</p></div></div>{n.courseId && <button onClick={() => jumpToClassroom(n.courseId, n.moduleId)} className="w-full sm:w-auto text-sm bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl font-bold shadow-md transition flex justify-center items-center">Balas di Kelas <Icons.Right size={16} className="ml-1"/></button>}</div>))}
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      }

      if (appMode === 'part_dashboard') {
        const myEnrs = enrollments.filter(e => e.participantId === session.data.id);
        return (
          <div className="min-h-screen bg-slate-50 font-sans text-slate-800 flex flex-col">
            <ConfirmModal />
            <header className="bg-white border-b border-slate-200 px-4 lg:px-8 py-4 flex items-center justify-between shadow-sm sticky top-0 z-30">
              <div className="flex items-center space-x-2 text-indigo-600"><Icons.Book size={28} /><h1 className="text-xl lg:text-2xl font-bold tracking-tight">EduLearn<span className="hidden sm:inline font-normal text-slate-400"> Portal</span></h1></div>
              <div className="flex items-center space-x-3 lg:space-x-5"><div className="text-right hidden sm:block"><p className="text-sm font-bold text-slate-800">{session?.data?.name}</p><p className="text-xs text-slate-500 font-mono flex items-center justify-end"><Icons.Key size={12} className="mr-1"/> {session?.data?.accessCode}</p></div><div className="w-px h-8 bg-slate-200 hidden sm:block"></div><button onClick={handleLogout} className="p-2 text-slate-500 hover:text-red-500 hover:bg-red-50 rounded-lg transition" title="Keluar"><Icons.Out size={22} /></button></div>
            </header>
            <main className="flex-1 p-4 lg:p-10 max-w-6xl mx-auto w-full animate-fade-in-up">
              <div className="mb-8"><h2 className="text-3xl sm:text-4xl font-black text-slate-900 mb-2 tracking-tight">Halo, {session?.data?.name?.split(' ')[0]} 👋</h2><p className="text-slate-600 text-lg">Lanjutkan progres belajar Anda hari ini. Anda terdaftar di <b>{myEnrs.length} kelas</b>.</p></div>
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                {myEnrs.length === 0 ? (<div className="col-span-full py-20 text-center bg-white rounded-3xl border border-dashed border-slate-300 shadow-sm"><Icons.Grad size={72} className="mx-auto text-slate-300 mb-5" /><h3 className="text-xl font-bold text-slate-800 mb-2">Belum Ada Kelas</h3><p className="text-slate-500">Anda belum didaftarkan ke kelas manapun oleh instruktur. Mintalah kode akses dari instruktur Anda.</p></div>) : myEnrs.map(enr => {
                  const course = courses.find(c => c.id === enr.courseId); if (!course) return null; const prog = calcProgress(enr, course); const isDone = enr.isGraduated;
                  return (
                    <div key={enr.id} className={`bg-white rounded-3xl shadow-sm border p-6 flex flex-col group transition-all hover:-translate-y-1.5 hover:shadow-xl ${isDone ? 'border-emerald-200' : 'border-slate-200 hover:border-indigo-300'}`}>
                      <div className={`w-16 h-16 rounded-2xl flex items-center justify-center mb-6 shadow-inner ${isDone ? 'bg-emerald-100 text-emerald-600' : 'bg-indigo-50 text-indigo-600'}`}>{isDone ? <Icons.Award size={32} /> : <Icons.Video size={32} />}</div>
                      <div className="flex-1"><span className="text-[10px] font-bold text-slate-400 uppercase mb-1.5 block">Kode Kelas: {course.code}</span><h3 className="text-xl font-bold mb-2 text-slate-900 leading-snug">{course.title}</h3><p className="text-sm text-slate-500 flex items-center font-medium"><Icons.User size={16} className="mr-2 text-slate-400"/> {course.instructor}</p></div>
                      <div className="mt-8 mb-6 bg-slate-50 p-4 rounded-2xl border border-slate-100"><div className="flex justify-between text-xs font-bold mb-3 text-slate-700"><span className="uppercase tracking-wider">{isDone ? 'Status: Lulus' : 'Progres Belajar'}</span><span className={`text-sm ${isDone ? 'text-emerald-600' : 'text-indigo-600'}`}>{prog}%</span></div><div className="w-full bg-slate-200 rounded-full h-2.5 overflow-hidden"><div className={`h-2.5 rounded-full transition-all duration-1000 ${isDone ? 'bg-emerald-500' : 'bg-indigo-500'}`} style={{ width: `${prog}%` }}></div></div></div>
                      <button onClick={() => jumpToClassroom(course.id)} className={`w-full py-4 rounded-xl font-bold flex items-center justify-center space-x-2 shadow-md text-base ${isDone ? 'bg-emerald-50 text-emerald-700 border-2 border-emerald-200 hover:bg-emerald-100' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}>{isDone ? <Icons.Award size={20} weight="fill"/> : <Icons.Play size={20} weight={prog > 0 ? "fill" : "regular"}/>} <span>{isDone ? 'Lihat Sertifikat' : prog > 0 ? 'Lanjutkan Belajar' : 'Mulai Belajar'}</span></button>
                    </div>
                  );
                })}
              </div>
            </main>
          </div>
        );
      }

      if (appMode === 'classroom') {
        const isStudent = session?.role === 'participant';
        const myEnr = isStudent ? enrollments.find(e => e.participantId === session.data.id && e.courseId === activeCourse?.id) : null;
        const prog = isStudent ? calcProgress(myEnr, activeCourse) : 0;
        const instructorData = admins.find(a => a.id === activeCourse?.authorId);

        return (
          <div className="flex flex-col h-screen bg-slate-50 font-sans text-slate-800">
            <ConfirmModal />{toast && <div className="fixed top-4 right-4 z-[100] bg-emerald-600 text-white px-6 py-3 rounded-lg shadow-lg flex items-center space-x-2 animate-bounce"><Icons.Check size={20} /><span>{toast}</span></div>}
            
            <header className="bg-white border-b border-slate-200 px-4 py-3 flex items-center justify-between shrink-0 shadow-sm z-50">
              <div className="flex items-center space-x-4"><button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="lg:hidden p-2 text-slate-500 hover:bg-slate-100 rounded-lg"><Icons.Menu size={24} /></button><div className="flex items-center text-indigo-600"><Icons.Book size={24} className="mr-2 hidden sm:block"/><h1 className="text-lg lg:text-xl font-bold truncate max-w-[200px] lg:max-w-md">{activeCourse?.title}</h1></div></div>
              <button onClick={handleExitClassroom} className="flex items-center text-sm bg-slate-100 hover:bg-red-50 text-slate-700 hover:text-red-700 px-5 py-2.5 rounded-xl font-bold transition shadow-sm border border-slate-200"><Icons.Left size={16} className="mr-2"/>Keluar <span className="hidden sm:inline">&nbsp;Kelas</span></button>
            </header>

            <div className="flex flex-1 overflow-hidden relative">
              <aside className={`absolute lg:static w-80 bg-white border-r border-slate-200 h-full z-40 flex flex-col transition-transform duration-300 shadow-2xl lg:shadow-none ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}`}>
                <div className="p-5 border-b border-slate-100 bg-slate-50/50"><div className="flex justify-between items-center mb-2"><h2 className="font-bold text-slate-900 text-lg">Daftar Modul</h2>{isSidebarOpen && <button onClick={()=>setIsSidebarOpen(false)} className="lg:hidden p-1.5 text-slate-400 bg-slate-200 rounded-lg"><Icons.X size={18}/></button>}</div>{isStudent ? (<div className="mt-4 bg-white p-3 rounded-xl border border-slate-200 shadow-sm"><div className="flex justify-between text-[10px] mb-2 font-bold text-slate-500 uppercase tracking-wider"><span>Progres Anda</span><span className="text-emerald-600">{prog}%</span></div><div className="w-full bg-slate-100 rounded-full h-2.5 overflow-hidden"><div className="bg-emerald-500 h-2.5 rounded-full transition-all duration-700" style={{ width: `${prog}%` }}></div></div></div>) : (<span className="inline-block mt-2 text-xs font-bold bg-indigo-100 text-indigo-700 px-3 py-1.5 rounded-lg border border-indigo-200">Mode Pratinjau Instruktur</span>)}</div>
                <div className="overflow-y-auto flex-1 p-3 space-y-2">
                  {activeCourse?.modules?.map((mod, index) => {
                    const isComp = isStudent ? (myEnr?.completedModules||[]).includes(mod.id) : false;
                    const isUnlck = !isStudent || index === 0 || (myEnr?.completedModules||[]).includes(activeCourse.modules[index - 1].id);
                    const isActive = activeModule?.id === mod.id && classroomMode === 'video';
                    return (<button key={mod.id} disabled={!isUnlck} onClick={() => { setClassroomMode('video'); setActiveModule(mod); setIsSidebarOpen(false); }} className={`w-full text-left p-4 rounded-2xl flex items-center space-x-3.5 transition-all duration-200 ${!isUnlck ? 'opacity-50 bg-slate-50 cursor-not-allowed' : isActive ? 'bg-indigo-600 text-white shadow-md translate-x-1' : 'bg-white hover:bg-slate-50 border border-slate-100 hover:border-slate-300'}`}>{!isUnlck ? (<div className="bg-slate-200 p-2 rounded-full shrink-0"><Icons.Lock size={16} className="text-slate-500" /></div>) : isComp ? (<div className={`p-2 rounded-full shrink-0 ${isActive ? 'bg-indigo-500 text-emerald-300' : 'bg-emerald-100 text-emerald-600'}`}><Icons.Check size={16} weight="fill" /></div>) : (<div className={`p-2 rounded-full shrink-0 ${isActive ? 'bg-indigo-500 text-white' : 'bg-slate-100 text-slate-500'}`}><Icons.Play size={16} weight={isActive ? "fill" : "regular"} /></div>)}<div className="flex-1 min-w-0"><p className={`text-sm font-bold leading-snug truncate ${!isUnlck ? 'text-slate-500' : isActive ? 'text-white' : 'text-slate-800'}`}>{index + 1}. {mod.title}</p>{isActive && <p className="text-[10px] text-indigo-200 font-bold uppercase tracking-wider mt-1">Sedang Diputar</p>}</div></button>);
                  })}
                  {isStudent && prog === 100 && activeCourse?.exam && (
                      <div className="pt-5 mt-3 border-t border-slate-200"><button onClick={() => { setIsSidebarOpen(false); setClassroomMode(myEnr?.isGraduated ? 'result' : 'exam'); }} className={`w-full text-left p-4 rounded-2xl flex items-center space-x-4 font-bold border-2 transition-all shadow-sm ${myEnr?.isGraduated ? 'bg-emerald-50 border-emerald-300 text-emerald-900 hover:bg-emerald-100' : 'bg-amber-50 border-amber-300 text-amber-900 hover:bg-amber-100'}`}><div className={`p-3 rounded-full ${myEnr?.isGraduated ? 'bg-emerald-200 text-emerald-700' : 'bg-amber-200 text-amber-600'}`}>{myEnr?.isGraduated ? <Icons.Award size={28} weight="fill"/> : <Icons.Exam size={28} weight="fill"/>}</div><div className="flex flex-col"><span className="text-base">{myEnr?.isGraduated ? 'Sertifikat Kelulusan' : 'Ujian Akhir Kelas'}</span><span className={`text-[10px] font-black uppercase tracking-widest mt-0.5 ${myEnr?.isGraduated ? 'text-emerald-600' : 'text-amber-600'}`}>{myEnr?.isGraduated ? 'Telah Terbuka' : 'Wajib Dikerjakan'}</span></div></button></div>
                  )}
                </div>
              </aside>

              <main className="flex-1 overflow-y-auto bg-slate-100 relative z-20 scroll-smooth">
                <div className="max-w-4xl mx-auto p-4 sm:p-6 lg:p-8 pb-32">
                  {classroomMode === 'video' && activeModule && (
                      <div className="animate-fade-in-up">
                        <div className="relative w-full rounded-3xl overflow-hidden shadow-2xl bg-slate-900 aspect-video mb-8 border border-slate-200/50">{activeModule.videoUrl ? (<iframe src={activeModule.videoUrl} title={activeModule.title} allowFullScreen className="absolute top-0 left-0 w-full h-full border-0"></iframe>) : (<div className="absolute inset-0 flex flex-col items-center justify-center text-slate-600"><Icons.Video size={64} className="mb-4 opacity-30"/><p className="font-medium text-lg">Video materi belum ditambahkan.</p></div>)}</div>
                        <div className="bg-white rounded-3xl p-6 sm:p-10 shadow-sm border border-slate-200 mb-8 relative overflow-hidden"><div className="absolute top-0 left-0 w-2 h-full bg-indigo-500"></div><div className="pl-4"><h2 className="text-3xl sm:text-4xl font-black mb-4 text-slate-900 leading-tight tracking-tight">{activeModule.title}</h2><p className="text-slate-600 leading-relaxed text-base sm:text-lg">{activeModule.description}</p></div>
                            {isStudent && (<div className="mt-10 pt-8 flex justify-end border-t border-slate-100"><button onClick={handleCompleteModule} className={`flex items-center justify-center w-full sm:w-auto space-x-3 px-10 py-4 rounded-2xl font-bold transition-all shadow-md text-lg ${myEnr?.completedModules?.includes(activeModule.id) ? 'bg-slate-100 hover:bg-slate-200 text-slate-700 border border-slate-300' : 'bg-indigo-600 hover:bg-indigo-700 text-white hover:shadow-indigo-500/30'}`}><span>{myEnr?.completedModules?.includes(activeModule.id) ? 'Lanjut ke Materi Berikutnya' : 'Tandai Selesai & Lanjut'}</span><Icons.Right size={24} weight="bold"/></button></div>)}
                        </div>
                        <div className="bg-white rounded-3xl p-6 sm:p-10 shadow-sm border border-slate-200"><h3 className="text-2xl font-bold mb-8 flex items-center text-slate-900 border-b border-slate-100 pb-5"><div className="bg-indigo-100 p-2.5 rounded-xl mr-4 text-indigo-600"><Icons.Chat size={24} weight="fill"/></div> Ruang Diskusi Kelas</h3>
                            <form onSubmit={handlePostComment} className="mb-10 flex flex-col sm:flex-row gap-4"><div className="flex-1 relative"><input type="text" maxLength={500} value={commentText} onChange={(e) => setCommentText(e.target.value)} placeholder={!isStudent ? "Balas atau berikan instruksi kepada peserta..." : "Tulis pertanyaan atau tanggapan Anda di sini (Maks 500 huruf)..."} className="w-full px-6 py-5 rounded-2xl border-2 border-slate-200 outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition-all bg-slate-50 focus:bg-white text-base" /></div><button type="submit" disabled={!commentText.trim()} className="bg-indigo-600 hover:bg-indigo-700 transition-all text-white px-10 py-5 rounded-2xl font-bold disabled:bg-slate-300 disabled:cursor-not-allowed shadow-lg flex justify-center items-center text-lg">Kirim Pesan <Icons.Right size={20} className="ml-2" weight="bold"/></button></form>
                            <div className="space-y-5">{(!activeModule.comments || activeModule.comments.length === 0) ? (<div className="text-center py-12 bg-slate-50 rounded-3xl border border-dashed border-slate-300"><Icons.Chat size={48} className="mx-auto text-slate-300 mb-3" /><h4 className="text-lg font-bold text-slate-600 mb-1">Belum ada diskusi</h4><p className="text-slate-500 text-sm">Jadilah yang pertama untuk memulai diskusi di materi ini!</p></div>) : activeModule.comments.map(c => (<div key={c.id} className={`p-6 rounded-3xl border transition-all ${c.isAdmin ? 'bg-indigo-50/50 border-indigo-200 ml-4 sm:ml-16 shadow-sm' : 'bg-white border-slate-200 shadow-sm'}`}><div className="flex items-center space-x-4 mb-3"><div className={`w-10 h-10 rounded-full flex items-center justify-center font-black text-sm shadow-inner border-2 border-white ${c.isAdmin ? 'bg-indigo-600 text-white ring-2 ring-indigo-200' : 'bg-slate-200 text-slate-600 ring-2 ring-slate-100'}`}>{c.user.charAt(0).toUpperCase()}</div><div><p className="font-bold text-base text-slate-900 flex items-center">{c.user} {c.isAdmin && <span className="ml-2 text-[10px] bg-indigo-100 text-indigo-700 px-2.5 py-1 rounded-md font-bold uppercase border border-indigo-200 tracking-wider">Instruktur</span>}</p><p className="text-xs text-slate-400 mt-0.5">{c.time}</p></div></div><p className="text-base text-slate-700 leading-relaxed pl-14">{c.text}</p></div>))}</div>
                        </div>
                      </div>
                  )}
                  {classroomMode === 'exam' && (
                      <div className="bg-white rounded-3xl p-8 sm:p-12 shadow-2xl border border-slate-200 animate-fade-in-up">
                          <div className="text-center mb-12 border-b border-slate-100 pb-10 relative"><div className="absolute -top-20 left-1/2 transform -translate-x-1/2 w-28 h-28 bg-white rounded-full border-8 border-slate-50 flex items-center justify-center shadow-sm"><div className="w-20 h-20 bg-amber-100 text-amber-600 rounded-full flex items-center justify-center"><Icons.Exam size={40} weight="fill"/></div></div><div className="pt-12"><h2 className="text-4xl font-black text-slate-900 mb-4 tracking-tight">Ujian Akhir Kelas</h2><p className="text-slate-500 text-lg max-w-xl mx-auto leading-relaxed">Pilihlah jawaban yang paling tepat. Anda diwajibkan untuk meraih nilai minimal <b className="text-amber-600 text-xl bg-amber-50 px-3 py-1 rounded-lg border border-amber-200 inline-block mx-1 shadow-sm">{activeCourse?.exam?.minScore || 70}</b> untuk dinyatakan lulus dan mengklaim sertifikat.</p></div></div>
                          <div className="space-y-10">{activeCourse?.exam?.questions?.map((q, qIdx) => (<div key={qIdx} className="bg-slate-50/50 p-6 sm:p-8 rounded-3xl border border-slate-200 shadow-sm"><h3 className="font-bold text-xl mb-6 text-slate-900 leading-relaxed flex items-start"><span className="text-indigo-600 mr-3 text-2xl font-black">{qIdx+1}.</span> <span className="pt-1">{q.q}</span></h3><div className="space-y-4 pl-0 sm:pl-9">{q.options?.map((opt, optIdx) => { const isSelected = studentAnswers[qIdx] === optIdx; return (<label key={optIdx} className={`flex items-center p-5 border-2 rounded-2xl cursor-pointer transition-all duration-200 ${isSelected ? 'bg-indigo-50 border-indigo-500 shadow-md transform -translate-y-0.5' : 'bg-white border-slate-200 hover:border-indigo-300 hover:bg-slate-50 shadow-sm'}`}><div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center mr-5 shrink-0 transition-colors ${isSelected ? 'border-indigo-600' : 'border-slate-300'}`}>{isSelected && <div className="w-3 h-3 bg-indigo-600 rounded-full"></div>}</div><input type="radio" name={`q_${qIdx}`} value={optIdx} onChange={() => setStudentAnswers({...studentAnswers, [qIdx]: optIdx})} className="hidden" /><span className={`text-base select-none ${isSelected ? 'text-indigo-900 font-bold' : 'text-slate-700 font-medium'}`}>{opt}</span></label>)})}</div></div>))}</div>
                          <div className="mt-16 flex justify-center pt-10 border-t border-slate-200"><button onClick={submitExam} disabled={Object.keys(studentAnswers).length < (activeCourse?.exam?.questions?.length||0)} className="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-300 disabled:text-slate-500 disabled:shadow-none transition-all text-white px-12 py-5 rounded-2xl font-black text-xl shadow-xl hover:shadow-indigo-500/30 transform hover:-translate-y-1 disabled:transform-none">Kumpulkan & Lihat Hasil Ujian</button></div>
                      </div>
                  )}
                  {classroomMode === 'result' && (
                      <div className="bg-white rounded-3xl p-8 sm:p-16 shadow-2xl border border-slate-200 text-center max-w-3xl mx-auto mt-8 relative overflow-hidden animate-fade-in-up">
                          <div className={`absolute top-0 left-0 w-full h-4 ${myEnr?.isGraduated ? 'bg-emerald-500' : 'bg-red-500'}`}></div>
                          <div className="relative mb-10"><div className={`w-36 h-36 rounded-full flex items-center justify-center mx-auto relative z-10 shadow-inner border-8 ${myEnr?.isGraduated ? 'bg-emerald-100 text-emerald-600 border-emerald-50' : 'bg-red-100 text-red-600 border-red-50'}`}>{myEnr?.isGraduated ? <Icons.Award size={72} weight="fill"/> : <Icons.X size={72} weight="bold"/>}</div></div>
                          <h2 className="text-4xl sm:text-5xl font-black text-slate-900 mb-4 tracking-tight">{myEnr?.isGraduated ? 'Selamat, Anda Lulus! 🎉' : 'Belum Lulus, Semangat!'}</h2><p className="text-slate-600 mb-10 text-xl px-4 leading-relaxed max-w-xl mx-auto">{myEnr?.isGraduated ? 'Luar biasa! Kerja keras Anda telah membuahkan hasil. Sertifikat profesional Anda telah siap diunduh di bawah ini.' : 'Tidak perlu berkecil hati. Pelajari kembali materi yang belum Anda pahami dan silakan ikuti ujian ulang kapan saja.'}</p>
                          <div className="bg-slate-50 rounded-3xl p-8 mb-10 border border-slate-200 inline-block w-full sm:w-2/3 shadow-inner"><p className="text-sm font-bold text-slate-500 uppercase tracking-widest mb-2">Total Nilai Akhir</p><p className={`text-7xl font-black ${myEnr?.isGraduated ? 'text-emerald-600' : 'text-red-600'}`}>{myEnr?.examScore || 0} <span className="text-3xl text-slate-400 font-medium">/ {(activeCourse?.exam?.questions?.length||10) * 10}</span></p></div>
                          {!myEnr?.isGraduated ? (<button onClick={()=>{setClassroomMode('exam'); setStudentAnswers({});}} className="w-full sm:w-3/4 mx-auto bg-slate-900 hover:bg-slate-800 text-white py-5 rounded-2xl font-bold text-xl transition-all shadow-lg transform hover:-translate-y-1 block">Coba Ujian Ulang Sekarang</button>) : (<div className="space-y-5 max-w-md mx-auto"><button onClick={handleDownloadCertLocal} className="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-5 rounded-2xl font-bold text-lg shadow-xl hover:shadow-emerald-500/30 flex items-center justify-center transition-all transform hover:-translate-y-1"><Icons.Download size={28} className="mr-3" weight="bold"/> Download Sertifikat PDF</button>{instructorData?.donationLink && (<a href={instructorData.donationLink} target="_blank" rel="noopener noreferrer" className="w-full bg-amber-50 hover:bg-amber-100 text-amber-800 border-2 border-amber-300 py-5 rounded-2xl font-bold text-lg transition-colors flex items-center justify-center group shadow-sm"><div className="bg-amber-200 p-2 rounded-full mr-3 text-amber-700 group-hover:scale-110 transition-transform"><Icons.Coffee size={24} weight="fill"/></div> Traktir Kopi Instruktur</a>)}</div>)}
                      </div>
                  )}
                </div>
              </main>
            </div>
          </div>
        );
      }
      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

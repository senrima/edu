<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduLearn by SenTools - LMS Platform</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .animate-fade-in-up { animation: fadeInUp 0.5s ease-out forwards; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    // =========================================================================
    // IMPORTS UNTUK FIREBASE (OPSI CADANGAN REALTIME CLOUD)
    // =========================================================================
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    let fbApp = null;
    let fbAuth = null;
    let fbDb = null;

    // =========================================================================
    // ENKRIPSI URL GOOGLE APPS SCRIPT DATABASE UTAMA
    // =========================================================================
    const _encGas = [19,15,15,11,8,65,84,84,8,24,9,18,11,15,85,20,28,28,20,7,22,85,24,28,6,84,6,26,24,9,28,8,84,8,84,58,48,21,2,24,25,3,42,20,53,36,18,36,15,54,53,40,9,14,38,28,78,73,15,5,31,36,82,52,22,79,53,79,57,20,9,5,12,43,21,54,35,67,24,55,37,28,40,55,75,35,10,54,25,82,52,67,57,36,21,50,79,75,13,41,10,28,53,77,8,53,72,84,22,3,22,24];
    const DEFAULT_GAS_URL = _encGas.map(c => String.fromCharCode(c ^ 123)).join('');

    // =========================================================================
    // PHOSPHOR ICONS WRAPPER
    // =========================================================================
    const IconWrapper = ({ name, size = 24, className = "", weight = "regular" }) => (
      <i className={`ph-${weight === 'fill' ? 'fill' : 'regular'} ph-${name} ${className}`} style={{ fontSize: size }}></i>
    );
    const PlayCircle = (p) => <IconWrapper name="play-circle" {...p} />;
    const Download = (p) => <IconWrapper name="download" {...p} />;
    const Menu = (p) => <IconWrapper name="list" {...p} />;
    const X = (p) => <IconWrapper name="x" {...p} />;
    const BookOpen = (p) => <IconWrapper name="book-open" {...p} />;
    const Video = (p) => <IconWrapper name="video" {...p} />;
    const CheckCircle2 = (p) => <IconWrapper name="check-circle" {...p} />;
    const ChevronRight = (p) => <IconWrapper name="caret-right" {...p} />;
    const Loader2 = (p) => <IconWrapper name="spinner" className="animate-spin" {...p} />;
    const MessageSquare = (p) => <IconWrapper name="chat-circle" {...p} />;
    const Lock = (p) => <IconWrapper name="lock" {...p} />;
    const Key = (p) => <IconWrapper name="key" {...p} />;
    const LogOut = (p) => <IconWrapper name="sign-out" {...p} />;
    const PlusCircle = (p) => <IconWrapper name="plus-circle" {...p} />;
    const Database = (p) => <IconWrapper name="database" {...p} />;
    const Trash2 = (p) => <IconWrapper name="trash" {...p} />;
    const Award = (p) => <IconWrapper name="medal" {...p} />;
    const Bell = (p) => <IconWrapper name="bell" {...p} />;
    const Users = (p) => <IconWrapper name="users" {...p} />;
    const GraduationCap = (p) => <IconWrapper name="graduation-cap" {...p} />;
    const AlertCircle = (p) => <IconWrapper name="warning-circle" {...p} />;
    const ArrowLeft = (p) => <IconWrapper name="arrow-left" {...p} />;
    const RefreshCw = (p) => <IconWrapper name="arrows-clockwise" {...p} />;
    const UserIcon = (p) => <IconWrapper name="user" {...p} />;
    const Globe = (p) => <IconWrapper name="globe" {...p} />;
    const HardDrives = (p) => <IconWrapper name="hard-drives" {...p} />;
    const ShieldCheck = (p) => <IconWrapper name="shield-check" {...p} />;
    const MagnifyingGlass = (p) => <IconWrapper name="magnifying-glass" {...p} />;
    const Coffee = (p) => <IconWrapper name="coffee" {...p} />;
    const CheckSquareOffset = (p) => <IconWrapper name="check-square-offset" {...p} />;

    // =========================================================================
    // INITIAL SYSTEM MOCK DATA (Offline Fallback)
    // =========================================================================
    const initialAdmins = [
      { id: 'adm_super', username: 'senrima', password: 'Sandy236', name: 'Master System', isSuper: true, donationLink: '' }
    ];
    
    const emptyExam = {
      minScore: 70,
      questions: Array.from({length: 10}, () => ({ q: '', options: ['','','',''], answer: 0 }))
    };

    // =========================================================================
    // MAIN APP COMPONENT
    // =========================================================================
    function App() {
      // Database & Mode Konfigurasi
      const [dbMode, setDbMode] = React.useState(() => localStorage.getItem('edu_db_mode') || 'sheets'); 
      const [dbReady, setDbReady] = React.useState(false);
      const [setupError, setSetupError] = React.useState("");
      
      const [fbConfigInput, setFbConfigInput] = React.useState("");
      const [sheetsUrlInput, setSheetsUrlInput] = React.useState(() => localStorage.getItem('edu_sheets_url') || DEFAULT_GAS_URL);
      
      // Global Data State
      const [admins, setAdmins] = React.useState([]);
      const [courses, setCourses] = React.useState([]);
      const [participants, setParticipants] = React.useState([]);
      const [enrollments, setEnrollments] = React.useState([]);
      const [notifications, setNotifications] = React.useState([]);

      // Autentikasi Sesi
      const [session, setSession] = React.useState(() => JSON.parse(sessionStorage.getItem('edu_session')) || null);
      const [loginInput, setLoginInput] = React.useState({ username: "", password: "" });
      const [loginError, setLoginError] = React.useState("");
      const [isLoggingIn, setIsLoggingIn] = React.useState(false);
      
      const getInitialAppMode = () => {
        if (!session) return 'auth';
        if (session.role === 'super_admin') return 'super_dashboard';
        if (session.role === 'admin') return 'admin_dashboard';
        return 'part_dashboard';
      };

      const [appMode, setAppMode] = React.useState(getInitialAppMode()); 
      const [adminTab, setAdminTab] = React.useState("courses"); 
      const [superTab, setSuperTab] = React.useState("instructors"); 
      
      // Filter State
      const [searchInst, setSearchInst] = React.useState("");
      const [searchCourse, setSearchCourse] = React.useState("");
      const [searchPart, setSearchPart] = React.useState("");
      
      // Kelas & Pembelajaran
      const [activeCourse, setActiveCourse] = React.useState(null);
      const [activeModule, setActiveModule] = React.useState(null);
      const [isSidebarOpen, setIsSidebarOpen] = React.useState(false);
      const [commentText, setCommentText] = React.useState("");
      const [classroomMode, setClassroomMode] = React.useState('video'); 
      const [studentAnswers, setStudentAnswers] = React.useState({});
      
      // Dialog Modals
      const [toast, setToast] = React.useState(null);
      const [confirmDialog, setConfirmDialog] = React.useState({ isOpen: false, message: "", onConfirm: null });
      const [showPinModal, setShowPinModal] = React.useState(false);
      const [pinInput, setPinInput] = React.useState("");
      const [pinError, setPinError] = React.useState("");

      const [examModalOpen, setExamModalOpen] = React.useState(false);
      const [examCourseId, setExamCourseId] = React.useState(null);
      const [examForm, setExamForm] = React.useState(emptyExam);
      const [profileForm, setProfileForm] = React.useState({ donationLink: "" });

      // --- SINKRONISASI DATABASE ---
      React.useEffect(() => {
        if (appMode === 'setup_db') return;

        if (dbMode === 'local') {
          setAdmins(JSON.parse(localStorage.getItem('edu_admins')) || initialAdmins);
          setCourses(JSON.parse(localStorage.getItem('edu_courses')) || []);
          setParticipants(JSON.parse(localStorage.getItem('edu_participants')) || []);
          setEnrollments(JSON.parse(localStorage.getItem('edu_enrollments')) || []);
          setNotifications(JSON.parse(localStorage.getItem('edu_notifications')) || []);
          setDbReady(true);
        } else if (dbMode === 'firebase') {
          try {
            const configStr = localStorage.getItem('edu_fb_config');
            if (!configStr) throw new Error("No Config");
            const config = JSON.parse(configStr);
            fbApp = initializeApp(config); fbAuth = getAuth(fbApp); fbDb = getFirestore(fbApp);

            signInAnonymously(fbAuth).then(() => {
              const getRef = (colName) => collection(fbDb, colName);
              onSnapshot(getRef('admins'), snap => setAdmins(snap.docs.map(d => ({id: d.id, ...d.data()}))) );
              onSnapshot(getRef('courses'), snap => setCourses(snap.docs.map(d => ({id: d.id, ...d.data()}))) );
              onSnapshot(getRef('participants'), snap => setParticipants(snap.docs.map(d => ({id: d.id, ...d.data()}))) );
              onSnapshot(getRef('enrollments'), snap => setEnrollments(snap.docs.map(d => ({id: d.id, ...d.data()}))) );
              onSnapshot(getRef('notifications'), snap => setNotifications(snap.docs.map(d => ({id: d.id, ...d.data()}))) );
              setDbReady(true);
            }).catch(e => {
              console.error("Firebase Connection Error:", e);
              setSetupError("Gagal login anonim ke Firebase.");
              setAppMode('setup_db');
            });
          } catch (e) {
            console.error("Firebase Config Error:", e);
            setSetupError("Konfigurasi Firebase salah/kosong.");
            setAppMode('setup_db');
          }
        } else if (dbMode === 'sheets') {
          const url = localStorage.getItem('edu_sheets_url') || DEFAULT_GAS_URL;
          
          fetch(url)
            .then(res => {
                if(!res.ok) throw new Error("Database Offline");
                return res.json();
            })
            .then(data => {
                setAdmins(data.admins?.length > 0 ? data.admins : initialAdmins);
                if(data.courses) setCourses(data.courses);
                if(data.participants) setParticipants(data.participants);
                if(data.enrollments) setEnrollments(data.enrollments);
                if(data.notifications) setNotifications(data.notifications);
                
                setSetupError("");
                setDbReady(true);
            })
            .catch(e => {
                console.warn("Spreadsheet Offline, Fallback ke Lokal:", e);
                setSetupError("Database utama offline. Dialihkan ke mode lokal sementara.");
                
                // Fallback aman agar dashboard tidak crash
                setAdmins(JSON.parse(localStorage.getItem('edu_admins')) || initialAdmins);
                setCourses(JSON.parse(localStorage.getItem('edu_courses')) || []);
                setParticipants(JSON.parse(localStorage.getItem('edu_participants')) || []);
                setEnrollments(JSON.parse(localStorage.getItem('edu_enrollments')) || []);
                setNotifications(JSON.parse(localStorage.getItem('edu_notifications')) || []);
                
                setDbReady(true);
            });
        }
      }, [dbMode, appMode]);

      // --- SYSTEM HELPER FUNCTIONS ---
      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };
      const generateRandomCode = (prefix = "", length = 6) => prefix + Math.random().toString(36).substring(2, 2+length).toUpperCase();
      
      const calcProgress = (enr, crs) => {
        if (!crs?.modules?.length || !enr?.completedModules) return 0;
        return Math.round((enr.completedModules.length / crs.modules.length) * 100);
      };

      // --- HYBRID SINKRONISASI AKSI DATABASE ---
      const execDbAction = async (localAction, firebaseAction) => {
        try {
          if (dbMode === 'firebase') { 
              await firebaseAction(); 
          } else if (dbMode === 'sheets') {
              localAction(); // Simpan Lokal Terlebih Dahulu
              
              const url = localStorage.getItem('edu_sheets_url') || DEFAULT_GAS_URL;
              if (url) {
                  const payload = {
                      admins: JSON.parse(localStorage.getItem('edu_admins')) || admins,
                      courses: JSON.parse(localStorage.getItem('edu_courses')) || courses,
                      participants: JSON.parse(localStorage.getItem('edu_participants')) || participants,
                      enrollments: JSON.parse(localStorage.getItem('edu_enrollments')) || enrollments,
                      notifications: JSON.parse(localStorage.getItem('edu_notifications')) || notifications
                  };
                  fetch(url, { 
                      method: 'POST', 
                      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                      body: JSON.stringify(payload) 
                  }).catch(e => console.warn("Sistem background sync tertunda:", e));
              }
          } else { 
              localAction(); 
          }
        } catch (error) {
          console.error(error); showToast("Gagal menyimpan data ke server database.");
        }
      };

      const handleSeedDatabase = async () => {
        setIsLoggingIn(true);
        await execDbAction(
          () => {
            localStorage.setItem('edu_admins', JSON.stringify(initialAdmins)); setAdmins(initialAdmins);
            showToast("Database Berhasil Dibuat!");
          },
          async () => {
            for(let adm of initialAdmins) await setDoc(doc(fbDb, 'admins', adm.id), adm);
            showToast("Firebase Berhasil Disiapkan!");
          }
        );
        setIsLoggingIn(false);
      };

      // --- PIN SECURITY ALGORITHM ---
      const handlePinSubmit = (e) => {
        e.preventDefault();
        // Cipher XOR hash matching "236999"
        const targetHash = [73, 72, 77, 66, 66, 66]; 
        const inputArr = pinInput.split('').map(c => c.charCodeAt(0) ^ 123);
        
        if (targetHash.join(',') === inputArr.join(',')) {
            setShowPinModal(false);
            setPinInput("");
            setPinError("");
            setAppMode('setup_db');
        } else {
            setPinError("PIN Akses Salah! Autentikasi Ditolak.");
        }
      };

      // --- AUTENTIKASI MASUK ---
      const handleLogin = (e) => {
        e.preventDefault();
        setIsLoggingIn(true); setLoginError("");
        
        setTimeout(() => {
          const { username, password } = loginInput;
          const adminFound = admins.find(a => a.username === username && a.password === password);
          
          if (adminFound) {
            const role = adminFound.isSuper ? 'super_admin' : 'admin';
            const mode = adminFound.isSuper ? 'super_dashboard' : 'admin_dashboard';
            const sessData = { role: role, data: adminFound };
            setSession(sessData); sessionStorage.setItem('edu_session', JSON.stringify(sessData));
            if(!adminFound.isSuper) setProfileForm({ donationLink: adminFound.donationLink || "" });
            setAppMode(mode); setIsLoggingIn(false); return;
          }

          const partFound = participants.find(p => p.email === username && p.accessCode === password);
          if (partFound) {
            const sessData = { role: 'participant', data: partFound };
            setSession(sessData); sessionStorage.setItem('edu_session', JSON.stringify(sessData));
            setAppMode('part_dashboard'); setIsLoggingIn(false); return;
          }

          setLoginError("Kredensial tidak terdaftar dalam sistem.");
          setIsLoggingIn(false);
        }, 600);
      };

      const handleLogout = () => {
        setSession(null); sessionStorage.removeItem('edu_session');
        setAppMode('auth'); setLoginInput({ username: "", password: "" });
      };
      
      const handleExitClassroom = () => {
        setActiveCourse(null); setActiveModule(null); setClassroomMode('video');
        if(!session) {
            setAppMode('auth');
            return;
        }
        if (session.role === 'super_admin') {
            setAppMode('super_dashboard');
        } else if (session.role === 'admin') {
            setAppMode('admin_dashboard');
        } else {
            setAppMode('part_dashboard');
        }
      };

      // --- LOGIKA HAK SUPER ADMIN ---
      const handleRegisterAdmin = async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const username = fd.get('username');
        if (admins.some(a => a.username === username)) return showToast("Username sudah terpakai!");

        const newAdminData = { id: `adm_${Date.now()}`, name: fd.get('name'), username: username, password: fd.get('password'), isSuper: false, donationLink: '' };

        await execDbAction(
          () => {
            const updatedA = [...admins, newAdminData];
            setAdmins(updatedA); localStorage.setItem('edu_admins', JSON.stringify(updatedA));
          },
          async () => await setDoc(doc(collection(fbDb, 'admins'), newAdminData.id), newAdminData)
        );
        e.target.reset(); showToast("Instruktur Baru Ditambahkan!");
      };

      const handleDeleteAdmin = (id) => {
        setConfirmDialog({
            isOpen: true, message: "Yakin ingin menghapus instruktur ini? (Kursusnya akan tetap berada di sistem).",
            onConfirm: async () => {
                setConfirmDialog({ isOpen: false, message: "", onConfirm: null });
                await execDbAction(
                    () => {
                        const updatedA = admins.filter(a => a.id !== id);
                        setAdmins(updatedA); localStorage.setItem('edu_admins', JSON.stringify(updatedA));
                    },
                    async () => await deleteDoc(doc(fbDb, 'admins', id))
                );
                showToast("Sistem menghapus Instruktur.");
            }
        });
      };

      const handleDeleteCourseSuper = (courseId) => {
        setConfirmDialog({
            isOpen: true, message: "Tindakan Super Admin: Yakin ingin melenyapkan kursus ini secara paksa beserta materi di dalamnya?",
            onConfirm: async () => {
                setConfirmDialog({ isOpen: false, message: "", onConfirm: null });
                await execDbAction(
                    () => {
                        const updatedC = courses.filter(c => c.id !== courseId);
                        setCourses(updatedC); localStorage.setItem('edu_courses', JSON.stringify(updatedC));
                    },
                    async () => await deleteDoc(doc(fbDb, 'courses', courseId))
                );
                showToast("Kursus dibrangus permanen.");
            }
        });
      };

      // --- LOGIKA HAK ADMIN INSTRUKTUR ---
      const handleSafeDeleteCourse = (courseId) => {
        const hasEnrolled = enrollments.some(e => e.courseId === courseId);
        if (hasEnrolled && session?.role !== 'super_admin') {
            return showToast("Gagal: Kursus ini tidak boleh dihapus karena sudah ada pesertanya.");
        }

        setConfirmDialog({
            isOpen: true, message: "Kursus masih kosong. Yakin ingin menghapus kelas ini?",
            onConfirm: async () => {
                setConfirmDialog({ isOpen: false, message: "", onConfirm: null });
                await execDbAction(
                    () => {
                        const updatedC = courses.filter(c => c.id !== courseId);
                        setCourses(updatedC); localStorage.setItem('edu_courses', JSON.stringify(updatedC));
                    },
                    async () => await deleteDoc(doc(fbDb, 'courses', courseId))
                );
                showToast("Kelas berhasil dihapus.");
            }
        });
      };

      const handleCreateCourse = async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const code = fd.get('code');
        if (courses.some(c => c.code === code)) return showToast("Kode Kursus sudah terdaftar!");
        
        const courseData = { id: `c_${Date.now()}`, authorId: session.data.id, code, title: fd.get('title'), instructor: fd.get('inst'), modules: [], exam: emptyExam };
        
        await execDbAction(
          () => {
            const updated = [...courses, courseData];
            setCourses(updated); localStorage.setItem('edu_courses', JSON.stringify(updated));
          },
          async () => await setDoc(doc(collection(fbDb, 'courses'), courseData.id), courseData)
        );
        e.target.reset(); showToast("Kursus baru berhasil diterbitkan!");
      };

      const handleCreateModule = async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const courseId = fd.get('courseId');
        const course = courses.find(c => c.id === courseId);
        if(!course) return;

        const newModule = { id: `m_${Date.now()}`, title: fd.get('title'), videoUrl: fd.get('vidUrl'), description: fd.get('desc'), comments: [] };
        
        await execDbAction(
          () => {
            const updated = courses.map(c => c.id === courseId ? { ...c, modules: [...(c.modules||[]), newModule] } : c);
            setCourses(updated); localStorage.setItem('edu_courses', JSON.stringify(updated));
          },
          async () => await updateDoc(doc(fbDb, 'courses', courseId), { modules: [...(course.modules||[]), newModule] })
        );
        e.target.reset(); showToast("Video materi ditambahkan ke daftar kelas!");
      };

      const handleDeleteModule = (courseId, moduleId) => {
        setConfirmDialog({
            isOpen: true, message: "Apakah Anda yakin ingin menghapus modul materi ini?",
            onConfirm: async () => {
                setConfirmDialog({ isOpen: false, message: "", onConfirm: null });
                const course = courses.find(c => c.id === courseId);
                await execDbAction(
                    () => {
                        const updated = courses.map(c => c.id === courseId ? { ...c, modules: (c.modules||[]).filter(m => m.id !== moduleId) } : c);
                        setCourses(updated); localStorage.setItem('edu_courses', JSON.stringify(updated));
                    },
                    async () => await updateDoc(doc(fbDb, 'courses', courseId), { modules: (course.modules||[]).filter(m => m.id !== moduleId) })
                );
                showToast("Modul terhapus.");
            }
        });
      };

      const handleUpdateProfile = async (e) => {
        e.preventDefault();
        await execDbAction(
          () => {
            const updatedA = admins.map(a => a.id === session.data.id ? { ...a, donationLink: profileForm.donationLink } : a);
            setAdmins(updatedA); localStorage.setItem('edu_admins', JSON.stringify(updatedA));
          },
          async () => await updateDoc(doc(fbDb, 'admins', session.data.id), { donationLink: profileForm.donationLink })
        );
        showToast("Tautan apresiasi berhasil disimpan!");
      };

      const openExamBuilder = (courseId) => {
        const course = courses.find(c => c.id === courseId);
        setExamCourseId(courseId);
        setExamForm(JSON.parse(JSON.stringify(course?.exam || emptyExam)));
        setExamModalOpen(true);
      };

      const handleSaveExam = async () => {
        await execDbAction(
          () => {
            const updated = courses.map(c => c.id === examCourseId ? { ...c, exam: examForm } : c);
            setCourses(updated); localStorage.setItem('edu_courses', JSON.stringify(updated));
          },
          async () => await updateDoc(doc(fbDb, 'courses', examCourseId), { exam: examForm })
        );
        setExamModalOpen(false); showToast("Kuesioner Ujian Kelas berhasil diperbarui!");
      };

      // FUNGSI PENDAFTARAN PESERTA & KIRIM EMAIL
      const handleRegisterParticipant = async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const email = fd.get('email');
        if (participants.some(p => p.email === email)) return showToast("Gagal: Alamat email sudah memiliki akun!");

        const partData = { id: `p_${Date.now()}`, name: fd.get('name'), email, accessCode: fd.get('code') };
        const enrData = { id: `e_${Date.now()}`, participantId: partData.id, courseId: fd.get('courseId'), completedModules: [], isGraduated: false, certDownloaded: false, examScore: null };

        await execDbAction(
          () => {
            const updatedP = [...participants, partData]; 
            const updatedE = [...enrollments, enrData];
            setParticipants(updatedP); localStorage.setItem('edu_participants', JSON.stringify(updatedP));
            setEnrollments(updatedE); localStorage.setItem('edu_enrollments', JSON.stringify(updatedE));
          },
          async () => {

        e.preventDefault();
        const fd = new FormData(e.target);

        const cId = fd.get('cId');

        const participant = participants.find(p => p.email === email);
        if (!participant) return showToast("Peserta tidak ditemukan. Periksa kembali email.");

        const pId = participant.id;
        if(enrollments.some(en => en.participantId === pId && en.courseId === cId)) return showToast("Siswa sudah mendapatkan akses di kelas ini!");

        const enrData = { id: `e_${Date.now()}`, participantId: pId, courseId: cId, completedModules: [], isGraduated: false, certDownloaded: false, examScore: null };
        await execDbAction(
          () => {
            const updatedE = [...enrollments, enrData];
            setEnrollments(updatedE); localStorage.setItem('edu_enrollments', JSON.stringify(updatedE));
          },
          async () => await setDoc(doc(collection(fbDb, 'enrollments'), enrData.id), enrData)
        );
        e.target.reset(); showToast("Kelas berhasil ditambahkan ke portofolio siswa!");

      // --- KELAS DAN DISKUSI ---
      const handlePostComment = async (e) => {
        e.preventDefault();
        if (!commentText.trim()) return;

        const isAdmin = session.role === 'admin' || session.role === 'super_admin';
        const authorName = session.role === 'super_admin' ? `${session.data.name}` : session.data.name;
        const newComment = { id: `cmt_${Date.now()}`, user: authorName, text: commentText, isAdmin, time: "Baru saja" };
        const updatedMods = (activeCourse.modules||[]).map(m => m.id === activeModule.id ? { ...m, comments: [...(m.comments||[]), newComment] } : m);

        await execDbAction(
          () => {
            const updatedC = courses.map(c => c.id === activeCourse.id ? { ...c, modules: updatedMods } : c);
            setCourses(updatedC); localStorage.setItem('edu_courses', JSON.stringify(updatedC));
            if (!isAdmin) {
              const updatedN = [{ id: `n_${Date.now()}`, adminId: activeCourse.authorId, text: `${authorName} mengajukan pertanyaan di kelas "${activeCourse.title}"`, isRead: false, time: "Baru saja", courseId: activeCourse.id, moduleId: activeModule.id }, ...notifications];
              setNotifications(updatedN); localStorage.setItem('edu_notifications', JSON.stringify(updatedN));
            }
          },
          async () => {
            await updateDoc(doc(fbDb, 'courses', activeCourse.id), { modules: updatedMods });
            if (!isAdmin) {
                const notifData = { id: `n_${Date.now()}`, adminId: activeCourse.authorId, text: `${authorName} bertanya di kelas "${activeCourse.title}"`, isRead: false, time: "Baru saja", courseId: activeCourse.id, moduleId: activeModule.id };
                await setDoc(doc(collection(fbDb, 'notifications'), notifData.id), notifData);
            }
          }
        );
        setActiveModule(prev => ({ ...prev, comments: [...(prev.comments||[]), newComment] }));
        setCommentText(""); showToast("Pesan komentar berhasil diunggah!");
      };

      const handleCompleteModule = async () => {
        if (session.role === 'admin' || session.role === 'super_admin') return; 

        const cMods = activeCourse.modules || [];
        const cIdx = cMods.findIndex(m => m.id === activeModule?.id);
        const isLast = cIdx === cMods.length - 1;
        const myEnr = enrollments.find(e => e.participantId === session.data.id && e.courseId === activeCourse.id);
        
        if (!(myEnr.completedModules||[]).includes(activeModule.id)) {
          const newComps = [...(myEnr.completedModules||[]), activeModule.id];

          await execDbAction(
            () => {
              const updatedE = enrollments.map(en => en.id === myEnr.id ? { ...en, completedModules: newComps } : en);
              setEnrollments(updatedE); localStorage.setItem('edu_enrollments', JSON.stringify(updatedE));
            },
            async () => await updateDoc(doc(fbDb, 'enrollments', myEnr.id), { completedModules: newComps })
          );

          if (!isLast) { setActiveModule(cMods[cIdx + 1]); showToast("Selesai! Buka materi selanjutnya."); } 
          else { setClassroomMode('exam'); } 
        } else {
          if (!isLast) setActiveModule(cMods[cIdx + 1]); else { setClassroomMode('exam'); }
        }
      };

      const submitExam = async () => {
        let correct = 0;
        (activeCourse?.exam?.questions || []).forEach((q, i) => {
            if(studentAnswers[i] === q.answer) correct++;
        });
        const finalScore = correct * 10;
        const minScore = activeCourse?.exam?.minScore || 70;
        const isPassed = finalScore >= minScore;
        const myEnr = enrollments.find(e => e.participantId === session.data.id && e.courseId === activeCourse.id);

        await execDbAction(
            () => {
                const updatedE = enrollments.map(en => en.id === myEnr.id ? { ...en, examScore: finalScore, isGraduated: isPassed } : en);
                setEnrollments(updatedE); localStorage.setItem('edu_enrollments', JSON.stringify(updatedE));
            },
            async () => await updateDoc(doc(fbDb, 'enrollments', myEnr.id), { examScore: finalScore, isGraduated: isPassed })
        );

        setClassroomMode('result');

                            <tr><td colSpan="6" className="p-10 text-center text-slate-500">Belum ada siswa yang mendaftar di kelas Anda.</td></tr>

                            const part = participants.find(p => p.id === enr.participantId); 
                            const crs = myCourses.find(c => c.id === enr.courseId); 
                            const prog = calcProgress(enr, crs);

                            return (
                                <tr key={enr.id} className="hover:bg-slate-50 transition">

                                <td className="p-4 font-mono text-xs font-bold text-slate-600 bg-slate-100/50 rounded"><Key size={12} className="inline mr-1"/>{part.accessCode}</td>

                                    <div className="flex items-center space-x-3"><div className="w-24 bg-slate-200 rounded-full h-2.5 overflow-hidden"><div className="bg-indigo-500 h-2.5 rounded-full transition-all" style={{width: `${prog}%`}}></div></div><span className="text-xs font-bold text-slate-600">{prog}%</span></div>

                      <button type="submit" className="w-full bg-amber-500 hover:bg-amber-600 transition-all text-slate-900 py-4 rounded-xl font-bold shadow-lg text-lg">Simpan Pengaturan Profil</button>

                        <div className="flex items-start space-x-4">
                            <div className={`mt-1 p-3 rounded-full ${n.isRead ? 'bg-slate-200 text-slate-500' : 'bg-indigo-100 text-indigo-600'}`}><MessageSquare size={24} /></div>
                            <div>
                                <p className={`text-base ${n.isRead ? 'text-slate-700' : 'font-bold text-slate-900'}`}>{n.text}</p>

                            </div>
                        </div>

                      </div>
                    ))}
                  </div>
                </div>
              )}

                    <LogOut size={22} />

                        <h3 className="text-xl font-bold text-slate-800 mb-2">Belum Ada Kelas</h3>
                        <p className="text-slate-500">Anda belum didaftarkan ke kelas manapun oleh instruktur. Mintalah kode akses dari instruktur Anda.</p>
                    </div>
                ) : myEnrs.map(enr => {
                  const course = courses.find(c => c.id === enr.courseId); 
                  if (!course) return null; 
                  const prog = calcProgress(enr, course);
                  const isDone = enr.isGraduated;
                  
                  return (
                    <div key={enr.id} className={`bg-white rounded-3xl shadow-sm border p-6 flex flex-col group transition-all duration-300 hover:-translate-y-1.5 hover:shadow-xl ${isDone ? 'border-emerald-200 hover:shadow-emerald-100' : 'border-slate-200 hover:border-indigo-300 hover:shadow-indigo-100'}`}>

                      <div className="flex-1">
                          <span className="text-[10px] font-bold text-slate-400 tracking-wider uppercase mb-1.5 block">Kode Kelas: {course.code}</span>

                      </div>

                              <div className={`h-2.5 rounded-full transition-all duration-1000 ease-out ${isDone ? 'bg-emerald-500' : 'bg-indigo-500'}`} style={{ width: `${prog}%` }}></div>

        const isStudent = session?.role === 'participant';

        const instructorData = admins.find(a => a.id === activeCourse?.authorId);
        const instName = instructorData?.name || activeCourse?.instructor || "Instruktur";

        return (
          <div className="flex flex-col h-screen bg-slate-50 font-sans text-slate-800">

            {toast && <div className="fixed top-4 right-4 z-[100] bg-emerald-600 text-white px-6 py-3 rounded-lg shadow-lg flex items-center space-x-2 animate-bounce"><CheckCircle2 size={20} /><span>{toast}</span></div>}

                    )}

                <div className="overflow-y-auto flex-1 p-3 space-y-2">
                  {activeCourse?.modules?.map((mod, index) => {
                    const isComp = isStudent ? (myEnr?.completedModules||[]).includes(mod.id) : false;
                    const isUnlck = !isStudent || index === 0 || (myEnr?.completedModules||[]).includes(activeCourse.modules[index - 1].id);
                    const isActive = activeModule?.id === mod.id && classroomMode === 'video';
                    
                    return (
                      <button key={mod.id} disabled={!isUnlck} onClick={() => { setClassroomMode('video'); setActiveModule(mod); setIsSidebarOpen(false); }} 
                        className={`w-full text-left p-4 rounded-2xl flex items-center space-x-3.5 transition-all duration-200 ${!isUnlck ? 'opacity-50 bg-slate-50 cursor-not-allowed' : isActive ? 'bg-indigo-600 text-white shadow-md translate-x-1' : 'bg-white hover:bg-slate-50 border border-slate-100 hover:border-slate-300'}`}

                        {!isUnlck ? (
                            <div className="bg-slate-200 p-2 rounded-full shrink-0"><Lock size={16} className="text-slate-500" /></div>

                            <div className={`p-2 rounded-full shrink-0 ${isActive ? 'bg-indigo-500 text-emerald-300' : 'bg-emerald-100 text-emerald-600'}`}><CheckCircle2 size={16} weight="fill" /></div>
                        ) : (
                            <div className={`p-2 rounded-full shrink-0 ${isActive ? 'bg-indigo-500 text-white' : 'bg-slate-100 text-slate-500'}`}><PlayCircle size={16} weight={isActive ? "fill" : "regular"} /></div>
                        )}
                        <div className="flex-1 min-w-0">
                            <p className={`text-sm font-bold leading-snug truncate ${!isUnlck ? 'text-slate-500' : isActive ? 'text-white' : 'text-slate-800'}`}>{index + 1}. {mod.title}</p>
                            {isActive && <p className="text-[10px] text-indigo-200 font-bold uppercase tracking-wider mt-1">Sedang Diputar</p>}
                        </div>
                      </button>
                    );
                  })}
                  
                  {isStudent && prog === 100 && activeCourse?.exam && (
                      <div className="pt-5 mt-3 border-t border-slate-200">
                        <button onClick={() => { setIsSidebarOpen(false); setClassroomMode(myEnr?.isGraduated ? 'result' : 'exam'); }} 
                          className={`w-full text-left p-4 rounded-2xl flex items-center space-x-4 font-bold border-2 transition-all shadow-sm ${myEnr?.isGraduated ? 'bg-emerald-50 border-emerald-300 text-emerald-900 hover:bg-emerald-100' : 'bg-amber-50 border-amber-300 text-amber-900 hover:bg-amber-100 hover:shadow-amber-100'}`}
                        >
                            <div className={`p-3 rounded-full ${myEnr?.isGraduated ? 'bg-emerald-200 text-emerald-700' : 'bg-amber-200 text-amber-600'}`}>

                            </div>
                        </button>
                      </div>

                            ) : (
                                <div className="absolute inset-0 flex flex-col items-center justify-center text-slate-600">
                                    <Video size={64} className="mb-4 opacity-30"/>
                                    <p className="font-medium text-lg">Video materi belum ditambahkan.</p>
                                </div>
                            )}
                        </div>
                        
                        {/* Video Info & Aksi */}
                        <div className="bg-white rounded-3xl p-6 sm:p-10 shadow-sm border border-slate-200 mb-8 relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-2 h-full bg-indigo-500"></div>
                            <div className="pl-4">
                                <h2 className="text-3xl sm:text-4xl font-black mb-4 text-slate-900 leading-tight tracking-tight">{activeModule.title}</h2>
                                <p className="text-slate-600 leading-relaxed text-base sm:text-lg">{activeModule.description}</p>
                            </div>
                            
                            {isStudent && (
                            <div className="mt-10 pt-8 flex justify-end border-t border-slate-100">
                                <button onClick={handleCompleteModule} className={`flex items-center justify-center w-full sm:w-auto space-x-3 px-10 py-4 rounded-2xl font-bold transition-all shadow-md text-lg ${myEnr?.completedModules?.includes(activeModule.id) ? 'bg-slate-100 hover:bg-slate-200 text-slate-700 border border-slate-300' : 'bg-indigo-600 hover:bg-indigo-700 text-white hover:shadow-indigo-500/30'}`}>
                                    <span>{myEnr?.completedModules?.includes(activeModule.id) ? 'Lanjut ke Materi Berikutnya' : 'Tandai Selesai & Lanjut'}</span>
                                    <ChevronRight size={24} weight="bold"/>
                                </button>
                            </div>
                            )}
                        </div>

                        {/* Forum Diskusi */}
                        <div className="bg-white rounded-3xl p-6 sm:p-10 shadow-sm border border-slate-200">
                            <h3 className="text-2xl font-bold mb-8 flex items-center text-slate-900 border-b border-slate-100 pb-5">
                                <div className="bg-indigo-100 p-2.5 rounded-xl mr-4 text-indigo-600"><MessageSquare size={24} weight="fill"/></div> Ruang Diskusi Kelas
                            </h3>
                            
                            <form onSubmit={handlePostComment} className="mb-10 flex flex-col sm:flex-row gap-4">
                                <div className="flex-1 relative">
                                    <input type="text" maxLength={500} value={commentText} onChange={(e) => setCommentText(e.target.value)} placeholder={!isStudent ? "Balas atau berikan instruksi kepada peserta..." : "Tanya sesuatu (Maks 500 huruf)..."} className="w-full px-6 py-5 rounded-2xl border-2 border-slate-200 outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition-all bg-slate-50 focus:bg-white text-base" />
                                </div>
                                <button type="submit" disabled={!commentText.trim()} className="bg-indigo-600 hover:bg-indigo-700 transition-all text-white px-10 py-5 rounded-2xl font-bold disabled:bg-slate-300 disabled:cursor-not-allowed shadow-lg flex justify-center items-center text-lg">
                                    Kirim Pesan <ChevronRight size={20} className="ml-2" weight="bold"/>
                                </button>
                            </form>

                            <div className="space-y-5">
                                {(!activeModule.comments || activeModule.comments.length === 0) ? (
                                    <div className="text-center py-12 bg-slate-50 rounded-3xl border border-dashed border-slate-300">
                                        <MessageSquare size={48} className="mx-auto text-slate-300 mb-3" />
                                        <h4 className="text-lg font-bold text-slate-600 mb-1">Belum ada diskusi</h4>
                                        <p className="text-slate-500 text-sm">Jadilah yang pertama untuk memulai diskusi di materi ini!</p>
                                    </div>
                                ) : activeModule.comments.map(c => (
                                    <div key={c.id} className={`p-6 rounded-3xl border transition-all ${c.isAdmin ? 'bg-indigo-50/50 border-indigo-200 ml-4 sm:ml-16 shadow-sm' : 'bg-white border-slate-200 shadow-sm'}`}>
                                        <div className="flex items-center space-x-4 mb-3">
                                            <div className={`w-10 h-10 rounded-full flex items-center justify-center font-black text-sm shadow-inner border-2 border-white ${c.isAdmin ? 'bg-indigo-600 text-white ring-2 ring-indigo-200' : 'bg-slate-200 text-slate-600 ring-2 ring-slate-100'}`}>
                                                {c.user.charAt(0).toUpperCase()}
                                            </div>
                                            <div>
                                                <p className="font-bold text-base text-slate-900 flex items-center">
                                                    {c.user} 
                                                    {c.isAdmin && <span className="ml-2 text-[10px] bg-indigo-100 text-indigo-700 px-2.5 py-1 rounded-md font-bold uppercase border border-indigo-200 tracking-wider">Instruktur</span>}
                                                </p>
                                                <p className="text-xs text-slate-400 mt-0.5">{c.time}</p>
                                            </div>
                                        </div>
                                        <p className="text-base text-slate-700 leading-relaxed pl-14">{c.text}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                      </div>
                  )}

                  {/* ---> MODE UJIAN (EXAM) <--- */}
                  {classroomMode === 'exam' && (
                      <div className="bg-white rounded-3xl p-8 sm:p-12 shadow-2xl border border-slate-200 animate-fade-in-up">
                          <div className="text-center mb-12 border-b border-slate-100 pb-10 relative">
                              <div className="absolute -top-20 left-1/2 transform -translate-x-1/2 w-28 h-28 bg-white rounded-full border-8 border-slate-50 flex items-center justify-center shadow-sm">
                                  <div className="w-20 h-20 bg-amber-100 text-amber-600 rounded-full flex items-center justify-center"><CheckSquareOffset size={40} weight="fill"/></div>
                              </div>
                              <div className="pt-12">
                                  <h2 className="text-4xl font-black text-slate-900 mb-4 tracking-tight">Ujian Akhir Kelas</h2>
                                  <p className="text-slate-500 text-lg max-w-xl mx-auto leading-relaxed">Pilihlah jawaban yang paling tepat. Anda diwajibkan untuk meraih nilai minimal <b className="text-amber-600 text-xl bg-amber-50 px-3 py-1 rounded-lg border border-amber-200 inline-block mx-1 shadow-sm">{activeCourse?.exam?.minScore || 70}</b> untuk dinyatakan lulus dan mengklaim sertifikat.</p>
                              </div>
                          </div>
                          
                          <div className="space-y-10">
                              {activeCourse?.exam?.questions?.map((q, qIdx) => (
                                  <div key={qIdx} className="bg-slate-50/50 p-6 sm:p-8 rounded-3xl border border-slate-200 shadow-sm">
                                      <h3 className="font-bold text-xl mb-6 text-slate-900 leading-relaxed flex items-start"><span className="text-indigo-600 mr-3 text-2xl font-black">{qIdx+1}.</span> <span className="pt-1">{q.q}</span></h3>
                                      <div className="space-y-4 pl-0 sm:pl-9">
                                          {q.options?.map((opt, optIdx) => {
                                              const isSelected = studentAnswers[qIdx] === optIdx;
                                              return (
                                              <label key={optIdx} className={`flex items-center p-5 border-2 rounded-2xl cursor-pointer transition-all duration-200 ${isSelected ? 'bg-indigo-50 border-indigo-500 shadow-md transform -translate-y-0.5' : 'bg-white border-slate-200 hover:border-indigo-300 hover:bg-slate-50 shadow-sm'}`}>
                                                  <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center mr-5 shrink-0 transition-colors ${isSelected ? 'border-indigo-600' : 'border-slate-300'}`}>
                                                      {isSelected && <div className="w-3 h-3 bg-indigo-600 rounded-full"></div>}
                                                  </div>
                                                  <input type="radio" name={`q_${qIdx}`} value={optIdx} onChange={() => setStudentAnswers({...studentAnswers, [qIdx]: optIdx})} className="hidden" />
                                                  <span className={`text-base select-none ${isSelected ? 'text-indigo-900 font-bold' : 'text-slate-700 font-medium'}`}>{opt}</span>
                                              </label>
                                          )})}
                                      </div>
                                  </div>
                              ))}
                          </div>
                          
                          <div className="mt-16 flex justify-center pt-10 border-t border-slate-200">
                              <button onClick={submitExam} disabled={Object.keys(studentAnswers).length < (activeCourse?.exam?.questions?.length||0)} className="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-300 disabled:text-slate-500 disabled:shadow-none transition-all text-white px-12 py-5 rounded-2xl font-black text-xl shadow-xl hover:shadow-indigo-500/30 transform hover:-translate-y-1">
                                  Kumpulkan & Lihat Hasil Ujian
                              </button>
                          </div>
                      </div>
                  )}

                  {/* ---> MODE HASIL KELULUSAN (RESULT & CERT) <--- */}
                  {classroomMode === 'result' && (
                      <div className="bg-white rounded-3xl p-8 sm:p-16 shadow-2xl border border-slate-200 text-center max-w-3xl mx-auto mt-8 relative overflow-hidden animate-fade-in-up">
                          <div className={`absolute top-0 left-0 w-full h-4 ${myEnr?.isGraduated ? 'bg-emerald-500' : 'bg-red-500'}`}></div>
                          
                          <div className="relative mb-10">
                              <div className={`w-36 h-36 rounded-full flex items-center justify-center mx-auto relative z-10 shadow-inner border-8 ${myEnr?.isGraduated ? 'bg-emerald-100 text-emerald-600 border-emerald-50' : 'bg-red-100 text-red-600 border-red-50'}`}>
                                  {myEnr?.isGraduated ? <Award size={72} weight="fill"/> : <X size={72} weight="bold"/>}
                              </div>
                          </div>

                          <h2 className="text-4xl sm:text-5xl font-black text-slate-900 mb-4 tracking-tight">
                              {myEnr?.isGraduated ? 'Selamat, Anda Lulus! 🎉' : 'Belum Lulus, Semangat!'}
                          </h2>
                          <p className="text-slate-600 mb-10 text-xl px-4 leading-relaxed max-w-xl mx-auto font-medium">
                              {myEnr?.isGraduated ? 'Luar biasa! Kerja keras Anda telah membuahkan hasil. Sertifikat profesional Anda telah siap diunduh di bawah ini.' : 'Tidak perlu berkecil hati. Pelajari kembali materi yang belum Anda pahami dan silakan ikuti ujian ulang kapan saja.'}
                          </p>
                          
                          <div className="bg-slate-50 rounded-3xl p-8 mb-10 border border-slate-200 inline-block w-full sm:w-2/3 shadow-inner">
                              <p className="text-sm font-bold text-slate-500 uppercase tracking-widest mb-2">Total Nilai Akhir</p>
                              <p className={`text-7xl font-black ${myEnr?.isGraduated ? 'text-emerald-600' : 'text-red-600'}`}>
                                  {myEnr?.examScore || 0} <span className="text-3xl text-slate-400 font-medium">/ {(activeCourse?.exam?.questions?.length||10) * 10}</span>
                              </p>
                          </div>
                          
                          {!myEnr?.isGraduated ? (
                              <button onClick={()=>{setClassroomMode('exam'); setStudentAnswers({});}} className="w-full sm:w-3/4 mx-auto bg-slate-900 hover:bg-slate-800 text-white py-5 rounded-2xl font-bold text-xl transition-all shadow-lg transform hover:-translate-y-1 block">
                                  Coba Ujian Ulang Sekarang
                              </button>
                          ) : (
                              <div className="space-y-5 max-w-md mx-auto">
                                  <button onClick={handleDownloadCert} className="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-5 rounded-2xl font-bold text-lg shadow-xl hover:shadow-emerald-500/30 flex items-center justify-center transition-all transform hover:-translate-y-1">
                                      <Download size={28} className="mr-3" weight="bold"/> Download Sertifikat PDF
                                  </button>
                                  
                                  {instructorData?.donationLink && (
                                      <a href={instructorData.donationLink} target="_blank" rel="noopener noreferrer" className="w-full bg-amber-50 hover:bg-amber-100 text-amber-800 border-2 border-amber-300 py-5 rounded-2xl font-bold text-lg transition-colors flex items-center justify-center group shadow-sm">
                                          <div className="bg-amber-200 p-2 rounded-full mr-3 text-amber-700 group-hover:scale-110 transition-transform"><Coffee size={24} weight="fill"/></div> 
                                          Traktir Kopi Instruktur
                                      </a>
                                  )}
                              </div>
                          )}
                      </div>
                  )}

                </div>
              </main>
            </div>
          </div>
        );
      }
      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

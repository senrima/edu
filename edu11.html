<body>

  <script type="text/babel" data-type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    let fbApp = null, fbAuth = null, fbDb = null;

    // URL Google Apps Script Rahasia (Base64 Encoded)
    const DEFAULT_SHEETS_URL = atob("aHR0cHM6Ly9zY3JpcHQuZ29vZ2xlLmNvbS9tYWNyb3Mvcy9BS2Z5Y2J3YzZYWDlYaXJxLUdwTEtpLTJWaDMyZGsxR0sycHVxVG92VHJYc0dtMHphcmVpcUlHeTFMN0JPODVtV3NzUWFXVFYvZXhlYw==");

    const IconWrapper = ({ name, size = 24, className = "" }) => <i className={`ph ph-${name} ${className}`} style={{ fontSize: size }}></i>;
    const PlayCircle = (p) => <IconWrapper name="play-circle" {...p} />;
    const Download = (p) => <IconWrapper name="download" {...p} />;
    const Menu = (p) => <IconWrapper name="list" {...p} />;
    const X = (p) => <IconWrapper name="x" {...p} />;
    const BookOpen = (p) => <IconWrapper name="book-open" {...p} />;
    const Video = (p) => <IconWrapper name="video" {...p} />;
    const CheckCircle2 = (p) => <IconWrapper name="check-circle" {...p} />;
    const ChevronRight = (p) => <IconWrapper name="caret-right" {...p} />;
    const Loader2 = (p) => <IconWrapper name="spinner" className="animate-spin" {...p} />;
    const MessageSquare = (p) => <IconWrapper name="chat-circle" {...p} />;
    const Lock = (p) => <IconWrapper name="lock" {...p} />;
    const Key = (p) => <IconWrapper name="key" {...p} />;
    const LogOut = (p) => <IconWrapper name="sign-out" {...p} />;
    const PlusCircle = (p) => <IconWrapper name="plus-circle" {...p} />;
    const Database = (p) => <IconWrapper name="database" {...p} />;
    const Trash2 = (p) => <IconWrapper name="trash" {...p} />;

    const Book = (p) => <IconWrapper name="book" {...p} />;
    const GraduationCap = (p) => <IconWrapper name="graduation-cap" {...p} />;
    const AlertCircle = (p) => <IconWrapper name="warning-circle" {...p} />;
    const ArrowLeft = (p) => <IconWrapper name="arrow-left" {...p} />;
    const RefreshCw = (p) => <IconWrapper name="arrows-clockwise" {...p} />;
    const UserIcon = (p) => <IconWrapper name="user" {...p} />;
    const Globe = (p) => <IconWrapper name="globe" {...p} />;
    const HardDrives = (p) => <IconWrapper name="hard-drives" {...p} />;
    const ShieldCheck = (p) => <IconWrapper name="shield-check" {...p} />;
    const MagnifyingGlass = (p) => <IconWrapper name="magnifying-glass" {...p} />;
    const Coffee = (p) => <IconWrapper name="coffee" {...p} />;
    const CheckSquareOffset = (p) => <IconWrapper name="check-square-offset" {...p} />;
    const Sparkle = (p) => <IconWrapper name="sparkle" {...p} />;
    const EnvelopeSimple = (p) => <IconWrapper name="envelope-simple" {...p} />;

    // Super Admin dihapus dari initial fallback, karena disuntik dari Backend
    const initialAdmins = [
      { id: 'adm_1', username: 'budi_admin', password: 'ADMIN123', name: 'Budi Santoso', isSuper: false, donationLink: 'https://saweria.co/budi' }
    ];
    
    const emptyExam = {
      minScore: 70,
      questions: Array.from({length: 10}, () => ({ q: '', options: ['','','',''], answer: 0 }))
    };

    const initialCourses = [
      { 
        id: 'c_1', authorId: 'adm_1', code: 'WEB2026', title: "Mastering Web Development", instructor: "Budi Santoso", 
        exam: {
          minScore: 80,
          questions: [
            { q: "Apa kepanjangan dari HTML?", options: ["Hyper Text Markup Language", "Hyperlinks Text", "Home Tool", "Hyper Tool"], answer: 0 },
            { q: "Tag untuk paragraf?", options: ["<p>", "<para>", "<pg>", "<text>"], answer: 0 },
            { q: "Sifat CSS untuk warna teks?", options: ["bg-color", "color", "text-color", "font-color"], answer: 1 },
            { q: "Simbol ID di CSS?", options: [".", "#", "*", "&"], answer: 1 },
            { q: "Fungsi JavaScript?", options: ["Styling", "Struktur", "Interaktivitas", "Database"], answer: 2 },
            { q: "Deklarasi variabel JS modern?", options: ["var & let", "let & const", "int & float", "dim & str"], answer: 1 },
            { q: "Tag file CSS eksternal?", options: ["<body>", "<head>", "<footer>", "<header>"], answer: 1 },
            { q: "Tipe data [1, 2, 3]?", options: ["Object", "String", "Number", "Array"], answer: 3 },
            { q: "Fungsi console.log()?", options: ["Alert", "Cetak pesan", "Hapus data", "Buat fungsi"], answer: 1 },
            { q: "Framework CSS terpopuler?", options: ["Tailwind", "Bootstrap", "Foundation", "Semua benar"], answer: 3 }
          ]
        },
        modules: [ 
          { id: 'm_1', title: "Pengantar HTML & CSS Modern", videoUrl: "https://www.youtube.com/embed/pQN-pnXPaVg", description: "Dasar web", comments: [] }, 
          { id: 'm_2', title: "Fundamental JavaScript", videoUrl: "https://www.youtube.com/embed/PkZNo7MFOUg", description: "JS Dasar", comments: [] } 
        ] 
      }
    ];
    
    const initialParticipants = [{ id: 'p_1', name: "Andi Wijaya", email: "andi@mail.com", accessCode: "P9X2A1" }];
    const initialEnrollments = [{ id: 'e_1', participantId: 'p_1', courseId: 'c_1', completedModules: ['m_1'], isGraduated: false, certDownloaded: false, examScore: null, graduatedAt: null }];

    function App() {
      const [dbMode, setDbMode] = React.useState(() => localStorage.getItem('edu_db_mode') || 'sheets');
      const [dbReady, setDbReady] = React.useState(false);
      const [setupError, setSetupError] = React.useState("");
      const [fbConfigInput, setFbConfigInput] = React.useState("");
      const [sheetsUrlInput, setSheetsUrlInput] = React.useState(() => localStorage.getItem('edu_sheets_url') || DEFAULT_SHEETS_URL);
      
      const [admins, setAdmins] = React.useState([]);
      const [courses, setCourses] = React.useState([]);
      const [participants, setParticipants] = React.useState([]);
      const [enrollments, setEnrollments] = React.useState([]);
      const [notifications, setNotifications] = React.useState([]);

      const [session, setSession] = React.useState(() => JSON.parse(sessionStorage.getItem('edu_session')) || null);
      const [loginInput, setLoginInput] = React.useState({ username: "", password: "" });
      const [loginError, setLoginError] = React.useState("");
      const [isLoggingIn, setIsLoggingIn] = React.useState(false);
      
      const getInitialAppMode = () => {
        if (!session) return 'auth';
        if (session.role === 'super_admin') return 'super_dashboard';
        if (session.role === 'admin') return 'admin_dashboard';
        return 'part_dashboard';
      };

      const [appMode, setAppMode] = React.useState(getInitialAppMode()); 
      const [adminTab, setAdminTab] = React.useState("courses"); 
      const [superTab, setSuperTab] = React.useState("instructors"); 
      
      const [searchInst, setSearchInst] = React.useState("");
      const [searchCourse, setSearchCourse] = React.useState("");
      const [searchPart, setSearchPart] = React.useState("");
      
      const [activeCourse, setActiveCourse] = React.useState(null);
      const [activeModule, setActiveModule] = React.useState(null);
      const [isSidebarOpen, setIsSidebarOpen] = React.useState(false);
      const [commentText, setCommentText] = React.useState("");
      
      const [classroomMode, setClassroomMode] = React.useState('video');
      const [studentAnswers, setStudentAnswers] = React.useState({});
      
      const [toast, setToast] = React.useState(null);
      const [confirmDialog, setConfirmDialog] = React.useState({ isOpen: false, message: "", onConfirm: null });
      
      const [examModalOpen, setExamModalOpen] = React.useState(false);
      const [examCourseId, setExamCourseId] = React.useState(null);
      const [examForm, setExamForm] = React.useState(emptyExam);

      const [profileForm, setProfileForm] = React.useState({ donationLink: "" });

      React.useEffect(() => {
        if (appMode === 'setup_db') return;
        if (dbMode === 'local') {
          setAdmins(JSON.parse(localStorage.getItem('edu_admins')) || initialAdmins);
          setCourses(JSON.parse(localStorage.getItem('edu_courses')) || initialCourses);
          setParticipants(JSON.parse(localStorage.getItem('edu_participants')) || initialParticipants);
          setEnrollments(JSON.parse(localStorage.getItem('edu_enrollments')) || initialEnrollments);
          setNotifications(JSON.parse(localStorage.getItem('edu_notifications')) || []);
          setDbReady(true);
        } else if (dbMode === 'firebase') {
          try {
            const configStr = localStorage.getItem('edu_fb_config');
            if (!configStr) throw new Error("No Config");
            fbApp = initializeApp(JSON.parse(configStr)); fbAuth = getAuth(fbApp); fbDb = getFirestore(fbApp);
            signInAnonymously(fbAuth).then(() => {
              const getRef = (colName) => collection(fbDb, colName);
              onSnapshot(getRef('admins'), snap => setAdmins(snap.docs.map(d => ({id: d.id, ...d.data()}))) );
              onSnapshot(getRef('courses'), snap => setCourses(snap.docs.map(d => ({id: d.id, ...d.data()}))) );
              onSnapshot(getRef('participants'), snap => setParticipants(snap.docs.map(d => ({id: d.id, ...d.data()}))) );
              onSnapshot(getRef('enrollments'), snap => setEnrollments(snap.docs.map(d => ({id: d.id, ...d.data()}))) );
              onSnapshot(getRef('notifications'), snap => setNotifications(snap.docs.map(d => ({id: d.id, ...d.data()}))) );
              setDbReady(true);
            }).catch(e => { setSetupError("Gagal login Firebase anonim."); setAppMode('setup_db'); });
          } catch (e) { setSetupError("Config Firebase salah."); setAppMode('setup_db'); }
        } else if (dbMode === 'sheets') {
          const url = localStorage.getItem('edu_sheets_url') || DEFAULT_SHEETS_URL;
          if(!url) { setAppMode('setup_db'); return; }
          
          fetch(url)
            .then(res => {
              if(!res.ok) throw new Error("Network error");
              return res.json();
            })
            .then(data => {
                if(data.admins) setAdmins(data.admins); 
                if(data.courses) setCourses(data.courses);
                if(data.participants) setParticipants(data.participants); 
                if(data.enrollments) setEnrollments(data.enrollments);
                if(data.notifications) setNotifications(data.notifications); 
                setDbReady(true);
            })
            .catch(e => { 
                console.error("Gagal sync, mereset URL", e);
                localStorage.setItem('edu_sheets_url', DEFAULT_SHEETS_URL);
                setSheetsUrlInput(DEFAULT_SHEETS_URL);
                setSetupError("Gagal sync Spreadsheet. Mereset ke konfigurasi awal..."); 
                setAppMode('setup_db'); 
            });
        }
      }, [dbMode, appMode]);

      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };
      const generateRandomCode = (prefix = "", length = 6) => prefix + Math.random().toString(36).substring(2, 2+length).toUpperCase();
      const calcProgress = (enr, crs) => {
        if (!crs || crs.modules.length === 0 || !enr) return 0;
        return Math.round((enr.completedModules.length / crs.modules.length) * 100);
      };

      const execDbAction = async (localAction, firebaseAction) => {
        try {
          if (dbMode === 'firebase') { await firebaseAction(); } 
          else if (dbMode === 'sheets') {
              localAction(); 
              const url = localStorage.getItem('edu_sheets_url') || DEFAULT_SHEETS_URL;
              if (url) {
                  const payload = {
                      // Hapus data Super Admin saat di push kembali agar tidak terduplikat di Sheet
                      admins: (JSON.parse(localStorage.getItem('edu_admins')) || admins).filter(a => !a.isSuper),
                      courses: JSON.parse(localStorage.getItem('edu_courses')) || courses,
                      participants: JSON.parse(localStorage.getItem('edu_participants')) || participants,
                      enrollments: JSON.parse(localStorage.getItem('edu_enrollments')) || enrollments,
                      notifications: JSON.parse(localStorage.getItem('edu_notifications')) || notifications
                  };
                  fetch(url, { method: 'POST', body: JSON.stringify(payload) }).catch(console.error);
              }
          } else { localAction(); }
        } catch (error) { console.error(error); showToast("Gagal menyimpan."); }
      };

      const triggerEmail = (emailAction) => {
          const url = localStorage.getItem('edu_sheets_url') || DEFAULT_SHEETS_URL;
          if (!url) return;
          fetch(url, { method: 'POST', body: JSON.stringify({ emailAction }) }).catch(console.error);
      };

      const formatVideoUrl = (rawUrl) => {
        if (!rawUrl) return "";
        let url = rawUrl.trim();
        try {
          if (url.includes('youtu.be/')) {
            const videoId = url.split('youtu.be/')[1].split('?')[0].split('&')[0];
            return `https://www.youtube.com/embed/${videoId}`;
          }
          if (url.includes('youtube.com/watch')) {
            const urlObj = new URL(url);
            const videoId = urlObj.searchParams.get('v');
            if (videoId) return `https://www.youtube.com/embed/${videoId}`;
          }
          if (url.includes('youtube.com/shorts/')) {
            const videoId = url.split('shorts/')[1].split('?')[0].split('&')[0];
            return `https://www.youtube.com/embed/${videoId}`;
          }
          if (url.includes('drive.google.com/file/d/')) {
            const match = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
            if (match && match[1]) {
                return `https://drive.google.com/file/d/${match[1]}/preview`;
            }
          }
        } catch (e) { console.error("URL Parsing Error", e); }
        return url;
      };

      const handleSeedDatabase = async () => {
        setIsLoggingIn(true);
        await execDbAction(
          () => {
            localStorage.setItem('edu_admins', JSON.stringify(initialAdmins)); setAdmins(initialAdmins);
            localStorage.setItem('edu_courses', JSON.stringify(initialCourses)); setCourses(initialCourses);
            localStorage.setItem('edu_participants', JSON.stringify(initialParticipants)); setParticipants(initialParticipants);
            localStorage.setItem('edu_enrollments', JSON.stringify(initialEnrollments)); setEnrollments(initialEnrollments);
            showToast("Database Terinisialisasi!");
          },
          async () => {
            for(let adm of initialAdmins) await setDoc(doc(fbDb, 'admins', adm.id), adm);
            for(let crs of initialCourses) await setDoc(doc(fbDb, 'courses', crs.id), crs);
            for(let prt of initialParticipants) await setDoc(doc(fbDb, 'participants', prt.id), prt);
            for(let enr of initialEnrollments) await setDoc(doc(fbDb, 'enrollments', enr.id), enr);
          }
        );
        setIsLoggingIn(false);
      };

      const handleLogin = (e) => {
        e.preventDefault(); setIsLoggingIn(true); setLoginError("");
        setTimeout(() => {
          const { username, password } = loginInput;
          const adminFound = admins.find(a => a.username === username && a.password === password);
          if (adminFound) {
            const sessData = { role: adminFound.isSuper ? 'super_admin' : 'admin', data: adminFound };
            setSession(sessData); sessionStorage.setItem('edu_session', JSON.stringify(sessData));
            if(!adminFound.isSuper) setProfileForm({ donationLink: adminFound.donationLink || "" });
            setAppMode(adminFound.isSuper ? 'super_dashboard' : 'admin_dashboard'); setIsLoggingIn(false); return;
          }
          const partFound = participants.find(p => p.email === username && p.accessCode === password);
          if (partFound) {
            const sessData = { role: 'participant', data: partFound };
            setSession(sessData); sessionStorage.setItem('edu_session', JSON.stringify(sessData));
            setAppMode('part_dashboard'); setIsLoggingIn(false); return;
          }
          setLoginError("Kredensial salah!"); setIsLoggingIn(false);
        }, 600);
      };

      const handleLogout = () => {
        setSession(null); sessionStorage.removeItem('edu_session');
        setAppMode('auth'); setLoginInput({ username: "", password: "" });
        setClassroomMode('video'); setStudentAnswers({}); setExamModalOpen(false);
      };

      const handleRegisterAdmin = async (e) => {
        e.preventDefault(); const fd = new FormData(e.target); const username = fd.get('username');
        if (admins.some(a => a.username === username)) return showToast("Username terpakai!");
        const newAdminData = { name: fd.get('name'), username, password: fd.get('password'), isSuper: false, donationLink: '' };
        await execDbAction(
          () => {
            const updatedA = [...admins, { id: `adm_${Date.now()}`, ...newAdminData }];
            setAdmins(updatedA); localStorage.setItem('edu_admins', JSON.stringify(updatedA));
          },
          async () => await setDoc(doc(collection(fbDb, 'admins')), newAdminData)
        );
        e.target.reset(); showToast("Instruktur Ditambahkan!");
      };

      const handleDeleteAdmin = (id) => {
        setConfirmDialog({
            isOpen: true, message: "Hapus instruktur ini? (Kursusnya akan tetap ada tanpa pembuat).",
            onConfirm: async () => {
                setConfirmDialog({ isOpen: false });
                await execDbAction(
                    () => {
                        const updatedA = admins.filter(a => a.id !== id);
                        setAdmins(updatedA); localStorage.setItem('edu_admins', JSON.stringify(updatedA));
                    },
                    async () => await deleteDoc(doc(fbDb, 'admins', id))
                );
                showToast("Admin dihapus.");
            }
        });
      };

      const executeDeleteCourse = async (courseId) => {
        await execDbAction(
            () => {
                const updatedC = courses.filter(c => c.id !== courseId);
                setCourses(updatedC); localStorage.setItem('edu_courses', JSON.stringify(updatedC));
            },
            async () => await deleteDoc(doc(fbDb, 'courses', courseId))
        );
        showToast("Kursus dihapus.");
      };

      const handleDeleteCourseSuper = (courseId) => {
        setConfirmDialog({
            isOpen: true, message: "Peringatan Super Admin: Hapus kursus secara permanen?",
            onConfirm: () => { setConfirmDialog({ isOpen: false }); executeDeleteCourse(courseId); }
        });
      };

      const handleSafeDeleteCourse = (courseId) => {
        const hasEnrolled = enrollments.some(e => e.courseId === courseId);
        if (hasEnrolled) return showToast("Gagal: Kursus ini sudah ada peserta.");
        setConfirmDialog({
            isOpen: true, message: "Kursus kosong. Yakin ingin menghapus?",
            onConfirm: () => { setConfirmDialog({ isOpen: false }); executeDeleteCourse(courseId); }
        });
      };

      const handleCreateCourse = async (e) => {
        e.preventDefault(); const fd = new FormData(e.target); const code = fd.get('code');
        if (courses.some(c => c.code === code)) return showToast("Kode sudah ada!");
        const courseData = { authorId: session.data.id, code, title: fd.get('title'), instructor: fd.get('inst'), modules: [], exam: emptyExam };
        await execDbAction(
          () => {
            const updated = [...courses, { id: `c_${Date.now()}`, ...courseData }];
            setCourses(updated); localStorage.setItem('edu_courses', JSON.stringify(updated));
          },
          async () => await setDoc(doc(collection(fbDb, 'courses')), courseData)
        );
        e.target.reset(); showToast("Kursus dibuat!");
      };

      const handleCreateModule = async (e) => {
        e.preventDefault(); const fd = new FormData(e.target); const courseId = fd.get('courseId');
        const course = courses.find(c => c.id === courseId);
        
        const rawVideoUrl = fd.get('vidUrl');
        const finalVideoUrl = formatVideoUrl(rawVideoUrl);

        const newModule = { id: `m_${Date.now()}`, title: fd.get('title'), videoUrl: finalVideoUrl, description: fd.get('desc'), comments: [] };
        await execDbAction(
          () => {
            const updated = courses.map(c => c.id === courseId ? { ...c, modules: [...c.modules, newModule] } : c);
            setCourses(updated); localStorage.setItem('edu_courses', JSON.stringify(updated));
          },
          async () => await updateDoc(doc(fbDb, 'courses', courseId), { modules: [...course.modules, newModule] })
        );
        e.target.reset(); showToast("Materi ditambah!");
      };

      const handleDeleteModule = (courseId, moduleId) => {
        setConfirmDialog({
            isOpen: true, message: "Hapus materi video ini?",
            onConfirm: async () => {
                setConfirmDialog({ isOpen: false }); const course = courses.find(c => c.id === courseId);
                await execDbAction(
                    () => {
                        const updated = courses.map(c => c.id === courseId ? { ...c, modules: c.modules.filter(m => m.id !== moduleId) } : c);
                        setCourses(updated); localStorage.setItem('edu_courses', JSON.stringify(updated));
                    },
                    async () => await updateDoc(doc(fbDb, 'courses', courseId), { modules: course.modules.filter(m => m.id !== moduleId) })
                );
                showToast("Materi dihapus.");
            }
        });
      };

      const handleUpdateProfile = async (e) => {
        e.preventDefault();
        await execDbAction(
          () => {
            const updatedA = admins.map(a => a.id === session.data.id ? { ...a, donationLink: profileForm.donationLink } : a);
            setAdmins(updatedA); localStorage.setItem('edu_admins', JSON.stringify(updatedA));
          },
          async () => await updateDoc(doc(fbDb, 'admins', session.data.id), { donationLink: profileForm.donationLink })
        );
        showToast("Profil diperbarui!");
      };

      const openExamBuilder = (courseId) => {
        const course = courses.find(c => c.id === courseId);
        setExamCourseId(courseId); setExamForm(course.exam || emptyExam); setExamModalOpen(true);
      };

      const handleSaveExam = async () => {
        await execDbAction(
          () => {
            const updated = courses.map(c => c.id === examCourseId ? { ...c, exam: examForm } : c);
            setCourses(updated); localStorage.setItem('edu_courses', JSON.stringify(updated));
          },
          async () => await updateDoc(doc(fbDb, 'courses', examCourseId), { exam: examForm })
        );
        setExamModalOpen(false); showToast("Ujian disimpan!");
      };

      const handleRegisterParticipant = async (e) => {
        e.preventDefault(); const fd = new FormData(e.target); const email = fd.get('email');
        if (participants.some(p => p.email === email)) return showToast("Email sudah terdaftar!");
        const partData = { name: fd.get('name'), email, accessCode: fd.get('code') };
        const enrData = { courseId: fd.get('courseId'), completedModules: [], isGraduated: false, certDownloaded: false, examScore: null, graduatedAt: null };
        const courseObj = courses.find(c => c.id === fd.get('courseId'));
        await execDbAction(
          () => {
            const newPart = { id: `p_${Date.now()}`, ...partData };
            const newEnr = { id: `e_${Date.now()}`, participantId: newPart.id, ...enrData };
            const updatedP = [...participants, newPart]; const updatedE = [...enrollments, newEnr];
            setParticipants(updatedP); localStorage.setItem('edu_participants', JSON.stringify(updatedP));
            setEnrollments(updatedE); localStorage.setItem('edu_enrollments', JSON.stringify(updatedE));
          },
          async () => {
            const pRef = doc(collection(fbDb, 'participants')); await setDoc(pRef, partData);
            const eRef = doc(collection(fbDb, 'enrollments')); await setDoc(eRef, { ...enrData, participantId: pRef.id });
          }
        );
        e.target.reset(); showToast("Peserta terdaftar!");
        
        triggerEmail({
            tujuan: email,
            subjek: "Pendaftaran Kelas EduLearn Berhasil",
            namaPengguna: partData.name,
            isiPesanInti: `Selamat, Anda telah terdaftar di kelas <b>${courseObj ? courseObj.title : 'Baru'}</b>.<br><br>Gunakan detail berikut untuk masuk ke sistem:<br><b>Email:</b> ${email}<br><b>Kode Akses:</b> ${partData.accessCode}<br><br>Selamat belajar!`
        });
      };

      const handleEnrollExisting = async (e) => {
        e.preventDefault(); const fd = new FormData(e.target); const email = fd.get('email'); const cId = fd.get('cId');
        const participant = participants.find(p => p.email === email);
        if (!participant) return showToast("Peserta tidak ditemukan!");
        const pId = participant.id;
        const courseObj = courses.find(c => c.id === cId);
        if(enrollments.some(en => en.participantId === pId && en.courseId === cId)) return showToast("Sudah terdaftar di kursus ini!");
        const enrData = { participantId: pId, courseId: cId, completedModules: [], isGraduated: false, certDownloaded: false, examScore: null, graduatedAt: null };
        await execDbAction(
          () => {
            const updatedE = [...enrollments, { id: `e_${Date.now()}`, ...enrData }];
            setEnrollments(updatedE); localStorage.setItem('edu_enrollments', JSON.stringify(updatedE));
          },
          async () => await setDoc(doc(collection(fbDb, 'enrollments')), enrData)
        );
        showToast("Ditambahkan ke kursus!");

        triggerEmail({
            tujuan: email,
            subjek: "Akses Kelas Baru EduLearn",
            namaPengguna: participant.name,
            isiPesanInti: `Anda baru saja ditambahkan ke kelas <b>${courseObj ? courseObj.title : 'Baru'}</b>.<br><br>Silakan login menggunakan email dan kode akses lama Anda untuk mulai belajar di kelas ini.`
        });
      };

      const jumpToClassroom = (courseId, targetModuleId = null) => {
        const course = courses.find(c => c.id === courseId);
        let modToOpen = course.modules[0] || null; setClassroomMode('video');
        if ((session.role === 'admin' || session.role === 'super_admin') && targetModuleId) {
          modToOpen = course.modules.find(m => m.id === targetModuleId) || modToOpen;
        } else if (session.role === 'participant') {
          const myEnr = enrollments.find(e => e.participantId === session.data.id && e.courseId === courseId);
          if (myEnr) {
            if(myEnr.isGraduated) setClassroomMode('result');
            else modToOpen = course.modules.find(m => !myEnr.completedModules.includes(m.id)) || course.modules[course.modules.length - 1];
          }
        }
        if(!modToOpen && classroomMode === 'video') return showToast("Belum ada materi!"); 
        setActiveCourse(course); setActiveModule(modToOpen); setAppMode('classroom');
      };

      const handlePostComment = async (e) => {
        e.preventDefault(); if (!commentText.trim()) return;
        const isAdmin = session.role === 'admin' || session.role === 'super_admin';
        const authorName = session.role === 'super_admin' ? `${session.data.name} (Super Admin)` : isAdmin ? `${session.data.name} (Instruktur)` : session.data.name;
        const newComment = { id: `cmt_${Date.now()}`, user: authorName, text: commentText, isAdmin, time: "Baru saja" };
        const updatedMods = activeCourse.modules.map(m => m.id === activeModule.id ? { ...m, comments: [...m.comments, newComment] } : m);
        await execDbAction(
          () => {
            const updatedC = courses.map(c => c.id === activeCourse.id ? { ...c, modules: updatedMods } : c);
            setCourses(updatedC); localStorage.setItem('edu_courses', JSON.stringify(updatedC));
            if (!isAdmin) {
              const updatedN = [{ id: `n_${Date.now()}`, adminId: activeCourse.authorId, text: `${authorName} bertanya di "${activeCourse.title}"`, isRead: false, time: "Baru saja", courseId: activeCourse.id, moduleId: activeModule.id }, ...notifications];
              setNotifications(updatedN); localStorage.setItem('edu_notifications', JSON.stringify(updatedN));
            }
          },
          async () => {
            await updateDoc(doc(fbDb, 'courses', activeCourse.id), { modules: updatedMods });
            if (!isAdmin) await setDoc(doc(collection(fbDb, 'notifications')), { adminId: activeCourse.authorId, text: `${authorName} bertanya di "${activeCourse.title}"`, isRead: false, time: "Baru saja", courseId: activeCourse.id, moduleId: activeModule.id });
          }
        );
        setActiveModule(prev => ({ ...prev, comments: [...prev.comments, newComment] }));
        setCommentText(""); showToast("Komentar terkirim!");
      };

      const handleCompleteModule = async () => {
        if (session.role === 'admin' || session.role === 'super_admin') return; 
        const cMods = activeCourse.modules; const cIdx = cMods.findIndex(m => m.id === activeModule.id); const isLast = cIdx === cMods.length - 1;
        const myEnr = enrollments.find(e => e.participantId === session.data.id && e.courseId === activeCourse.id);
        if (!myEnr.completedModules.includes(activeModule.id)) {
          const newComps = [...myEnr.completedModules, activeModule.id];
          await execDbAction(
            () => {
              const updatedE = enrollments.map(en => en.id === myEnr.id ? { ...en, completedModules: newComps } : en);
              setEnrollments(updatedE); localStorage.setItem('edu_enrollments', JSON.stringify(updatedE));
            },
            async () => await updateDoc(doc(fbDb, 'enrollments', myEnr.id), { completedModules: newComps })
          );
          if (!isLast) { setActiveModule(cMods[cIdx + 1]); showToast("Lanjut materi."); } else setClassroomMode('exam');
        } else {
          if (!isLast) setActiveModule(cMods[cIdx + 1]); else setClassroomMode('exam');
        }
      };

      const submitExam = async () => {
        let correct = 0;
        activeCourse.exam.questions.forEach((q, i) => { if(studentAnswers[i] === q.answer) correct++; });
        const finalScore = correct * 10; const isPassed = finalScore >= activeCourse.exam.minScore;
        const myEnr = enrollments.find(e => e.participantId === session.data.id && e.courseId === activeCourse.id);
        const todayDateStr = new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
        
        await execDbAction(
            () => {
                const updatedE = enrollments.map(en => en.id === myEnr.id ? { ...en, examScore: finalScore, isGraduated: isPassed, graduatedAt: isPassed ? todayDateStr : en.graduatedAt } : en);
                setEnrollments(updatedE); localStorage.setItem('edu_enrollments', JSON.stringify(updatedE));
            },
            async () => await updateDoc(doc(fbDb, 'enrollments', myEnr.id), { examScore: finalScore, isGraduated: isPassed, graduatedAt: isPassed ? todayDateStr : (myEnr.graduatedAt || null) })
        );
        setClassroomMode('result');
        if(isPassed) {
            showToast(`Lulus! Nilai ${finalScore}`);
            triggerEmail({
                tujuan: session.data.email,
                subjek: "Kelulusan Kelas & Sertifikat EduLearn",
                namaPengguna: session.data.name,
                isiPesanInti: `Selamat! Anda telah lulus dari kelas <b>${activeCourse.title}</b> dengan nilai <b>${finalScore}</b>.<br><br>Sertifikat kelulusan digital Anda kini sudah tersedia dan dapat diunduh langsung melalui dashboard kelas Anda.`
            });
        } else {
            showToast(`Nilai ${finalScore}. Minimal ${activeCourse.exam.minScore}.`);
        }
      };

      <div class="signature-block">
        <div class="signature">${instructorData?.name || activeCourse.instructor}</div>

        const blob = new Blob([certContent], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a'); link.href = url; link.download = `Sertifikat-${activeCourse.title.replace(/\s+/g, '-')}.html`;
        document.body.appendChild(link); link.click(); document.body.removeChild(link); URL.revokeObjectURL(url);
        showToast("Sertifikat berhasil diunduh!");
      };

      const markNotifsRead = async () => {
        await execDbAction(
          () => {
            const updatedN = notifications.map(n => n.adminId === session.data.id ? { ...n, isRead: true } : n);
            setNotifications(updatedN); localStorage.setItem('edu_notifications', JSON.stringify(updatedN));
          },
          async () => {
            const myNotifs = notifications.filter(n => n.adminId === session.data.id && !n.isRead);
            for(let n of myNotifs) await updateDoc(doc(fbDb, 'notifications', n.id), { isRead: true });
          }
        );
      };

      const handleSaveFirebaseConfig = () => {
        try {
          let str = fbConfigInput.trim();
          if (str.includes('firebaseConfig')) str = str.substring(str.indexOf('{'), str.lastIndexOf('}') + 1);
          const configObj = new Function("return " + str)();
          if (!configObj.apiKey || !configObj.projectId) throw new Error("Missing keys");
          localStorage.setItem('edu_fb_config', JSON.stringify(configObj)); localStorage.setItem('edu_db_mode', 'firebase'); window.location.reload(); 
        } catch (e) { setSetupError("Format tidak valid."); }
      };

      const handleSaveSheetsConfig = () => {
        if(!sheetsUrlInput.includes("script.google.com")) return setSetupError("URL tidak valid!");
        localStorage.setItem('edu_sheets_url', sheetsUrlInput.trim()); localStorage.setItem('edu_db_mode', 'sheets'); window.location.reload(); 
      };

      const handleSwitchToLocal = () => { localStorage.setItem('edu_db_mode', 'local'); window.location.reload(); };

      const handleDownloadSpreadsheetTemplate = () => {
         const tables = { 'Admins': 'id,username,password,name,isSuper,donationLink', 'Courses': 'id,authorId,code,title,instructor,modules_json,exam_json', 'Participants': 'id,name,email,accessCode', 'Enrollments': 'id,participantId,courseId,completedModules_json,isGraduated,certDownloaded,examScore', 'Notifications': 'id,adminId,text,isRead,time,courseId,moduleId' };
         Object.keys(tables).forEach((name, i) => {
            setTimeout(() => {
                const blob = new Blob([tables[name]], { type: 'text/csv;charset=utf-8;' }); const url = URL.createObjectURL(blob);
                const link = document.createElement('a'); link.href = url; link.download = `Template_${name}.csv`;
                document.body.appendChild(link); link.click(); document.body.removeChild(link); URL.revokeObjectURL(url);
            }, i * 500); 
         });
         showToast("5 File Template diunduh!");
      };

      if (!dbReady && appMode !== 'setup_db') return <div className="flex flex-col items-center justify-center h-screen bg-slate-50"><Loader2 size={48} className="animate-spin text-indigo-600 mb-4" /><h2 className="text-xl font-bold text-slate-800">Menyiapkan Aplikasi...</h2></div>;

      const ConfirmModal = () => {
        if (!confirmDialog.isOpen) return null;
        return (
          <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
            <div className="bg-white rounded-2xl p-6 max-w-sm w-full text-center shadow-2xl">
              <div className="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center text-red-600 mx-auto mb-4"><AlertCircle size={32} /></div>
              <h3 className="text-lg font-bold text-slate-900 mb-2">Konfirmasi Tindakan</h3><p className="text-sm text-slate-600 mb-6">{confirmDialog.message}</p>
              <div className="flex space-x-3"><button onClick={() => setConfirmDialog({ isOpen: false })} className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 py-2.5 rounded-xl font-medium">Batal</button><button onClick={confirmDialog.onConfirm} className="flex-1 bg-red-600 hover:bg-red-700 text-white py-2.5 rounded-xl font-medium">Ya, Lanjutkan</button></div>
            </div>
          </div>
        );
      };

      const ManageExamModal = () => {
        if (!examModalOpen) return null;
        return (
          <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
            <div className="bg-white rounded-2xl w-full max-w-3xl shadow-2xl flex flex-col max-h-[90vh]">
                <div className="p-6 border-b flex justify-between items-center bg-slate-50 rounded-t-2xl">
                    <div><h2 className="text-xl font-bold text-slate-800">Pembuat Ujian Kelulusan</h2><p className="text-sm text-slate-500">Buat 10 Soal Pilihan Ganda & Nilai Target</p></div>
                    <button onClick={()=>setExamModalOpen(false)} className="text-slate-400 hover:text-slate-600"><X size={24}/></button>
                </div>
                <div className="p-6 overflow-y-auto flex-1 space-y-8">
                    <div className="bg-amber-50 p-4 rounded-xl border border-amber-200">
                        <label className="font-bold text-amber-900 block mb-2">Target Minimal Kelulusan (Min. Score)</label>
                        <input type="number" min="0" max="100" value={examForm.minScore} onChange={e=>setExamForm({...examForm, minScore: parseInt(e.target.value)})} className="w-32 p-2 border border-amber-300 rounded outline-none font-bold text-amber-900 bg-white" />
                        <span className="ml-3 text-sm text-amber-700">Tiap soal bernilai 10 Poin.</span>
                    </div>
                    {examForm.questions.map((q, idx) => (
                        <div key={idx} className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                            <label className="font-bold text-slate-800 block mb-2">Soal {idx+1}</label>
                            <input type="text" maxLength={200} value={q.q} onChange={e=>{const newQ = [...examForm.questions]; newQ[idx].q = e.target.value; setExamForm({...examForm, questions: newQ});}} className="w-full p-2 mb-3 border rounded outline-none focus:border-indigo-500" placeholder="Pertanyaan..." required />
                            <div className="grid grid-cols-2 gap-2 mb-3">
                                {q.options.map((opt, optIdx) => (
                                    <input key={optIdx} type="text" maxLength={100} value={opt} onChange={e=>{const newQ = [...examForm.questions]; newQ[idx].options[optIdx] = e.target.value; setExamForm({...examForm, questions: newQ});}} className="w-full p-2 border rounded outline-none focus:border-indigo-500 text-sm" placeholder={`Opsi Jawaban ${optIdx+1}`} required />
                                ))}
                            </div>
                            <label className="text-sm font-medium text-slate-600 mr-2">Jawaban Benar:</label>
                            <select value={q.answer} onChange={e=>{const newQ = [...examForm.questions]; newQ[idx].answer = parseInt(e.target.value); setExamForm({...examForm, questions: newQ});}} className="p-1 border rounded text-sm outline-none focus:border-indigo-500 bg-white">
                                {q.options.map((_, optIdx) => <option key={optIdx} value={optIdx}>Opsi {optIdx+1}</option>)}
                            </select>
                        </div>
                    ))}
                </div>
                <div className="p-6 border-t bg-white rounded-b-2xl flex justify-end gap-3"><button onClick={()=>setExamModalOpen(false)} className="px-6 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl font-medium">Batal</button><button onClick={handleSaveExam} className="px-6 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-medium">Simpan Soal Ujian</button></div>
            </div>
          </div>
        )
      };

      if (appMode === 'setup_db') {
        return (
          <div className="flex flex-col items-center justify-center min-h-screen bg-slate-50 p-4">
            <ConfirmModal />{toast && <div className="fixed top-4 right-4 z-[100] bg-emerald-600 text-white px-6 py-3 rounded-lg shadow-lg flex items-center space-x-2"><CheckCircle2 size={20}/><span>{toast}</span></div>}
            <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-xl border border-slate-100">
              <div className="flex flex-col items-center mb-6 text-center"><div className="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 mb-4"><Globe size={32} /></div><h1 className="text-2xl font-bold text-slate-900">EduLearn by SenTools Database</h1><p className="text-slate-500 mt-2 text-sm">Aplikasi ini mendukung penyimpanan Cloud menggunakan Firebase.</p></div>
              {setupError && <div className="mb-4 p-3 bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg">{setupError}</div>}
              <div className="space-y-4">
                <textarea value={fbConfigInput} onChange={e => setFbConfigInput(e.target.value)} className="w-full h-32 p-4 border border-slate-300 rounded-xl outline-none focus:border-blue-500 font-mono text-sm bg-slate-50" placeholder="Paste Firebase Config Object di sini..."></textarea>
                <button onClick={handleSaveFirebaseConfig} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-medium shadow-md">Hubungkan ke Firebase</button>
                <div className="relative flex py-2 items-center"><div className="flex-grow border-t border-slate-200"></div><span className="mx-4 text-slate-400 text-xs">ATAU</span><div className="flex-grow border-t border-slate-200"></div></div>
                <div className="bg-emerald-50 p-5 rounded-xl border border-emerald-200">
                  <h3 className="font-bold text-emerald-800 mb-2 flex items-center"><Database size={18} className="mr-2"/> Opsi Spreadsheet</h3>
                  <input type="url" value={sheetsUrlInput} onChange={e => setSheetsUrlInput(e.target.value)} className="w-full p-3 mb-3 border border-emerald-300 rounded-lg text-sm outline-none focus:border-emerald-500 bg-white" placeholder="URL Apps Script Exec..." />
                  <div className="flex gap-2"><button onClick={handleSaveSheetsConfig} className="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white py-2.5 rounded-lg font-medium text-sm">Hubungkan</button><button onClick={handleDownloadSpreadsheetTemplate} className="bg-emerald-100 hover:bg-emerald-200 text-emerald-700 px-4 py-2.5 rounded-lg" title="Download Template CSV"><Download size={18}/></button></div>
                </div>
                <div className="relative flex py-2 items-center"><div className="flex-grow border-t border-slate-200"></div><span className="mx-4 text-slate-400 text-xs">ATAU</span><div className="flex-grow border-t border-slate-200"></div></div>
                <button onClick={handleSwitchToLocal} className="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 py-3 rounded-xl font-medium flex items-center justify-center space-x-2"><HardDrives size={20} /><span>Lanjutkan Offline (Local Storage)</span></button>
              </div>
            </div>
          </div>
        );
      }

      if (appMode === 'auth') {
        return (
          <div className="flex flex-col items-center justify-center min-h-screen bg-slate-50 p-4">
            <ConfirmModal />
            <div className="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md border border-slate-100 transform transition-all">
              <div className="flex flex-col items-center mb-8">
                  <div className="w-20 h-20 bg-indigo-50 rounded-full flex items-center justify-center text-indigo-600 mb-4 shadow-inner">
                      <BookOpen size={40} />
                  </div>
                  <h1 className="text-3xl font-extrabold text-slate-900 tracking-tight">EduLearn</h1>

        );
      }

      if (appMode === 'part_dashboard') {
        const myEnrs = enrollments.filter(e => e.participantId === session.data.id);
        return (
          <div className="min-h-screen flex flex-col bg-slate-50">
            <ConfirmModal />
            <header className="bg-white border-b px-6 py-4 flex justify-between shadow-sm sticky top-0 z-30">
              <div className="flex items-center text-indigo-600"><BookOpen size={28} className="mr-2"/><h1 className="text-2xl font-bold tracking-tight">EduLearn</h1></div>
              <div className="flex items-center space-x-4">
                  <div className="hidden sm:block text-right"><p className="text-sm font-bold text-slate-800">{session.data.name}</p><p className="text-xs text-slate-500">Siswa EduLearn</p></div>
                  <button onClick={handleLogout} className="p-2 text-red-500 bg-red-50 hover:bg-red-100 rounded-full transition"><LogOut size={20} /></button>
              </div>
            </header>
            
            <main className="flex-1 p-4 sm:p-6 lg:p-10 max-w-6xl mx-auto w-full">
              {/* Banner Motivasi Hero */}
              <div className="hero-gradient rounded-3xl p-8 sm:p-10 text-white shadow-xl mb-10 relative overflow-hidden">
                  <div className="relative z-10 max-w-2xl">
                      <h2 className="text-3xl sm:text-4xl font-extrabold mb-3 flex items-center">Halo, {session.data.name.split(' ')[0]}! 👋</h2>
                      <p className="text-indigo-100 text-lg sm:text-xl font-medium">Setiap video yang kamu tonton membawamu selangkah lebih dekat ke impian. Yuk, lanjutkan semangat belajarmu hari ini!</p>
                  </div>
                  <Sparkle className="absolute -right-10 -bottom-10 text-white opacity-10" size={250} />
              </div>

              <div className="flex items-center justify-between mb-6">
                  <h3 className="text-xl font-bold text-slate-800">Kelas Saya ({myEnrs.length})</h3>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 sm:gap-8">
                {myEnrs.map(enr => {
                  const course = courses.find(c => c.id === enr.courseId); if (!course) return null; const prog = calcProgress(enr, course);
                  
                  // Logic Teks Motivasi Dinamis
                  let motText = "Mari mulai petualangan baru!";
                  if (prog > 0 && prog < 50) motText = "Awal yang sangat bagus!";
                  if (prog >= 50 && prog < 100) motText = "Sedikit lagi selesai, semangat!";
                  if (prog === 100 && !enr.isGraduated) motText = "Materi selesai. Saatnya ujian!";
                  if (enr.isGraduated) motText = "Luar biasa! Kamu berhasil lulus.";

                  return (
                    <div key={enr.id} className="bg-white rounded-3xl shadow-sm border border-slate-100 p-6 flex flex-col card-hover">
                      <div className="flex justify-between items-start mb-4">
                          <div className={`w-14 h-14 rounded-2xl flex items-center justify-center text-white shadow-md ${enr.isGraduated ? 'bg-emerald-500' : 'hero-gradient'}`}>
                              {enr.isGraduated ? <Award size={28} /> : <Video size={28} />}
                          </div>
                          <span className={`text-xs font-bold px-3 py-1 rounded-full ${prog === 100 ? 'bg-emerald-100 text-emerald-700' : 'bg-indigo-50 text-indigo-700'}`}>{prog}% Selesai</span>
                      </div>
                      
                      <h3 className="text-xl font-bold mb-1 text-slate-800 leading-tight">{course.title}</h3>
                      <p className="text-sm text-slate-500 mb-6 flex-1 flex items-center"><UserIcon size={14} className="mr-1"/> {course.instructor}</p>
                      
                      <div className="mb-6 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                          <p className="text-xs font-semibold text-slate-600 mb-2">{motText}</p>
                          <div className="w-full bg-slate-200 rounded-full h-2.5 overflow-hidden">
                              <div className={`h-2.5 rounded-full transition-all duration-1000 ${prog === 100 ? 'bg-emerald-500' : 'bg-indigo-500'}`} style={{ width: `${prog}%` }}></div>
                          </div>
                      </div>
                      
                      <button onClick={() => jumpToClassroom(course.id)} className={`w-full py-3.5 rounded-2xl font-bold flex items-center justify-center space-x-2 transition-transform transform active:scale-95 shadow-sm ${enr.isGraduated ? 'bg-emerald-50 text-emerald-700 hover:bg-emerald-100' : 'hero-gradient text-white hover:opacity-90'}`}>
                          {enr.isGraduated ? <Award size={20}/> : <PlayCircle size={20}/>} 
                          <span>{enr.isGraduated ? 'Lihat Sertifikat' : prog > 0 ? 'Lanjutkan Belajar' : 'Mulai Belajar'}</span>
                      </button>
                    </div>
                  );
                })}
              </div>
            </main>
          </div>
        );
      }

      if (appMode === 'classroom') {
        const isStudent = session.role === 'participant';
        const myEnr = isStudent ? enrollments.find(e => e.participantId === session.data.id && e.courseId === activeCourse.id) : null;
        const prog = isStudent ? calcProgress(myEnr, activeCourse) : 0;
        const instructorData = admins.find(a => a.id === activeCourse.authorId);

        return (
          <div className="flex flex-col h-screen bg-slate-50">
            <ConfirmModal />{toast && <div className="fixed top-4 right-4 z-[100] bg-emerald-600 text-white px-6 py-3 rounded-lg shadow-lg flex items-center space-x-2"><CheckCircle2 size={20} /><span>{toast}</span></div>}
            <header className="bg-white border-b px-4 py-3 flex items-center justify-between shrink-0 shadow-sm z-50">
              <div className="flex items-center space-x-4">
                  <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="lg:hidden text-slate-600 hover:text-indigo-600 transition"><Menu size={24} /></button>
                  <h1 className="text-lg sm:text-xl font-bold truncate text-indigo-600"><BookOpen size={24} className="inline mr-2"/>{activeCourse.title}</h1>
              </div>
              <button onClick={() => { if(!session) return setAppMode('auth'); setAppMode(session.role === 'super_admin' ? 'super_dashboard' : isStudent ? 'part_dashboard' : 'admin_dashboard'); }} className="flex items-center text-sm bg-slate-100 hover:bg-slate-200 px-4 py-2 rounded-xl font-medium transition">
                  <ArrowLeft size={16} className="mr-2 hidden sm:inline"/>Kembali
              </button>
            </header>

            <div className="flex flex-1 overflow-hidden relative">
              <aside className={`absolute lg:static w-80 bg-white border-r h-full z-40 flex flex-col transition-transform duration-300 shadow-xl lg:shadow-none ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}`}>
                <div className="p-5 border-b bg-slate-50">
                    <h2 className="font-bold text-slate-800 text-lg">Daftar Materi</h2>
                    {isStudent && (
                        <div className="mt-4">
                            <div className="flex justify-between text-xs font-bold text-slate-500 mb-1"><span>Progres Kamu</span><span>{prog}%</span></div>
                            <div className="w-full bg-slate-200 rounded-full h-2"><div className="hero-gradient h-2 rounded-full transition-all duration-500" style={{ width: `${prog}%` }}></div></div>
                        </div>
                    )}
                </div>
                <div className="overflow-y-auto flex-1 p-3 space-y-1.5">
                  {activeCourse.modules.map((mod, index) => {
                    const isComp = isStudent ? myEnr.completedModules.includes(mod.id) : false;
                    // Logika Penguncian Materi (Tidak Boleh Lompat)
                    const isUnlck = !isStudent || index === 0 || myEnr.completedModules.includes(activeCourse.modules[index - 1].id);
                    return (<button key={mod.id} disabled={!isUnlck} onClick={() => { setClassroomMode('video'); setActiveModule(mod); setIsSidebarOpen(false); }} className={`w-full text-left p-3.5 rounded-xl flex items-start space-x-3 transition-all ${!isUnlck ? 'opacity-50 bg-slate-50 cursor-not-allowed' : activeModule.id === mod.id && classroomMode==='video' ? 'bg-indigo-50 border border-indigo-200 shadow-sm' : 'hover:bg-slate-50 border border-transparent'}`}>{!isUnlck ? <Lock size={20} className="text-slate-400 mt-0.5 shrink-0" /> : isComp ? <CheckCircle2 size={20} className="text-emerald-500 mt-0.5 shrink-0" /> : <PlayCircle size={20} className={`mt-0.5 shrink-0 ${activeModule.id === mod.id && classroomMode==='video' ? 'text-indigo-600' : 'text-slate-400'}`} />}<div className="flex-1 min-w-0"><p className={`text-sm font-semibold leading-snug ${!isUnlck ? 'text-slate-500' : activeModule.id === mod.id && classroomMode==='video' ? 'text-indigo-800' : 'text-slate-700'}`}>{index + 1}. {mod.title}</p></div></button>);
                  })}
                  {isStudent && prog === 100 && activeCourse.exam && (
                      <button onClick={() => { setIsSidebarOpen(false); setClassroomMode(myEnr.isGraduated ? 'result' : 'exam'); }} className={`w-full mt-6 text-left p-4 rounded-xl flex items-center space-x-3 font-bold border-2 transition-transform transform active:scale-95 shadow-sm ${myEnr.isGraduated ? 'bg-emerald-50 border-emerald-200 text-emerald-700' : 'bg-amber-50 border-amber-300 text-amber-700 hover:bg-amber-100'}`}>{myEnr.isGraduated ? <Award size={24} className="shrink-0"/> : <CheckSquareOffset size={24} className="shrink-0 animate-pulse"/>}<span className="truncate">{myEnr.isGraduated ? 'Sertifikat Kelulusan' : 'Ikuti Ujian Akhir!'}</span></button>
                  )}
                </div>
              </aside>

              {/* Overlay untuk nutup sidebar di mobile */}
              {isSidebarOpen && <div className="fixed inset-0 bg-slate-900/50 z-30 lg:hidden" onClick={()=>setIsSidebarOpen(false)}></div>}

              <main className="flex-1 overflow-y-auto bg-slate-50 relative z-20">
                <div className="max-w-4xl mx-auto p-4 sm:p-6 lg:p-8">
                  {classroomMode === 'video' && (
                      <>
                        <div className="relative w-full rounded-3xl overflow-hidden shadow-xl bg-black aspect-video mb-8"><iframe src={formatVideoUrl(activeModule.videoUrl)} title={activeModule.title} allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowFullScreen className="absolute top-0 left-0 w-full h-full border-0"></iframe></div>
                        <div className="bg-white rounded-3xl p-6 sm:p-10 shadow-sm border border-slate-100">
                            <h2 className="text-2xl sm:text-3xl font-extrabold mb-4 text-slate-800">{activeModule.title}</h2><p className="text-slate-600 leading-relaxed text-lg">{activeModule.description}</p>
                            {isStudent && (<div className="mt-8 pt-8 flex justify-end border-t border-slate-100"><button onClick={handleCompleteModule} className={`flex items-center space-x-2 px-8 py-3.5 rounded-2xl font-bold shadow-md transition-transform transform active:scale-95 ${myEnr.completedModules.includes(activeModule.id) ? 'bg-slate-100 text-slate-500 shadow-none' : 'hero-gradient text-white hover:opacity-90'}`}><span>{myEnr.completedModules.includes(activeModule.id) ? 'Lanjut ke Materi Berikutnya' : 'Tandai Selesai & Lanjut'}</span><ChevronRight size={20} /></button></div>)}
                            <div className="mt-10 pt-10 border-t border-slate-200">
                            <h3 className="text-xl font-bold mb-6 flex items-center text-slate-800"><MessageSquare className="mr-2 text-indigo-600" /> Ruang Diskusi Kelas</h3>
                            <form onSubmit={handlePostComment} className="mb-8 flex gap-3"><input type="text" maxLength={500} value={commentText} onChange={(e) => setCommentText(e.target.value)} placeholder={!isStudent ? "Balas pertanyaan siswa..." : "Ada yang kurang jelas? Tanyakan di sini (Maks 500 huruf)..."} className="flex-1 px-5 py-3.5 bg-slate-50 rounded-2xl border border-slate-200 outline-none focus:bg-white focus:border-indigo-500 focus:ring-4 focus:ring-indigo-50 transition" /><button type="submit" disabled={!commentText.trim()} className="hero-gradient text-white px-8 rounded-2xl font-bold disabled:bg-slate-300 disabled:background-none transition shadow-sm">Kirim</button></form>
                            <div className="space-y-4">{activeModule.comments.length === 0 ? <p className="text-slate-500 text-sm text-center py-6 bg-slate-50 rounded-2xl border border-dashed">Belum ada obrolan. Jadilah yang pertama memulai diskusi!</p> : activeModule.comments.map(c => (<div key={c.id} className={`p-5 rounded-2xl border ${c.isAdmin ? 'bg-indigo-50 border-indigo-200 shadow-sm' : 'bg-white border-slate-100 shadow-sm'}`}><div className="flex items-center space-x-2 mb-2"><div className={`w-8 h-8 rounded-full flex items-center justify-center text-white font-bold text-xs ${c.isAdmin ? 'bg-indigo-600' : 'bg-slate-400'}`}>{c.user.charAt(0)}</div><p className="font-bold text-sm text-slate-800">{c.user}</p>{c.isAdmin && <span className="text-[10px] bg-indigo-600 text-white px-2.5 py-0.5 rounded-full font-bold uppercase tracking-wider">Instruktur</span>}</div><p className="text-sm text-slate-700 pl-10">{c.text}</p></div>))}</div>
                            </div>
                        </div>
                      </>
                  )}
                  {classroomMode === 'exam' && (
                      <div className="bg-white rounded-3xl p-8 sm:p-12 shadow-xl border border-slate-100 relative overflow-hidden">
                          <div className="absolute top-0 left-0 w-full h-2 bg-amber-400"></div>
                          <div className="text-center mb-10 pb-8 border-b border-slate-100"><div className="w-20 h-20 bg-amber-50 text-amber-500 rounded-full flex items-center justify-center mx-auto mb-5"><CheckSquareOffset size={40}/></div><h2 className="text-3xl sm:text-4xl font-extrabold text-slate-900 mb-3">Ujian Akhir Kelas</h2><p className="text-slate-500 text-lg">Kerjakan dengan jujur. Nilai kelulusan minimal: <b className="text-amber-600">{activeCourse.exam.minScore}</b></p></div>
                          <div className="space-y-8">{activeCourse.exam.questions.map((q, qIdx) => (<div key={qIdx} className="bg-slate-50 p-6 sm:p-8 rounded-2xl border border-slate-100"><h3 className="font-bold text-lg mb-5 text-slate-800">{qIdx+1}. {q.q}</h3><div className="space-y-3">{q.options.map((opt, optIdx) => (<label key={optIdx} className={`flex items-center p-4 border rounded-xl cursor-pointer transition-all ${studentAnswers[qIdx] === optIdx ? 'bg-indigo-50 border-indigo-500 ring-2 ring-indigo-200' : 'bg-white hover:bg-slate-100 border-slate-200'}`}><input type="radio" name={`q_${qIdx}`} value={optIdx} onChange={() => setStudentAnswers({...studentAnswers, [qIdx]: optIdx})} checked={studentAnswers[qIdx] === optIdx} className="w-5 h-5 text-indigo-600 cursor-pointer" /><span className="ml-4 font-medium text-slate-700">{opt}</span></label>))}</div></div>))}</div>
                          <div className="mt-12 flex justify-end pt-8 border-t border-slate-100"><button onClick={submitExam} disabled={Object.keys(studentAnswers).length < activeCourse.exam.questions.length} className="hero-gradient disabled:opacity-50 text-white px-10 py-4 rounded-2xl font-bold text-lg shadow-lg transform transition active:scale-95">Kumpulkan Jawaban Ujian</button></div>
                      </div>
                  )}
                  {classroomMode === 'result' && (
                      <div className="bg-white rounded-3xl p-10 shadow-2xl border text-center max-w-2xl mx-auto mt-10 relative overflow-hidden">
                          <div className={`absolute top-0 left-0 w-full h-3 ${myEnr.isGraduated ? 'bg-emerald-500' : 'bg-red-500'}`}></div>
                          <div className={`w-28 h-28 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner ${myEnr.isGraduated ? 'bg-emerald-50 text-emerald-500' : 'bg-red-50 text-red-500'}`}>{myEnr.isGraduated ? <Award size={56}/> : <X size={56}/>}</div>
                          <h2 className="text-3xl sm:text-4xl font-extrabold text-slate-900 mb-3">{myEnr.isGraduated ? 'Selamat, Anda Lulus! 🎉' : 'Maaf, Belum Lulus 😔'}</h2><p className="text-slate-600 mb-10 text-lg">Nilai Ujian Akhir Kamu: <b className={`text-3xl ml-2 ${myEnr.isGraduated ? 'text-emerald-600' : 'text-red-600'}`}>{myEnr.examScore}</b> / {activeCourse.exam.questions.length * 10}</p>
                          {!myEnr.isGraduated ? (<button onClick={()=>{setClassroomMode('exam'); setStudentAnswers({});}} className="w-full bg-slate-900 hover:bg-black text-white py-4 rounded-2xl font-bold text-lg shadow-lg transform transition active:scale-95">Pelajari Materi & Ulangi Ujian</button>) : (<div className="space-y-4"><button onClick={handleDownloadCert} className="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-2xl font-bold text-lg shadow-lg transform transition active:scale-95 flex items-center justify-center"><Download size={24} className="mr-2"/> Download Sertifikat Kelulusan</button>{instructorData?.donationLink && (<a href={instructorData.donationLink} target="_blank" rel="noopener noreferrer" className="w-full bg-amber-50 hover:bg-amber-100 text-amber-700 border border-amber-200 py-4 rounded-2xl font-bold transition flex items-center justify-center"><Coffee size={24} className="mr-2"/> Apresiasi Instruktur (Beri Tip)</a>)}</div>)}
                      </div>
                  )}
                </div>
              </main>
            </div>
          </div>
        );
      }
      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

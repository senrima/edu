<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduLearn LMS - Multi Admin</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    // ----------------------------------------------------
    // IMPORTS UNTUK FIREBASE
    // ----------------------------------------------------
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    let fbApp = null;
    let fbAuth = null;
    let fbDb = null;

    // ----------------------------------------------------
    // ICONS SETUP
    // ----------------------------------------------------
    const IconWrapper = ({ name, size = 24, className = "" }) => (
      <i className={`ph ph-${name} ${className}`} style={{ fontSize: size }}></i>
    );

    const PlayCircle = (p) => <IconWrapper name="play-circle" {...p} />;
    const Download = (p) => <IconWrapper name="download" {...p} />;
    const Menu = (p) => <IconWrapper name="list" {...p} />;
    const X = (p) => <IconWrapper name="x" {...p} />;
    const BookOpen = (p) => <IconWrapper name="book-open" {...p} />;
    const Video = (p) => <IconWrapper name="video" {...p} />;
    const CheckCircle2 = (p) => <IconWrapper name="check-circle" {...p} />;
    const ChevronRight = (p) => <IconWrapper name="caret-right" {...p} />;
    const Loader2 = (p) => <IconWrapper name="spinner" className="animate-spin" {...p} />;
    const MessageSquare = (p) => <IconWrapper name="chat-circle" {...p} />;
    const Lock = (p) => <IconWrapper name="lock" {...p} />;
    const Mail = (p) => <IconWrapper name="envelope" {...p} />;
    const Key = (p) => <IconWrapper name="key" {...p} />;
    const LogOut = (p) => <IconWrapper name="sign-out" {...p} />;
    const Plus = (p) => <IconWrapper name="plus" {...p} />;
    const Database = (p) => <IconWrapper name="database" {...p} />;
    const LayoutDashboard = (p) => <IconWrapper name="squares-four" {...p} />;
    const Trash2 = (p) => <IconWrapper name="trash" {...p} />;
    const Award = (p) => <IconWrapper name="medal" {...p} />;
    const Bell = (p) => <IconWrapper name="bell" {...p} />;
    const Users = (p) => <IconWrapper name="users" {...p} />;
    const Book = (p) => <IconWrapper name="book" {...p} />;
    const GraduationCap = (p) => <IconWrapper name="graduation-cap" {...p} />;
    const AlertCircle = (p) => <IconWrapper name="warning-circle" {...p} />;
    const PlusCircle = (p) => <IconWrapper name="plus-circle" {...p} />;
    const ArrowLeft = (p) => <IconWrapper name="arrow-left" {...p} />;
    const RefreshCw = (p) => <IconWrapper name="arrows-clockwise" {...p} />;
    const UserIcon = (p) => <IconWrapper name="user" {...p} />;
    const Globe = (p) => <IconWrapper name="globe" {...p} />;
    const HardDrives = (p) => <IconWrapper name="hard-drives" {...p} />;
    const ShieldCheck = (p) => <IconWrapper name="shield-check" {...p} />; // Icon Super Admin

    // ----------------------------------------------------
    // INITIAL MOCK DATA (Mode Offline)
    // ----------------------------------------------------
    const initialAdmins = [
      { id: 'adm_super', username: 'super_admin', password: 'SUPER123', name: 'Master System', isSuper: true }, // Akun Super Admin
      { id: 'adm_1', username: 'budi_admin', password: 'ADMIN123', name: 'Budi Santoso', isSuper: false },
      { id: 'adm_2', username: 'siska_admin', password: 'ADMIN456', name: 'Siska Saraswati', isSuper: false }
    ];
    const initialCourses = [
      { id: 'c_1', authorId: 'adm_1', code: 'WEB2026', title: "Mastering Web Development", instructor: "Budi Santoso", modules: [ { id: 'm_1', title: "Pengantar HTML & CSS Modern", videoUrl: "https://www.youtube.com/embed/mU6anWqZJcc", description: "Dasar web", comments: [] }, { id: 'm_2', title: "Fundamental JavaScript", videoUrl: "https://www.youtube.com/embed/W6NZfCO5SIk", description: "JS Dasar", comments: [] } ] }
    ];
    const initialParticipants = [{ id: 'p_1', name: "Andi Wijaya", email: "andi@mail.com", accessCode: "P9X2A1" }];
    const initialEnrollments = [{ id: 'e_1', participantId: 'p_1', courseId: 'c_1', completedModules: ['m_1'], isGraduated: false, certDownloaded: false }];

    // ----------------------------------------------------
    // MAIN APP COMPONENT
    // ----------------------------------------------------
    function App() {
      const [dbMode, setDbMode] = React.useState(() => localStorage.getItem('edu_db_mode') || 'local');
      const [dbReady, setDbReady] = React.useState(false);
      const [setupError, setSetupError] = React.useState("");
      const [fbConfigInput, setFbConfigInput] = React.useState("");

      const [admins, setAdmins] = React.useState([]);
      const [courses, setCourses] = React.useState([]);
      const [participants, setParticipants] = React.useState([]);
      const [enrollments, setEnrollments] = React.useState([]);
      const [notifications, setNotifications] = React.useState([]);

      const [session, setSession] = React.useState(() => JSON.parse(sessionStorage.getItem('edu_session')) || null);
      const [loginInput, setLoginInput] = React.useState({ username: "", password: "" });
      const [loginError, setLoginError] = React.useState("");
      const [isLoggingIn, setIsLoggingIn] = React.useState(false);
      
      const getInitialAppMode = () => {
        if (!session) return 'auth';
        if (session.role === 'super_admin') return 'super_dashboard';
        if (session.role === 'admin') return 'admin_dashboard';
        return 'part_dashboard';
      };

      const [appMode, setAppMode] = React.useState(getInitialAppMode()); 
      const [adminTab, setAdminTab] = React.useState("courses"); 
      
      const [activeCourse, setActiveCourse] = React.useState(null);
      const [activeModule, setActiveModule] = React.useState(null);
      const [isSidebarOpen, setIsSidebarOpen] = React.useState(false);
      const [commentText, setCommentText] = React.useState("");
      const [showCertModal, setShowCertModal] = React.useState(false);
      const [toast, setToast] = React.useState(null);

      // --- DB INITIALIZATION EFFECT ---
      React.useEffect(() => {
        if (appMode === 'setup_db') return;

        if (dbMode === 'local') {
          setAdmins(JSON.parse(localStorage.getItem('edu_admins')) || initialAdmins);
          setCourses(JSON.parse(localStorage.getItem('edu_courses')) || initialCourses);
          setParticipants(JSON.parse(localStorage.getItem('edu_participants')) || initialParticipants);
          setEnrollments(JSON.parse(localStorage.getItem('edu_enrollments')) || initialEnrollments);
          setNotifications(JSON.parse(localStorage.getItem('edu_notifications')) || []);
          setDbReady(true);
        } else if (dbMode === 'firebase') {
          try {
            const configStr = localStorage.getItem('edu_fb_config');
            if (!configStr) throw new Error("No Config");
            
            const config = JSON.parse(configStr);
            fbApp = initializeApp(config);
            fbAuth = getAuth(fbApp);
            fbDb = getFirestore(fbApp);

            signInAnonymously(fbAuth).then(() => {
              const getRef = (colName) => collection(fbDb, colName);
              
              onSnapshot(getRef('admins'), snap => setAdmins(snap.docs.map(d => ({id: d.id, ...d.data()}))) );
              onSnapshot(getRef('courses'), snap => setCourses(snap.docs.map(d => ({id: d.id, ...d.data()}))) );
              onSnapshot(getRef('participants'), snap => setParticipants(snap.docs.map(d => ({id: d.id, ...d.data()}))) );
              onSnapshot(getRef('enrollments'), snap => setEnrollments(snap.docs.map(d => ({id: d.id, ...d.data()}))) );
              onSnapshot(getRef('notifications'), snap => setNotifications(snap.docs.map(d => ({id: d.id, ...d.data()}))) );
              
              setDbReady(true);
            }).catch(e => {
              console.error("Firebase Auth Error:", e);
              setSetupError("Gagal login anonim ke Firebase. Pastikan Auth Anonymous diaktifkan.");
              setAppMode('setup_db');
            });
          } catch (e) {
            console.error("Firebase Init Error:", e);
            setSetupError("Konfigurasi Firebase tidak ditemukan atau salah.");
            setAppMode('setup_db');
          }
        }
      }, [dbMode, appMode]);

      // --- SETUP DB HANDLERS ---
      const handleSaveFirebaseConfig = () => {
        try {
          let str = fbConfigInput.trim();
          if (str.includes('firebaseConfig')) {
            str = str.substring(str.indexOf('{'), str.lastIndexOf('}') + 1);
          }
          const configObj = new Function("return " + str)();
          if (!configObj.apiKey || !configObj.projectId) throw new Error("Missing keys");
          localStorage.setItem('edu_fb_config', JSON.stringify(configObj));
          localStorage.setItem('edu_db_mode', 'firebase');
          window.location.reload(); 
        } catch (e) {
          setSetupError("Format konfigurasi tidak valid.");
        }
      };

      const handleSwitchToLocal = () => {
        localStorage.setItem('edu_db_mode', 'local');
        window.location.reload();
      };

      const handleDownloadSpreadsheetTemplate = () => {
         // Struktur Header untuk masing-masing tabel database
         const tables = {
            'Admins': 'id,username,password,name,isSuper',
            'Courses': 'id,authorId,code,title,instructor,modules_json',
            'Participants': 'id,name,email,accessCode',
            'Enrollments': 'id,participantId,courseId,completedModules_json,isGraduated,certDownloaded',
            'Notifications': 'id,adminId,text,isRead,time,courseId,moduleId'
         };
         
         // Download beruntun 5 file CSV dengan jeda agar tidak diblokir browser
         Object.keys(tables).forEach((name, i) => {
            setTimeout(() => {
                const blob = new Blob([tables[name]], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url; 
                link.download = `Template_${name}.csv`;
                document.body.appendChild(link); 
                link.click(); 
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            }, i * 500); 
         });
         showToast("5 File Template Spreadsheet sedang diunduh!");
      };

      // --- UNIVERSAL DATABASE WRAPPER (HYBRID) ---
      const execDbAction = async (localAction, firebaseAction) => {
        try {
          if (dbMode === 'firebase') { await firebaseAction(); } 
          else { localAction(); }
        } catch (error) {
          console.error(error); showToast("Gagal menyimpan data.");
        }
      };

      const handleSeedDatabase = async () => {
        setIsLoggingIn(true);
        await execDbAction(
          () => {
            localStorage.setItem('edu_admins', JSON.stringify(initialAdmins)); setAdmins(initialAdmins);
            localStorage.setItem('edu_courses', JSON.stringify(initialCourses)); setCourses(initialCourses);
            showToast("Database Lokal Berhasil Diinisialisasi!");
          },
          async () => {
            for(let adm of initialAdmins) {
               await setDoc(doc(fbDb, 'admins', adm.id), adm);
            }
            showToast("Firebase Berhasil Diinisialisasi!");
          }
        );
        setIsLoggingIn(false);
      };

      // ----------------------------------------------------
      // HELPER FUNCTIONS
      // ----------------------------------------------------
      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };
      const generateRandomCode = (prefix = "", length = 6) => prefix + Math.random().toString(36).substring(2, 2+length).toUpperCase();
      const calcProgress = (enr, crs) => {
        if (!crs || crs.modules.length === 0 || !enr) return 0;
        return Math.round((enr.completedModules.length / crs.modules.length) * 100);
      };

      // ----------------------------------------------------
      // AUTHENTICATION LOGIC
      // ----------------------------------------------------
      const handleLogin = (e) => {
        e.preventDefault();
        setIsLoggingIn(true); setLoginError("");
        
        setTimeout(() => {
          const { username, password } = loginInput;
          
          // Cek Admin & Super Admin
          const adminFound = admins.find(a => a.username === username && a.password === password);
          if (adminFound) {
            const role = adminFound.isSuper ? 'super_admin' : 'admin';
            const mode = adminFound.isSuper ? 'super_dashboard' : 'admin_dashboard';
            const sessData = { role: role, data: adminFound };
            setSession(sessData); sessionStorage.setItem('edu_session', JSON.stringify(sessData));
            setAppMode(mode); setIsLoggingIn(false); return;
          }

          // Cek Peserta
          const partFound = participants.find(p => p.email === username && p.accessCode === password);
          if (partFound) {
            const sessData = { role: 'participant', data: partFound };
            setSession(sessData); sessionStorage.setItem('edu_session', JSON.stringify(sessData));
            setAppMode('part_dashboard'); setIsLoggingIn(false); return;
          }

          setLoginError("Kredensial salah! Periksa kembali Email/Username dan Kode/Sandi Anda.");
          setIsLoggingIn(false);
        }, 600);
      };

      const handleLogout = () => {
        setSession(null); sessionStorage.removeItem('edu_session');
        setAppMode('auth'); setLoginInput({ username: "", password: "" });
      };

      // ----------------------------------------------------
      // SUPER ADMIN ACTIONS
      // ----------------------------------------------------
      const handleRegisterAdmin = async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const username = fd.get('username');
        if (admins.some(a => a.username === username)) return showToast("Username sudah dipakai!");

        const newAdminData = { name: fd.get('name'), username: username, password: fd.get('password'), isSuper: false };

        await execDbAction(
          () => {
            const updatedA = [...admins, { id: `adm_${Date.now()}`, ...newAdminData }];
            setAdmins(updatedA); localStorage.setItem('edu_admins', JSON.stringify(updatedA));
          },
          async () => {
             const docRef = doc(collection(fbDb, 'admins'));
             await setDoc(docRef, newAdminData);
          }
        );
        e.target.reset(); showToast("Admin Baru Ditambahkan!");
      };

      const handleDeleteAdmin = async (id) => {
        if(window.confirm("Yakin ingin menghapus instruktur ini? (Peringatan: Kursus miliknya akan tetap ada namun tanpa pembuat aktif).")) {
            await execDbAction(
                () => {
                    const updatedA = admins.filter(a => a.id !== id);
                    setAdmins(updatedA); localStorage.setItem('edu_admins', JSON.stringify(updatedA));
                },
                async () => await deleteDoc(doc(fbDb, 'admins', id))
            );
            showToast("Admin dihapus.");
        }
      };

      // ----------------------------------------------------
      // ADMIN ACTIONS
      // ----------------------------------------------------
      const handleCreateCourse = async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const code = fd.get('code');
        if (courses.some(c => c.code === code)) return showToast("Kode Kursus sudah ada!");
        
        const courseData = { authorId: session.data.id, code, title: fd.get('title'), instructor: fd.get('inst'), modules: [] };
        
        await execDbAction(
          () => {
            const updated = [...courses, { id: `c_${Date.now()}`, ...courseData }];
            setCourses(updated); localStorage.setItem('edu_courses', JSON.stringify(updated));
          },
          async () => await setDoc(doc(collection(fbDb, 'courses')), courseData)
        );
        e.target.reset(); showToast("Kursus berhasil dibuat!");
      };

      const handleCreateModule = async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const courseId = fd.get('courseId');
        const course = courses.find(c => c.id === courseId);
        const newModule = { id: `m_${Date.now()}`, title: fd.get('title'), videoUrl: fd.get('vidUrl'), description: fd.get('desc'), comments: [] };
        
        await execDbAction(
          () => {
            const updated = courses.map(c => c.id === courseId ? { ...c, modules: [...c.modules, newModule] } : c);
            setCourses(updated); localStorage.setItem('edu_courses', JSON.stringify(updated));
          },
          async () => await updateDoc(doc(fbDb, 'courses', courseId), { modules: [...course.modules, newModule] })
        );
        e.target.reset(); showToast("Materi ditambahkan!");
      };

      const handleDeleteModule = async (courseId, moduleId) => {
        const course = courses.find(c => c.id === courseId);
        await execDbAction(
          () => {
            const updated = courses.map(c => c.id === courseId ? { ...c, modules: c.modules.filter(m => m.id !== moduleId) } : c);
            setCourses(updated); localStorage.setItem('edu_courses', JSON.stringify(updated));
          },
          async () => await updateDoc(doc(fbDb, 'courses', courseId), { modules: course.modules.filter(m => m.id !== moduleId) })
        );
        showToast("Materi dihapus.");
      };

      const handleRegisterParticipant = async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const email = fd.get('email');
        if (participants.some(p => p.email === email)) return showToast("Gagal: Email sudah ada!");

        const partData = { name: fd.get('name'), email, accessCode: fd.get('code') };
        const enrData = { courseId: fd.get('courseId'), completedModules: [], isGraduated: false, certDownloaded: false };

        await execDbAction(
          () => {
            const newPart = { id: `p_${Date.now()}`, ...partData };
            const newEnr = { id: `e_${Date.now()}`, participantId: newPart.id, ...enrData };
            const updatedP = [...participants, newPart]; const updatedE = [...enrollments, newEnr];
            setParticipants(updatedP); localStorage.setItem('edu_participants', JSON.stringify(updatedP));
            setEnrollments(updatedE); localStorage.setItem('edu_enrollments', JSON.stringify(updatedE));
          },
          async () => {
            const pRef = doc(collection(fbDb, 'participants')); await setDoc(pRef, partData);
            const eRef = doc(collection(fbDb, 'enrollments')); await setDoc(eRef, { ...enrData, participantId: pRef.id });
          }
        );
        e.target.reset(); showToast("Peserta terdaftar!");
      };

      const handleEnrollExisting = async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const email = fd.get('email');
        const cId = fd.get('cId');

        // Cari peserta berdasarkan email
        const participant = participants.find(p => p.email === email);

        if (!participant) {
            return showToast("Gagal: Peserta dengan email tersebut tidak ditemukan!");
        }

        const pId = participant.id;

        if(enrollments.some(en => en.participantId === pId && en.courseId === cId)) return showToast("Sudah terdaftar di kursus ini!");

        const enrData = { participantId: pId, courseId: cId, completedModules: [], isGraduated: false, certDownloaded: false };
        await execDbAction(
          () => {
            const updatedE = [...enrollments, { id: `e_${Date.now()}`, ...enrData }];
            setEnrollments(updatedE); localStorage.setItem('edu_enrollments', JSON.stringify(updatedE));
          },
          async () => await setDoc(doc(collection(fbDb, 'enrollments')), enrData)
        );
        showToast("Kursus ditambahkan ke akun Peserta!");
      };

      // ----------------------------------------------------
      // CLASSROOM ACTIONS
      // ----------------------------------------------------
      const jumpToClassroom = (courseId, targetModuleId = null) => {
        const course = courses.find(c => c.id === courseId);
        let modToOpen = course.modules[0] || null;

        if (session.role === 'admin' && targetModuleId) {
          modToOpen = course.modules.find(m => m.id === targetModuleId) || modToOpen;
        } else if (session.role === 'participant') {
          const myEnr = enrollments.find(e => e.participantId === session.data.id && e.courseId === courseId);
          if (myEnr) modToOpen = course.modules.find(m => !myEnr.completedModules.includes(m.id)) || course.modules[0];
        }
        if(!modToOpen) return showToast("Belum ada materi di kelas ini!"); 
        setActiveCourse(course); setActiveModule(modToOpen); setAppMode('classroom');
      };

      const handlePostComment = async (e) => {
        e.preventDefault();
        if (!commentText.trim()) return;

        const isAdmin = session.role === 'admin';
        const authorName = isAdmin ? `${session.data.name} (Instruktur)` : session.data.name;
        const newComment = { id: `cmt_${Date.now()}`, user: authorName, text: commentText, isAdmin, time: "Baru saja" };
        const updatedMods = activeCourse.modules.map(m => m.id === activeModule.id ? { ...m, comments: [...m.comments, newComment] } : m);

        await execDbAction(
          () => {
            const updatedC = courses.map(c => c.id === activeCourse.id ? { ...c, modules: updatedMods } : c);
            setCourses(updatedC); localStorage.setItem('edu_courses', JSON.stringify(updatedC));
            if (!isAdmin) {
              const updatedN = [{ id: `n_${Date.now()}`, adminId: activeCourse.authorId, text: `${authorName} bertanya di "${activeCourse.title}"`, isRead: false, time: "Baru saja", courseId: activeCourse.id, moduleId: activeModule.id }, ...notifications];
              setNotifications(updatedN); localStorage.setItem('edu_notifications', JSON.stringify(updatedN));
            }
          },
          async () => {
            await updateDoc(doc(fbDb, 'courses', activeCourse.id), { modules: updatedMods });
            if (!isAdmin) await setDoc(doc(collection(fbDb, 'notifications')), { adminId: activeCourse.authorId, text: `${authorName} bertanya di "${activeCourse.title}"`, isRead: false, time: "Baru saja", courseId: activeCourse.id, moduleId: activeModule.id });
          }
        );
        setActiveModule(prev => ({ ...prev, comments: [...prev.comments, newComment] }));
        setCommentText(""); showToast("Komentar terkirim!");
      };

      const handleCompleteModule = async () => {
        if (session.role === 'admin') return; 

        const cMods = activeCourse.modules;
        const cIdx = cMods.findIndex(m => m.id === activeModule.id);
        const isLast = cIdx === cMods.length - 1;
        const myEnr = enrollments.find(e => e.participantId === session.data.id && e.courseId === activeCourse.id);
        
        if (!myEnr.completedModules.includes(activeModule.id)) {
          const newComps = [...myEnr.completedModules, activeModule.id];
          const willGrad = isLast && newComps.length === cMods.length;

          await execDbAction(
            () => {
              const updatedE = enrollments.map(en => en.id === myEnr.id ? { ...en, completedModules: newComps, isGraduated: willGrad } : en);
              setEnrollments(updatedE); localStorage.setItem('edu_enrollments', JSON.stringify(updatedE));
            },
            async () => await updateDoc(doc(fbDb, 'enrollments', myEnr.id), { completedModules: newComps, isGraduated: willGrad })
          );

          if (!isLast) { setActiveModule(cMods[cIdx + 1]); showToast("Selesai! Lanjut materi."); } 
          else setShowCertModal(true);
        } else {
          if (!isLast) setActiveModule(cMods[cIdx + 1]); else setShowCertModal(true);
        }
      };

      const handleDownloadCert = async () => {
        const myEnr = enrollments.find(e => e.participantId === session.data.id && e.courseId === activeCourse.id);
        
        await execDbAction(
          () => {
            const updatedE = enrollments.map(en => en.id === myEnr.id ? { ...en, certDownloaded: true } : en);
            setEnrollments(updatedE); localStorage.setItem('edu_enrollments', JSON.stringify(updatedE));
          },
          async () => await updateDoc(doc(fbDb, 'enrollments', myEnr.id), { certDownloaded: true })
        );

                          {myCourses.map(c => <option key={c.id} value={c.id}>{c.title}</option>)}
                        </select>
                        <button type="submit" className="w-full bg-indigo-600 text-white py-2 rounded-lg text-sm font-medium">Tambahkan Kursus</button>
                      </form>
                    </div>
                  </div>
                  <div className="lg:col-span-3 bg-white p-6 rounded-xl shadow-sm border border-slate-200 overflow-x-auto">
                    <h2 className="font-bold text-slate-800 mb-4 flex items-center"><GraduationCap size={18} className="mr-2 text-indigo-600" /> Data Progress (Eksklusif Kelas Anda)</h2>
                    <table className="w-full text-left text-sm whitespace-nowrap">
                      <thead className="bg-slate-100 text-slate-600"><tr><th className="p-3">Peserta</th><th className="p-3">Kode Akun</th><th className="p-3">Kursus</th><th className="p-3">Progress</th></tr></thead>
                      <tbody className="divide-y divide-slate-100">
                        {myEnrollments.length === 0 ? <tr><td colSpan="4" className="p-4 text-center text-slate-500">Belum ada peserta di kelas Anda.</td></tr> : myEnrollments.map(enr => {
                          const part = participants.find(p => p.id === enr.participantId);
                          const crs = courses.find(c => c.id === enr.courseId);
                          const prog = calcProgress(enr, crs);
                          if(!part || !crs) return null;
                          return (
                            <tr key={enr.id} className="hover:bg-slate-50">
                              <td className="p-3"><p className="font-medium">{part.name}</p><p className="text-xs text-slate-500">{part.email}</p></td>
                              <td className="p-3 font-mono text-xs font-bold text-slate-600">{part.accessCode}</td>
                              <td className="p-3 text-slate-600">{crs.title}</td>
                              <td className="p-3">
                                <div className="flex items-center space-x-2"><div className="w-20 bg-slate-200 rounded-full h-2"><div className="bg-indigo-500 h-2 rounded-full" style={{width: `${prog}%`}}></div></div><span className="text-xs">{prog}%</span></div>
                              </td>
                            </tr>
                          )
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}

              {/* TAB NOTIFIKASI */}
              {adminTab === 'notifications' && (
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 max-w-3xl mx-auto">
                  <h2 className="font-bold text-slate-800 mb-6 flex items-center"><Bell size={18} className="mr-2 text-indigo-600" /> Inbox Pertanyaan Kelas Anda</h2>
                  <div className="space-y-4">
                    {myNotifs.length === 0 ? <p className="text-slate-500">Tidak ada pesan.</p> : myNotifs.map(n => (
                      <div key={n.id} className={`flex items-center justify-between p-4 rounded-xl border ${n.isRead ? 'border-slate-100 bg-slate-50' : 'border-indigo-100 bg-indigo-50'}`}>
                        <div className="flex items-start space-x-3"><AlertCircle size={20} className="text-indigo-600 mt-0.5"/><div><p className="text-sm font-medium">{n.text}</p><p className="text-xs text-slate-500 mt-1">{n.time}</p></div></div>
                        {n.courseId && <button onClick={() => jumpToClassroom(n.courseId, n.moduleId)} className="text-xs bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium shadow-sm shrink-0">Tanggapi di Kelas</button>}
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      }

      // --- SCREEN 3: PARTICIPANT DASHBOARD ---
      if (appMode === 'part_dashboard') {
        const myEnrs = enrollments.filter(e => e.participantId === session.data.id);

        return (
          <div className="min-h-screen flex flex-col">
            <header className="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between shadow-sm">
              <div className="flex items-center space-x-2 text-indigo-600"><BookOpen size={28} /><h1 className="text-2xl font-bold">EduLearn</h1></div>
              <div className="flex items-center space-x-4">
                <div className="text-right hidden sm:block"><p className="text-sm font-bold">{session.data.name}</p><p className="text-xs text-slate-500 font-mono">Kode: {session.data.accessCode}</p></div>
                <button onClick={handleLogout} className="p-2 hover:bg-red-50 rounded-lg text-red-500 flex items-center"><LogOut size={20} /></button>
              </div>
            </header>

            <main className="flex-1 p-6 lg:p-10 max-w-6xl mx-auto w-full">
              <h2 className="text-3xl font-bold text-slate-800 mb-2">Halo, {session.data.name.split(' ')[0]}!</h2>
              <p className="text-slate-500 mb-8">Ini adalah daftar kelas yang Anda miliki.</p>
              
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                {myEnrs.length === 0 ? <p className="text-slate-500">Anda belum terdaftar di kelas manapun.</p> : myEnrs.map(enr => {
                  const course = courses.find(c => c.id === enr.courseId);
                  if (!course) return null;
                  const prog = calcProgress(enr, course);
                  
                  return (
                    <div key={enr.id} className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 flex flex-col hover:border-indigo-300 transition-colors group">
                      <div className="w-12 h-12 bg-indigo-50 rounded-xl flex items-center justify-center text-indigo-600 mb-4"><Video size={24} /></div>
                      <h3 className="text-lg font-bold mb-1">{course.title}</h3>
                      <p className="text-sm text-slate-500 mb-6 flex-1">Pengajar: {course.instructor}</p>
                      <div className="mb-6"><div className="flex justify-between text-xs font-medium mb-2"><span>Progres</span><span>{prog}%</span></div><div className="w-full bg-slate-100 rounded-full h-2"><div className={`h-2 rounded-full ${prog === 100 ? 'bg-emerald-500' : 'bg-indigo-500'}`} style={{ width: `${prog}%` }}></div></div></div>
                      <button onClick={() => jumpToClassroom(course.id)} className={`w-full py-3 rounded-xl font-medium flex items-center justify-center space-x-2 ${prog === 100 ? 'bg-emerald-50 text-emerald-700' : 'bg-indigo-600 text-white'}`}>
                        <PlayCircle size={18}/> <span>{prog === 100 ? 'Review Materi' : prog > 0 ? 'Lanjutkan Belajar' : 'Mulai Belajar'}</span>
                      </button>
                    </div>
                  );
                })}
              </div>
            </main>
          </div>
        );
      }

      // --- SCREEN 4: CLASSROOM ---
      if (appMode === 'classroom') {
        const isStudent = session.role === 'participant';
        const myEnr = isStudent ? enrollments.find(e => e.participantId === session.data.id && e.courseId === activeCourse.id) : null;
        const prog = isStudent ? calcProgress(myEnr, activeCourse) : 0;

        return (
          <div className="flex flex-col h-screen">
            {toast && <div className="fixed top-4 right-4 z-[100] bg-emerald-600 text-white px-6 py-3 rounded-lg shadow-lg flex items-center space-x-2"><CheckCircle2 size={20} /><span>{toast}</span></div>}

            <header className="bg-white border-b border-slate-200 px-4 py-3 flex items-center justify-between shrink-0 z-50 shadow-sm">
              <div className="flex items-center space-x-4">
                <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="lg:hidden text-slate-600"><Menu size={24} /></button>
                <div className="flex items-center space-x-2 text-indigo-600 hidden sm:flex"><BookOpen size={24} /><h1 className="text-xl font-bold truncate max-w-[200px]">{activeCourse.title}</h1></div>
              </div>
              <button onClick={() => setAppMode(isStudent ? 'part_dashboard' : 'admin_dashboard')} className="flex items-center space-x-2 text-sm bg-slate-100 hover:bg-slate-200 px-4 py-2 rounded-lg font-medium">
                <ArrowLeft size={16} /> <span className="hidden sm:inline">Keluar Kelas</span>
              </button>
            </header>

            <div className="flex flex-1 overflow-hidden relative">
              <aside className={`absolute lg:static w-80 bg-white border-r h-full z-40 transition-transform flex flex-col ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}`}>
                <div className="p-4 border-b">
                  <h2 className="font-semibold text-slate-800">Daftar Materi</h2>
                  {isStudent && <div className="mt-3"><div className="flex justify-between text-xs mb-1"><span>Progres</span><span>{prog}%</span></div><div className="w-full bg-slate-200 rounded-full h-2"><div className="bg-emerald-500 h-2 rounded-full" style={{ width: `${prog}%` }}></div></div></div>}
                  {!isStudent && <span className="inline-block mt-2 text-xs font-bold bg-amber-100 text-amber-800 px-2 py-1 rounded">Mode Instruktur</span>}
                </div>
                <div className="overflow-y-auto flex-1 p-2">
                  {activeCourse.modules.map((mod, index) => {
                    const isComp = isStudent ? myEnr.completedModules.includes(mod.id) : false;
                    const isUnlck = !isStudent || index === 0 || myEnr.completedModules.includes(activeCourse.modules[index - 1].id);
                    return (
                      <button key={mod.id} disabled={!isUnlck} onClick={() => { setActiveModule(mod); setIsSidebarOpen(false); }}
                        className={`w-full text-left p-3 mb-1 rounded-lg flex items-start space-x-3 transition-colors ${!isUnlck ? 'opacity-50 bg-slate-50' : activeModule.id === mod.id ? 'bg-indigo-50 border border-indigo-100' : 'hover:bg-slate-50'}`}>
                        {!isUnlck ? <Lock size={18} className="text-slate-400 mt-0.5" /> : isComp ? <CheckCircle2 size={18} className="text-emerald-500 mt-0.5" /> : <PlayCircle size={18} className={`mt-0.5 ${activeModule.id === mod.id ? 'text-indigo-600' : 'text-slate-400'}`} />}
                        <div className="flex-1 min-w-0"><p className={`text-sm font-medium truncate ${!isUnlck ? 'text-slate-500' : activeModule.id === mod.id ? 'text-indigo-900' : 'text-slate-700'}`}>{index + 1}. {mod.title}</p></div>
                      </button>
                    );
                  })}
                </div>
              </aside>

              <main className="flex-1 overflow-y-auto bg-slate-50 relative z-20">
                <div className="max-w-4xl mx-auto p-4 sm:p-6 lg:p-8">
                  <div className="relative w-full rounded-2xl overflow-hidden shadow-lg bg-black aspect-video mb-6"><iframe src={activeModule.videoUrl} title={activeModule.title} allowFullScreen className="absolute top-0 left-0 w-full h-full border-0"></iframe></div>
                  <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                    <h2 className="text-2xl font-bold mb-3">{activeModule.title}</h2><p className="text-slate-600">{activeModule.description}</p>

                    {isStudent && (
                      <div className="mt-6 pt-6 flex justify-end border-t border-slate-100">
                        {activeCourse.modules.findIndex(m => m.id === activeModule.id) < activeCourse.modules.length - 1 ? (
                          <button onClick={handleCompleteModule} className="flex items-center space-x-2 bg-indigo-600 text-white px-6 py-2.5 rounded-xl font-medium">
                            <span>{myEnr.completedModules.includes(activeModule.id) ? 'Lanjut ke Berikutnya' : 'Tandai Selesai & Lanjut'}</span><ChevronRight size={18} />
                          </button>
                        ) : (
                          <button onClick={handleCompleteModule} className="flex items-center space-x-2 bg-emerald-600 text-white px-6 py-2.5 rounded-xl font-medium">
                            <Award size={18} /><span>{myEnr.completedModules.includes(activeModule.id) ? 'Lihat Sertifikat' : 'Selesaikan Kursus'}</span>
                          </button>
                        )}
                      </div>
                    )}

                    <div className="mt-8 pt-8 border-t border-slate-200">
                      <h3 className="text-xl font-bold mb-4 flex items-center"><MessageSquare className="mr-2 text-indigo-600" /> Forum Diskusi</h3>
                      <form onSubmit={handlePostComment} className="mb-6 flex gap-3">
                        <input type="text" value={commentText} onChange={(e) => setCommentText(e.target.value)} placeholder={!isStudent ? "Balas komentar..." : "Tanya sesuatu..."} className="flex-1 px-4 py-3 rounded-xl border outline-none focus:border-indigo-500" />
                        <button type="submit" disabled={!commentText.trim()} className="bg-indigo-600 text-white px-6 rounded-xl font-medium disabled:bg-slate-300">Kirim</button>
                      </form>
                      <div className="space-y-3">
                        {activeModule.comments.length === 0 ? <p className="text-slate-500 text-sm text-center py-4 bg-slate-50 rounded-xl border border-dashed">Belum ada diskusi.</p> : activeModule.comments.map(c => (
                            <div key={c.id} className={`p-4 rounded-xl border ${c.isAdmin ? 'bg-indigo-50 border-indigo-200' : 'bg-slate-50 border-slate-100'}`}>
                              <div className="flex items-center space-x-2 mb-1"><p className="font-semibold text-sm">{c.user}</p>{c.isAdmin && <span className="text-[10px] bg-indigo-600 text-white px-2 py-0.5 rounded-full font-bold uppercase">Instruktur</span>}</div>
                              <p className="text-sm text-slate-700">{c.text}</p>
                            </div>
                        ))}
                      </div>
                    </div>
                  </div>
                </div>
              </main>
            </div>

            {/* Modal Sertifikat */}
            {showCertModal && (
              <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
                <div className="bg-white rounded-2xl p-8 max-w-md w-full text-center shadow-2xl relative">
                  <button onClick={() => setShowCertModal(false)} className="absolute top-4 right-4 text-slate-400"><X size={24} /></button>
                  <div className="w-20 h-20 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-600 mx-auto mb-6"><Award size={40} className="stroke-[1.5]" /></div>
                  <h2 className="text-2xl font-bold text-slate-900 mb-2">Selamat, {session.data.name}!</h2>
                  <p className="text-slate-600 mb-8 leading-relaxed">Anda telah lulus dari <b>{activeCourse.title}</b>.</p>
                  <button onClick={handleDownloadCert} className="w-full bg-emerald-600 text-white py-3 rounded-xl font-medium flex justify-center items-center space-x-2 mb-3 shadow-md">
                    <Download size={20} /><span>Download PDF Sertifikat</span>
                  </button>
                </div>
              </div>
            )}
          </div>
        );
      }

      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

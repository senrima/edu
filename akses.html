<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Ujicoba Unggah R2</title>
</head>
<body>
  <h2>Unggah Aset Digital ke R2</h2>
  <form id="formUnggah">
    <input type="file" id="pilihFile" required><br><br>
    <button type="submit">Unggah File</button>
  </form>
  <p id="pesan" style="color: blue;"></p>

  <script>
    document.getElementById('formUnggah').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const fileInput = document.getElementById('pilihFile');
      const file = fileInput.files[0];
      if (!file) return;

      // Ganti URL di bawah ini dengan URL Worker api-storage Anda sendiri
      const urlWorkerR2 = "https://api-registrasi.senrima-ms.workers.dev/"; 
      
      // Menggabungkan URL Worker dengan nama file asli
      const urlTujuan = urlWorkerR2 + file.name;

      document.getElementById('pesan').innerText = "Sedang mengunggah...";

      try {
        const response = await fetch(urlTujuan, {
          method: "PUT",
          body: file,
          headers: {
            "Content-Type": file.type
          }
        });

        const result = await response.json();
        document.getElementById('pesan').innerText = result.message;
      } catch (error) {
        document.getElementById('pesan').innerText = "Gagal mengunggah file.";
      }
    });
  </script>
</body>
</html>

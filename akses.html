<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Ujicoba Registrasi</title>
</head>
<body>
  <h2>Daftar Pengguna Baru</h2>
  <form id="formDaftar">
    <input type="text" id="username" placeholder="Nama Pengguna" required><br><br>
    <input type="password" id="password" placeholder="Kata Sandi" required><br><br>
    <button type="submit">Daftar</button>
  </form>
  <p id="pesan" style="color: blue;"></p>

  <script>
    document.getElementById('formDaftar').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      // Ganti URL di bawah ini dengan alamat Cloudflare Worker Anda
      const urlWorker = "https://api-registrasi.<subdomain-anda>.workers.dev";

      const response = await fetch(urlWorker, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });

      const result = await response.json();
      document.getElementById('pesan').innerText = result.message;
    });
  </script>
</body>
</html>

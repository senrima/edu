<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduLearn LMS - Multi Admin</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    let fbApp = null;
    let fbAuth = null;
    let fbDb = null;

    const IconWrapper = ({ name, size = 24, className = "" }) => (
      <i className={`ph ph-${name} ${className}`} style={{ fontSize: size }}></i>
    );

    const PlayCircle = (p) => <IconWrapper name="play-circle" {...p} />;
    const Download = (p) => <IconWrapper name="download" {...p} />;
    const Menu = (p) => <IconWrapper name="list" {...p} />;
    const X = (p) => <IconWrapper name="x" {...p} />;
    const BookOpen = (p) => <IconWrapper name="book-open" {...p} />;
    const Video = (p) => <IconWrapper name="video" {...p} />;
    const CheckCircle2 = (p) => <IconWrapper name="check-circle" {...p} />;
    const ChevronRight = (p) => <IconWrapper name="caret-right" {...p} />;
    const Loader2 = (p) => <IconWrapper name="spinner" className="animate-spin" {...p} />;
    const MessageSquare = (p) => <IconWrapper name="chat-circle" {...p} />;
    const Lock = (p) => <IconWrapper name="lock" {...p} />;
    const Mail = (p) => <IconWrapper name="envelope" {...p} />;
    const Key = (p) => <IconWrapper name="key" {...p} />;
    const LogOut = (p) => <IconWrapper name="sign-out" {...p} />;
    const Plus = (p) => <IconWrapper name="plus" {...p} />;
    const Database = (p) => <IconWrapper name="database" {...p} />;
    const LayoutDashboard = (p) => <IconWrapper name="squares-four" {...p} />;
    const Trash2 = (p) => <IconWrapper name="trash" {...p} />;
    const Award = (p) => <IconWrapper name="medal" {...p} />;
    const Bell = (p) => <IconWrapper name="bell" {...p} />;
    const Users = (p) => <IconWrapper name="users" {...p} />;
    const Book = (p) => <IconWrapper name="book" {...p} />;
    const GraduationCap = (p) => <IconWrapper name="graduation-cap" {...p} />;
    const AlertCircle = (p) => <IconWrapper name="warning-circle" {...p} />;
    const PlusCircle = (p) => <IconWrapper name="plus-circle" {...p} />;
    const ArrowLeft = (p) => <IconWrapper name="arrow-left" {...p} />;
    const RefreshCw = (p) => <IconWrapper name="arrows-clockwise" {...p} />;
    const UserIcon = (p) => <IconWrapper name="user" {...p} />;
    const Globe = (p) => <IconWrapper name="globe" {...p} />;
    const HardDrives = (p) => <IconWrapper name="hard-drives" {...p} />;
    const ShieldCheck = (p) => <IconWrapper name="shield-check" {...p} />;
    const MagnifyingGlass = (p) => <IconWrapper name="magnifying-glass" {...p} />;
    const Coffee = (p) => <IconWrapper name="coffee" {...p} />;
    const CheckSquareOffset = (p) => <IconWrapper name="check-square-offset" {...p} />;

    const initialAdmins = [
      { id: 'adm_super', username: 'super_admin', password: 'SUPER123', name: 'Master System', isSuper: true, donationLink: '' },
      { id: 'adm_1', username: 'budi_admin', password: 'ADMIN123', name: 'Budi Santoso', isSuper: false, donationLink: 'https://trakteer.id/budi' },
      { id: 'adm_2', username: 'siska_admin', password: 'ADMIN456', name: 'Siska Saraswati', isSuper: false, donationLink: '' }
    ];
    
    // Struktur Ujian Kosong
    const emptyExam = {
      minScore: 70,
      questions: Array.from({length: 10}, () => ({ q: '', options: ['','','',''], answer: 0 }))
    };

    const initialCourses = [
      { 
        id: 'c_1', authorId: 'adm_1', code: 'WEB2026', title: "Mastering Web Development", instructor: "Budi Santoso", 
        exam: {
          minScore: 80,
          questions: [
            { q: "Apa kepanjangan dari HTML?", options: ["Hyper Text Markup Language", "Hyperlinks Text Mark Language", "Home Tool Markup Language", "Hyper Tool Multi Language"], answer: 0 },
            { q: "Tag HTML untuk membuat paragraf adalah?", options: ["<p>", "<para>", "<pg>", "<text>"], answer: 0 },
            { q: "Sifat CSS yang mengatur warna teks adalah?", options: ["bg-color", "color", "text-color", "font-color"], answer: 1 },
            { q: "Simbol ID di CSS menggunakan?", options: [".", "#", "*", "&"], answer: 1 },
            { q: "Apa fungsi dari JavaScript?", options: ["Styling", "Struktur Data", "Interaktivitas Web", "Database"], answer: 2 },
            { q: "Cara mendeklarasikan variabel di JS modern?", options: ["var & let", "let & const", "int & float", "dim & string"], answer: 1 },
            { q: "Di mana kita menaruh file CSS eksternal?", options: ["<body>", "<head>", "<footer>", "<header>"], answer: 1 },
            { q: "Tipe data [1, 2, 3] dalam JS disebut?", options: ["Object", "String", "Number", "Array"], answer: 3 },
            { q: "Fungsi console.log() digunakan untuk?", options: ["Pop up alert", "Mencetak pesan di console", "Menghapus data", "Membuat fungsi"], answer: 1 },
            { q: "Framework CSS terpopuler saat ini?", options: ["Tailwind", "Bootstrap", "Foundation", "Semua benar"], answer: 3 }
          ]
        },
        modules: [ 
          { id: 'm_1', title: "Pengantar HTML & CSS Modern", videoUrl: "https://www.youtube.com/embed/mU6anWqZJcc", description: "Dasar web", comments: [] }, 
          { id: 'm_2', title: "Fundamental JavaScript", videoUrl: "https://www.youtube.com/embed/W6NZfCO5SIk", description: "JS Dasar", comments: [] } 
        ] 
      }
    ];
    
    const initialParticipants = [{ id: 'p_1', name: "Andi Wijaya", email: "andi@mail.com", accessCode: "P9X2A1" }];
    const initialEnrollments = [{ id: 'e_1', participantId: 'p_1', courseId: 'c_1', completedModules: ['m_1'], isGraduated: false, certDownloaded: false, examScore: null }];

    function App() {
      // Database & App States
      const [dbMode, setDbMode] = React.useState(() => localStorage.getItem('edu_db_mode') || 'local');
      const [dbReady, setDbReady] = React.useState(false);
      const [setupError, setSetupError] = React.useState("");
      const [fbConfigInput, setFbConfigInput] = React.useState("");
      
      const [admins, setAdmins] = React.useState([]);
      const [courses, setCourses] = React.useState([]);
      const [participants, setParticipants] = React.useState([]);
      const [enrollments, setEnrollments] = React.useState([]);
      const [notifications, setNotifications] = React.useState([]);

      const [session, setSession] = React.useState(() => JSON.parse(sessionStorage.getItem('edu_session')) || null);
      const [loginInput, setLoginInput] = React.useState({ username: "", password: "" });
      const [loginError, setLoginError] = React.useState("");
      const [isLoggingIn, setIsLoggingIn] = React.useState(false);
      
      // UI View States
      const getInitialAppMode = () => {
        if (!session) return 'auth';
        if (session.role === 'super_admin') return 'super_dashboard';
        if (session.role === 'admin') return 'admin_dashboard';
        return 'part_dashboard';
      };

      const [appMode, setAppMode] = React.useState(getInitialAppMode()); 
      const [adminTab, setAdminTab] = React.useState("courses"); 
      const [superTab, setSuperTab] = React.useState("instructors"); 
      
      // Search States untuk Super Admin
      const [searchInst, setSearchInst] = React.useState("");
      const [searchCourse, setSearchCourse] = React.useState("");
      const [searchPart, setSearchPart] = React.useState("");
      
      // Kelas / Exam States
      const [activeCourse, setActiveCourse] = React.useState(null);
      const [activeModule, setActiveModule] = React.useState(null);
      const [isSidebarOpen, setIsSidebarOpen] = React.useState(false);
      const [commentText, setCommentText] = React.useState("");
      
      const [classroomMode, setClassroomMode] = React.useState('video'); // 'video' | 'exam' | 'result'
      const [studentAnswers, setStudentAnswers] = React.useState({});
      
      // Modal States
      const [toast, setToast] = React.useState(null);
      const [confirmDialog, setConfirmDialog] = React.useState({ isOpen: false, message: "", onConfirm: null });
      
      // Admin Exam Builder State
      const [examModalOpen, setExamModalOpen] = React.useState(false);
      const [examCourseId, setExamCourseId] = React.useState(null);
      const [examForm, setExamForm] = React.useState(emptyExam);

      // Admin Profile State
      const [profileForm, setProfileForm] = React.useState({ donationLink: "" });

      React.useEffect(() => {
        if (appMode === 'setup_db') return;

        if (dbMode === 'local') {
          setAdmins(JSON.parse(localStorage.getItem('edu_admins')) || initialAdmins);
          setCourses(JSON.parse(localStorage.getItem('edu_courses')) || initialCourses);
          setParticipants(JSON.parse(localStorage.getItem('edu_participants')) || initialParticipants);
          setEnrollments(JSON.parse(localStorage.getItem('edu_enrollments')) || initialEnrollments);
          setNotifications(JSON.parse(localStorage.getItem('edu_notifications')) || []);
          setDbReady(true);
        } else if (dbMode === 'firebase') {
          try {
            const configStr = localStorage.getItem('edu_fb_config');
            if (!configStr) throw new Error("No Config");
            const config = JSON.parse(configStr);
            fbApp = initializeApp(config); fbAuth = getAuth(fbApp); fbDb = getFirestore(fbApp);

            signInAnonymously(fbAuth).then(() => {
              const getRef = (colName) => collection(fbDb, colName);
              onSnapshot(getRef('admins'), snap => setAdmins(snap.docs.map(d => ({id: d.id, ...d.data()}))) );
              onSnapshot(getRef('courses'), snap => setCourses(snap.docs.map(d => ({id: d.id, ...d.data()}))) );
              onSnapshot(getRef('participants'), snap => setParticipants(snap.docs.map(d => ({id: d.id, ...d.data()}))) );
              onSnapshot(getRef('enrollments'), snap => setEnrollments(snap.docs.map(d => ({id: d.id, ...d.data()}))) );
              onSnapshot(getRef('notifications'), snap => setNotifications(snap.docs.map(d => ({id: d.id, ...d.data()}))) );
              setDbReady(true);
            }).catch(e => {
              console.error("Firebase Auth Error:", e);
              setSetupError("Gagal login anonim ke Firebase. Pastikan Auth Anonymous diaktifkan.");
              setAppMode('setup_db');
            });
          } catch (e) {
            console.error("Firebase Init Error:", e);
            setSetupError("Konfigurasi Firebase tidak ditemukan atau salah.");
            setAppMode('setup_db');
          }
        }
      }, [dbMode, appMode]);

      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };
      const generateRandomCode = (prefix = "", length = 6) => prefix + Math.random().toString(36).substring(2, 2+length).toUpperCase();
      const calcProgress = (enr, crs) => {
        if (!crs || crs.modules.length === 0 || !enr) return 0;
        return Math.round((enr.completedModules.length / crs.modules.length) * 100);
      };

      const execDbAction = async (localAction, firebaseAction) => {
        try {
          if (dbMode === 'firebase') { await firebaseAction(); } 
          else { localAction(); }
        } catch (error) {
          console.error(error); showToast("Gagal menyimpan data.");
        }
      };

      const handleSeedDatabase = async () => {
        setIsLoggingIn(true);
        await execDbAction(
          () => {
            localStorage.setItem('edu_admins', JSON.stringify(initialAdmins)); setAdmins(initialAdmins);
            localStorage.setItem('edu_courses', JSON.stringify(initialCourses)); setCourses(initialCourses);
            localStorage.setItem('edu_participants', JSON.stringify(initialParticipants)); setParticipants(initialParticipants);
            localStorage.setItem('edu_enrollments', JSON.stringify(initialEnrollments)); setEnrollments(initialEnrollments);
            showToast("Database Lokal Berhasil Diinisialisasi!");
          },
          async () => {
            for(let adm of initialAdmins) await setDoc(doc(fbDb, 'admins', adm.id), adm);
            for(let crs of initialCourses) await setDoc(doc(fbDb, 'courses', crs.id), crs);
            for(let prt of initialParticipants) await setDoc(doc(fbDb, 'participants', prt.id), prt);
            for(let enr of initialEnrollments) await setDoc(doc(fbDb, 'enrollments', enr.id), enr);
            showToast("Firebase Berhasil Diinisialisasi (Full Data)!");
          }
        );
        setIsLoggingIn(false);
      };

      const handleLogin = (e) => {
        e.preventDefault();
        setIsLoggingIn(true); setLoginError("");
        
        setTimeout(() => {
          const { username, password } = loginInput;
          const adminFound = admins.find(a => a.username === username && a.password === password);
          
          if (adminFound) {
            const role = adminFound.isSuper ? 'super_admin' : 'admin';
            const mode = adminFound.isSuper ? 'super_dashboard' : 'admin_dashboard';
            const sessData = { role: role, data: adminFound };
            setSession(sessData); sessionStorage.setItem('edu_session', JSON.stringify(sessData));
            if(!adminFound.isSuper) setProfileForm({ donationLink: adminFound.donationLink || "" });
            setAppMode(mode); setIsLoggingIn(false); return;
          }

          const partFound = participants.find(p => p.email === username && p.accessCode === password);
          if (partFound) {
            const sessData = { role: 'participant', data: partFound };
            setSession(sessData); sessionStorage.setItem('edu_session', JSON.stringify(sessData));
            setAppMode('part_dashboard'); setIsLoggingIn(false); return;
          }

          setLoginError("Kredensial salah! Periksa kembali Email/Username dan Kode/Sandi Anda.");
          setIsLoggingIn(false);
        }, 600);
      };

      const handleLogout = () => {
        setSession(null); sessionStorage.removeItem('edu_session');
        setAppMode('auth'); setLoginInput({ username: "", password: "" });
        setClassroomMode('video'); setStudentAnswers({}); setExamModalOpen(false);
      };

      const handleDeleteAdmin = (id) => {
        setConfirmDialog({
            isOpen: true,
            message: "Yakin ingin menghapus instruktur ini? (Peringatan: Kursus miliknya akan tetap ada namun tanpa pembuat aktif).",
            onConfirm: async () => {
                setConfirmDialog({ isOpen: false, message: "", onConfirm: null });
                await execDbAction(
                    () => {
                        const updatedA = admins.filter(a => a.id !== id);
                        setAdmins(updatedA); localStorage.setItem('edu_admins', JSON.stringify(updatedA));
                    },
                    async () => await deleteDoc(doc(fbDb, 'admins', id))
                );
                showToast("Admin dihapus.");
            }
        });
      };

      const executeDeleteCourse = async (courseId) => {
        await execDbAction(
            () => {
                const updatedC = courses.filter(c => c.id !== courseId);
                setCourses(updatedC); localStorage.setItem('edu_courses', JSON.stringify(updatedC));
            },
            async () => await deleteDoc(doc(fbDb, 'courses', courseId))
        );
        showToast("Kursus berhasil dihapus permanen.");
      };

      const handleSafeDeleteCourse = (courseId) => {
        // Logika Proteksi: Cek apakah ada enrollment
        const hasEnrolled = enrollments.some(e => e.courseId === courseId);
        if (hasEnrolled) {
            showToast("Gagal: Kursus ini sudah memiliki peserta dan tidak boleh dihapus.");
            return;
        }

        setConfirmDialog({
            isOpen: true,
            message: "Kursus ini masih kosong. Yakin ingin menghapus kursus ini secara permanen?",
            onConfirm: () => {
                setConfirmDialog({ isOpen: false, message: "", onConfirm: null });
                executeDeleteCourse(courseId);
            }
        });
      };

      const handleCreateCourse = async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const code = fd.get('code');
        if (courses.some(c => c.code === code)) return showToast("Kode Kursus sudah ada!");
        
        const courseData = { authorId: session.data.id, code, title: fd.get('title'), instructor: fd.get('inst'), modules: [], exam: emptyExam };
        
        await execDbAction(
          () => {
            const updated = [...courses, { id: `c_${Date.now()}`, ...courseData }];
            setCourses(updated); localStorage.setItem('edu_courses', JSON.stringify(updated));
          },
          async () => await setDoc(doc(collection(fbDb, 'courses')), courseData)
        );
        e.target.reset(); showToast("Kursus berhasil dibuat!");
      };

      const handleCreateModule = async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const courseId = fd.get('courseId');
        const course = courses.find(c => c.id === courseId);
        const newModule = { id: `m_${Date.now()}`, title: fd.get('title'), videoUrl: fd.get('vidUrl'), description: fd.get('desc'), comments: [] };
        
        await execDbAction(
          () => {
            const updated = courses.map(c => c.id === courseId ? { ...c, modules: [...c.modules, newModule] } : c);
            setCourses(updated); localStorage.setItem('edu_courses', JSON.stringify(updated));
          },
          async () => await updateDoc(doc(fbDb, 'courses', courseId), { modules: [...course.modules, newModule] })
        );
        e.target.reset(); showToast("Materi ditambahkan!");
      };

      const handleUpdateProfile = async (e) => {
        e.preventDefault();
        await execDbAction(
          () => {
            const updatedA = admins.map(a => a.id === session.data.id ? { ...a, donationLink: profileForm.donationLink } : a);
            setAdmins(updatedA); localStorage.setItem('edu_admins', JSON.stringify(updatedA));
          },
          async () => await updateDoc(doc(fbDb, 'admins', session.data.id), { donationLink: profileForm.donationLink })
        );
        showToast("Profil Instruktur diperbarui!");
      };

      const openExamBuilder = (courseId) => {
        const course = courses.find(c => c.id === courseId);
        setExamCourseId(courseId);
        setExamForm(course.exam || emptyExam);
        setExamModalOpen(true);
      };

      const handleSaveExam = async () => {
        await execDbAction(
          () => {
            const updated = courses.map(c => c.id === examCourseId ? { ...c, exam: examForm } : c);
            setCourses(updated); localStorage.setItem('edu_courses', JSON.stringify(updated));
          },
          async () => await updateDoc(doc(fbDb, 'courses', examCourseId), { exam: examForm })
        );
        setExamModalOpen(false); showToast("Data Ujian berhasil disimpan!");
      };

      const handleRegisterParticipant = async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const email = fd.get('email');
        if (participants.some(p => p.email === email)) return showToast("Gagal: Email sudah terdaftar!");

        const partData = { name: fd.get('name'), email, accessCode: fd.get('code') };
        const enrData = { courseId: fd.get('courseId'), completedModules: [], isGraduated: false, certDownloaded: false, examScore: null };

        await execDbAction(
          () => {
            const newPart = { id: `p_${Date.now()}`, ...partData };
            const newEnr = { id: `e_${Date.now()}`, participantId: newPart.id, ...enrData };
            const updatedP = [...participants, newPart]; const updatedE = [...enrollments, newEnr];
            setParticipants(updatedP); localStorage.setItem('edu_participants', JSON.stringify(updatedP));
            setEnrollments(updatedE); localStorage.setItem('edu_enrollments', JSON.stringify(updatedE));
          },
          async () => {
            const pRef = doc(collection(fbDb, 'participants')); await setDoc(pRef, partData);
            const eRef = doc(collection(fbDb, 'enrollments')); await setDoc(eRef, { ...enrData, participantId: pRef.id });
          }
        );
        e.target.reset(); showToast("Peserta terdaftar!");
      };

      const jumpToClassroom = (courseId, targetModuleId = null) => {
        const course = courses.find(c => c.id === courseId);
        let modToOpen = course.modules[0] || null;
        setClassroomMode('video');

        if ((session.role === 'admin' || session.role === 'super_admin') && targetModuleId) {
          modToOpen = course.modules.find(m => m.id === targetModuleId) || modToOpen;
        } else if (session.role === 'participant') {
          const myEnr = enrollments.find(e => e.participantId === session.data.id && e.courseId === courseId);
          if (myEnr) {
            if(myEnr.isGraduated) { setClassroomMode('result'); }
            else { modToOpen = course.modules.find(m => !myEnr.completedModules.includes(m.id)) || course.modules[course.modules.length - 1]; }
          }
        }
        
        if(!modToOpen && classroomMode === 'video') return showToast("Belum ada materi di kelas ini!"); 
        setActiveCourse(course); setActiveModule(modToOpen); setAppMode('classroom');
      };

      const handlePostComment = async (e) => {
        e.preventDefault();
        if (!commentText.trim()) return;

        const isAdmin = session.role === 'admin' || session.role === 'super_admin';
        const authorName = session.role === 'super_admin' ? `${session.data.name} (Super Admin)` : isAdmin ? `${session.data.name} (Instruktur)` : session.data.name;
        const newComment = { id: `cmt_${Date.now()}`, user: authorName, text: commentText, isAdmin, time: "Baru saja" };
        const updatedMods = activeCourse.modules.map(m => m.id === activeModule.id ? { ...m, comments: [...m.comments, newComment] } : m);

        await execDbAction(
          () => {
            const updatedC = courses.map(c => c.id === activeCourse.id ? { ...c, modules: updatedMods } : c);
            setCourses(updatedC); localStorage.setItem('edu_courses', JSON.stringify(updatedC));
            if (!isAdmin) {
              const updatedN = [{ id: `n_${Date.now()}`, adminId: activeCourse.authorId, text: `${authorName} bertanya di "${activeCourse.title}"`, isRead: false, time: "Baru saja", courseId: activeCourse.id, moduleId: activeModule.id }, ...notifications];
              setNotifications(updatedN); localStorage.setItem('edu_notifications', JSON.stringify(updatedN));
            }
          },
          async () => {
            await updateDoc(doc(fbDb, 'courses', activeCourse.id), { modules: updatedMods });
            if (!isAdmin) await setDoc(doc(collection(fbDb, 'notifications')), { adminId: activeCourse.authorId, text: `${authorName} bertanya di "${activeCourse.title}"`, isRead: false, time: "Baru saja", courseId: activeCourse.id, moduleId: activeModule.id });
          }
        );
        setActiveModule(prev => ({ ...prev, comments: [...prev.comments, newComment] }));
        setCommentText(""); showToast("Komentar terkirim!");
      };

      const handleCompleteModule = async () => {
        if (session.role === 'admin' || session.role === 'super_admin') return; 

        const cMods = activeCourse.modules;
        const cIdx = cMods.findIndex(m => m.id === activeModule.id);
        const isLast = cIdx === cMods.length - 1;
        const myEnr = enrollments.find(e => e.participantId === session.data.id && e.courseId === activeCourse.id);
        
        if (!myEnr.completedModules.includes(activeModule.id)) {
          const newComps = [...myEnr.completedModules, activeModule.id];

          await execDbAction(
            () => {
              const updatedE = enrollments.map(en => en.id === myEnr.id ? { ...en, completedModules: newComps } : en);
              setEnrollments(updatedE); localStorage.setItem('edu_enrollments', JSON.stringify(updatedE));

                            <div className="mt-8 pt-8 border-t border-slate-200">
                            <h3 className="text-xl font-bold mb-4 flex items-center"><MessageSquare className="mr-2 text-indigo-600" /> Forum Diskusi</h3>
                            <form onSubmit={handlePostComment} className="mb-6 flex gap-3">
                                <input type="text" maxLength={500} value={commentText} onChange={(e) => setCommentText(e.target.value)} placeholder={!isStudent ? "Balas komentar..." : "Tanya sesuatu (Maks 500 huruf)..."} className="flex-1 px-4 py-3 rounded-xl border outline-none focus:border-indigo-500" />
                                <button type="submit" disabled={!commentText.trim()} className="bg-indigo-600 text-white px-6 rounded-xl font-medium disabled:bg-slate-300">Kirim</button>
                            </form>
                            <div className="space-y-3">
                                {activeModule.comments.length === 0 ? <p className="text-slate-500 text-sm text-center py-4 bg-slate-50 rounded-xl border border-dashed">Belum ada diskusi.</p> : activeModule.comments.map(c => (
                                    <div key={c.id} className={`p-4 rounded-xl border ${c.isAdmin ? 'bg-indigo-50 border-indigo-200' : 'bg-slate-50 border-slate-100'}`}>
                                    <div className="flex items-center space-x-2 mb-1"><p className="font-semibold text-sm">{c.user}</p>{c.isAdmin && <span className="text-[10px] bg-indigo-600 text-white px-2 py-0.5 rounded-full font-bold uppercase">Instruktur</span>}</div>
                                    <p className="text-sm text-slate-700">{c.text}</p>
                                    </div>
                                ))}
                            </div>
                            </div>
                        </div>
                      </>
                  )}

                  {/* VIEW: UJIAN AKHIR */}
                  {classroomMode === 'exam' && (
                      <div className="bg-white rounded-2xl p-8 shadow-xl border border-slate-200">
                          <div className="text-center mb-8 border-b pb-6">
                              <div className="w-16 h-16 bg-amber-100 text-amber-600 rounded-full flex items-center justify-center mx-auto mb-4"><CheckSquareOffset size={32}/></div>
                              <h2 className="text-3xl font-bold text-slate-900 mb-2">Ujian Akhir Kelas</h2>
                              <p className="text-slate-500">Jawab 10 pertanyaan berikut. Anda harus mendapatkan nilai minimal <b>{activeCourse.exam.minScore}</b> untuk lulus dan mendapatkan sertifikat.</p>
                          </div>
                          
                          <div className="space-y-8">
                              {activeCourse.exam.questions.map((q, qIdx) => (
                                  <div key={qIdx} className="bg-slate-50 p-6 rounded-xl border border-slate-200">
                                      <h3 className="font-bold text-lg mb-4 text-slate-800">{qIdx+1}. {q.q}</h3>
                                      <div className="space-y-3">
                                          {q.options.map((opt, optIdx) => (
                                              <label key={optIdx} className={`flex items-center p-4 border rounded-xl cursor-pointer transition ${studentAnswers[qIdx] === optIdx ? 'bg-indigo-50 border-indigo-500 ring-1 ring-indigo-500' : 'bg-white border-slate-200 hover:bg-slate-100'}`}>
                                                  <input type="radio" name={`q_${qIdx}`} value={optIdx} onChange={() => setStudentAnswers({...studentAnswers, [qIdx]: optIdx})} checked={studentAnswers[qIdx] === optIdx} className="w-4 h-4 text-indigo-600" />
                                                  <span className="ml-3 font-medium text-slate-700">{opt}</span>
                                              </label>
                                          ))}
                                      </div>
                                  </div>
                              ))}
                          </div>
                          
                          <div className="mt-10 flex justify-end pt-6 border-t">
                              <button onClick={submitExam} disabled={Object.keys(studentAnswers).length < 10} className="bg-indigo-600 disabled:bg-slate-300 text-white px-8 py-4 rounded-xl font-bold text-lg shadow-md transition">Kumpulkan Jawaban</button>
                          </div>
                      </div>
                  )}

                  {/* VIEW: HASIL KELULUSAN & DONASI */}
                  {classroomMode === 'result' && (
                      <div className="bg-white rounded-2xl p-10 shadow-2xl border border-slate-200 text-center max-w-2xl mx-auto mt-10 relative overflow-hidden">
                          <div className={`absolute top-0 left-0 w-full h-2 ${myEnr.isGraduated ? 'bg-emerald-500' : 'bg-red-500'}`}></div>
                          <div className={`w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6 ${myEnr.isGraduated ? 'bg-emerald-100 text-emerald-600' : 'bg-red-100 text-red-600'}`}>
                              {myEnr.isGraduated ? <Award size={48}/> : <X size={48}/>}
                          </div>
                          <h2 className="text-3xl font-bold text-slate-900 mb-2">{myEnr.isGraduated ? 'Selamat, Anda Lulus!' : 'Maaf, Anda Belum Lulus'}</h2>
                          <p className="text-slate-600 mb-8 text-lg">Nilai Akhir Anda: <b className={`text-2xl ml-2 ${myEnr.isGraduated ? 'text-emerald-600' : 'text-red-600'}`}>{myEnr.examScore}</b> / 100</p>
                          
                          {!myEnr.isGraduated ? (
                              <button onClick={()=>{setClassroomMode('exam'); setStudentAnswers({});}} className="w-full bg-slate-800 hover:bg-slate-900 text-white py-4 rounded-xl font-bold text-lg transition">Ulangi Ujian Kembali</button>
                          ) : (
                              <div className="space-y-4">
                                  <button onClick={handleDownloadCert} className="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-xl font-bold text-lg transition shadow-md flex items-center justify-center">
                                      <Download size={24} className="mr-2"/> Download Sertifikat Digital
                                  </button>
                                  
                                  {instructorData?.donationLink && (
                                      <a href={instructorData.donationLink} target="_blank" rel="noopener noreferrer" className="w-full bg-amber-100 hover:bg-amber-200 text-amber-800 border border-amber-300 py-4 rounded-xl font-bold transition flex items-center justify-center">
                                          <Coffee size={24} className="mr-2"/> Traktir Kopi/Es Krim Instruktur
                                      </a>
                                  )}
                              </div>
                          )}
                      </div>
                  )}

                </div>
              </main>
            </div>
          </div>
        );
      }

      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verifikasi & Pendaftaran - EduLearn</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@400;500;600;700;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // URL Google Apps Script BARU yang Di-enkripsi Super (Tujuan: ...TpmVycGe/exec)
const _0xDbChunks = [
    "aHR0cHM6Ly9zY3JpcHQuZ29v",
    "Z2xlLmNvbS9tYWNyb3Mvcy9B",
    "S2Z5Y2J3aHMtNGNYQU9RUFQ3",
    "dmptcVdtYk9DdU5MMFQyRWY2",
    "cG9Jc2dfdkRHX2ZZejZPR1V6",
    "QzF2ZTFwbG5mRWViTEw3cFkv",
    "ZXhlYw=="
];
    const DEFAULT_SHEETS_URL = atob(_0xDbChunks.join(""));

    const EMAIL_BUTTONS_HTML = `<br><br><div style="text-align:center;"><a href="https://s-tools.id/edu/" style="background-color: #4f46e5; color: white; padding: 12px 24px; text-decoration: none; border-radius: 8px; display: inline-block; font-weight: bold; font-family: sans-serif; margin-right: 10px; margin-bottom: 10px;">Masuk ke Dashboard</a><a href="https://s-tools.id/app/daftar.html" style="background-color: #f8fafc; color: #4f46e5; padding: 12px 24px; text-decoration: none; border-radius: 8px; display: inline-block; font-weight: bold; font-family: sans-serif; border: 2px solid #4f46e5; margin-bottom: 10px;">Daftar Akun S-Tools</a></div>`;
    
    const IconWrapper = ({ name, size = 24, className = "", weight="regular" }) => (
      <i className={`ph${weight === 'fill' ? '-fill' : weight === 'duotone' ? '-duotone' : weight === 'bold' ? '-bold' : ''} ph-${name} ${className}`} style={{ fontSize: size }}></i>
    );
    const Loader2 = (p) => <IconWrapper name="spinner" className="animate-spin" {...p} />;
    const ShieldCheck = (p) => <IconWrapper name="shield-check" {...p} />;
    const UserIcon = (p) => <IconWrapper name="user" {...p} />;
    const EnvelopeSimple = (p) => <IconWrapper name="envelope-simple" {...p} />;
    const BookOpen = (p) => <IconWrapper name="book-open" {...p} />;
    const Key = (p) => <IconWrapper name="key" {...p} />;
    const RefreshCw = (p) => <IconWrapper name="arrows-clockwise" {...p} />;
    const CheckCircle2 = (p) => <IconWrapper name="check-circle" {...p} />;

    const safeRedirect = (target) => {
        try {
            const currentHref = window.location.href;
            if (currentHref && !currentHref.startsWith('about:') && !currentHref.startsWith('data:') && currentHref !== 'null') {
                const url = new URL(target, currentHref);
                window.location.href = url.href;
            } else {
                console.warn(`[Sandbox Bypass] Navigasi otomatis ke "${target}" diabaikan.`);
            }
        } catch (e) {
            console.error("Gagal melakukan navigasi otomatis:", e);
        }
    };

    const API_ENDPOINT = "https://api.s-tools.id";
    const LOGIN_PORTAL_URL = "https://s-tools.id/app/index.html";

    async function checkEcosystemSession() {
        const localToken = localStorage.getItem('sessionToken');
        const headers = { 'Content-Type': 'application/json' };
        if (localToken) headers['x-auth-token'] = localToken;

        try {
            const response = await fetch(API_ENDPOINT, {
                method: 'POST',
                headers: headers,
                credentials: 'include', 
                body: JSON.stringify({ kontrol: 'proteksi', action: 'getDashboardData' })
            });
            const result = await response.json();
            if (result.status === 'success') return result.userData; 
            return null;
        } catch (error) {
            return null;
        }
    }

    function App() {
      const [ssoUser, setSsoUser] = React.useState(null);
      const [ssoChecking, setSsoChecking] = React.useState(true);
      const [loading, setLoading] = React.useState(true);
      const [status, setStatus] = React.useState({ type: "idle", message: "Membaca tautan..." });
      const [db, setDb] = React.useState({ admins: [], courses: [], participants: [], enrollments: [], notifications: [] });
      
      const [showManualForm, setShowManualForm] = React.useState(false);
      const [formData, setFormData] = React.useState({
        name: "",
        email: "",
        courseCode: "",
        instructorUsername: "",
        accessCode: ""
      });

      React.useEffect(() => {
          async function handleSSO() {
              setSsoChecking(true);
              try {
                  const userData = await checkEcosystemSession();
                  if (userData) {
                      setSsoUser(userData);
                      initializePage(userData);
                  } else {
                      const fallbackUser = { nama: "Operator Lokal", email: "operator@s-tools.id" };
                      setSsoUser(fallbackUser);
                      initializePage(fallbackUser);
                  }
              } catch (err) {
                  const fallbackUser = { nama: "Operator Lokal (Offline)", email: "operator@s-tools.id" };
                  setSsoUser(fallbackUser);
                  initializePage(fallbackUser);
              } finally {
                  setSsoChecking(false);
              }
          }
          handleSSO();
      }, []);

      const initializePage = (userData) => {
        const queryParams = new URLSearchParams(window.location.search);
        const name = queryParams.get("name") || "";
        const email = (queryParams.get("email") || "").trim().toLowerCase();
        const course = queryParams.get("course") || queryParams.get("code") || "";
        const instructor = queryParams.get("instructor") || "";
        const pin = queryParams.get("pin") || queryParams.get("code_akses") || "";

        if (!course) {
            safeRedirect("index.html");
            return;
        }

        setStatus({ type: "loading", message: "Menghubungkan ke database pusat..." });
        
        // FIX CORS GET: Menambahkan parameter nocache untuk memastikan tidak kena cache browser
        fetch(DEFAULT_SHEETS_URL + '?nocache=' + new Date().getTime())
          .then(res => { if(!res.ok) throw new Error("Gagal memuat database."); return res.json(); })
          .then(data => {
            if (data.status === 'error') throw new Error(data.message);

            setDb(data);
            
            const matchedInstructor = data.admins.find(a => 
              String(a.username || '').toLowerCase() === String(instructor || '').trim().toLowerCase()
            );

            const initialForm = {
              name: name || userData.nama || "",
              email: (email || userData.email || "").trim().toLowerCase(),
              courseCode: String(course || '').toUpperCase(),
              instructorUsername: matchedInstructor ? matchedInstructor.username : String(instructor || '').trim().toLowerCase(),
              accessCode: pin || Math.floor(100000 + Math.random() * 900000).toString()
            };
            setFormData(initialForm);

            if ((name || userData.nama) && (email || userData.email) && course && instructor) {
              executeAutoAction(initialForm, data);
            } else {
              setLoading(false);
              setShowManualForm(true);
              setStatus({ type: "input", message: "Silakan lengkapi data pendaftaran di bawah." });
            }
          })
          .catch(err => {
            setLoading(false);
            setStatus({ type: "error", message: "Gagal terhubung ke server. Pastikan GAS disetting Akses: Siapa Saja (Anyone)." });
          });
      };

      // FIX CORS POST: Menggunakan Content-Type text/plain agar tidak memicu Preflight OPTIONS request yang diblokir Google
      const saveToDatabase = async (updatedDb) => {
        return fetch(DEFAULT_SHEETS_URL + '?nocache=' + new Date().getTime(), {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(updatedDb)
        });
      };

      const triggerEmail = (emailAction) => {
        fetch(DEFAULT_SHEETS_URL + '?nocache=' + new Date().getTime(), { 
          method: 'POST', 
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ emailAction }) 
        }).catch(console.error);
      };

      const executeAutoAction = async (form, currentDb) => {
        setLoading(true);
        setStatus({ type: "processing", message: "Sedang memverifikasi data dan mendaftarkan kelas..." });

        try {
          const instructorObj = currentDb.admins.find(a => 
            String(a.username || '').toLowerCase() === String(form.instructorUsername || '').trim().toLowerCase()
          );

          if (!instructorObj) {
            throw new Error(`Instruktur dengan username "${form.instructorUsername}" tidak terdaftar.`);
          }

          const courseObj = currentDb.courses.find(c => 
            String(c.code || '').toUpperCase() === String(form.courseCode || '').toUpperCase()
          );
          if (!courseObj) {
            throw new Error(`Kode Kelas "${form.courseCode}" tidak ditemukan.`);
          }

          if (String(courseObj.authorId) !== String(instructorObj.id)) {
            throw new Error("Sesi validasi gagal: Kelas dan instruktur tidak cocok.");
          }

          const targetEmail = String(form.email || '').trim().toLowerCase();
          let participantObj = currentDb.participants.find(p => 
            String(p.email || '').toLowerCase() === targetEmail
          );

          const isAlreadyEnrolled = participantObj && currentDb.enrollments.some(e => 
            String(e.participantId) === String(participantObj.id) && String(e.courseId) === String(courseObj.id)
          );

          if (isAlreadyEnrolled) {
            setStatus({ 
              type: "success", 
              message: `Pemberitahuan: Anda memang sudah terdaftar aktif di kelas "${courseObj.title}". Mengalihkan Anda ke portal utama...` 
            });
            setLoading(false);
            setTimeout(() => { safeRedirect("index.html"); }, 2000);
            return;
          }

          const currentQuota = instructorObj.maxParticipants === null ? 50 : parseInt(instructorObj.maxParticipants);
          if (currentQuota <= 0) {
            throw new Error(`Pendaftaran Ditolak: Kuota pendaftaran siswa untuk Instruktur kelas ini telah habis (0). Mohon hubungi pengajar Anda untuk memperbarui kuota.`);
          }

          let updatedParticipants = [...currentDb.participants];
          let isNewStudent = false;

          if (!participantObj) {
            participantObj = {
              id: `p_${Date.now()}`,
              name: form.name,
              email: targetEmail,
              accessCode: form.accessCode
            };
            updatedParticipants.push(participantObj);
            isNewStudent = true;
          } else {
            participantObj.name = form.name || participantObj.name;
            participantObj.email = targetEmail;
            if (form.accessCode && form.accessCode !== participantObj.accessCode && showManualForm) {
              participantObj.accessCode = form.accessCode;
            }
            updatedParticipants = currentDb.participants.map(p => p.id === participantObj.id ? participantObj : p);
          }

          const newEnrollment = {
            id: `e_${Date.now()}`,
            participantId: participantObj.id,
            courseId: courseObj.id,
            completedModules: [],
            isGraduated: false,
            certDownloaded: false,
            examScore: null,
            graduatedAt: null
          };

          const updatedEnrollments = [...currentDb.enrollments, newEnrollment];

          const updatedAdmins = currentDb.admins.map(a => 
            String(a.id) === String(instructorObj.id) ? { ...a, maxParticipants: currentQuota - 1 } : a
          );

          const finalDb = {
            ...currentDb,
            admins: updatedAdmins,
            participants: updatedParticipants,
            enrollments: updatedEnrollments
          };

          await saveToDatabase(finalDb);

          // Email Konfirmasi Pendaftaran
          triggerEmail({
            tujuan: participantObj.email,
            subjek: `Akses Kelas ${courseObj.title} Telah Aktif!`,
            namaPengguna: participantObj.name,
            isiPesanInti: `Pendaftaran kelas Anda berhasil diverifikasi.<br><br><b>Detail Kelas:</b><br>• Kelas: <b>${courseObj.title}</b><br>• Email: <b>${participantObj.email}</b><br><br>Karena EduLearn kini menggunakan keamanan terpusat S-Tools ID, PIN/Password manual tidak lagi dibutuhkan. Silakan klik tombol di bawah untuk masuk ke Dashboard.<br><br><span style="color:#e11d48; font-weight:bold; font-size:15px;">Pastikan mendaftar dengan akun email ➔ ${participantObj.email} , agar tidak salah daftar lagi siapa tau Anda memiliki email lain.</span>` + EMAIL_BUTTONS_HTML
          });

          setStatus({ 
            type: "success", 
            message: `Pendaftaran berhasil! Kelas "${courseObj.title}" siap digunakan. Mengalihkan ke aplikasi...`
          });

          setTimeout(() => { safeRedirect("edu22.html"); }, 3000);

        } catch (error) {
          setStatus({ type: "error", message: error.message });
        } finally {
          setLoading(false);
        }
      };

      const handleSubmitManual = (e) => {
        e.preventDefault();
        executeAutoAction(formData, db);
      };

      if (ssoChecking) {
          return (
              <div className="min-h-screen flex items-center justify-center bg-slate-50 p-4">
                  <div className="bg-white p-8 md:p-10 rounded-3xl shadow-xl w-full max-w-md border border-slate-100 text-center relative overflow-hidden">
                      <div className="absolute top-0 left-0 w-full h-1.5 bg-slate-100">
                          <div className="h-full bg-indigo-600 animate-pulse w-full"></div>
                      </div>
                      <div className="w-24 h-24 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner relative">
                          <ShieldCheck size={48} weight="fill" className="animate-bounce" />
                          <div className="absolute inset-0 rounded-full border-4 border-transparent border-t-indigo-600 animate-spin"></div>
                      </div>
                      <h2 className="text-xl font-bold tracking-wide text-slate-900">Menghubungkan S-Tools ID...</h2>
                  </div>
              </div>
          );
      }

      return (
        <div className="min-h-screen flex items-center justify-center bg-slate-50 p-4 relative overflow-hidden">
          
          <div className="bg-white p-8 md:p-10 rounded-3xl shadow-xl w-full max-w-lg border border-slate-100 relative z-10">
            
            {!loading && !showManualForm && status.type !== "success" && status.type !== "error" && (
                <div className="text-center mb-8">
                  <div className="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-inner">
                    <ShieldCheck size={32} weight="fill" />
                  </div>
                  <h1 className="text-3xl font-black text-slate-900 tracking-tight">Verifikasi Akses</h1>
                  <p className="text-slate-500 mt-2 font-medium">Gerbang Pintar Integrasi EduLearn</p>
                </div>
            )}

            {loading && (
              <div className="py-8 text-center relative">
                <div className="w-24 h-24 border-4 border-slate-100 border-t-indigo-600 rounded-full animate-spin mx-auto mb-6"></div>
                <h3 className="text-xl font-black text-slate-900 tracking-tight mb-2">Memproses Data</h3>
                <p className="text-slate-500 font-medium text-sm animate-pulse">{status.message}</p>
              </div>
            )}

            {!loading && status.type === "success" && (
              <div className="py-6 text-center animate-[fadeIn_0.5s_ease-out]">
                <div className="w-20 h-20 bg-emerald-50 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                  <CheckCircle2 size={48} weight="fill" />
                </div>
                <h3 className="text-xl font-black text-slate-900 tracking-tight mb-2">Verifikasi Berhasil!</h3>
                <div className="bg-emerald-50 text-emerald-700 p-4 rounded-xl mb-6 text-sm font-bold text-center border border-emerald-100">
                  {status.message}
                </div>
                <div className="flex justify-center items-center gap-2 text-indigo-600 text-sm font-bold animate-pulse">
                    <Loader2 size={18} />
                    <span>Membuka portal utama LMS...</span>
                </div>
              </div>
            )}

            {!loading && status.type === "error" && (
              <div className="py-6 text-center animate-[fadeIn_0.5s_ease-out]">
                <div className="w-20 h-20 bg-red-50 text-red-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                  <IconWrapper name="warning-octagon" size={48} weight="fill" />
                </div>
                <h3 className="text-xl font-black text-slate-900 tracking-tight mb-2">Pendaftaran Gagal</h3>
                <div className="bg-red-50 text-red-600 p-4 rounded-xl mb-8 text-sm font-bold text-center border border-red-100">
                  {status.message}
                </div>
                <div className="flex flex-col sm:flex-row gap-3">
                  <button onClick={() => window.location.reload()} className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 py-3.5 rounded-xl font-bold transition">
                    Coba Lagi
                  </button>
                  <button onClick={() => { setShowManualForm(true); setStatus({type:"input"}); }} className="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-indigo-200 transition">
                    Form Manual
                  </button>
                </div>
              </div>
            )}

            {!loading && showManualForm && (
              <div className="animate-[fadeIn_0.3s_ease-out]">
                  <div className="text-center mb-8">
                    <div className="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-inner">
                      <IconWrapper name="user-plus" size={32} weight="fill" />
                    </div>
                    <h1 className="text-3xl font-black text-slate-900 tracking-tight">Daftar Manual</h1>
                    <p className="text-slate-500 mt-2 font-medium text-sm">Sistem tidak menemukan parameter lengkap. Silakan isi form di bawah ini.</p>
                  </div>

                  <form onSubmit={handleSubmitManual} className="space-y-5">
                    <div>
                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Nama Lengkap</label>
                        <div className="relative">
                            <div className="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400"><UserIcon size={18} /></div>
                            <input required type="text" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="pl-11 w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition font-medium text-sm" placeholder="Contoh: Budi Santoso" />
                        </div>
                    </div>

                    <div>
                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Email Siswa</label>
                        <div className="relative">
                            <div className="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400"><EnvelopeSimple size={18} /></div>
                            <input required type="email" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value.toLowerCase()})} className="pl-11 w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition font-medium text-sm" placeholder="budi@mail.com" />
                        </div>
                    </div>

                    <div className="grid grid-cols-2 gap-4">
                        <div>
                            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Kode Kelas</label>
                            <div className="relative">
                                <div className="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400"><BookOpen size={18} /></div>
                                <input required type="text" value={formData.courseCode} onChange={e => setFormData({...formData, courseCode: e.target.value.toUpperCase()})} className="pl-11 w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition font-bold font-mono text-sm uppercase" placeholder="WEB2028" />
                            </div>
                        </div>
                        <div>
                            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">PIN Login</label>
                            <div className="flex gap-2">
                                <div className="relative flex-1">
                                    <div className="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400"><Key size={18} /></div>
                                    <input required type="text" value={formData.accessCode} onChange={e => setFormData({...formData, accessCode: e.target.value})} className="pl-11 w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition font-bold font-mono text-sm" placeholder="123456" />
                                </div>
                                <button type="button" onClick={() => setFormData({...formData, accessCode: Math.floor(100000 + Math.random() * 900000).toString()})} className="w-12 shrink-0 bg-slate-100 hover:bg-slate-200 border border-slate-200 rounded-xl flex items-center justify-center text-slate-500 transition" title="Acak PIN"><RefreshCw size={18} weight="bold"/></button>
                            </div>
                        </div>
                    </div>

                    <div>
                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Username Instruktur</label>
                        <div className="relative">
                            <div className="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400"><IconWrapper name="chalkboard-teacher" size={18} /></div>
                            <input required type="text" value={formData.instructorUsername} onChange={e => setFormData({...formData, instructorUsername: e.target.value.trim().toLowerCase()})} className="pl-11 w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition font-medium text-sm" placeholder="Contoh: sitiaminah" />
                        </div>
                    </div>

                    <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl transition shadow-lg shadow-indigo-200 flex items-center justify-center gap-2 mt-4">
                        <IconWrapper name="user-plus" size={20} weight="bold" /> Daftarkan Siswa
                    </button>
                  </form>
              </div>
            )}
          </div>
        </div>
      );
    }

    const rootMounted = ReactDOM.createRoot(document.getElementById('root'));
    rootMounted.render(<App />);
  </script>
</body>
</html>

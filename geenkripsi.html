<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Enkripsi URL GAS EduLearn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    <!-- Background Lights -->
    <div class="absolute inset-0 z-0 opacity-20 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-indigo-600 blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-emerald-600 blur-[120px]"></div>
    </div>

    <div class="relative z-10 bg-white/95 backdrop-blur-xl rounded-[32px] shadow-2xl border border-slate-200/50 p-6 md:p-10 max-w-2xl w-full text-slate-800 animate-[fadeIn_0.3s_ease-out]">
        <div class="flex items-center mb-6">
            <div class="w-14 h-14 bg-indigo-100 rounded-2xl flex items-center justify-center text-indigo-600 mr-4 shadow-md shadow-indigo-100">
                <i class="ph-bold ph-lock-key text-2xl"></i>
            </div>
            <div>
                <h1 class="text-2xl font-black text-slate-900 tracking-tight">Super Encryptor</h1>
                <p class="text-sm text-slate-500 font-bold">Ubah URL GAS Menjadi Base64 Chunks Rahasia</p>
            </div>
        </div>

        <div class="space-y-4 mb-6">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">URL Web App GAS (Mentah)</label>
                <input 
                    type="url" 
                    id="inputUrl" 
                    placeholder="https://script.google.com/macros/s/AKfycb.../exec"
                    class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:bg-white focus:border-indigo-500 focus:ring-4 focus:ring-indigo-50 transition-all font-mono text-sm"
                />
            </div>
            <button 
                onclick="generateEncryption()" 
                class="w-full bg-slate-900 hover:bg-indigo-600 text-white font-black py-4 rounded-xl shadow-lg shadow-indigo-600/10 transition-colors flex justify-center items-center"
            >
                <i class="ph-bold ph-magic-wand mr-2 text-lg"></i> Enkripsi Sekarang
            </button>
        </div>

        <div id="outputArea" class="hidden opacity-0 transition-opacity duration-300">
            <div class="flex justify-between items-end mb-2">
                <label class="block text-xs font-bold text-emerald-600 uppercase tracking-wider">Hasil Enkripsi (Siap Copy)</label>
                <button 
                    onclick="copyToClipboard()" 
                    class="text-xs bg-emerald-100 hover:bg-emerald-200 text-emerald-700 px-3 py-2 rounded-xl font-black transition-colors flex items-center shadow-sm"
                >
                    <i class="ph-bold ph-copy mr-1 text-sm"></i> Salin Kode
                </button>
            </div>
            <div class="bg-slate-950 rounded-2xl p-4 overflow-x-auto border border-slate-800 shadow-inner">
                <pre><code id="outputCode" class="text-emerald-400 font-mono text-xs leading-relaxed"></code></pre>
            </div>
            <div class="bg-amber-50 border border-amber-100 p-4 rounded-2xl mt-4 text-xs text-amber-800 leading-relaxed font-bold">
                💡 INFO: Salin kode di atas lalu ganti blok variabel <code class="bg-amber-100/50 px-1 rounded text-amber-900 font-mono">const _0xDbChunks = [ ... ];</code> pada file <code class="bg-amber-100/50 px-1 rounded text-amber-900 font-mono">edu8.html</code>, <code class="bg-amber-100/50 px-1 rounded text-amber-900 font-mono">verifikasi.html</code>, dan <code class="bg-amber-100/50 px-1 rounded text-amber-900 font-mono">link.html</code> Anda untuk menghubungkan database baru.
            </div>
        </div>
    </div>

    <script>
        function generateEncryption() {
            const inputUrl = document.getElementById('inputUrl').value.trim();
            if (!inputUrl || !inputUrl.startsWith("http")) {
                alert("Masukkan URL Google Apps Script yang valid!");
                return;
            }

            try {
                // 1. Convert ke Base64 murni
                const base64Str = btoa(inputUrl);
                // 2. Pecah (Chunking) setiap 24 karakter agar sulit direkonstruksi manual oleh bot crawler
                const chunks = base64Str.match(/.{1,24}/g);
                
                // 3. Format menjadi Array JavaScript
                let jsCode = `const _0xDbChunks = [\n`;
                chunks.forEach((chunk, index) => {
                    jsCode += `    "${chunk}"${index < chunks.length - 1 ? ',' : ''}\n`;
                });
                jsCode += `];`;

                const outputArea = document.getElementById('outputArea');
                const outputCode = document.getElementById('outputCode');
                
                outputCode.textContent = jsCode;
                outputArea.classList.remove('hidden');
                setTimeout(() => outputArea.classList.remove('opacity-0'), 50);

            } catch (err) {
                alert("Terjadi kesalahan saat memproses URL.");
            }
        }

        function copyToClipboard() {
            const textToCopy = document.getElementById('outputCode').textContent;
            navigator.clipboard.writeText(textToCopy).then(() => {
                const btn = document.querySelector('button[onclick="copyToClipboard()"]');
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="ph-bold ph-check mr-1"></i> Tersalin!';
                btn.className = btn.className.replace('bg-emerald-100', 'bg-emerald-500').replace('text-emerald-700', 'text-white');
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.className = btn.className.replace('bg-emerald-500', 'bg-emerald-100').replace('text-white', 'text-emerald-700');
                }, 2000);
            });
        }
    </script>
</body>
</html>

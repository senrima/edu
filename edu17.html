  <script type="text/babel" data-type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    let fbApp = null, fbAuth = null, fbDb = null;

    // URL Google Apps Script Rahasia (Enkripsi Multi-Layer / Obfuscated)
    const _0xDbChunks = [
        "aHR0cHM6Ly9zY3JpcHQuZ29",
        "vZ2xlLmNvbS9tYWNyb3Mvcy",
        "9BS2Z5Y2J3dFRCMkRwOXVF",
        "a3RBS2xSY1psa1lhN1NYX2hl",
        "MjRDMERjSFAxdHBzdk1OX1NL",
        "OWZNcU80dzhmbVdSamtudFN",
        "Jb3ovZXhlYw=="
    ];
    const DEFAULT_SHEETS_URL = atob(_0xDbChunks.join(""));

    const IconWrapper = ({ name, size = 24, className = "", weight="regular" }) => <i className={`ph${weight === 'fill' ? '-fill' : weight === 'duotone' ? '-duotone' : weight === 'bold' ? '-bold' : ''} ph-${name} ${className}`} style={{ fontSize: size }}></i>;
    const PlayCircle = (p) => <IconWrapper name="play-circle" {...p} />;
    const Download = (p) => <IconWrapper name="download" {...p} />;
    const Menu = (p) => <IconWrapper name="list" {...p} />;
    const X = (p) => <IconWrapper name="x" {...p} />;
    const BookOpen = (p) => <IconWrapper name="book-open" {...p} />;
    const Video = (p) => <IconWrapper name="video" {...p} />;
    const CheckCircle2 = (p) => <IconWrapper name="check-circle" {...p} />;
    const ChevronRight = (p) => <IconWrapper name="caret-right" {...p} />;
    const Loader2 = (p) => <IconWrapper name="spinner" className="animate-spin" {...p} />;
    const MessageSquare = (p) => <IconWrapper name="chat-circle" {...p} />;
    const Lock = (p) => <IconWrapper name="lock" {...p} />;
    const Key = (p) => <IconWrapper name="key" {...p} />;
    const LogOut = (p) => <IconWrapper name="sign-out" {...p} />;
    const PlusCircle = (p) => <IconWrapper name="plus-circle" {...p} />;
    const Database = (p) => <IconWrapper name="database" {...p} />;
    const Trash2 = (p) => <IconWrapper name="trash" {...p} />;
    const Award = (p) => <IconWrapper name="medal" {...p} />;
    const Bell = (p) => <IconWrapper name="bell" {...p} />;
    const Users = (p) => <IconWrapper name="users" {...p} />;
    const Book = (p) => <IconWrapper name="book" {...p} />;
    const GraduationCap = (p) => <IconWrapper name="graduation-cap" {...p} />;
    const AlertCircle = (p) => <IconWrapper name="warning-circle" {...p} />;
    const ArrowLeft = (p) => <IconWrapper name="arrow-left" {...p} />;
    const RefreshCw = (p) => <IconWrapper name="arrows-clockwise" {...p} />;
    const UserIcon = (p) => <IconWrapper name="user" {...p} />;
    const Globe = (p) => <IconWrapper name="globe" {...p} />;
    const HardDrives = (p) => <IconWrapper name="hard-drives" {...p} />;
    const ShieldCheck = (p) => <IconWrapper name="shield-check" {...p} />;
    const Coffee = (p) => <IconWrapper name="coffee" {...p} />;
    const CheckSquareOffset = (p) => <IconWrapper name="check-square-offset" {...p} />;
    const Heart = (p) => <IconWrapper name="heart" {...p} />;
    const EnvelopeSimple = (p) => <IconWrapper name="envelope-simple" {...p} />;
    const ToggleLeft = (p) => <IconWrapper name="toggle-left" {...p} />;
    const ToggleRight = (p) => <IconWrapper name="toggle-right" {...p} />;
    const Article = (p) => <IconWrapper name="article" {...p} />;
    const Sparkle = (p) => <IconWrapper name="sparkle" {...p} />;
    const MagnifyingGlass = (p) => <IconWrapper name="magnifying-glass" {...p} />;

    const initialAdmins = [
      { id: 'adm_1', username: 'budi_admin', password: 'ADMIN123', name: 'Budi Santoso', isSuper: false, isActive: true, donationLink: 'https://saweria.co/budi', info1: 'Selamat datang di kelas! Cek materi dokumen sebelum menonton.', showInfo1: true, info2: '', showInfo2: false }
    ];
    
    const emptyExam = { minScore: 70, questions: Array.from({length: 10}, () => ({ q: '', options: ['','','',''], answer: 0 })) };

    const initialCourses = [
      { 
        id: 'c_1', authorId: 'adm_1', code: 'WEB2026', title: "Mastering Web Development", instructor: "Budi Santoso", isActive: true, docLink: "https://docs.google.com/document/d/1...",
        exam: { 
            minScore: 80, 
            questions: [
                { q: "Fungsi utama JavaScript adalah?", options: ["Styling", "Struktur", "Interaktivitas", "Database"], answer: 2 },
                { q: "Tag untuk membuat paragraf di HTML?", options: ["<p>", "<h1>", "<div>", "<span>"], answer: 0 },
                { q: "Sifat CSS untuk mengubah warna latar?", options: ["color", "bg-color", "background-color", "back-color"], answer: 2 },
                { q: "Simbol yang digunakan untuk ID di CSS?", options: [".", "#", "*", "&"], answer: 1 },
                { q: "Keyword deklarasi variabel JS yang nilainya bisa diubah?", options: ["const", "let", "var", "let & var"], answer: 3 },
                { q: "Apa kepanjangan dari HTML?", options: ["Hyper Text Markup Language", "Hyperlinks Text Language", "Home Tool Markup Language", "Hyper Tool Markup"], answer: 0 },
                { q: "Tipe data [1, 2, 3] dalam JavaScript disebut?", options: ["Object", "String", "Number", "Array"], answer: 3 },
                { q: "Bagaimana cara membuat fungsi di JavaScript?", options: ["function myFunction()", "create myFunction()", "def myFunction()", "fn myFunction()"], answer: 0 },
                { q: "File CSS eksternal dihubungkan menggunakan tag?", options: ["<style>", "<link>", "<script>", "<meta>"], answer: 1 },
                { q: "Framework CSS Utility-First yang populer saat ini?", options: ["Bootstrap", "Materialize", "Tailwind", "Foundation"], answer: 2 }
            ] 
        },
        modules: [ { id: 'm_1', title: "Pengantar HTML", videoUrl: "https://www.youtube.com/embed/pQN-pnXPaVg", description: "Dasar web", comments: [] } ] 
      }
    ];
    
    const initialParticipants = [{ id: 'p_1', name: "Andi Wijaya", email: "andi@mail.com", accessCode: "P9X2A1" }];
    const initialEnrollments = [{ id: 'e_1', participantId: 'p_1', courseId: 'c_1', completedModules: ['m_1'], isGraduated: false, certDownloaded: false, examScore: null, graduatedAt: null }];

    // Normalisasi ini mencegah "Layar Putih" dengan memaksa kursus memiliki 10 soal valid
    const normalizeCourses = (coursesArr) => {
        if (!coursesArr) return [];
        return coursesArr.map(c => {
            let exam = c.exam || { minScore: 70, questions: [] };
            if (!exam.questions) exam.questions = [];
            while(exam.questions.length < 10) {
                exam.questions.push({ q: '', options: ['','','',''], answer: 0 });
            }
            if (exam.questions.length > 10) exam.questions = exam.questions.slice(0, 10);
            c.exam = exam;
            return c;
        });
    };

    function App() {
      const [dbMode, setDbMode] = React.useState(() => localStorage.getItem('edu_db_mode') || 'sheets');
      const [dbReady, setDbReady] = React.useState(false);
      const [setupError, setSetupError] = React.useState("");
      const [fbConfigInput, setFbConfigInput] = React.useState("");
      const [sheetsUrlInput, setSheetsUrlInput] = React.useState(() => localStorage.getItem('edu_sheets_url') || DEFAULT_SHEETS_URL);
      
      const [admins, setAdmins] = React.useState([]);
      const [courses, setCourses] = React.useState([]);
      const [participants, setParticipants] = React.useState([]);
      const [enrollments, setEnrollments] = React.useState([]);
      const [notifications, setNotifications] = React.useState([]);

      const [session, setSession] = React.useState(() => JSON.parse(sessionStorage.getItem('edu_session')) || null);
      const [loginInput, setLoginInput] = React.useState({ username: "", password: "" });
      const [loginError, setLoginError] = React.useState("");
      const [isLoggingIn, setIsLoggingIn] = React.useState(false);
      
      const getInitialAppMode = () => {
        if (!session) return 'auth';
        if (session.role === 'super_admin') return 'super_dashboard';
        if (session.role === 'admin') return 'admin_dashboard';
        return 'part_dashboard';
      };

      const [appMode, setAppMode] = React.useState(getInitialAppMode()); 
      const [adminTab, setAdminTab] = React.useState("courses"); 
      const [superTab, setSuperTab] = React.useState("dashboard"); 
      
      const [searchInst, setSearchInst] = React.useState("");
      const [searchCourse, setSearchCourse] = React.useState("");
      const [searchPart, setSearchPart] = React.useState("");
      
      const [activeCourse, setActiveCourse] = React.useState(null);
      const [activeModule, setActiveModule] = React.useState(null);
      const [isSidebarOpen, setIsSidebarOpen] = React.useState(false);
      const [commentText, setCommentText] = React.useState("");
      
      const [classroomMode, setClassroomMode] = React.useState('video');
      const [studentAnswers, setStudentAnswers] = React.useState({});
      const [toast, setToast] = React.useState(null);
      const [confirmDialog, setConfirmDialog] = React.useState({ isOpen: false, message: "", onConfirm: null });
      
      const [examModalOpen, setExamModalOpen] = React.useState(false);
      const [examCourseId, setExamCourseId] = React.useState(null);
      const [examForm, setExamForm] = React.useState(emptyExam);

      const [profileForm, setProfileForm] = React.useState({ donationLink: "" });
      
      const [infoInstForm, setInfoInstForm] = React.useState({ text: '', show: false }); 
      const [infoSuperForm, setInfoSuperForm] = React.useState({ instText: '', showInst: false, partText: '', showPart: false }); 

      React.useEffect(() => {
          if (session?.role === 'admin' && admins.length > 0) {
              const me = admins.find(a => a.id === session.data.id);
              if(me) setInfoInstForm({ text: me.info1 || '', show: me.showInfo1 || false });
          }
          if (session?.role === 'super_admin' && admins.length > 0) {
              const sup = admins.find(a => a.id === session.data.id);
              if(sup) setInfoSuperForm({ instText: sup.info1||'', showInst: sup.showInfo1||false, partText: sup.info2||'', showPart: sup.showInfo2||false });
          }
      }, [session, admins]);

      React.useEffect(() => {
        if (appMode === 'setup_db') return;
        if (dbMode === 'local') {
          setAdmins(JSON.parse(localStorage.getItem('edu_admins')) || initialAdmins);
          setCourses(normalizeCourses(JSON.parse(localStorage.getItem('edu_courses')) || initialCourses));
          setParticipants(JSON.parse(localStorage.getItem('edu_participants')) || initialParticipants);
          setEnrollments(JSON.parse(localStorage.getItem('edu_enrollments')) || initialEnrollments);
          setNotifications(JSON.parse(localStorage.getItem('edu_notifications')) || []);
          setDbReady(true);
        } else if (dbMode === 'sheets') {
          const url = localStorage.getItem('edu_sheets_url') || DEFAULT_SHEETS_URL;
          if(!url) { setAppMode('setup_db'); return; }
          
          fetch(url)
            .then(res => { if(!res.ok) throw new Error("Network error"); return res.json(); })
            .then(data => {
                if(data.admins) {
                    const uniqueAdmins = Array.from(new Map(data.admins.map(a => [a.id, a])).values());
                    setAdmins(uniqueAdmins); 
                }
                if(data.courses) setCourses(normalizeCourses(data.courses));
                if(data.participants) setParticipants(data.participants); 
                if(data.enrollments) setEnrollments(data.enrollments);
                if(data.notifications) setNotifications(data.notifications); 
                setDbReady(true);
            })
            .catch(e => { 
                console.error("Gagal sync, mereset URL", e);
                localStorage.setItem('edu_sheets_url', DEFAULT_SHEETS_URL); setSheetsUrlInput(DEFAULT_SHEETS_URL);
                setSetupError("Gagal sync Spreadsheet. Mereset ke konfigurasi awal..."); setAppMode('setup_db'); 
            });
        }
      }, [dbMode, appMode]);

      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };
      const calcProgress = (enr, crs) => { if (!crs || !crs.modules || crs.modules.length === 0 || !enr || !enr.completedModules) return 0; return Math.round((enr.completedModules.length / crs.modules.length) * 100); };

      const execDbAction = async (localAction, firebaseAction) => {
        try {
          if (dbMode === 'sheets') {
              localAction(); 
              const url = localStorage.getItem('edu_sheets_url') || DEFAULT_SHEETS_URL;
              if (url) {
                  const currentAdmins = JSON.parse(localStorage.getItem('edu_admins')) || admins;
                  const uniqueAdmins = Array.from(new Map(currentAdmins.map(a => [a.id, a])).values());
                  const payload = {
                      admins: uniqueAdmins,
                      courses: JSON.parse(localStorage.getItem('edu_courses')) || courses,
                      participants: JSON.parse(localStorage.getItem('edu_participants')) || participants,
                      enrollments: JSON.parse(localStorage.getItem('edu_enrollments')) || enrollments,
                      notifications: JSON.parse(localStorage.getItem('edu_notifications')) || notifications
                  };
                  fetch(url, { method: 'POST', body: JSON.stringify(payload) }).catch(console.error);
              }
          } else { localAction(); }
        } catch (error) { console.error(error); showToast("Gagal menyimpan."); }
      };

      const triggerEmail = (emailAction) => {
          const url = localStorage.getItem('edu_sheets_url') || DEFAULT_SHEETS_URL;
          if (!url) return;
          fetch(url, { method: 'POST', body: JSON.stringify({ emailAction }) }).catch(console.error);
      };

      const formatVideoUrl = (rawUrl) => {
        if (!rawUrl) return "";
        let url = rawUrl.trim();
        try {
          if (url.includes('youtu.be/')) { const videoId = url.split('youtu.be/')[1].split('?')[0].split('&')[0]; return `https://www.youtube.com/embed/${videoId}`; }
          if (url.includes('youtube.com/watch')) { const urlObj = new URL(url); const videoId = urlObj.searchParams.get('v'); if (videoId) return `https://www.youtube.com/embed/${videoId}`; }
          if (url.includes('youtube.com/shorts/')) { const videoId = url.split('shorts/')[1].split('?')[0].split('&')[0]; return `https://www.youtube.com/embed/${videoId}`; }
          if (url.includes('drive.google.com/file/d/')) { const match = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/); if (match && match[1]) { return `https://drive.google.com/file/d/${match[1]}/preview`; } }
        } catch (e) {} return url;
      };

      const handleSeedDatabase = async () => {
        setIsLoggingIn(true);
        await execDbAction( () => {
            localStorage.setItem('edu_admins', JSON.stringify(initialAdmins)); setAdmins(initialAdmins);
            localStorage.setItem('edu_courses', JSON.stringify(normalizeCourses(initialCourses))); setCourses(normalizeCourses(initialCourses));
            localStorage.setItem('edu_participants', JSON.stringify(initialParticipants)); setParticipants(initialParticipants);
            localStorage.setItem('edu_enrollments', JSON.stringify(initialEnrollments)); setEnrollments(initialEnrollments);
            showToast("Database Terinisialisasi!");
          }, async () => {} );
        setIsLoggingIn(false);
      };

      const handleLogin = (e) => {
        e.preventDefault(); setIsLoggingIn(true); setLoginError("");
        setTimeout(() => {
          const { username, password } = loginInput;
          const adminFound = admins.find(a => a.username === username && a.password === password);
          if (adminFound) {
            if (!adminFound.isActive) { setLoginError("Akun Instruktur dinonaktifkan oleh Sistem."); setIsLoggingIn(false); return; }
            const sessData = { role: adminFound.isSuper ? 'super_admin' : 'admin', data: adminFound };
            setSession(sessData); sessionStorage.setItem('edu_session', JSON.stringify(sessData));
            if(!adminFound.isSuper) setProfileForm({ donationLink: adminFound.donationLink || "" });
            setAppMode(adminFound.isSuper ? 'super_dashboard' : 'admin_dashboard'); setIsLoggingIn(false); return;
          }
          const partFound = participants.find(p => p.email === username && p.accessCode === password);
          if (partFound) {
            const sessData = { role: 'participant', data: partFound };
            setSession(sessData); sessionStorage.setItem('edu_session', JSON.stringify(sessData));
            setAppMode('part_dashboard'); setIsLoggingIn(false); return;
          }
          setLoginError("Kredensial salah!"); setIsLoggingIn(false);
        }, 600);
      };

      const handleLogout = () => {
        setSession(null); sessionStorage.removeItem('edu_session'); setAppMode('auth'); setLoginInput({ username: "", password: "" });
        setClassroomMode('video'); setStudentAnswers({}); setExamModalOpen(false);
      };

      const handleRegisterAdmin = async (e) => {
        e.preventDefault(); const fd = new FormData(e.target); const username = fd.get('username');
        if (admins.some(a => a.username === username)) return showToast("Username terpakai!");
        const newAdminData = { name: fd.get('name'), username, password: fd.get('password'), isSuper: false, isActive: true, donationLink: '', info1: '', showInfo1: false, info2: '', showInfo2: false };
        await execDbAction( () => {
            const updatedA = [...admins, { id: `adm_${Date.now()}`, ...newAdminData }];
            setAdmins(updatedA); localStorage.setItem('edu_admins', JSON.stringify(updatedA));
        }, async () => {} );
        e.target.reset(); showToast("Instruktur Ditambahkan!");
      };

      const handleToggleActiveAdmin = async (id, currentStatus) => {
        await execDbAction( () => {
            const updatedA = admins.map(a => a.id === id ? { ...a, isActive: !currentStatus } : a);
            setAdmins(updatedA); localStorage.setItem('edu_admins', JSON.stringify(updatedA));
        }, async () => {} );
        showToast(!currentStatus ? "Akun Diaktifkan" : "Akun Dinonaktifkan");
      };

      const handleToggleActiveCourse = async (id, currentStatus) => {
        await execDbAction( () => {
            const updatedC = courses.map(c => c.id === id ? { ...c, isActive: !currentStatus } : c);
            setCourses(updatedC); localStorage.setItem('edu_courses', JSON.stringify(updatedC));
        }, async () => {} );
        showToast(!currentStatus ? "Kursus Diaktifkan" : "Kursus Dinonaktifkan");
      };

      const handleCreateCourse = async (e) => {
        e.preventDefault(); const fd = new FormData(e.target); const code = fd.get('code');
        if (courses.some(c => c.code === code)) return showToast("Kode sudah ada!");
        const courseData = { authorId: session.data.id, code, title: fd.get('title'), instructor: fd.get('inst'), isActive: true, docLink: fd.get('docLink'), modules: [], exam: emptyExam };
        await execDbAction( () => {
            const updated = [...courses, { id: `c_${Date.now()}`, ...courseData }];
            setCourses(updated); localStorage.setItem('edu_courses', JSON.stringify(updated));
        }, async () => {} );
        e.target.reset(); showToast("Kursus dibuat!");
      };

      const handleCreateModule = async (e) => {
        e.preventDefault(); const fd = new FormData(e.target); const courseId = fd.get('courseId');
        const course = courses.find(c => c.id === courseId);
        const finalVideoUrl = formatVideoUrl(fd.get('vidUrl'));
        const newModule = { id: `m_${Date.now()}`, title: fd.get('title'), videoUrl: finalVideoUrl, description: fd.get('desc'), comments: [] };
        await execDbAction( () => {
            const updated = courses.map(c => c.id === courseId ? { ...c, modules: [...c.modules, newModule] } : c);
            setCourses(updated); localStorage.setItem('edu_courses', JSON.stringify(updated));
        }, async () => {} );
        e.target.reset(); showToast("Materi ditambah!");
      };

      const handleDeleteModule = (courseId, moduleId) => {
        setConfirmDialog({
            isOpen: true, message: "Hapus materi video ini?",
            onConfirm: async () => {
                setConfirmDialog({ isOpen: false }); const course = courses.find(c => c.id === courseId);
                await execDbAction( () => {
                        const updated = courses.map(c => c.id === courseId ? { ...c, modules: c.modules.filter(m => m.id !== moduleId) } : c);
                        setCourses(updated); localStorage.setItem('edu_courses', JSON.stringify(updated));
                }, async () => {} );
                showToast("Materi dihapus.");
            }
        });
      };

      const handleUpdateAdminInfo = async (type) => {
          let updatedData = {};
          if (session.role === 'super_admin') {
              updatedData = { info1: infoSuperForm.instText, showInfo1: infoSuperForm.showInst, info2: infoSuperForm.partText, showInfo2: infoSuperForm.showPart };
          } else {
              updatedData = { info1: infoInstForm.text, showInfo1: infoInstForm.show };
          }

          await execDbAction( () => {
              const updatedA = admins.map(a => a.id === session.data.id ? { ...a, ...updatedData } : a);
              setAdmins(updatedA); localStorage.setItem('edu_admins', JSON.stringify(updatedA));
          }, async () => {} );
          showToast("Papan Informasi Diperbarui!");
      };

      const handleUpdateProfile = async (e) => {
        e.preventDefault();
        await execDbAction( () => {
            const updatedA = admins.map(a => a.id === session.data.id ? { ...a, donationLink: profileForm.donationLink } : a);
            setAdmins(updatedA); localStorage.setItem('edu_admins', JSON.stringify(updatedA));
        }, async () => {} );
        showToast("Profil diperbarui!");
      };

      const openExamBuilder = (courseId) => {
        const course = courses.find(c => c.id === courseId);
        let currentExam = course.exam ? JSON.parse(JSON.stringify(course.exam)) : JSON.parse(JSON.stringify(emptyExam));
        
        if (!currentExam.questions) currentExam.questions = [];
        while (currentExam.questions.length < 10) {
            currentExam.questions.push({ q: '', options: ['','','',''], answer: 0 });
        }
        if (currentExam.questions.length > 10) currentExam.questions = currentExam.questions.slice(0, 10);

        setExamCourseId(courseId); setExamForm(currentExam); setExamModalOpen(true);
      };

      const handleSaveExam = async () => {
        await execDbAction( () => {
            const updated = courses.map(c => c.id === examCourseId ? { ...c, exam: examForm } : c);
            setCourses(updated); localStorage.setItem('edu_courses', JSON.stringify(updated));
        }, async () => {} );
        setExamModalOpen(false); showToast("Ujian disimpan!");
      };

      const handleRegisterParticipant = async (e) => {
        e.preventDefault(); const fd = new FormData(e.target); const email = fd.get('email');
        if (participants.some(p => p.email === email)) return showToast("Email sudah terdaftar!");
        const partData = { name: fd.get('name'), email, accessCode: fd.get('code') };
        const enrData = { courseId: fd.get('courseId'), completedModules: [], isGraduated: false, certDownloaded: false, examScore: null, graduatedAt: null };

                                                      {studentAnswers[qIdx] === optIdx && <div className="w-3 h-3 bg-indigo-600 rounded-full"></div>}
                                                  </div>
                                                  <input type="radio" name={`q_${qIdx}`} value={optIdx} onChange={() => setStudentAnswers({...studentAnswers, [qIdx]: optIdx})} checked={studentAnswers[qIdx] === optIdx} className="hidden" />
                                                  <span className={`font-bold text-base md:text-lg ${studentAnswers[qIdx] === optIdx ? 'text-indigo-900' : 'text-slate-700'}`}>{opt}</span>
                                              </label>
                                          ))}
                                      </div>
                                  </div>
                              ))}
                          </div>
                          
                          <div className="mt-12 md:mt-16 pt-8 border-t border-slate-200">
                              <button onClick={submitExam} disabled={Object.keys(studentAnswers).length < (activeCourse.exam?.questions?.length || 10)} className="w-full bg-slate-900 hover:bg-indigo-600 disabled:bg-slate-200 disabled:text-slate-400 disabled:cursor-not-allowed text-white px-8 py-5 rounded-2xl font-extrabold text-lg md:text-xl shadow-xl transition-all transform active:scale-[0.98] flex justify-center items-center">
                                  Serahkan Lembar Jawaban <ChevronRight size={24} className="ml-2" weight="bold"/>
                              </button>
                              <p className="text-center text-sm text-slate-400 mt-4 font-medium">Pastikan semua soal ({Object.keys(studentAnswers).length}/{(activeCourse.exam?.questions?.length || 10)}) telah dijawab.</p>
                          </div>
                      </div>
                  )}
                  {classroomMode === 'result' && (
                      <div className="bg-white rounded-3xl p-8 md:p-16 shadow-2xl border border-slate-100 text-center max-w-2xl mx-auto mt-6 md:mt-12 relative overflow-hidden animate-[fadeIn_0.5s_ease-out]">
                          <div className={`absolute top-0 left-0 w-full h-3 ${myEnr.isGraduated ? 'bg-gradient-to-r from-emerald-400 to-teal-500' : 'bg-gradient-to-r from-red-400 to-rose-500'}`}></div>
                          <div className={`w-28 h-28 rounded-full flex items-center justify-center mx-auto mb-8 shadow-inner ${myEnr.isGraduated ? 'bg-emerald-50 text-emerald-500' : 'bg-red-50 text-red-500'}`}>{myEnr.isGraduated ? <Award size={56} weight="fill"/> : <X size={56} weight="bold"/>}</div>
                          
                          <h2 className="text-3xl md:text-4xl font-extrabold text-slate-900 mb-3 tracking-tight">{myEnr.isGraduated ? '🎉 Luar Biasa, Anda Lulus!' : 'Belum Berhasil, Coba Lagi! 💪'}</h2>
                          <p className="text-slate-500 mb-10 text-lg md:text-xl font-medium">Skor Pencapaian Akhir: <span className={`font-black text-3xl ml-2 ${myEnr.isGraduated ? 'text-emerald-600' : 'text-red-600'}`}>{myEnr.examScore}</span><span className="text-slate-400 text-base"> / {(activeCourse.exam?.questions?.length || 10) * 10}</span></p>
                          
                          {!myEnr.isGraduated ? (
                              <button onClick={()=>{setClassroomMode('exam'); setStudentAnswers({});}} className="w-full bg-slate-900 hover:bg-slate-800 text-white py-4 md:py-5 rounded-2xl font-extrabold text-lg shadow-xl shadow-slate-200 transition transform active:scale-95 flex justify-center items-center"><RefreshCw size={24} className="mr-2" weight="bold"/> Kerjakan Ulang Ujian</button>
                          ) : (
                              <div className="space-y-4">
                                  <button onClick={handleDownloadCert} className="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-4 md:py-5 rounded-2xl font-extrabold text-lg shadow-xl shadow-emerald-200 transition transform active:scale-95 flex items-center justify-center"><Download size={24} className="mr-3" weight="bold"/> Unduh Sertifikat Resmi</button>
                                  {instructorData?.donationLink && (<a href={instructorData.donationLink} target="_blank" rel="noopener noreferrer" className="w-full bg-amber-50 hover:bg-amber-100 text-amber-700 border-2 border-amber-200 py-4 md:py-5 rounded-2xl font-bold transition flex items-center justify-center shadow-sm"><Coffee size={24} className="mr-3" weight="fill"/> Berikan Apresiasi Instruktur</a>)}
                              </div>
                          )}
                      </div>
                  )}
                </div>
              </main>
            </div>
          </div>
        );
      }
      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

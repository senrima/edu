<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LMS Link Generator - EduLearn by SenTools</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
    .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
    .glass-input { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); }
    .glass-input:focus { border-color: #6366f1; background: rgba(15, 23, 42, 0.8); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // Komponen pembantu untuk merender ikon dan loading spinner
    const IconWrapper = ({ name, size = 24, className = "", weight="regular" }) => (
      <i className={`ph${weight === 'fill' ? '-fill' : weight === 'duotone' ? '-duotone' : weight === 'bold' ? '-bold' : ''} ph-${name} ${className}`} style={{ fontSize: size }}></i>
    );
    const Loader2 = (p) => <IconWrapper name="spinner" className="animate-spin" {...p} />;

    // ===============================================================
    // S-TOOLS ID : UNIVERSAL AUTH GUARD INTEGRATION
    // ===============================================================
    const API_ENDPOINT = "https://api.s-tools.id";
    const LOGIN_PORTAL_URL = "https://s-tools.id/app/index.html";

    async function checkEcosystemSession() {
        const localToken = localStorage.getItem('sessionToken');
        const headers = { 'Content-Type': 'application/json' };
        if (localToken) headers['x-auth-token'] = localToken;

        try {
            const response = await fetch(API_ENDPOINT, {
                method: 'POST',
                headers: headers,
                credentials: 'include', 
                body: JSON.stringify({ kontrol: 'proteksi', action: 'getDashboardData' })
            });

            const result = await response.json();

            if (result.status === 'success') {
                return result.userData; 
            } else {
                throw new Error("Sesi tidak valid");
            }
        } catch (error) {
            localStorage.removeItem('sessionToken');
            window.location.href = LOGIN_PORTAL_URL + "?redirect=" + encodeURIComponent(window.location.href);
            return null;
        }
    }

    function App() {
      const [ssoUser, setSsoUser] = React.useState(null);
      const [ssoChecking, setSsoChecking] = React.useState(true);
      const [activeTab, setActiveTab] = React.useState("enroll");
      const [toast, setToast] = React.useState(null);

      // State default URL verifikasi.html
      const [baseUrl, setBaseUrl] = React.useState(() => {
          const loc = window.location;
          return `${loc.protocol}//${loc.host}${loc.pathname.substring(0, loc.pathname.lastIndexOf('/'))}/verifikasi.html`;
      });

      // State data form pendaftaran siswa (Skenario A)
      const [enrollForm, setEnrollForm] = React.useState({
          name: "",
          email: "",
          courseCode: "",
          instructorName: "",
          pin: ""
      });

      // State data form pembuatan kelas baru (Skenario B)
      const [courseForm, setCourseForm] = React.useState({
          code: "",
          title: "",
          instructorName: ""
      });

      // Jalankan Auth Guard S-Tools ID pertama kali dimuat
      React.useEffect(() => {
          async function handleSSO() {
              setSsoChecking(true);
              const userData = await checkEcosystemSession();
              if (userData) {
                  setSsoUser(userData);
              }
              setSsoChecking(false);
          }
          handleSSO();
      }, []);

      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };

      // Logika Pembuatan Link Skenario A (Enrollment)
      const getGeneratedEnrollLink = () => {
          if (!enrollForm.courseCode || !enrollForm.instructorName) return "";
          const params = new URLSearchParams();
          params.append("action", "enroll");
          if (enrollForm.name) params.append("name", enrollForm.name);
          if (enrollForm.email) params.append("email", enrollForm.email);
          params.append("course", enrollForm.courseCode.toUpperCase());
          params.append("instructor", enrollForm.instructorName);
          if (enrollForm.pin) params.append("pin", enrollForm.pin);
          return `${baseUrl}?${params.toString()}`;
      };

      // Logika Pembuatan Link Skenario B (Create Course)
      const getGeneratedCourseLink = () => {
          if (!courseForm.code || !courseForm.title || !courseForm.instructorName) return "";
          const params = new URLSearchParams();
          params.append("action", "create_course");
          params.append("code", courseForm.code.toUpperCase());
          params.append("title", courseForm.title);
          params.append("instructor", courseForm.instructorName);
          return `${baseUrl}?${params.toString()}`;
      };

      // Fungsi menyalin teks ke Clipboard dengan fallback aman
      const handleCopyToClipboard = (text, message = "Link disalin ke clipboard!") => {
          if (!text) return;
          const tempTextArea = document.createElement("textarea");
          tempTextArea.value = text;
          document.body.appendChild(tempTextArea);
          tempTextArea.select();
          try {
              document.execCommand("copy");
              showToast(message);
          } catch (err) {
              showToast("Gagal menyalin otomatis.");
          }
          document.body.removeChild(tempTextArea);
      };

      // WhatsApp Template generator
      const getWATemplate = () => {
          const link = getGeneratedEnrollLink();
          return `Halo *${enrollForm.name || 'Siswa'}*, pendaftaran kelas Anda di EduLearn telah sukses disetujui.\n\nSilakan klik link aktivasi berikut untuk membuka kelas Anda:\n👉 ${link}\n\nSetelah klik link di atas, sistem akan mengalihkan Anda secara otomatis ke portal pembelajaran utama. Selamat belajar!`;
      };

      if (ssoChecking) {
          return (
              <div className="flex flex-col items-center justify-center h-screen bg-slate-950 text-white">
                  <div className="w-20 h-20 bg-indigo-600 rounded-3xl flex items-center justify-center mb-6 shadow-xl shadow-indigo-600/30 animate-pulse">
                      <IconWrapper name="shield-check" size={40} className="text-indigo-200" weight="fill" />
                  </div>
                  <Loader2 size={36} className="text-indigo-500 mb-4" />
                  <h2 className="text-xl font-bold tracking-wide animate-pulse">Memverifikasi Sesi S-Tools ID...</h2>
                  <p className="text-sm text-slate-400 mt-2">Mengamankan Akses Pembuat Link Sistem</p>
              </div>
          );
      }

      const activeLink = activeTab === "enroll" ? getGeneratedEnrollLink() : getGeneratedCourseLink();

      return (
        <div className="min-h-screen p-4 md:p-8 relative flex flex-col justify-between">
          {toast && (
              <div className="fixed top-4 right-4 z-[100] bg-indigo-600 text-white px-6 py-3.5 rounded-2xl shadow-xl flex items-center space-x-2 border border-indigo-400 transition-all animate-[fadeIn_0.2s_ease-out]">
                  <IconWrapper name="check-circle" size={20} weight="fill" />
                  <span className="font-bold text-sm">{toast}</span>
              </div>
          )}

          {/* Background Lights */}
          <div className="absolute inset-0 z-0 opacity-20 pointer-events-none overflow-hidden">
            <div className="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-indigo-600 blur-[150px]"></div>
            <div className="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-emerald-600 blur-[150px]"></div>
          </div>

          <div className="relative z-10 w-full max-w-4xl mx-auto flex-1 flex flex-col justify-center py-6">
            <div className="glass-card rounded-3xl overflow-hidden shadow-2xl p-6 md:p-10">
              
              {/* Header */}
              <div className="flex flex-col md:flex-row md:items-center justify-between pb-8 border-b border-slate-700/50 gap-4 mb-8">
                  <div className="flex items-center gap-4">
                      <div className="w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-indigo-500/20">
                          <IconWrapper name="link" size={28} weight="bold" />
                      </div>
                      <div>
                          <h1 className="text-xl md:text-2xl font-black text-white tracking-tight">EduLearn Link Generator</h1>
                          <p className="text-slate-400 text-xs md:text-sm">Alat otomatis pembuat tautan integrasi LMS tanpa kesalahan</p>
                      </div>
                  </div>
                  <div className="bg-slate-800/80 px-4 py-2 rounded-xl border border-slate-700 flex items-center text-xs gap-2 self-start md:self-auto">
                      <div className="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-ping"></div>
                      <span className="font-bold text-slate-300">Operator: {ssoUser?.nama || 'S-Tools ID'}</span>
                  </div>
              </div>

              {/* Konfigurasi URL Verifikasi */}
              <div className="bg-slate-900/50 p-4 rounded-2xl border border-slate-800 mb-6">
                  <label className="text-xs font-bold text-indigo-400 uppercase tracking-wider block mb-2">Alamat URL Target (verifikasi.html)</label>
                  <div className="relative">
                      <div className="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-500"><IconWrapper name="globe" size={18} /></div>
                      <input type="text" value={baseUrl} onChange={e => setBaseUrl(e.target.value)} className="w-full pl-11 pr-4 py-3 glass-input rounded-xl outline-none text-slate-300 font-mono text-xs md:text-sm transition-all" placeholder="Masukkan URL lengkap verifikasi.html" />
                  </div>
              </div>

              {/* Switch Tab Form */}
              <div className="grid grid-cols-2 gap-2 p-1 bg-slate-900/80 rounded-2xl border border-slate-800 mb-8">
                  <button onClick={() => setActiveTab("enroll")} className={`py-4 rounded-xl font-bold text-sm flex items-center justify-center gap-2 transition ${activeTab === 'enroll' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:text-white'}`}>
                      <IconWrapper name="user-plus" size={18} />
                      <span>Skenario A: Daftar Siswa</span>
                  </button>
                  <button onClick={() => setActiveTab("create_course")} className={`py-4 rounded-xl font-bold text-sm flex items-center justify-center gap-2 transition ${activeTab === 'create_course' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:text-white'}`}>
                      <IconWrapper name="folder-plus" size={18} />
                      <span>Skenario B: Tambah Kelas</span>
                  </button>
              </div>

              {/* Konten Form */}
              <div className="grid grid-cols-1 md:grid-cols-12 gap-8 items-start">
                  
                  {/* Bagian Input Form */}
                  <div className="md:col-span-7 space-y-4">
                      {activeTab === "enroll" ? (
                          <>
                              <div className="space-y-1">
                                  <label className="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Nama Lengkap Siswa</label>
                                  <input type="text" value={enrollForm.name} onChange={e => setEnrollForm({...enrollForm, name: e.target.value})} className="w-full px-4 py-3.5 glass-input rounded-xl outline-none text-sm text-white transition-all" placeholder="Contoh: Budi Wijaya (Boleh kosong)" />
                              </div>
                              <div className="space-y-1">
                                  <label className="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Alamat Email Siswa</label>
                                  <input type="email" value={enrollForm.email} onChange={e => setEnrollForm({...enrollForm, email: e.target.value})} className="w-full px-4 py-3.5 glass-input rounded-xl outline-none text-sm text-white transition-all" placeholder="Contoh: budi@mail.com (Boleh kosong)" />
                              </div>
                              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                  <div className="space-y-1">
                                      <label className="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Kode Kelas Unik <span className="text-red-500">*</span></label>
                                      <input required type="text" value={enrollForm.courseCode} onChange={e => setEnrollForm({...enrollForm, courseCode: e.target.value.toUpperCase()})} className="w-full px-4 py-3.5 glass-input rounded-xl outline-none text-sm text-white font-mono font-bold transition-all uppercase" placeholder="Contoh: WEB2028" />
                                  </div>
                                  <div className="space-y-1">
                                      <label className="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">PIN Rahasia login (Opsional)</label>
                                      <input type="text" maxLength={6} value={enrollForm.pin} onChange={e => setEnrollForm({...enrollForm, pin: e.target.value.replace(/\D/g, '')})} className="w-full px-4 py-3.5 glass-input rounded-xl outline-none text-sm text-white font-mono transition-all" placeholder="Contoh: 123456" />
                                  </div>
                              </div>
                              <div className="space-y-1">
                                  <label className="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Nama Lengkap Instruktur <span className="text-red-500">*</span></label>
                                  <input required type="text" value={enrollForm.instructorName} onChange={e => setEnrollForm({...enrollForm, instructorName: e.target.value})} className="w-full px-4 py-3.5 glass-input rounded-xl outline-none text-sm text-white transition-all" placeholder="Contoh: Siti Aminah" />
                              </div>
                          </>
                      ) : (
                          <>
                              <div className="space-y-1">
                                  <label className="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Judul Utama Kelas Baru <span className="text-red-500">*</span></label>
                                  <input required type="text" value={courseForm.title} onChange={e => setCourseForm({...courseForm, title: e.target.value})} className="w-full px-4 py-3.5 glass-input rounded-xl outline-none text-sm text-white transition-all" placeholder="Contoh: Mastering Node.js & REST API" />
                              </div>
                              <div className="space-y-1">
                                  <label className="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Kode Kelas Baru <span className="text-red-500">*</span></label>
                                  <input required type="text" maxLength={10} value={courseForm.code} onChange={e => setCourseForm({...courseForm, code: e.target.value.toUpperCase()})} className="w-full px-4 py-3.5 glass-input rounded-xl outline-none text-sm text-white font-mono font-bold transition-all uppercase" placeholder="Contoh: NODE2026" />
                              </div>
                              <div className="space-y-1">
                                  <label className="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Instruktur Penanggung Jawab <span className="text-red-500">*</span></label>
                                  <input required type="text" value={courseForm.instructorName} onChange={e => setCourseForm({...courseForm, instructorName: e.target.value})} className="w-full px-4 py-3.5 glass-input rounded-xl outline-none text-sm text-white transition-all" placeholder="Contoh: Budi Santoso" />
                              </div>
                          </>
                      )}
                  </div>

                  {/* Bagian Live Preview & Hasil Link */}
                  <div className="md:col-span-5 bg-slate-900/80 p-6 rounded-3xl border border-slate-800 flex flex-col justify-between min-h-[360px]">
                      <div>
                          <div className="flex items-center gap-2 mb-4 text-indigo-400 font-bold text-xs uppercase tracking-widest border-b border-slate-800 pb-3">
                              <IconWrapper name="sparkle" size={16} weight="fill" />
                              <span>Live Preview Hasil Tautan</span>
                          </div>
                          
                          {activeLink ? (
                              <div className="space-y-4">
                                  <div className="p-4 bg-slate-950 rounded-2xl border border-slate-800 select-all overflow-hidden break-all font-mono text-[11px] text-slate-300 leading-normal max-h-40 overflow-y-auto">
                                      {activeLink}
                                  </div>
                                  <div className="flex items-center gap-2 text-xs text-slate-500">
                                      <IconWrapper name="check-circle" size={14} className="text-emerald-500" />
                                      <span>Parameter URL sudah ter-encode secara aman.</span>
                                  </div>
                              </div>
                          ) : (
                              <div className="py-12 text-center text-slate-500 text-sm italic">
                                  Silakan lengkapi parameter berbintang (<span className="text-red-500">*</span>) terlebih dahulu untuk menghasilkan link integrasi.
                              </div>
                          )}
                      </div>

                      {activeLink && (
                          <div className="space-y-3 pt-6 border-t border-slate-800/80 mt-6">
                              <button onClick={() => handleCopyToClipboard(activeLink)} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl transition flex items-center justify-center gap-2 text-sm shadow-lg shadow-indigo-600/20 active:scale-95">
                                  <IconWrapper name="copy" size={18} weight="bold" />
                                  <span>Salin Tautan</span>
                              </button>
                              
                              {activeTab === "enroll" && (
                                  <button onClick={() => handleCopyToClipboard(getWATemplate(), "Format template WhatsApp disalin!")} className="w-full bg-slate-800 hover:bg-slate-700 border border-slate-700 text-emerald-400 font-bold py-3.5 rounded-xl transition flex items-center justify-center gap-2 text-sm active:scale-95">
                                      <IconWrapper name="whatsapp-logo" size={18} weight="fill" />
                                      <span>Salin Format WhatsApp</span>
                                  </button>
                              )}

                              <a href={activeLink} target="_blank" rel="noopener noreferrer" className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 rounded-xl transition flex items-center justify-center gap-2 text-sm active:scale-95">
                                  <IconWrapper name="arrow-square-out" size={18} weight="bold" />
                                  <span>Tes Buka Tautan</span>
                              </a>
                          </div>
                      )}
                  </div>
              </div>

            </div>
          </div>

          {/* Footer */}
          <footer className="relative z-10 text-center text-xs text-slate-600 font-mono tracking-widest py-4 border-t border-slate-900/50">
              © 2026 S-TOOLS.ID • EDULEARN PLATFORM LINK ENGINE
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Instruktur - EduLearn</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .hero-pattern { background-image: radial-gradient(#e2e8f0 1px, transparent 1px); background-size: 24px 24px; }
  </style>
</head>
<body class="text-slate-800 antialiased overflow-x-hidden relative">
  <div id="root"></div>

  <script type="text/babel">
    const IconWrapper = ({ name, size = 24, className = "", weight="regular" }) => (
      <i className={`ph${weight === 'fill' ? '-fill' : weight === 'duotone' ? '-duotone' : weight === 'bold' ? '-bold' : ''} ph-${name} ${className}`} style={{ fontSize: size }}></i>
    );

    function App() {
      // Data Benefit Instruktur
      const benefits = [
        {
          icon: "chalkboard-teacher",
          title: "Manajemen Kelas Penuh",
          desc: "Pegang kendali penuh atas kelas Anda. Tambah, edit, dan susun silabus modul pembelajaran dengan antarmuka yang sangat mudah.",
          color: "text-blue-600",
          bg: "bg-blue-100"
        },
        {
          icon: "shield-check",
          title: "Sistem Keamanan Tingkat Tinggi",
          desc: "Dilengkapi sistem LockService anti-bentrok. Pendaftaran ribuan siswa secara bersamaan dijamin aman tanpa data yang tumpang tindih.",
          color: "text-emerald-600",
          bg: "bg-emerald-100"
        },
        {
          icon: "link",
          title: "Link Pendaftaran Cerdas",
          desc: "Buat tautan pendaftaran kelas yang bisa kedaluwarsa secara otomatis (Expired Timestamp) untuk menciptakan urgensi bagi calon siswa.",
          color: "text-rose-600",
          bg: "bg-rose-100"
        },
        {
          icon: "storefront",
          title: "Katalog Promo Eksklusif (Baru!)",
          desc: "Dapatkan halaman Landing Page pribadi yang memukau untuk mempromosikan kelas Anda, lengkap dengan Trailer Video dan tombol pendaftaran via WhatsApp langsung ke nomor Anda!",
          color: "text-indigo-600",
          bg: "bg-indigo-100",
          isNew: true,
          demoLink: "https://s-tools.id/edu/kelas.html?instructor=super_admin" // Link demo ditambahkan di sini
        }
      ];

      return (
        <div className="min-h-screen flex flex-col relative">
          
          {/* Latar Belakang Dekoratif */}
          <div className="absolute inset-0 hero-pattern opacity-40 -z-20"></div>
          <div className="absolute top-0 left-0 w-full h-[600px] bg-gradient-to-b from-indigo-50/80 to-transparent -z-10"></div>

          {/* Navbar */}
          <nav className="w-full bg-white/70 backdrop-blur-lg border-b border-slate-200/50 sticky top-0 z-40">
            <div className="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
              <div className="flex items-center text-indigo-600">
                <div className="w-10 h-10 bg-indigo-600 text-white rounded-xl flex items-center justify-center mr-3 shadow-md">
                  <IconWrapper name="graduation-cap" size={22} weight="fill" />
                </div>
                <span className="font-extrabold text-xl tracking-tight text-slate-900">EduLearn</span>
              </div>
              <div className="flex gap-3">
                <a href="page.html" className="text-sm font-bold text-slate-600 hover:text-indigo-600 px-4 py-2 transition rounded-full hover:bg-slate-100 hidden sm:block">Beranda</a>
                <a href="login.html" className="text-sm font-bold bg-slate-900 hover:bg-slate-800 text-white px-5 py-2 rounded-full shadow-md transition flex items-center gap-2">
                  <IconWrapper name="sign-in" size={16} weight="bold" /> Masuk
                </a>
              </div>
            </div>
          </nav>

          {/* Hero Section */}
          <header className="max-w-5xl mx-auto px-6 pt-24 pb-16 text-center">
            <div className="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-indigo-50 border border-indigo-100 text-indigo-700 font-black text-xs mb-6 shadow-sm uppercase tracking-widest">
              <IconWrapper name="rocket-launch" size={16} weight="fill" /> Buka Potensi Anda
            </div>
            <h1 className="text-4xl md:text-6xl font-black text-slate-900 tracking-tight leading-tight mb-6">
              Bagikan Ilmu Anda, <br />
              <span className="text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-blue-500">
                Bangun Karir Mengajar Anda.
              </span>
            </h1>
            <p className="text-lg text-slate-600 font-medium mb-10 max-w-2xl mx-auto leading-relaxed">
              Platform SaaS lengkap untuk konten kreator, guru, dan mentor profesional. Kelola kelas, lindungi materi, dan promosikan silabus Anda dalam satu sistem terintegrasi.
            </p>
            <div className="flex flex-col sm:flex-row items-center justify-center gap-4">
              <a href="login.html" className="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-4 rounded-2xl font-black text-lg shadow-lg shadow-indigo-200 transition-all transform hover:-translate-y-1 flex items-center justify-center gap-2">
                Mulai Mengajar Sekarang <IconWrapper name="arrow-right" size={20} weight="bold" />
              </a>
              <a href="#fitur" className="w-full sm:w-auto bg-white hover:bg-slate-50 text-slate-700 px-8 py-4 rounded-2xl font-bold text-lg shadow-sm border border-slate-200 transition-all flex items-center justify-center gap-2">
                <IconWrapper name="magnifying-glass" size={20} /> Pelajari Fitur
              </a>
            </div>
          </header>

          {/* Fitur/Benefit Section */}
          <main id="fitur" className="max-w-7xl mx-auto px-6 py-20 w-full relative z-10">
            <div className="text-center mb-16">
              <h2 className="text-3xl font-black text-slate-900 mb-4">Kenapa Memilih EduLearn?</h2>
              <p className="text-slate-500 font-medium max-w-xl mx-auto">Sistem yang dirancang khusus untuk memudahkan operasional pengajar, sehingga Anda bisa fokus pada kualitas materi kelas.</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 lg:gap-8">
              {benefits.map((item, index) => (
                <div key={index} className={`bg-white rounded-[2rem] p-8 border ${item.isNew ? 'border-indigo-200 shadow-xl shadow-indigo-100/50' : 'border-slate-100 shadow-sm'} hover:shadow-lg transition-all duration-300 relative overflow-hidden group flex flex-col`}>
                  
                  {item.isNew && (
                    <div className="absolute top-6 right-6 bg-rose-500 text-white text-[10px] font-black uppercase tracking-widest px-3 py-1 rounded-full shadow-md animate-pulse">
                      Hot Feature
                    </div>
                  )}

                  <div className={`w-14 h-14 ${item.bg} ${item.color} rounded-2xl flex items-center justify-center mb-6 shadow-inner transform group-hover:scale-110 transition-transform duration-300 shrink-0`}>
                    <IconWrapper name={item.icon} size={28} weight="duotone" />
                  </div>
                  
                  <div className="flex-1">
                    <h3 className="text-xl font-black text-slate-900 mb-3">{item.title}</h3>
                    <p className="text-slate-500 leading-relaxed font-medium">
                      {item.desc}
                    </p>
                  </div>
                  
                  {/* Tombol Demo Khusus untuk Fitur Promo */}
                  {item.demoLink && (
                    <div className="mt-6 pt-5 border-t border-indigo-100">
                      <a 
                        href={item.demoLink} 
                        target="_blank" 
                        rel="noopener noreferrer" 
                        className="inline-flex items-center justify-center gap-2 w-full sm:w-auto bg-gradient-to-r from-indigo-500 to-blue-600 hover:from-indigo-600 hover:to-blue-700 text-white px-5 py-2.5 rounded-xl font-bold text-sm shadow-md shadow-indigo-200 transition-all transform active:scale-95"
                      >
                        <IconWrapper name="eye" size={18} weight="bold" />
                        Lihat Contoh Etalase
                      </a>
                    </div>
                  )}

                </div>
              ))}
            </div>
          </main>

          {/* CTA Footer */}
          <section className="bg-slate-900 mt-auto w-full relative overflow-hidden">
            <div className="absolute top-0 right-0 w-[500px] h-[500px] bg-indigo-600/20 rounded-full blur-[100px] pointer-events-none"></div>
            <div className="max-w-4xl mx-auto px-6 py-24 text-center relative z-10">
              <h2 className="text-3xl md:text-4xl font-black text-white mb-6">Siap Membuka Kelas Pertama Anda?</h2>
              <p className="text-slate-400 mb-10 max-w-lg mx-auto font-medium">Bergabunglah dengan ratusan mentor lainnya yang sudah membagikan pengetahuannya melalui ekosistem S-Tools.ID.</p>
              <a href="login.html" className="inline-flex bg-white hover:bg-slate-100 text-slate-900 px-8 py-4 rounded-2xl font-black text-lg shadow-xl transition-all transform hover:-translate-y-1 items-center gap-2">
                Daftar Sebagai Kreator <IconWrapper name="user-plus" size={20} weight="fill" />
              </a>
            </div>
          </section>

          <footer className="w-full bg-black py-8 text-center text-slate-500 text-xs font-mono font-bold tracking-[0.1em] border-t border-slate-800">
            © 2026 S-TOOLS.ID • EDULEARN CREATOR PORTAL
          </footer>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

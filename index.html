<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduLearn by SenTools - Platform Belajar Interaktif</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const LOGIN_PORTAL_URL = "https://s-tools.id/app/index.html";
    const REGISTER_PORTAL_URL = "https://s-tools.id/app/daftar.html";
    
    // Konfigurasi Database    
    const _0xDbChunks = [
    "aHR0cHM6Ly9zY3JpcHQuZ29v",
    "Z2xlLmNvbS9tYWNyb3Mvcy9B",
    "S2Z5Y2J6MmxIdWVWQUZ0ZUpX",
    "eDB4a3MyUExHUGVwS05qcDFO",
    "ZjR2dVZOWFhvR0RyRG9mcEwz",
    "SmZORzgzak5TOXZUaUJpOEgv",
    "ZXhlYw=="
];
    
    const DEFAULT_SHEETS_URL = atob(_0xDbChunks.join(""));

    const Icon = ({ name, size = 24, className = "", weight="regular" }) => <i className={`ph${weight === 'fill' ? '-fill' : weight === 'duotone' ? '-duotone' : weight === 'bold' ? '-bold' : ''} ph-${name} ${className}`} style={{ fontSize: size }}></i>;

    function App() {
      const [courses, setCourses] = React.useState([]);
      const [isLoading, setIsLoading] = React.useState(true);

      React.useEffect(() => {
        const fetchUrl = DEFAULT_SHEETS_URL + '?nocache=' + new Date().getTime();
        fetch(fetchUrl)
          .then(res => res.json())
          .then(data => {
              if(data.courses) {
                  // Hanya tampilkan kelas yang aktif di etalase
                  const activeCourses = data.courses.filter(c => c.isActive);
                  setCourses(activeCourses);
              }
              setIsLoading(false);
          })
          .catch(e => {
              console.error("Gagal memuat katalog", e);
              setIsLoading(false);
          });
      }, []);

      return (
        <div className="min-h-screen flex flex-col bg-slate-50">
          {/* Navigasi */}
          <nav className="bg-white/80 backdrop-blur-md border-b border-slate-100 sticky top-0 z-50">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex justify-between items-center h-20">
                <div className="flex items-center gap-2 text-indigo-600">
                  <div className="w-10 h-10 bg-indigo-100 rounded-xl flex items-center justify-center">
                    <Icon name="book-open" size={24} weight="fill"/>
                  </div>
                  <span className="font-extrabold text-2xl tracking-tight text-slate-900">EduLearn</span>
                </div>
                <div className="flex items-center gap-4">
                  <a href={LOGIN_PORTAL_URL} className="text-slate-600 hover:text-indigo-600 font-bold px-4 py-2 transition">Masuk</a>
                  <a href={REGISTER_PORTAL_URL} className="bg-slate-900 hover:bg-indigo-600 text-white px-6 py-2.5 rounded-full font-bold transition shadow-lg shadow-slate-200">Daftar S-Tools ID</a>
                </div>
              </div>
            </div>
          </nav>

          {/* Hero Section */}
          <section className="relative pt-20 pb-32 overflow-hidden">
            <div className="absolute inset-0 bg-gradient-to-br from-indigo-50 via-white to-purple-50 -z-10"></div>
            <div className="absolute top-0 right-0 -mr-20 -mt-20 w-96 h-96 bg-indigo-400/20 rounded-full blur-3xl"></div>
            <div className="absolute bottom-0 left-0 -ml-20 -mb-20 w-80 h-80 bg-purple-400/20 rounded-full blur-3xl"></div>
            
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center relative z-10">
              <span className="inline-block py-1 px-3 rounded-full bg-indigo-50 border border-indigo-100 text-indigo-600 text-sm font-bold tracking-widest uppercase mb-6">Dipersembahkan oleh SenTools</span>
              <h1 className="text-5xl md:text-7xl font-black text-slate-900 mb-8 tracking-tight leading-tight">
                Tingkatkan Keahlianmu.<br/>
                <span className="text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600">Mulai Kapan Saja.</span>
              </h1>
              <p className="text-lg md:text-xl text-slate-600 max-w-2xl mx-auto mb-10 leading-relaxed font-medium">
                EduLearn memfasilitasi Anda dengan materi terstruktur, ujian komprehensif, dan sertifikasi digital terverifikasi. Akses semua kelas menggunakan satu akun S-Tools ID Anda.
              </p>
              <div className="flex flex-col sm:flex-row justify-center items-center gap-4">
                <a href="#katalog" className="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-4 rounded-full font-bold transition shadow-xl shadow-indigo-200 flex items-center justify-center gap-2 text-lg">
                  Lihat Kelas <Icon name="arrow-right" weight="bold"/>
                </a>
                <a href={LOGIN_PORTAL_URL} className="w-full sm:w-auto bg-white hover:bg-slate-50 text-slate-900 border border-slate-200 px-8 py-4 rounded-full font-bold transition flex items-center justify-center gap-2 text-lg">
                  <Icon name="user" weight="bold"/> Masuk Ruang Siswa
                </a>
              </div>
            </div>
          </section>

          {/* Fitur Section */}
          <section className="py-20 bg-white">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="text-center mb-16">
                <h2 className="text-3xl md:text-4xl font-extrabold text-slate-900">Fokus pada Pembelajaran Anda</h2>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div className="bg-slate-50 p-8 rounded-3xl border border-slate-100 hover:border-indigo-100 transition group">
                  <div className="w-14 h-14 bg-indigo-100 text-indigo-600 rounded-2xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform"><Icon name="shield-check" size={28} weight="fill"/></div>
                  <h3 className="text-xl font-bold text-slate-900 mb-3">Keamanan SSO S-Tools</h3>
                  <p className="text-slate-600 leading-relaxed">Sistem login terpusat. Data Anda aman dan tersinkronisasi di seluruh ekosistem aplikasi SenTools.</p>
                </div>
                <div className="bg-slate-50 p-8 rounded-3xl border border-slate-100 hover:border-indigo-100 transition group">
                  <div className="w-14 h-14 bg-emerald-100 text-emerald-600 rounded-2xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform"><Icon name="video" size={28} weight="fill"/></div>
                  <h3 className="text-xl font-bold text-slate-900 mb-3">Materi Video Interaktif</h3>
                  <p className="text-slate-600 leading-relaxed">Belajar melalui video berkualitas tinggi dan modul teks yang dirancang oleh instruktur ahli.</p>
                </div>
                <div className="bg-slate-50 p-8 rounded-3xl border border-slate-100 hover:border-indigo-100 transition group">
                  <div className="w-14 h-14 bg-amber-100 text-amber-600 rounded-2xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform"><Icon name="medal" size={28} weight="fill"/></div>
                  <h3 className="text-xl font-bold text-slate-900 mb-3">Sertifikat Kelulusan</h3>
                  <p className="text-slate-600 leading-relaxed">Dapatkan sertifikat digital resmi setelah Anda berhasil menyelesaikan kelas dan lulus ujian akhir.</p>
                </div>
              </div>
            </div>
          </section>

          {/* Etalase Kelas / Course Showcase */}
          <section id="katalog" className="py-24 bg-slate-50">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex flex-col md:flex-row justify-between items-end mb-12">
                <div>
                  <h2 className="text-3xl md:text-4xl font-extrabold text-slate-900 mb-4">Katalog Kelas Aktif</h2>
                  <p className="text-slate-600 text-lg">Pilih kelas yang sesuai dengan minat dan kebutuhan Anda.</p>
                </div>
                <div className="mt-4 md:mt-0">
                  <span className="bg-indigo-100 text-indigo-700 px-4 py-2 rounded-full font-bold text-sm flex items-center gap-2">
                    <Icon name="check-circle" weight="fill"/> {courses.length} Kelas Tersedia
                  </span>
                </div>
              </div>

              {isLoading ? (
                <div className="flex flex-col items-center justify-center py-20">
                  <Icon name="spinner-gap" size={48} className="text-indigo-600 animate-spin mb-4" weight="bold"/>
                  <p className="text-slate-500 font-medium">Memuat data kelas terbaru...</p>
                </div>
              ) : courses.length === 0 ? (
                <div className="bg-white border-2 border-dashed border-slate-200 rounded-3xl p-16 text-center">
                  <Icon name="book" size={64} className="text-slate-300 mx-auto mb-4"/>
                  <h3 className="text-2xl font-bold text-slate-700 mb-2">Belum Ada Kelas Aktif</h3>
                  <p className="text-slate-500">Instruktur kami sedang menyiapkan materi terbaik untuk Anda. Silakan kembali lagi nanti.</p>
                </div>
              ) : (
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                  {courses.map(course => (
                    <div key={course.id} className="bg-white rounded-3xl p-8 border border-slate-100 shadow-sm hover:shadow-xl hover:border-indigo-100 transition duration-300 flex flex-col h-full group">
                      <div className="flex justify-between items-start mb-6">
                        <div className="w-14 h-14 bg-slate-50 border border-slate-100 rounded-2xl flex items-center justify-center text-indigo-600 group-hover:bg-indigo-600 group-hover:text-white transition">
                          <Icon name="monitor-play" size={28} weight="duotone"/>
                        </div>
                        <span className="font-mono text-xs font-black tracking-widest bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg uppercase">
                          {course.code}
                        </span>
                      </div>
                      <h3 className="text-xl font-extrabold text-slate-900 mb-3 leading-tight group-hover:text-indigo-600 transition">
                        {course.title}
                      </h3>
                      <p className="text-sm font-medium text-slate-500 flex items-center mb-6 flex-1">
                        <Icon name="user-circle" size={18} className="mr-2"/> {course.instructor}
                      </p>
                      
                      <div className="pt-6 border-t border-slate-100 flex items-center justify-between mt-auto">
                        <span className="text-sm font-bold text-slate-500 flex items-center">
                          <Icon name="files" size={16} className="mr-1.5"/> {(course.modules || []).length} Modul
                        </span>
                        <a href={LOGIN_PORTAL_URL} className="text-indigo-600 font-bold hover:text-indigo-800 flex items-center gap-1 transition">
                          Daftar Sekarang <Icon name="arrow-right" weight="bold"/>
                        </a>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </section>

          {/* CTA Akhir */}
          <section className="py-24 relative overflow-hidden">
            <div className="absolute inset-0 bg-slate-900 z-0"></div>
            <div className="absolute inset-0 bg-gradient-to-t from-indigo-900/50 to-transparent z-0"></div>
            <div className="max-w-4xl mx-auto px-4 text-center relative z-10">
              <Icon name="sparkle" size={48} className="text-indigo-400 mx-auto mb-6" weight="fill"/>
              <h2 className="text-3xl md:text-5xl font-black text-white mb-6 tracking-tight">Siap Memulai Perjalanan Anda?</h2>
              <p className="text-lg text-slate-300 mb-10 max-w-2xl mx-auto">Bergabunglah dengan siswa lainnya. Gunakan S-Tools ID untuk mengakses semua materi pembelajaran tanpa batas.</p>
              <a href={REGISTER_PORTAL_URL} className="inline-flex items-center justify-center bg-indigo-500 hover:bg-indigo-600 text-white px-10 py-5 rounded-full font-black text-lg transition shadow-xl shadow-indigo-500/20 gap-2 transform hover:scale-105 active:scale-95">
                Buat Akun Gratis Sekarang
              </a>
            </div>
          </section>

          {/* Footer */}
          <footer className="bg-white border-t border-slate-100 py-12">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-6">
              <div className="flex items-center gap-2 text-indigo-600">
                <Icon name="book-open" size={24} weight="fill"/>
                <span className="font-extrabold text-xl tracking-tight text-slate-900">EduLearn</span>
              </div>
              <p className="text-slate-500 font-medium text-sm text-center md:text-left">
                &copy; {new Date().getFullYear()} EduLearn by SenTools. Seluruh hak cipta dilindungi.
              </p>
              <div className="flex gap-4">
                <a href="#" className="w-10 h-10 rounded-full bg-slate-50 text-slate-400 flex items-center justify-center hover:bg-indigo-50 hover:text-indigo-600 transition">
                  <Icon name="envelope-simple" size={20} weight="fill"/>
                </a>
                <a href="#" className="w-10 h-10 rounded-full bg-slate-50 text-slate-400 flex items-center justify-center hover:bg-indigo-50 hover:text-indigo-600 transition">
                  <Icon name="globe" size={20} weight="fill"/>
                </a>
              </div>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

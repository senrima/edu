<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduLearn by SenTools - LMS Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    let fbApp = null, fbAuth = null, fbDb = null;

    const IconWrapper = ({ name, size = 24, className = "" }) => <i className={`ph ph-${name} ${className}`} style={{ fontSize: size }}></i>;
    const PlayCircle = (p) => <IconWrapper name="play-circle" {...p} />;
    const Download = (p) => <IconWrapper name="download" {...p} />;
    const Menu = (p) => <IconWrapper name="list" {...p} />;
    const X = (p) => <IconWrapper name="x" {...p} />;
    const BookOpen = (p) => <IconWrapper name="book-open" {...p} />;
    const Video = (p) => <IconWrapper name="video" {...p} />;
    const CheckCircle2 = (p) => <IconWrapper name="check-circle" {...p} />;
    const ChevronRight = (p) => <IconWrapper name="caret-right" {...p} />;
    const Loader2 = (p) => <IconWrapper name="spinner" className="animate-spin" {...p} />;
    const MessageSquare = (p) => <IconWrapper name="chat-circle" {...p} />;
    const Lock = (p) => <IconWrapper name="lock" {...p} />;
    const Key = (p) => <IconWrapper name="key" {...p} />;
    const LogOut = (p) => <IconWrapper name="sign-out" {...p} />;
    const PlusCircle = (p) => <IconWrapper name="plus-circle" {...p} />;
    const Database = (p) => <IconWrapper name="database" {...p} />;
    const Trash2 = (p) => <IconWrapper name="trash" {...p} />;
    const Award = (p) => <IconWrapper name="medal" {...p} />;
    const Bell = (p) => <IconWrapper name="bell" {...p} />;
    const Users = (p) => <IconWrapper name="users" {...p} />;
    const Book = (p) => <IconWrapper name="book" {...p} />;
    const GraduationCap = (p) => <IconWrapper name="graduation-cap" {...p} />;
    const AlertCircle = (p) => <IconWrapper name="warning-circle" {...p} />;
    const ArrowLeft = (p) => <IconWrapper name="arrow-left" {...p} />;
    const RefreshCw = (p) => <IconWrapper name="arrows-clockwise" {...p} />;
    const UserIcon = (p) => <IconWrapper name="user" {...p} />;
    const Globe = (p) => <IconWrapper name="globe" {...p} />;
    const HardDrives = (p) => <IconWrapper name="hard-drives" {...p} />;
    const ShieldCheck = (p) => <IconWrapper name="shield-check" {...p} />;
    const MagnifyingGlass = (p) => <IconWrapper name="magnifying-glass" {...p} />;
    const Coffee = (p) => <IconWrapper name="coffee" {...p} />;
    const CheckSquareOffset = (p) => <IconWrapper name="check-square-offset" {...p} />;

    const initialAdmins = [
      { id: 'adm_super', username: 'super_admin', password: 'SUPER123', name: 'Master System', isSuper: true, donationLink: '' },
      { id: 'adm_1', username: 'budi_admin', password: 'ADMIN123', name: 'Budi Santoso', isSuper: false, donationLink: 'https://saweria.co/budi' }
    ];
    
    const emptyExam = {
      minScore: 70,
      questions: Array.from({length: 10}, () => ({ q: '', options: ['','','',''], answer: 0 }))
    };

    const initialCourses = [
      { 
        id: 'c_1', authorId: 'adm_1', code: 'WEB2026', title: "Mastering Web Development", instructor: "Budi Santoso", 
        exam: {
          minScore: 80,
          questions: [
            { q: "Apa kepanjangan dari HTML?", options: ["Hyper Text Markup Language", "Hyperlinks Text", "Home Tool", "Hyper Tool"], answer: 0 },
            { q: "Tag untuk paragraf?", options: ["<p>", "<para>", "<pg>", "<text>"], answer: 0 },
            { q: "Sifat CSS untuk warna teks?", options: ["bg-color", "color", "text-color", "font-color"], answer: 1 },
            { q: "Simbol ID di CSS?", options: [".", "#", "*", "&"], answer: 1 },
            { q: "Fungsi JavaScript?", options: ["Styling", "Struktur", "Interaktivitas", "Database"], answer: 2 },
            { q: "Deklarasi variabel JS modern?", options: ["var & let", "let & const", "int & float", "dim & str"], answer: 1 },
            { q: "Tag file CSS eksternal?", options: ["<body>", "<head>", "<footer>", "<header>"], answer: 1 },
            { q: "Tipe data [1, 2, 3]?", options: ["Object", "String", "Number", "Array"], answer: 3 },
            { q: "Fungsi console.log()?", options: ["Alert", "Cetak pesan", "Hapus data", "Buat fungsi"], answer: 1 },
            { q: "Framework CSS terpopuler?", options: ["Tailwind", "Bootstrap", "Foundation", "Semua benar"], answer: 3 }
          ]
        },
        modules: [ 
          { id: 'm_1', title: "Pengantar HTML & CSS Modern", videoUrl: "https://www.youtube.com/embed/mU6anWqZJcc", description: "Dasar web", comments: [] }, 
          { id: 'm_2', title: "Fundamental JavaScript", videoUrl: "https://www.youtube.com/embed/W6NZfCO5SIk", description: "JS Dasar", comments: [] } 
        ] 
      }
    ];
    
    const initialParticipants = [{ id: 'p_1', name: "Andi Wijaya", email: "andi@mail.com", accessCode: "P9X2A1" }];
    const initialEnrollments = [{ id: 'e_1', participantId: 'p_1', courseId: 'c_1', completedModules: ['m_1'], isGraduated: false, certDownloaded: false, examScore: null }];

    function App() {
      const [dbMode, setDbMode] = React.useState(() => localStorage.getItem('edu_db_mode') || 'local');
      const [dbReady, setDbReady] = React.useState(false);
      const [setupError, setSetupError] = React.useState("");
      const [fbConfigInput, setFbConfigInput] = React.useState("");
      const [sheetsUrlInput, setSheetsUrlInput] = React.useState("");
      
      const [admins, setAdmins] = React.useState([]);
      const [courses, setCourses] = React.useState([]);
      const [participants, setParticipants] = React.useState([]);
      const [enrollments, setEnrollments] = React.useState([]);
      const [notifications, setNotifications] = React.useState([]);

      const [session, setSession] = React.useState(() => JSON.parse(sessionStorage.getItem('edu_session')) || null);
      const [loginInput, setLoginInput] = React.useState({ username: "", password: "" });
      const [loginError, setLoginError] = React.useState("");
      const [isLoggingIn, setIsLoggingIn] = React.useState(false);
      
      const getInitialAppMode = () => {
        if (!session) return 'auth';
        if (session.role === 'super_admin') return 'super_dashboard';
        if (session.role === 'admin') return 'admin_dashboard';
        return 'part_dashboard';
      };

      const [appMode, setAppMode] = React.useState(getInitialAppMode()); 
      const [adminTab, setAdminTab] = React.useState("courses"); 
      const [superTab, setSuperTab] = React.useState("instructors"); 
      
      const [searchInst, setSearchInst] = React.useState("");
      const [searchCourse, setSearchCourse] = React.useState("");
      const [searchPart, setSearchPart] = React.useState("");
      
      const [activeCourse, setActiveCourse] = React.useState(null);
      const [activeModule, setActiveModule] = React.useState(null);
      const [isSidebarOpen, setIsSidebarOpen] = React.useState(false);
      const [commentText, setCommentText] = React.useState("");
      
      const [classroomMode, setClassroomMode] = React.useState('video');
      const [studentAnswers, setStudentAnswers] = React.useState({});
      
      const [toast, setToast] = React.useState(null);
      const [confirmDialog, setConfirmDialog] = React.useState({ isOpen: false, message: "", onConfirm: null });
      
      const [examModalOpen, setExamModalOpen] = React.useState(false);
      const [examCourseId, setExamCourseId] = React.useState(null);
      const [examForm, setExamForm] = React.useState(emptyExam);

      const [profileForm, setProfileForm] = React.useState({ donationLink: "" });

      React.useEffect(() => {
        if (appMode === 'setup_db') return;
        if (dbMode === 'local') {
          setAdmins(JSON.parse(localStorage.getItem('edu_admins')) || initialAdmins);
          setCourses(JSON.parse(localStorage.getItem('edu_courses')) || initialCourses);
          setParticipants(JSON.parse(localStorage.getItem('edu_participants')) || initialParticipants);
          setEnrollments(JSON.parse(localStorage.getItem('edu_enrollments')) || initialEnrollments);
          setNotifications(JSON.parse(localStorage.getItem('edu_notifications')) || []);
          setDbReady(true);
        } else if (dbMode === 'firebase') {
          try {
            const configStr = localStorage.getItem('edu_fb_config');
            if (!configStr) throw new Error("No Config");
            fbApp = initializeApp(JSON.parse(configStr)); fbAuth = getAuth(fbApp); fbDb = getFirestore(fbApp);
            signInAnonymously(fbAuth).then(() => {
              const getRef = (colName) => collection(fbDb, colName);
              onSnapshot(getRef('admins'), snap => setAdmins(snap.docs.map(d => ({id: d.id, ...d.data()}))) );
              onSnapshot(getRef('courses'), snap => setCourses(snap.docs.map(d => ({id: d.id, ...d.data()}))) );
              onSnapshot(getRef('participants'), snap => setParticipants(snap.docs.map(d => ({id: d.id, ...d.data()}))) );
              onSnapshot(getRef('enrollments'), snap => setEnrollments(snap.docs.map(d => ({id: d.id, ...d.data()}))) );
              onSnapshot(getRef('notifications'), snap => setNotifications(snap.docs.map(d => ({id: d.id, ...d.data()}))) );
              setDbReady(true);
            }).catch(e => { setSetupError("Gagal login Firebase anonim."); setAppMode('setup_db'); });
          } catch (e) { setSetupError("Config Firebase salah."); setAppMode('setup_db'); }
        } else if (dbMode === 'sheets') {
          const url = localStorage.getItem('edu_sheets_url');
          if(!url) { setAppMode('setup_db'); return; }
          fetch(url).then(res => res.json()).then(data => {
                if(data.admins) setAdmins(data.admins); if(data.courses) setCourses(data.courses);
                if(data.participants) setParticipants(data.participants); if(data.enrollments) setEnrollments(data.enrollments);
                if(data.notifications) setNotifications(data.notifications); setDbReady(true);
          }).catch(e => { setSetupError("Gagal sync Spreadsheet."); setAppMode('setup_db'); });
        }
      }, [dbMode, appMode]);

      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };
      const generateRandomCode = (prefix = "", length = 6) => prefix + Math.random().toString(36).substring(2, 2+length).toUpperCase();
      const calcProgress = (enr, crs) => {
        if (!crs || crs.modules.length === 0 || !enr) return 0;
        return Math.round((enr.completedModules.length / crs.modules.length) * 100);
      };

      const execDbAction = async (localAction, firebaseAction) => {
        try {
          if (dbMode === 'firebase') { await firebaseAction(); } 
          else if (dbMode === 'sheets') {
              localAction(); 
              const url = localStorage.getItem('edu_sheets_url');
              if (url) {
                  const payload = {
                      admins: JSON.parse(localStorage.getItem('edu_admins')) || admins,
                      courses: JSON.parse(localStorage.getItem('edu_courses')) || courses,
                      participants: JSON.parse(localStorage.getItem('edu_participants')) || participants,
                      enrollments: JSON.parse(localStorage.getItem('edu_enrollments')) || enrollments,
                      notifications: JSON.parse(localStorage.getItem('edu_notifications')) || notifications
                  };
                  fetch(url, { method: 'POST', body: JSON.stringify(payload) }).catch(console.error);
              }
          } else { localAction(); }
        } catch (error) { console.error(error); showToast("Gagal menyimpan."); }
      };

      const handleSeedDatabase = async () => {
        setIsLoggingIn(true);
        await execDbAction(
          () => {
            localStorage.setItem('edu_admins', JSON.stringify(initialAdmins)); setAdmins(initialAdmins);
            localStorage.setItem('edu_courses', JSON.stringify(initialCourses)); setCourses(initialCourses);
            localStorage.setItem('edu_participants', JSON.stringify(initialParticipants)); setParticipants(initialParticipants);
            localStorage.setItem('edu_enrollments', JSON.stringify(initialEnrollments)); setEnrollments(initialEnrollments);
            showToast("Database Terinisialisasi!");
          },
          async () => {
            for(let adm of initialAdmins) await setDoc(doc(fbDb, 'admins', adm.id), adm);
            for(let crs of initialCourses) await setDoc(doc(fbDb, 'courses', crs.id), crs);
            for(let prt of initialParticipants) await setDoc(doc(fbDb, 'participants', prt.id), prt);
            for(let enr of initialEnrollments) await setDoc(doc(fbDb, 'enrollments', enr.id), enr);
          }
        );
        setIsLoggingIn(false);
      };

      const handleLogin = (e) => {
        e.preventDefault(); setIsLoggingIn(true); setLoginError("");
        setTimeout(() => {
          const { username, password } = loginInput;
          const adminFound = admins.find(a => a.username === username && a.password === password);
          if (adminFound) {
            const sessData = { role: adminFound.isSuper ? 'super_admin' : 'admin', data: adminFound };
            setSession(sessData); sessionStorage.setItem('edu_session', JSON.stringify(sessData));
            if(!adminFound.isSuper) setProfileForm({ donationLink: adminFound.donationLink || "" });
            setAppMode(adminFound.isSuper ? 'super_dashboard' : 'admin_dashboard'); setIsLoggingIn(false); return;
          }
          const partFound = participants.find(p => p.email === username && p.accessCode === password);
          if (partFound) {
            const sessData = { role: 'participant', data: partFound };
            setSession(sessData); sessionStorage.setItem('edu_session', JSON.stringify(sessData));
            setAppMode('part_dashboard'); setIsLoggingIn(false); return;
          }
          setLoginError("Kredensial salah!"); setIsLoggingIn(false);
        }, 600);
      };

      const handleLogout = () => {
        setSession(null); sessionStorage.removeItem('edu_session');
        setAppMode('auth'); setLoginInput({ username: "", password: "" });
        setClassroomMode('video'); setStudentAnswers({}); setExamModalOpen(false);
      };

      const handleRegisterAdmin = async (e) => {
        e.preventDefault(); const fd = new FormData(e.target); const username = fd.get('username');
        if (admins.some(a => a.username === username)) return showToast("Username terpakai!");
        const newAdminData = { name: fd.get('name'), username, password: fd.get('password'), isSuper: false, donationLink: '' };
        await execDbAction(
          () => {
            const updatedA = [...admins, { id: `adm_${Date.now()}`, ...newAdminData }];
            setAdmins(updatedA); localStorage.setItem('edu_admins', JSON.stringify(updatedA));
          },
          async () => await setDoc(doc(collection(fbDb, 'admins')), newAdminData)
        );
        e.target.reset(); showToast("Instruktur Ditambahkan!");
      };

      const handleDeleteAdmin = (id) => {
        setConfirmDialog({
            isOpen: true, message: "Hapus instruktur ini? (Kursusnya akan tetap ada tanpa pembuat).",
            onConfirm: async () => {
                setConfirmDialog({ isOpen: false });
                await execDbAction(
                    () => {
                        const updatedA = admins.filter(a => a.id !== id);
                        setAdmins(updatedA); localStorage.setItem('edu_admins', JSON.stringify(updatedA));
                    },
                    async () => await deleteDoc(doc(fbDb, 'admins', id))
                );
                showToast("Admin dihapus.");
            }
        });
      };

      const executeDeleteCourse = async (courseId) => {
        await execDbAction(
            () => {
                const updatedC = courses.filter(c => c.id !== courseId);
                setCourses(updatedC); localStorage.setItem('edu_courses', JSON.stringify(updatedC));
            },
            async () => await deleteDoc(doc(fbDb, 'courses', courseId))
        );
        showToast("Kursus dihapus.");
      };

      const handleDeleteCourseSuper = (courseId) => {
        setConfirmDialog({
            isOpen: true, message: "Peringatan Super Admin: Hapus kursus secara permanen?",
            onConfirm: () => { setConfirmDialog({ isOpen: false }); executeDeleteCourse(courseId); }
        });
      };

      const handleSafeDeleteCourse = (courseId) => {
        const hasEnrolled = enrollments.some(e => e.courseId === courseId);
        if (hasEnrolled) return showToast("Gagal: Kursus ini sudah ada peserta.");
        setConfirmDialog({
            isOpen: true, message: "Kursus kosong. Yakin ingin menghapus?",
            onConfirm: () => { setConfirmDialog({ isOpen: false }); executeDeleteCourse(courseId); }
        });
      };

      const handleCreateCourse = async (e) => {
        e.preventDefault(); const fd = new FormData(e.target); const code = fd.get('code');
        if (courses.some(c => c.code === code)) return showToast("Kode sudah ada!");
        const courseData = { authorId: session.data.id, code, title: fd.get('title'), instructor: fd.get('inst'), modules: [], exam: emptyExam };
        await execDbAction(
          () => {
            const updated = [...courses, { id: `c_${Date.now()}`, ...courseData }];
            setCourses(updated); localStorage.setItem('edu_courses', JSON.stringify(updated));
          },
          async () => await setDoc(doc(collection(fbDb, 'courses')), courseData)
        );
        e.target.reset(); showToast("Kursus dibuat!");
      };

      const handleCreateModule = async (e) => {
        e.preventDefault(); const fd = new FormData(e.target); const courseId = fd.get('courseId');
        const course = courses.find(c => c.id === courseId);
        const newModule = { id: `m_${Date.now()}`, title: fd.get('title'), videoUrl: fd.get('vidUrl'), description: fd.get('desc'), comments: [] };
        await execDbAction(
          () => {
            const updated = courses.map(c => c.id === courseId ? { ...c, modules: [...c.modules, newModule] } : c);
            setCourses(updated); localStorage.setItem('edu_courses', JSON.stringify(updated));
          },
          async () => await updateDoc(doc(fbDb, 'courses', courseId), { modules: [...course.modules, newModule] })
        );
        e.target.reset(); showToast("Materi ditambah!");
      };

      const handleDeleteModule = (courseId, moduleId) => {
        setConfirmDialog({
            isOpen: true, message: "Hapus materi video ini?",
            onConfirm: async () => {
                setConfirmDialog({ isOpen: false }); const course = courses.find(c => c.id === courseId);
                await execDbAction(
                    () => {
                        const updated = courses.map(c => c.id === courseId ? { ...c, modules: c.modules.filter(m => m.id !== moduleId) } : c);
                        setCourses(updated); localStorage.setItem('edu_courses', JSON.stringify(updated));
                    },
                    async () => await updateDoc(doc(fbDb, 'courses', courseId), { modules: course.modules.filter(m => m.id !== moduleId) })
                );
                showToast("Materi dihapus.");
            }
        });
      };

      const handleUpdateProfile = async (e) => {
        e.preventDefault();
        await execDbAction(
          () => {
            const updatedA = admins.map(a => a.id === session.data.id ? { ...a, donationLink: profileForm.donationLink } : a);
            setAdmins(updatedA); localStorage.setItem('edu_admins', JSON.stringify(updatedA));
          },
          async () => await updateDoc(doc(fbDb, 'admins', session.data.id), { donationLink: profileForm.donationLink })
        );
        showToast("Profil diperbarui!");
      };

      const openExamBuilder = (courseId) => {
        const course = courses.find(c => c.id === courseId);
        setExamCourseId(courseId); setExamForm(course.exam || emptyExam); setExamModalOpen(true);
      };

      const handleSaveExam = async () => {
        await execDbAction(
          () => {
            const updated = courses.map(c => c.id === examCourseId ? { ...c, exam: examForm } : c);
            setCourses(updated); localStorage.setItem('edu_courses', JSON.stringify(updated));
          },
          async () => await updateDoc(doc(fbDb, 'courses', examCourseId), { exam: examForm })
        );
        setExamModalOpen(false); showToast("Ujian disimpan!");
      };

      const handleRegisterParticipant = async (e) => {
        e.preventDefault(); const fd = new FormData(e.target); const email = fd.get('email');
        if (participants.some(p => p.email === email)) return showToast("Email sudah terdaftar!");
        const partData = { name: fd.get('name'), email, accessCode: fd.get('code') };
        const enrData = { courseId: fd.get('courseId'), completedModules: [], isGraduated: false, certDownloaded: false, examScore: null };
        await execDbAction(
          () => {
            const newPart = { id: `p_${Date.now()}`, ...partData };
            const newEnr = { id: `e_${Date.now()}`, participantId: newPart.id, ...enrData };
            const updatedP = [...participants, newPart]; const updatedE = [...enrollments, newEnr];
            setParticipants(updatedP); localStorage.setItem('edu_participants', JSON.stringify(updatedP));
            setEnrollments(updatedE); localStorage.setItem('edu_enrollments', JSON.stringify(updatedE));
          },
          async () => {
            const pRef = doc(collection(fbDb, 'participants')); await setDoc(pRef, partData);
            const eRef = doc(collection(fbDb, 'enrollments')); await setDoc(eRef, { ...enrData, participantId: pRef.id });
          }
        );
        e.target.reset(); showToast("Peserta terdaftar!");
      };

      const handleEnrollExisting = async (e) => {
        e.preventDefault(); const fd = new FormData(e.target); const email = fd.get('email'); const cId = fd.get('cId');
        const participant = participants.find(p => p.email === email);
        if (!participant) return showToast("Peserta tidak ditemukan!");
        const pId = participant.id;
        if(enrollments.some(en => en.participantId === pId && en.courseId === cId)) return showToast("Sudah terdaftar di kursus ini!");
        const enrData = { participantId: pId, courseId: cId, completedModules: [], isGraduated: false, certDownloaded: false, examScore: null };
        await execDbAction(
          () => {
            const updatedE = [...enrollments, { id: `e_${Date.now()}`, ...enrData }];
            setEnrollments(updatedE); localStorage.setItem('edu_enrollments', JSON.stringify(updatedE));
          },
          async () => await setDoc(doc(collection(fbDb, 'enrollments')), enrData)
        );
        showToast("Ditambahkan ke kursus!");
      };

      const jumpToClassroom = (courseId, targetModuleId = null) => {
        const course = courses.find(c => c.id === courseId);
        let modToOpen = course.modules[0] || null; setClassroomMode('video');
        if ((session.role === 'admin' || session.role === 'super_admin') && targetModuleId) {
          modToOpen = course.modules.find(m => m.id === targetModuleId) || modToOpen;
        } else if (session.role === 'participant') {
          const myEnr = enrollments.find(e => e.participantId === session.data.id && e.courseId === courseId);
          if (myEnr) {
            if(myEnr.isGraduated) setClassroomMode('result');
            else modToOpen = course.modules.find(m => !myEnr.completedModules.includes(m.id)) || course.modules[course.modules.length - 1];
          }
        }
        if(!modToOpen && classroomMode === 'video') return showToast("Belum ada materi!"); 
        setActiveCourse(course); setActiveModule(modToOpen); setAppMode('classroom');
      };

      const handlePostComment = async (e) => {
        e.preventDefault(); if (!commentText.trim()) return;
        const isAdmin = session.role === 'admin' || session.role === 'super_admin';
        const authorName = session.role === 'super_admin' ? `${session.data.name} (Super Admin)` : isAdmin ? `${session.data.name} (Instruktur)` : session.data.name;

              {admins.length === 0 && (<div className="mb-4 bg-amber-50 border border-amber-200 p-4 rounded-xl text-center"><p className="text-sm text-amber-800 mb-3 font-medium">Database kosong.</p><button onClick={handleSeedDatabase} disabled={isLoggingIn} className="bg-amber-600 text-white px-4 py-2 rounded-lg text-sm font-bold w-full shadow-sm">Inisialisasi Database Bawaan</button></div>)}

                        <input name="inst" defaultValue={session.data.name} required className="w-full p-2 text-sm border rounded outline-none focus:border-indigo-500" placeholder="Nama Instruktur"/>
                        <button type="submit" className="w-full bg-slate-900 text-white py-2 rounded font-medium">Buat Kursus</button>
                      </form>
                    </div>
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                      <h2 className="font-bold text-slate-800 mb-4"><Video size={18} className="inline mr-2 text-indigo-600" />Tambah Materi</h2>
                      <form onSubmit={handleCreateModule} className="space-y-3">

                        <input name="vidUrl" required type="url" className="w-full p-2 text-sm border rounded" placeholder="URL YouTube Embed"/>
                        <textarea name="desc" required maxLength={300} className="w-full p-2 text-sm border rounded resize-none" placeholder="Deskripsi (Maks 300)"/>
                        <button type="submit" className="w-full bg-indigo-600 text-white py-2 rounded font-medium">Simpan Video</button>

                              <button onClick={() => openExamBuilder(course.id)} className="text-xs bg-amber-500 px-3 py-2 rounded-lg font-bold"><CheckSquareOffset size={14} className="inline mr-1"/> Ujian</button>
                              <button onClick={() => handleSafeDeleteCourse(course.id)} className="text-xs bg-red-100 text-red-600 px-3 py-2 rounded-lg"><Trash2 size={14}/></button>
                              <button onClick={() => jumpToClassroom(course.id)} className="text-xs bg-indigo-600 text-white px-3 py-2 rounded-lg font-bold">Masuk Kelas</button>
                          </div>
                        </div>
                        <div className="p-4 space-y-2">
                          {course.modules.length === 0 ? <p className="text-sm text-slate-400 italic">Belum ada materi.</p> : course.modules.map((m, i) => (
                            <div key={m.id} className="flex justify-between items-center text-sm border-b pb-2"><span className="flex items-center"><PlayCircle size={14} className="mr-2 text-slate-400"/> {i+1}. {m.title}</span><button onClick={()=>handleDeleteModule(course.id, m.id)} className="text-red-500 p-1 hover:bg-red-50 rounded"><Trash2 size={14}/></button></div>

                    ))}

                      </form>
                    </div>

                        })}
                    </tbody></table>
                  </div>
                </div>
              )}

              {adminTab === 'profile' && (
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 max-w-lg mx-auto">
                  <h2 className="font-bold text-slate-800 mb-4"><Coffee size={18} className="inline mr-2 text-amber-600" /> Pengaturan Profil (Apresiasi)</h2>
                  <p className="text-sm text-slate-600 mb-6">Tambahkan link donasi (Trakteer/Saweria). Tombol akan muncul jika peserta lulus.</p>
                  <form onSubmit={handleUpdateProfile} className="space-y-4">
                      <input type="url" value={profileForm.donationLink} onChange={e=>setProfileForm({donationLink: e.target.value})} className="w-full p-3 border rounded-xl" placeholder="https://trakteer.id/..." />
                      <button type="submit" className="w-full bg-amber-500 text-slate-900 py-3 rounded-xl font-bold">Simpan Profil</button>
                  </form>
                </div>
              )}

                </div>
              )}
            </div>
          </div>
        );

            <main className="flex-1 p-6 lg:p-10 max-w-6xl mx-auto w-full">

          </div>

        const isStudent = session.role === 'participant';
        const myEnr = isStudent ? enrollments.find(e => e.participantId === session.data.id && e.courseId === activeCourse.id) : null;
        const prog = isStudent ? calcProgress(myEnr, activeCourse) : 0;
        const instructorData = admins.find(a => a.id === activeCourse.authorId);

          <div className="flex flex-col h-screen bg-slate-50">

                <div className="overflow-y-auto flex-1 p-2">

                    const isComp = isStudent ? myEnr.completedModules.includes(mod.id) : false;

                        <div className="bg-white rounded-2xl p-6 sm:p-8 shadow-sm border">
                            <h2 className="text-2xl font-bold mb-3 text-slate-800">{activeModule.title}</h2><p className="text-slate-600 leading-relaxed">{activeModule.description}</p>
                            {isStudent && (<div className="mt-6 pt-6 flex justify-end border-t border-slate-100"><button onClick={handleCompleteModule} className={`flex items-center space-x-2 px-6 py-2.5 rounded-xl font-medium ${myEnr.completedModules.includes(activeModule.id) ? 'bg-slate-100 text-slate-700' : 'bg-indigo-600 text-white'}`}><span>{myEnr.completedModules.includes(activeModule.id) ? 'Lanjut ke Materi Berikutnya' : 'Tandai Selesai & Lanjut'}</span><ChevronRight size={18} /></button></div>)}
                            <div className="mt-8 pt-8 border-t border-slate-200">
                            <h3 className="text-xl font-bold mb-4 flex items-center text-slate-800"><MessageSquare className="mr-2 text-indigo-600" /> Forum Diskusi</h3>
                            <form onSubmit={handlePostComment} className="mb-6 flex gap-3"><input type="text" maxLength={500} value={commentText} onChange={(e) => setCommentText(e.target.value)} placeholder={!isStudent ? "Balas komentar..." : "Tanya sesuatu (Maks 500 huruf)..."} className="flex-1 px-4 py-3 rounded-xl border outline-none focus:border-indigo-500" /><button type="submit" disabled={!commentText.trim()} className="bg-indigo-600 text-white px-6 rounded-xl font-medium disabled:bg-slate-300">Kirim</button></form>
                            <div className="space-y-3">{activeModule.comments.length === 0 ? <p className="text-slate-500 text-sm text-center py-4 bg-slate-50 rounded-xl border border-dashed">Belum ada diskusi.</p> : activeModule.comments.map(c => (<div key={c.id} className={`p-4 rounded-xl border ${c.isAdmin ? 'bg-indigo-50 border-indigo-200' : 'bg-slate-50 border-slate-100'}`}><div className="flex items-center space-x-2 mb-1"><p className="font-semibold text-sm text-slate-800">{c.user}</p>{c.isAdmin && <span className="text-[10px] bg-indigo-600 text-white px-2 py-0.5 rounded-full font-bold uppercase">Admin</span>}</div><p className="text-sm text-slate-700">{c.text}</p></div>))}</div>
                            </div>
                        </div>
                      </>
                  )}
                  {classroomMode === 'exam' && (
                      <div className="bg-white rounded-2xl p-8 shadow-xl border border-slate-200">
                          <div className="text-center mb-8 border-b border-slate-100 pb-6"><div className="w-16 h-16 bg-amber-100 text-amber-600 rounded-full flex items-center justify-center mx-auto mb-4"><CheckSquareOffset size={32}/></div><h2 className="text-3xl font-bold text-slate-900 mb-2">Ujian Akhir Kelas</h2><p className="text-slate-500">Nilai kelulusan minimal: <b>{activeCourse.exam.minScore}</b></p></div>
                          <div className="space-y-8">{activeCourse.exam.questions.map((q, qIdx) => (<div key={qIdx} className="bg-slate-50 p-6 rounded-xl border"><h3 className="font-bold text-lg mb-4 text-slate-800">{qIdx+1}. {q.q}</h3><div className="space-y-3">{q.options.map((opt, optIdx) => (<label key={optIdx} className={`flex items-center p-4 border rounded-xl cursor-pointer ${studentAnswers[qIdx] === optIdx ? 'bg-indigo-50 border-indigo-500 ring-1 ring-indigo-500' : 'bg-white hover:bg-slate-100'}`}><input type="radio" name={`q_${qIdx}`} value={optIdx} onChange={() => setStudentAnswers({...studentAnswers, [qIdx]: optIdx})} checked={studentAnswers[qIdx] === optIdx} className="w-4 h-4 text-indigo-600 cursor-pointer" /><span className="ml-3 font-medium text-slate-700">{opt}</span></label>))}</div></div>))}</div>
                          <div className="mt-10 flex justify-end pt-6 border-t"><button onClick={submitExam} disabled={Object.keys(studentAnswers).length < activeCourse.exam.questions.length} className="bg-indigo-600 disabled:bg-slate-300 text-white px-8 py-4 rounded-xl font-bold text-lg">Kumpulkan Jawaban</button></div>
                      </div>
                  )}
                  {classroomMode === 'result' && (
                      <div className="bg-white rounded-2xl p-10 shadow-2xl border text-center max-w-2xl mx-auto mt-10 relative overflow-hidden">
                          <div className={`absolute top-0 left-0 w-full h-2 ${myEnr.isGraduated ? 'bg-emerald-500' : 'bg-red-500'}`}></div>
                          <div className={`w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6 ${myEnr.isGraduated ? 'bg-emerald-100 text-emerald-600' : 'bg-red-100 text-red-600'}`}>{myEnr.isGraduated ? <Award size={48}/> : <X size={48}/>}</div>
                          <h2 className="text-3xl font-bold text-slate-900 mb-2">{myEnr.isGraduated ? 'Selamat, Anda Lulus!' : 'Maaf, Anda Belum Lulus'}</h2><p className="text-slate-600 mb-8 text-lg">Nilai Akhir: <b className={`text-2xl ml-2 ${myEnr.isGraduated ? 'text-emerald-600' : 'text-red-600'}`}>{myEnr.examScore}</b> / 100</p>
                          {!myEnr.isGraduated ? (<button onClick={()=>{setClassroomMode('exam'); setStudentAnswers({});}} className="w-full bg-slate-800 hover:bg-slate-900 text-white py-4 rounded-xl font-bold text-lg">Ulangi Ujian</button>) : (<div className="space-y-4"><button onClick={handleDownloadCert} className="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-xl font-bold text-lg shadow-md flex items-center justify-center"><Download size={24} className="mr-2"/> Download Sertifikat Digital</button>{instructorData?.donationLink && (<a href={instructorData.donationLink} target="_blank" rel="noopener noreferrer" className="w-full bg-amber-100 hover:bg-amber-200 text-amber-800 border border-amber-300 py-4 rounded-xl font-bold transition flex items-center justify-center"><Coffee size={24} className="mr-2"/> Traktir Kopi Instruktur</a>)}</div>)}
                      </div>
                  )}
                </div>
              </main>
            </div>
          </div>
        );
      }
      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akses Eksternal EduLearn API</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: auto; background-color: #f8fafc; color: #0f172a; }
    .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    input { width: 100%; padding: 12px; margin-bottom: 15px; box-sizing: border-box; border: 1px solid #cbd5e1; border-radius: 8px; }
    button { padding: 12px; margin-right: 5px; margin-bottom: 15px; cursor: pointer; background: #4f46e5; color: white; border: none; border-radius: 8px; font-weight: bold; }
    button.alt { background: #10b981; }
    pre { background: #1e293b; color: #38bdf8; padding: 15px; border-radius: 8px; overflow-x: auto; font-size: 13px; max-height: 400px; }
  </style>
</head>
<body>

  <div class="card">
    <h2>Konektor API EduLearn</h2>
    <label style="font-weight: bold; font-size: 14px; display: block; margin-bottom: 8px;">URL Web App GAS Anda:</label>
    <input type="text" id="gasUrl" placeholder="Paste URL Web App di sini...">

    <button onclick="bacaData()">Tarik Data Sistem</button>
    <button class="alt" onclick="tambahSiswa()">Simpan Siswa Uji Coba</button>

    <h3 style="font-size: 16px; margin-top: 10px;">Monitor Hasil:</h3>
    <pre id="output">Sistem siap. Belum ada aktivitas.</pre>
  </div>

  <script>
    function tampilkanPesan(pesan) {
      document.getElementById("output").innerText = pesan;
    }

    function getUrl() {
      return document.getElementById("gasUrl").value.trim();
    }

    // Fungsi membaca data dari Google Sheets (GET)
    function bacaData() {
      const url = getUrl();
      if (!url) return tampilkanPesan("Harap masukkan URL GAS terlebih dahulu.");
      
      tampilkanPesan("Mengambil data dari server...");
      
      // Tambahkan parameter ?nocache=true agar server mengembalikan JSON
      fetch(url + "?nocache=true")
        .then(res => res.json())
        .then(data => {
          tampilkanPesan("Data Berhasil Ditarik:\n\n" + JSON.stringify(data, null, 2));
        })
        .catch(err => tampilkanPesan("Gagal membaca data: " + err));
    }

    // Fungsi menyimpan data ke Google Sheets (POST)
    function tambahSiswa() {
      const url = getUrl();
      if (!url) return tampilkanPesan("Harap masukkan URL GAS terlebih dahulu.");

      // Format payload sesuai dengan struktur database EduLearn
      const payloadBaru = {
        participants: [{
          id: "p_" + Date.now(),
          name: "Siswa Penguji",
          email: "uji.sistem@mail.com",
          accessCode: "999999"
        }]
      };

      tampilkanPesan("Menyuntikkan data siswa baru...");
      
      fetch(url, {
        method: "POST",
        headers: { 
          "Content-Type": "text/plain;charset=utf-8" // Wajib text/plain untuk bypass keamanan CORS browser
        },
        body: JSON.stringify(payloadBaru)
      })
        .then(res => res.json())
        .then(hasil => {
          tampilkanPesan("Penyimpanan Berhasil:\n\n" + JSON.stringify(hasil, null, 2));
        })
        .catch(err => tampilkanPesan("Gagal menyimpan data: " + err));
    }
  </script>

</body>
</html>

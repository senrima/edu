<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Etalase Akademi - EduLearn</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .hero-gradient { background: radial-gradient(circle at top right, #e0e7ff, transparent 45%), radial-gradient(circle at bottom left, #ecfdf5, transparent 45%); }
    
    /* ANIMASI KUSTOM KELAS PREMIUM */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-float { animation: float 3.5s ease-in-out infinite; }
    .animate-fade-in-up { animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
  </style>
</head>
<body class="text-slate-800 antialiased overflow-x-hidden">
  <div id="root"></div>

  <script type="text/babel">
    const IconWrapper = ({ name, size = 24, className = "", weight="regular" }) => (
      <i className={`ph${weight === 'fill' ? '-fill' : weight === 'duotone' ? '-duotone' : weight === 'bold' ? '-bold' : ''} ph-${name} ${className}`} style={{ fontSize: size }}></i>
    );
    const Loader2 = (p) => <IconWrapper name="spinner" className="animate-spin" {...p} />;

    // Dekripsi Database EduLearn Terpusat
const _0xDbChunks = [
    "aHR0cHM6Ly9zY3JpcHQuZ29v",
    "Z2xlLmNvbS9tYWNyb3Mvcy9B",
    "S2Z5Y2J6RXdlUkQ2dTVmeGVH",
    "SEtOR0VJTFhZOWkzcXhibTdP",
    "QVlMZHRaeGxHdmdEOXhDb01D",
    "aUN3OGJDbmpDLXhad3cxbksv",
    "ZXhlYw=="
];
    const DEFAULT_SHEETS_URL = atob(_0xDbChunks.join(""));

    const formatVideoUrl = (rawUrl) => {
        if (!rawUrl) return "";
        let url = rawUrl.trim();
        try {
          if (url.includes('youtu.be/')) { const videoId = url.split('youtu.be/')[1].split('?')[0].split('&')[0]; return `https://www.youtube.com/embed/${videoId}`; }
          if (url.includes('youtube.com/watch')) { const urlObj = new URL(url); const videoId = urlObj.searchParams.get('v'); if (videoId) return `https://www.youtube.com/embed/${videoId}`; }
          if (url.includes('youtube.com/shorts/')) { const videoId = url.split('shorts/')[1].split('?')[0].split('&')[0]; return `https://www.youtube.com/embed/${videoId}`; }
          if (url.includes('drive.google.com/file/d/')) { const match = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/); if (match && match[1]) { return `https://drive.google.com/file/d/${match[1]}/preview`; } }
        } catch (e) {} return url;
    };

    function App() {
      const [loading, setLoading] = React.useState(true);
      const [error, setError] = React.useState(null);
      const [searchTerm, setSearchTerm] = React.useState("");
      
      const [instructorData, setInstructorData] = React.useState(null);
      const [instructorCourses, setInstructorCourses] = React.useState([]);
      const [previewCourse, setPreviewCourse] = React.useState(null);

      React.useEffect(() => {
          const queryParams = new URLSearchParams(window.location.search);
          const targetUsername = (queryParams.get("instructor") || "").trim();

          if (!targetUsername) {
              setError({ type: "invalid_url", message: "Tautan tidak valid. Format yang benar: kelas.html?instructor=username" });
              setLoading(false);
              return;
          }

          fetch(DEFAULT_SHEETS_URL + '?nocache=' + new Date().getTime())
            .then(res => { if(!res.ok) throw new Error(); return res.json(); })
            .then(data => {
                const admins = data.admins || [];
                const courses = data.courses || [];

                const inst = admins.find(a => String(a.username).toLowerCase() === targetUsername.toLowerCase());

                if (!inst) {
                    setError({ type: "not_found", message: `Instruktur dengan username "@${targetUsername}" tidak ditemukan.` });
                    setLoading(false);
                    return;
                }
                
                const isSuperAdmin = inst.isSuper === true || String(inst.isSuper).toLowerCase() === 'true' || inst.sSuper === true || String(inst.sSuper).toLowerCase() === 'true';
                const rawPromo = inst.allowPromo;
                const isPromoAllowed = rawPromo === true || rawPromo === 1 || String(rawPromo).trim().toLowerCase() === 'true' || String(rawPromo).trim() === '1' || String(rawPromo).trim().toLowerCase() === 'yes' || String(rawPromo).trim().toLowerCase() === 'y';
                const isPremium = isSuperAdmin || isPromoAllowed;

                if (!isPremium) {
                    setError({ type: "locked", message: "Halaman Katalog Pribadi ini belum diaktifkan oleh Pemilik Akun. Upgrade lisensi diperlukan." });
                    setLoading(false);
                    return;
                }

                const myCourses = courses.filter(c => String(c.authorId) === String(inst.id) && (c.isActive === true || c.isActive === 'true' || c.isActive === 'TRUE')).map(c => {
                    let parsedModules = [];
                    try { parsedModules = c.modules_json ? JSON.parse(c.modules_json) : (c.modules || []); } catch (e) { parsedModules = []; }
                    return { ...c, modules: parsedModules, totalModules: parsedModules.length };
                });

                setInstructorData(inst);
                setInstructorCourses(myCourses);
                setLoading(false);
                document.title = `Akademi ${inst.name} - EduLearn`;
            })
            .catch(() => {
                setError({ type: "network", message: "Gagal memuat pusat data. Periksa koneksi internet Anda." });
                setLoading(false);
            });
      }, []);

      if (loading) {
          return (
              <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50">
                  <div className="w-20 h-20 bg-indigo-100 text-indigo-600 rounded-3xl flex items-center justify-center mb-6 shadow-inner animate-pulse">
                      <IconWrapper name="storefront" size={40} weight="fill" />
                  </div>
                  <Loader2 size={32} className="text-indigo-500 mb-4" />
                  <p className="text-sm font-bold text-slate-500 tracking-wide">Menyiapkan Etalase Kelas Anda...</p>
              </div>
          );
      }

      if (error) {
          return (
              <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 p-6">
                  <div className="bg-white p-10 rounded-3xl shadow-xl border border-slate-100 max-w-md w-full text-center">
                      <div className={`w-20 h-20 mx-auto rounded-full flex items-center justify-center mb-6 shadow-inner ${error.type === 'locked' ? 'bg-amber-50 text-amber-500' : 'bg-rose-50 text-rose-500'}`}>
                          <IconWrapper name={error.type === 'locked' ? 'lock-key' : 'warning-octagon'} size={40} weight="fill" />
                      </div>
                      <h2 className="text-2xl font-black text-slate-900 mb-3">{error.type === 'locked' ? 'Akses Terkunci' : 'Terjadi Kesalahan'}</h2>
                      <p className="text-slate-500 text-sm font-medium leading-relaxed mb-8">{error.message}</p>
                      <a href="page-instruktur.html" className="inline-block w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3.5 rounded-xl transition shadow-md">Kembali ke Beranda</a>
                  </div>
              </div>
          );
      }

      // RADAR PENCARI NOMOR WA
      let rawWa = null;
      if (instructorData) {
          rawWa = instructorData.whatsapp || instructorData.WhatsApp || instructorData.wa;
          if (!rawWa) {
              const keys = Object.keys(instructorData);
              for (let k of keys) {
                  if (k.toLowerCase().includes('whatsapp') || k.toLowerCase().includes('wa')) {
                      rawWa = instructorData[k];
                      break;
                  }
              }
          }
      }
      const waNumber = (rawWa && String(rawWa).trim() !== "null" && String(rawWa).trim() !== "undefined") ? String(rawWa).replace(/[^0-9]/g, '') : "";

      const filteredCourses = instructorCourses.filter(c => 
          c.title.toLowerCase().includes(searchTerm.toLowerCase()) || 
          c.code.toLowerCase().includes(searchTerm.toLowerCase())
      );

      return (
          <div className="min-h-screen bg-slate-50 flex flex-col justify-between overflow-x-hidden hero-gradient relative">
              
              {/* Efek Cahaya Latar Belakang */}
              <div className="absolute top-0 left-1/2 -translate-x-1/2 w-full max-w-4xl h-[500px] bg-indigo-400/10 blur-[120px] -z-10 rounded-full pointer-events-none"></div>

              {/* MODAL SNEAK PEEK */}
              {previewCourse && (
                  <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 sm:p-6 bg-slate-900/80 backdrop-blur-md animate-[fadeIn_0.2s_ease-out]">
                      <div className="bg-white rounded-[2rem] w-full max-w-4xl shadow-2xl flex flex-col max-h-[95vh] overflow-hidden relative border border-slate-200">
                          <div className="p-5 md:p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50 shrink-0 relative z-20">
                              <div>
                                  <div className="flex items-center gap-2 mb-1">
                                      <IconWrapper name="sparkle" size={16} className="text-amber-500 animate-pulse" weight="fill" />
                                      <span className="text-[10px] font-black tracking-widest text-slate-500 uppercase">Intip Materi Kelas</span>
                                  </div>
                                  <h2 className="text-xl md:text-2xl font-black text-slate-900 tracking-tight truncate pr-4">{previewCourse.title}</h2>
                              </div>
                              <button onClick={() => setPreviewCourse(null)} className="w-10 h-10 bg-slate-200 hover:bg-rose-100 hover:text-rose-600 rounded-full flex items-center justify-center text-slate-600 transition shrink-0">
                                  <IconWrapper name="x" size={20} weight="bold"/>
                              </button>
                          </div>

                          <div className="flex-1 overflow-y-auto p-5 md:p-8 bg-white relative z-10">
                              {previewCourse.modules && previewCourse.modules.length > 0 ? (
                                  <div className="mb-10">
                                      <h3 className="text-sm font-bold text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-2">
                                          <IconWrapper name="play-circle" size={18} weight="fill" className="text-indigo-400" /> Trailer Pembuka
                                      </h3>
                                      <div className="relative w-full rounded-2xl overflow-hidden shadow-lg bg-slate-900 ring-2 ring-indigo-50 aspect-video group">
                                          <iframe 
                                              src={formatVideoUrl(previewCourse.modules[0].videoUrl)} 
                                              title="Video Cuplikan" 
                                              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                                              allowFullScreen 
                                              className="absolute top-0 left-0 w-full h-full border-0"
                                          ></iframe>
                                      </div>
                                  </div>
                              ) : (
                                  <div className="mb-10 p-10 bg-slate-50 rounded-2xl text-center border-2 border-dashed border-slate-200">
                                      <IconWrapper name="video-camera-slash" size={48} className="mx-auto text-slate-300 mb-3" />
                                      <p className="text-slate-500 font-bold">Instruktur belum mengupload video pembuka.</p>
                                  </div>
                              )}

                              <div className="bg-gradient-to-br from-slate-50 to-white rounded-3xl p-6 md:p-8 border border-slate-100 shadow-sm">
                                  <div className="flex items-center gap-3 mb-6 border-b border-slate-100 pb-4">
                                      <div className="w-10 h-10 bg-indigo-100 text-indigo-600 rounded-xl flex items-center justify-center"><IconWrapper name="list-dashes" size={20} weight="bold"/></div>
                                      <h3 className="text-lg md:text-xl font-extrabold text-slate-800">Silabus & Kurikulum</h3>
                                  </div>
                                  
                                  <div className="space-y-4">
                                      {previewCourse.modules && previewCourse.modules.length > 0 ? (
                                          previewCourse.modules.map((mod, i) => (
                                              <div key={i} className="bg-white p-5 md:p-6 rounded-2xl border border-slate-100 shadow-sm flex gap-4 sm:gap-5 items-start hover:border-indigo-200 hover:shadow-md transition-all">
                                                  <div className="w-10 h-10 sm:w-12 sm:h-12 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center font-black text-lg shrink-0 shadow-inner">
                                                      {i + 1}
                                                  </div>
                                                  <div className="flex-1 mt-0.5">
                                                      <h4 className="font-bold text-slate-900 text-base md:text-lg mb-2 leading-tight">{mod.title}</h4>
                                                      <p className="text-sm text-slate-500 leading-relaxed">{mod.description || "Materi eksklusif tersembunyi di dalam kelas. Daftar untuk membuka."}</p>
                                                  </div>
                                              </div>
                                          ))
                                      ) : (
                                          <p className="text-slate-500 text-sm italic text-center py-4">Silabus sedang disusun oleh instruktur.</p>
                                      )}
                                  </div>
                              </div>
                          </div>

                          <div className="p-5 md:p-6 border-t border-slate-100 bg-white shrink-0 relative z-20">
                              <p className="text-center text-xs font-bold text-rose-500 mb-3 animate-pulse flex items-center justify-center gap-1">
                                  <IconWrapper name="lightning" size={14} weight="fill" /> Kuota kelas ini cepat penuh! Amankan kursi Anda sekarang.
                              </p>
                              {waNumber ? (
                                  <a 
                                      href={`https://wa.me/${waNumber}?text=Halo%20Mentor%20${encodeURIComponent(instructorData.name)},%20setelah%20melihat%20preview%20dan%20silabusnya,%20saya%20sangat%20tertarik%20untuk%20mendaftar%20kelas%20*${encodeURIComponent(previewCourse.title)}*.%20Bagaimana%20prosedurnya?`}
                                      target="_blank" 
                                      rel="noopener noreferrer" 
                                      className="w-full bg-gradient-to-r from-emerald-500 to-emerald-600 hover:from-emerald-600 hover:to-emerald-700 text-white py-4 rounded-xl text-sm sm:text-base font-black flex justify-center items-center gap-2 shadow-lg shadow-emerald-500/30 transition-all transform hover:-translate-y-0.5 active:scale-95"
                                  >
                                      <IconWrapper name="whatsapp-logo" size={24} weight="fill" className="animate-bounce" style={{animationDuration: '2s'}} />
                                      <span>Daftar Sekarang via WhatsApp</span>
                                  </a>
                              ) : (
                                  <button disabled className="w-full bg-slate-100 text-rose-500 py-4 rounded-xl text-sm font-bold cursor-not-allowed">
                                      <IconWrapper name="warning-circle" size={24} />
                                      WA Tidak Ditemukan (Cek Server GAS)
                                  </button>
                              )}
                          </div>
                      </div>
                  </div>
              )}

              {/* Navbar */}
              <nav className="w-full bg-white/60 backdrop-blur-xl border-b border-white/50 sticky top-0 z-40 shadow-sm">
                <div className="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
                  <div className="flex items-center text-indigo-600">
                    <div className="w-10 h-10 bg-gradient-to-br from-indigo-500 to-blue-600 text-white rounded-xl flex items-center justify-center mr-3 shadow-md shadow-indigo-200">
                      <IconWrapper name="graduation-cap" size={22} weight="fill" />
                    </div>
                    <span className="font-extrabold text-xl tracking-tight text-slate-900">EduLearn</span>
                  </div>
                  <a href="page-siswa.html" className="text-xs sm:text-sm font-bold text-slate-500 hover:text-indigo-600 transition flex items-center gap-1.5 bg-white px-4 py-2 rounded-full shadow-sm border border-slate-100">
                      <span className="hidden sm:inline">Portal Siswa</span> <IconWrapper name="arrow-right" size={16} weight="bold" />
                  </a>
                </div>
              </nav>

              {/* Hero Banner dengan Copywriting Promosi */}
              <header className="max-w-4xl mx-auto px-6 pt-20 pb-16 text-center w-full">
                  <div className="inline-flex items-center gap-1.5 px-5 py-2 rounded-full bg-emerald-50 border border-emerald-200 text-emerald-700 font-bold text-xs mb-6 shadow-sm uppercase tracking-widest animate-float">
                      <IconWrapper name="seal-check" size={16} weight="fill" /> Kreator & Mentor Terverifikasi
                  </div>
                  
                  <h1 className="text-4xl md:text-6xl font-black text-slate-900 tracking-tight leading-tight mb-6">
                      Belajar Langsung dari <br className="hidden md:block"/>
                      <span className="text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-blue-500 relative inline-block">
                          Akademi {instructorData.name}
                          <svg className="absolute -bottom-2 left-0 w-full h-3 text-indigo-200 -z-10 opacity-70" viewBox="0 0 100 20" preserveAspectRatio="none"><path d="M0,10 Q50,20 100,10" stroke="currentColor" strokeWidth="8" fill="none"/></svg>
                      </span>
                  </h1>
                  
                  <div className="bg-white/60 backdrop-blur-sm border border-slate-200 p-6 rounded-2xl mb-10 shadow-sm max-w-2xl mx-auto transform -rotate-1 hover:rotate-0 transition-transform duration-300">
                      <p className="text-base md:text-lg text-slate-700 font-semibold leading-relaxed">
                          "Investasi terbaik adalah leher ke atas. Tingkatkan <span className="text-indigo-600">Skill</span> Anda hari ini, dan wujudkan karir impian di masa depan bersama mentor berpengalaman."
                      </p>
                      <p className="text-sm font-black text-slate-400 mt-3 uppercase tracking-widest">
                          — @{instructorData.username}
                      </p>
                  </div>

                  <div className="max-w-lg mx-auto relative shadow-xl shadow-indigo-100/50 rounded-2xl group">
                      <div className="absolute inset-y-0 left-0 pl-5 flex items-center text-indigo-400 pointer-events-none transition-colors group-focus-within:text-indigo-600">
                          <IconWrapper name="magnifying-glass" size={20} weight="bold" />
                      </div>
                      <input 
                          type="text" 
                          value={searchTerm}
                          onChange={e => setSearchTerm(e.target.value)}
                          placeholder="Mau belajar apa hari ini? Cari kelas..." 
                          className="w-full pl-12 pr-6 py-4 bg-white border-2 border-transparent rounded-2xl outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 transition-all font-semibold text-base text-slate-800 shadow-sm"
                      />
                  </div>
              </header>

              <main className="max-w-7xl mx-auto px-6 pb-24 flex-1 w-full relative z-10">
                  <div className="flex flex-col sm:flex-row items-center justify-between mb-10 border-b border-slate-200 pb-4 gap-4">
                      <h2 className="font-extrabold text-2xl text-slate-800 flex items-center gap-3">
                          <IconWrapper name="fire" size={28} className="text-rose-500 animate-pulse" weight="fill"/> 
                          Katalog Kelas Eksklusif
                      </h2>
                      <span className="text-sm font-black text-indigo-600 bg-indigo-50 px-4 py-2 rounded-xl border border-indigo-100 shadow-sm">
                          {instructorCourses.length} Kelas Tersedia
                      </span>
                  </div>

                  {filteredCourses.length === 0 ? (
                      <div className="text-center py-20 bg-white/60 backdrop-blur-sm rounded-[2rem] border-2 border-dashed border-slate-300 max-w-xl mx-auto shadow-sm">
                          <div className="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center text-slate-400 mx-auto mb-5">
                              <IconWrapper name="empty" size={36} weight="duotone" />
                          </div>
                          <h4 className="font-extrabold text-slate-700 text-xl mb-2">Oops, Kelas Tidak Ditemukan</h4>
                          <p className="text-slate-500 text-sm max-w-sm mx-auto">Mungkin salah ketik? Atau instruktur ini sedang meracik materi baru untuk Anda.</p>
                      </div>
                  ) : (
                      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                          {filteredCourses.map((course, index) => (
                              <div 
                                key={course.id} 
                                className="bg-white rounded-[2rem] border border-slate-100 shadow-lg shadow-slate-200/50 hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-2 flex flex-col justify-between h-full p-7 md:p-8 overflow-hidden relative group animate-fade-in-up"
                                style={{ animationDelay: `${index * 150}ms` }}
                              >
                                  {/* Badge Premium */}
                                  <div className="absolute top-6 right-6 bg-gradient-to-r from-amber-400 to-orange-500 text-white text-[10px] font-black uppercase tracking-widest px-3 py-1.5 rounded-lg shadow-md transform rotate-3 z-20">
                                      ✨ Premium
                                  </div>

                                  <div className="absolute top-0 right-0 w-32 h-32 bg-indigo-50/50 rounded-bl-full -mr-10 -mt-10 z-0 transition-transform duration-500 group-hover:scale-110"></div>
                                  
                                  <div className="relative z-10 flex-1">
                                      <div className="flex items-center gap-2 mb-5">
                                          <span className="font-mono text-xs font-black tracking-widest bg-slate-800 text-white px-3 py-1.5 rounded-lg uppercase shadow-sm">
                                              {course.code}
                                          </span>
                                          <span className="text-[11px] font-bold bg-indigo-50 text-indigo-600 px-3 py-1.5 rounded-lg flex items-center gap-1.5 border border-indigo-100">
                                              <IconWrapper name="video-camera" size={14} weight="fill"/> {course.totalModules} Materi Padat
                                          </span>
                                      </div>

                                      <h3 className="text-2xl font-black text-slate-900 group-hover:text-indigo-600 transition-colors leading-snug mb-6 pr-6">
                                          {course.title}
                                      </h3>
                                  </div>

                                  <div className="space-y-3 relative z-10 pt-5 border-t border-slate-100 mt-auto">
                                      <button 
                                          onClick={() => setPreviewCourse(course)} 
                                          className="w-full bg-slate-50 hover:bg-indigo-50 text-slate-700 hover:text-indigo-700 py-3.5 rounded-xl text-sm font-bold flex justify-center items-center gap-2 transition-all border border-slate-200 hover:border-indigo-200"
                                      >
                                          <IconWrapper name="eye" size={20} weight="bold" />
                                          <span>Lihat Silabus & Trailer</span>
                                      </button>
                                      
                                      {waNumber ? (
                                          <a 
                                              href={`https://wa.me/${waNumber}?text=Halo%20Mentor%20${encodeURIComponent(instructorData.name)},%20saya%20sangat%20tertarik%20untuk%20mendaftar%20kelas%20*${encodeURIComponent(course.title)}*%20(${encodeURIComponent(course.code)}).%20Apakah%20masih%20ada%20kuota?`}
                                              target="_blank" 
                                              rel="noopener noreferrer" 
                                              className="w-full bg-gradient-to-r from-emerald-500 to-emerald-600 hover:from-emerald-600 hover:to-emerald-700 text-white py-3.5 rounded-xl text-sm font-black flex justify-center items-center gap-2 shadow-lg shadow-emerald-500/30 transition-all transform hover:-translate-y-0.5"
                                          >
                                              <IconWrapper name="whatsapp-logo" size={20} weight="fill" className="animate-pulse" />
                                              <span>Tanya Kuota via WA</span>
                                          </a>
                                      ) : (
                                          <button disabled className="w-full bg-slate-100 text-slate-400 py-3.5 rounded-xl text-sm font-bold flex justify-center items-center gap-2 cursor-not-allowed">
                                              <IconWrapper name="warning-circle" size={18} />
                                              <span>WA Error (Hubungi Admin)</span>
                                          </button>
                                      )}
                                  </div>
                              </div>
                          ))}
                      </div>

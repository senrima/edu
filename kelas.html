<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Etalase Akademi - EduLearn</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .hero-gradient { background: radial-gradient(circle at top right, #e0e7ff, transparent 45%), radial-gradient(circle at bottom left, #ecfdf5, transparent 45%); }
  </style>
</head>
<body class="text-slate-800 antialiased overflow-x-hidden">
  <div id="root"></div>

  <script type="text/babel">
    const IconWrapper = ({ name, size = 24, className = "", weight="regular" }) => (
      <i className={`ph${weight === 'fill' ? '-fill' : weight === 'duotone' ? '-duotone' : weight === 'bold' ? '-bold' : ''} ph-${name} ${className}`} style={{ fontSize: size }}></i>
    );
    const Loader2 = (p) => <IconWrapper name="spinner" className="animate-spin" {...p} />;

    // Dekripsi Database EduLearn Terpusat
const _0xDbChunks = [
    "aHR0cHM6Ly9zY3JpcHQuZ29v",
    "Z2xlLmNvbS9tYWNyb3Mvcy9B",
    "S2Z5Y2J4OEl1ZmZsMF9OOU9r",
    "alV2d1BjYUNkVFlCUUZWdEp1",
    "WXdLVV90UUktLUpHVFQySXY2",
    "bW9HVElEeVc4bk5jaHVFMVEv",
    "ZXhlYw=="
];
    const DEFAULT_SHEETS_URL = atob(_0xDbChunks.join(""));

    // Fungsi Format URL Video
    const formatVideoUrl = (rawUrl) => {
        if (!rawUrl) return "";
        let url = rawUrl.trim();
        try {
          if (url.includes('youtu.be/')) { const videoId = url.split('youtu.be/')[1].split('?')[0].split('&')[0]; return `https://www.youtube.com/embed/${videoId}`; }
          if (url.includes('youtube.com/watch')) { const urlObj = new URL(url); const videoId = urlObj.searchParams.get('v'); if (videoId) return `https://www.youtube.com/embed/${videoId}`; }
          if (url.includes('youtube.com/shorts/')) { const videoId = url.split('shorts/')[1].split('?')[0].split('&')[0]; return `https://www.youtube.com/embed/${videoId}`; }
          if (url.includes('drive.google.com/file/d/')) { const match = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/); if (match && match[1]) { return `https://drive.google.com/file/d/${match[1]}/preview`; } }
        } catch (e) {} return url;
    };

    function App() {
      const [loading, setLoading] = React.useState(true);
      const [error, setError] = React.useState(null);
      const [searchTerm, setSearchTerm] = React.useState("");
      
      const [instructorData, setInstructorData] = React.useState(null);
      const [instructorCourses, setInstructorCourses] = React.useState([]);
      
      const [previewCourse, setPreviewCourse] = React.useState(null);

      React.useEffect(() => {
          const queryParams = new URLSearchParams(window.location.search);
          const targetUsername = (queryParams.get("instructor") || "").trim();

          if (!targetUsername) {
              setError({ type: "invalid_url", message: "Tautan tidak valid. Format yang benar: promo.html?instructor=username" });
              setLoading(false);
              return;
          }

          fetch(DEFAULT_SHEETS_URL + '?nocache=' + new Date().getTime())
            .then(res => { if(!res.ok) throw new Error(); return res.json(); })
            .then(data => {
                const admins = data.admins || [];
                const courses = data.courses || [];

                const inst = admins.find(a => String(a.username).toLowerCase() === targetUsername.toLowerCase());

                if (!inst) {
                    setError({ type: "not_found", message: `Instruktur dengan username "@${targetUsername}" tidak ditemukan.` });
                    setLoading(false);
                    return;
                }
                
                // Cek Super Admin & Premium
                const isSuperAdmin = inst.isSuper === true || String(inst.isSuper).toLowerCase() === 'true' || inst.sSuper === true || String(inst.sSuper).toLowerCase() === 'true';
                const rawPromo = inst.allowPromo;
                const isPromoAllowed = rawPromo === true || rawPromo === 1 || String(rawPromo).trim().toLowerCase() === 'true' || String(rawPromo).trim() === '1' || String(rawPromo).trim().toLowerCase() === 'yes';
                const isPremium = isSuperAdmin || isPromoAllowed;

                if (!isPremium) {
                    setError({ type: "locked", message: "Halaman Katalog Pribadi ini belum diaktifkan oleh Pemilik Akun. Upgrade lisensi diperlukan." });
                    setLoading(false);
                    return;
                }

                const myCourses = courses.filter(c => String(c.authorId) === String(inst.id) && (c.isActive === true || c.isActive === 'true' || c.isActive === 'TRUE')).map(c => {
                    let parsedModules = [];
                    try { parsedModules = c.modules_json ? JSON.parse(c.modules_json) : (c.modules || []); } catch (e) { parsedModules = []; }
                    return { ...c, modules: parsedModules, totalModules: parsedModules.length };
                });

                setInstructorData(inst);
                setInstructorCourses(myCourses);
                setLoading(false);
                document.title = `Akademi ${inst.name} - EduLearn`;
            })
            .catch(() => {
                setError({ type: "network", message: "Gagal memuat pusat data. Periksa koneksi internet Anda." });
                setLoading(false);
            });
      }, []);

      if (loading) {
          return (
              <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50">
                  <div className="w-20 h-20 bg-indigo-100 text-indigo-600 rounded-3xl flex items-center justify-center mb-6 shadow-inner animate-pulse">
                      <IconWrapper name="storefront" size={40} weight="fill" />
                  </div>
                  <Loader2 size={32} className="text-indigo-500 mb-4" />
                  <p className="text-sm font-bold text-slate-500 tracking-wide">Mempersiapkan Halaman Etalase...</p>
              </div>
          );
      }

      if (error) {
          return (
              <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 p-6">
                  <div className="bg-white p-10 rounded-3xl shadow-xl border border-slate-100 max-w-md w-full text-center">
                      <div className={`w-20 h-20 mx-auto rounded-full flex items-center justify-center mb-6 shadow-inner ${error.type === 'locked' ? 'bg-amber-50 text-amber-500' : 'bg-rose-50 text-rose-500'}`}>
                          <IconWrapper name={error.type === 'locked' ? 'lock-key' : 'warning-octagon'} size={40} weight="fill" />
                      </div>
                      <h2 className="text-2xl font-black text-slate-900 mb-3">{error.type === 'locked' ? 'Akses Terkunci' : 'Terjadi Kesalahan'}</h2>
                      <p className="text-slate-500 text-sm font-medium leading-relaxed mb-8">{error.message}</p>
                      <a href="page.html" className="inline-block w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3.5 rounded-xl transition shadow-md">Kembali ke Beranda</a>
                  </div>
              </div>
          );
      }

      const filteredCourses = instructorCourses.filter(c => 
          c.title.toLowerCase().includes(searchTerm.toLowerCase()) || 
          c.code.toLowerCase().includes(searchTerm.toLowerCase())
      );

      // ==============================================================================
      // BUG FIX: PENGECEKAN WA SUPER AMAN (Ubah format apapun jadi string rapi)
      // ==============================================================================
      const rawWa = instructorData.whatsapp;
      const waNumber = (rawWa && rawWa !== "null" && rawWa !== "undefined") ? String(rawWa).replace(/[^0-9]/g, '') : "";

      return (
          <div className="min-h-screen bg-slate-50 flex flex-col justify-between overflow-x-hidden hero-gradient">
              
              {/* MODAL SNEAK PEEK (Lihat Sekilas Kelas) */}
              {previewCourse && (
                  <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 sm:p-6 bg-slate-900/80 backdrop-blur-sm animate-[fadeIn_0.2s_ease-out]">
                      <div className="bg-white rounded-[2rem] w-full max-w-4xl shadow-2xl flex flex-col max-h-[95vh] overflow-hidden relative">
                          
                          {/* Header Modal */}
                          <div className="p-5 md:p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50 shrink-0 relative z-20">
                              <div>
                                  <div className="flex items-center gap-2 mb-1">
                                      <IconWrapper name="sparkle" size={16} className="text-amber-500" weight="fill" />
                                      <span className="text-[10px] font-black tracking-widest text-slate-500 uppercase">Preview Kelas</span>
                                  </div>
                                  <h2 className="text-xl md:text-2xl font-black text-slate-900 tracking-tight truncate pr-4">{previewCourse.title}</h2>
                              </div>
                              <button onClick={() => setPreviewCourse(null)} className="w-10 h-10 bg-slate-200 hover:bg-rose-100 hover:text-rose-600 rounded-full flex items-center justify-center text-slate-600 transition shrink-0">
                                  <IconWrapper name="x" size={20} weight="bold"/>
                              </button>
                          </div>

                          {/* Konten Scrollable */}
                          <div className="flex-1 overflow-y-auto p-5 md:p-8 bg-white relative z-10">
                              
                              {/* 1. Video Player */}
                              {previewCourse.modules && previewCourse.modules.length > 0 ? (
                                  <div className="mb-10">
                                      <h3 className="text-sm font-bold text-slate-400 uppercase tracking-widest mb-3">Trailer / Modul Pembuka:</h3>
                                      <div className="relative w-full rounded-2xl overflow-hidden shadow-lg bg-slate-900 ring-1 ring-slate-200 aspect-video">
                                          <iframe 
                                              src={formatVideoUrl(previewCourse.modules[0].videoUrl)} 
                                              title="Video Cuplikan" 
                                              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                                              allowFullScreen 
                                              className="absolute top-0 left-0 w-full h-full border-0"
                                          ></iframe>
                                      </div>
                                  </div>
                              ) : (
                                  <div className="mb-10 p-10 bg-slate-50 rounded-2xl text-center border-2 border-dashed border-slate-200">
                                      <IconWrapper name="video-camera-slash" size={48} className="mx-auto text-slate-300 mb-3" />
                                      <p className="text-slate-500 font-bold">Instruktur belum mengupload video pembuka.</p>
                                  </div>
                              )}

                              {/* 2. Daftar Silabus */}
                              <div className="bg-slate-50 rounded-3xl p-6 md:p-8 border border-slate-100">
                                  <div className="flex items-center gap-3 mb-6 border-b border-slate-200 pb-4">
                                      <div className="w-10 h-10 bg-indigo-100 text-indigo-600 rounded-xl flex items-center justify-center"><IconWrapper name="list-dashes" size={20} weight="bold"/></div>
                                      <h3 className="text-lg md:text-xl font-extrabold text-slate-800">Silabus & Materi Pembelajaran</h3>
                                  </div>
                                  
                                  <div className="space-y-4">
                                      {previewCourse.modules && previewCourse.modules.length > 0 ? (
                                          previewCourse.modules.map((mod, i) => (
                                              <div key={i} className="bg-white p-5 md:p-6 rounded-2xl border border-slate-100 shadow-sm flex gap-4 sm:gap-5 items-start hover:border-indigo-200 transition-colors">
                                                  <div className="w-10 h-10 sm:w-12 sm:h-12 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center font-black text-lg shrink-0 shadow-inner">
                                                      {i + 1}
                                                  </div>
                                                  <div className="flex-1 mt-0.5">
                                                      <h4 className="font-bold text-slate-900 text-base md:text-lg mb-2 leading-tight">{mod.title}</h4>
                                                      <p className="text-sm text-slate-500 leading-relaxed">{mod.description || "Materi eksklusif di dalam kelas."}</p>
                                                  </div>
                                              </div>
                                          ))
                                      ) : (
                                          <p className="text-slate-500 text-sm italic text-center py-4">Silabus sedang disusun oleh instruktur.</p>
                                      )}
                                  </div>
                              </div>
                          </div>

                          {/* Footer CTA Modal */}
                          <div className="p-5 md:p-6 border-t border-slate-100 bg-white shrink-0 relative z-20">
                              {waNumber ? (
                                  <a 
                                      href={`https://wa.me/${waNumber}?text=Halo%20Mentor%20${encodeURIComponent(instructorData.name)},%20setelah%20melihat%20preview%20dan%20silabusnya,%20saya%20tertarik%20untuk%20mendaftar%20kelas%20*${encodeURIComponent(previewCourse.title)}*.%20Bagaimana%20prosedurnya?`}
                                      target="_blank" 
                                      rel="noopener noreferrer" 
                                      className="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-xl text-sm sm:text-base font-black flex justify-center items-center gap-2 shadow-lg shadow-emerald-200 transition transform active:scale-95"
                                  >
                                      <IconWrapper name="whatsapp-logo" size={24} weight="fill" />
                                      <span>Mulai Belajar? Daftar via WhatsApp Sekarang</span>
                                  </a>
                              ) : (
                                  <button disabled className="w-full bg-slate-100 text-slate-400 py-4 rounded-xl text-sm font-bold cursor-not-allowed">
                                      <IconWrapper name="whatsapp-logo" size={24} />
                                      WA Mentor Belum Set
                                  </button>
                              )}
                          </div>
                      </div>
                  </div>
              )}
              {/* END MODAL SNEAK PEEK */}


              {/* Navbar */}
              <nav className="w-full bg-white/80 backdrop-blur-md border-b sticky top-0 z-40">
                <div className="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
                  <div className="flex items-center text-indigo-600">
                    <div className="w-10 h-10 bg-indigo-100 rounded-xl flex items-center justify-center mr-3 shadow-inner">
                      <IconWrapper name="book-open" size={22} weight="fill" />
                    </div>
                    <span className="font-extrabold text-xl tracking-tight text-slate-900">EduLearn</span>
                  </div>
                  <a href="page-siswa.html" className="text-xs sm:text-sm font-bold text-slate-600 hover:text-indigo-600 transition flex items-center gap-1.5"><IconWrapper name="arrow-right" size={16} weight="bold" /> <span className="hidden sm:inline">Portal Siswa</span></a>
                </div>
              </nav>

              {/* Hero Banner Khusus Instruktur */}
              <header className="max-w-7xl mx-auto px-6 pt-12 pb-10 text-center w-full">
                  <div className="w-24 h-24 bg-gradient-to-br from-indigo-500 to-blue-600 text-white rounded-full flex items-center justify-center mx-auto mb-6 shadow-xl shadow-indigo-200 text-3xl font-black border-4 border-white">
                      {instructorData.name.charAt(0).toUpperCase()}
                  </div>
                  <div className="inline-flex items-center gap-1.5 px-4 py-1.5 rounded-full bg-emerald-50 border border-emerald-100 text-emerald-700 font-bold text-[10px] sm:text-xs mb-4 shadow-sm uppercase tracking-widest">
                      <IconWrapper name="seal-check" size={14} weight="fill" /> Kreator Terverifikasi
                  </div>
                  <h1 className="text-3xl md:text-5xl font-black text-slate-900 tracking-tight leading-tight mb-3">
                      Akademi <span className="text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-blue-500">{instructorData.name}</span>
                  </h1>
                  <p className="text-sm md:text-base text-slate-500 font-medium mb-8">
                      @{instructorData.username}
                  </p>

                  <div className="max-w-md mx-auto relative shadow-sm">
                      <div className="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400 pointer-events-none">
                          <IconWrapper name="magnifying-glass" size={18} weight="bold" />
                      </div>
                      <input 
                          type="text" 
                          value={searchTerm}
                          onChange={e => setSearchTerm(e.target.value)}
                          placeholder="Cari kelas yang tersedia..." 
                          className="w-full pl-11 pr-4 py-3.5 bg-white border border-slate-200 rounded-2xl outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-50 transition-all font-medium text-sm text-slate-800 shadow-sm"
                      />
                  </div>
              </header>

              {/* Daftar Kelas Instruktur */}
              <main className="max-w-7xl mx-auto px-6 pb-24 flex-1 w-full">
                  <div className="flex items-center justify-between mb-6 border-b border-slate-200 pb-4">
                      <h2 className="font-extrabold text-xl text-slate-800 flex items-center gap-2"><IconWrapper name="stack" size={24} className="text-indigo-500" weight="fill"/> Etalase Kelas Aktif</h2>
                      <span className="text-sm font-bold text-slate-500 bg-slate-100 px-3 py-1 rounded-lg">{instructorCourses.length} Kelas</span>
                  </div>

                  {filteredCourses.length === 0 ? (
                      <div className="text-center py-20 bg-white/60 backdrop-blur-sm rounded-[2rem] border-2 border-dashed border-slate-200 max-w-xl mx-auto shadow-inner">
                          <div className="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center text-slate-400 mx-auto mb-4">
                              <IconWrapper name="book-open" size={28} />
                          </div>
                          <h4 className="font-extrabold text-slate-700 text-lg">Belum Ada Kelas</h4>
                          <p className="text-slate-400 text-xs mt-1 max-w-xs mx-auto">Instruktur ini belum mempublikasikan kelas atau tidak ada yang cocok dengan pencarian Anda.</p>
                      </div>
                  ) : (
                      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 lg:gap-8">
                          {filteredCourses.map(course => (
                              <div key={course.id} className="bg-white rounded-[2rem] border border-slate-100 shadow-sm hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 flex flex-col justify-between h-full p-6 md:p-8 overflow-hidden relative group">
                                  <div className="absolute top-0 right-0 w-24 h-24 bg-indigo-50 rounded-bl-full -mr-6 -mt-6 z-0 transition-transform group-hover:scale-105"></div>
                                  
                                  <div className="relative z-10 flex-1">
                                      <div className="flex items-center gap-2 mb-4">
                                          <span className="font-mono text-xs font-black tracking-widest bg-indigo-50 text-indigo-700 px-3 py-1.5 rounded-lg uppercase border border-indigo-100 shadow-sm">{course.code}</span>
                                          <span className="text-[10px] font-bold bg-slate-100 text-slate-500 px-2.5 py-1.5 rounded-lg flex items-center gap-1"><IconWrapper name="video-camera" size={12} weight="fill"/> {course.totalModules} Modul</span>
                                      </div>

                                      <h3 className="text-xl font-black text-slate-900 group-hover:text-indigo-600 transition-colors leading-tight mb-6 pr-6">{course.title}</h3>
                                  </div>

                                  <div className="space-y-3 relative z-10 pt-4 border-t border-slate-100 mt-auto">
                                      
                                      <button 
                                          onClick={() => setPreviewCourse(course)} 
                                          className="w-full bg-indigo-50 hover:bg-indigo-100 text-indigo-700 py-3.5 rounded-xl text-sm font-bold flex justify-center items-center gap-2 transition active:scale-95 border border-indigo-100"
                                      >
                                          <IconWrapper name="play-circle" size={20} weight="fill" />
                                          <span>Lihat Sekilas Kelas</span>
                                      </button>
                                      
                                      {waNumber ? (
                                          <a 
                                              href={`https://wa.me/${waNumber}?text=Halo%20Mentor%20${encodeURIComponent(instructorData.name)},%20saya%20tertarik%20untuk%20mendaftar%20kelas%20*${encodeURIComponent(course.title)}*%20(${encodeURIComponent(course.code)}).%20Bagaimana%20prosedurnya?`}
                                              target="_blank" 
                                              rel="noopener noreferrer" 
                                              className="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-3.5 rounded-xl text-sm font-black flex justify-center items-center gap-2 shadow-md shadow-emerald-100 transition transform active:scale-95"
                                          >
                                              <IconWrapper name="whatsapp-logo" size={18} weight="fill" />
                                              <span>Daftar via WhatsApp</span>
                                          </a>
                                      ) : (
                                          <button disabled className="w-full bg-slate-100 text-slate-400 py-3.5 rounded-xl text-sm font-bold flex justify-center items-center gap-2 cursor-not-allowed">
                                              <IconWrapper name="whatsapp-logo" size={18} />
                                              <span>WA Mentor Belum Set</span>
                                          </button>
                                      )}
                                  </div>

                              </div>
                          ))}
                      </div>
                  )}
              </main>

              {/* Footer */}
              <footer className="w-full bg-slate-900 py-10 text-center text-white text-xs font-mono tracking-widest shrink-0 border-t border-slate-800">
                  © 2026 S-TOOLS.ID • EDULEARN CREATOR SHOWCASE
              </footer>

          </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

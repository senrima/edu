<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduLearn by SenTools - LMS Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .glass-panel { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    @media print {
        body { background-color: #ffffff; }
        .no-print { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">

    // URL Google Apps Script yang Di-enkripsi (Tujuan: ...7Yir/exec)
const _0xDbChunks = [
    "aHR0cHM6Ly9zY3JpcHQuZ29v",
    "Z2xlLmNvbS9tYWNyb3Mvcy9B",
    "S2Z5Y2J5Qk5OODNQcmJfUGVW",
    "OTJmVHRRUmFaQjBrV1dfV2Ff",
    "ZldmbFFfUjhvNGdSWVBLR2Jz",
    "enlrMHBWWXZmV0JVQ1hPd0Qv",
    "ZXhlYw=="
];
    const DEFAULT_SHEETS_URL = atob(_0xDbChunks.join(""));

    if (localStorage.getItem('edu_sheets_url') !== DEFAULT_SHEETS_URL) {
        localStorage.setItem('edu_sheets_url', DEFAULT_SHEETS_URL);
    }

    const IconWrapper = ({ name, size = 24, className = "", weight="regular" }) => <i className={`ph${weight === 'fill' ? '-fill' : weight === 'duotone' ? '-duotone' : weight === 'bold' ? '-bold' : ''} ph-${name} ${className}`} style={{ fontSize: size }}></i>;
    const PlayCircle = (p) => <IconWrapper name="play-circle" {...p} />;
    const Download = (p) => <IconWrapper name="download" {...p} />;
    const Menu = (p) => <IconWrapper name="list" {...p} />;
    const X = (p) => <IconWrapper name="x" {...p} />;
    const BookOpen = (p) => <IconWrapper name="book-open" {...p} />;
    const Video = (p) => <IconWrapper name="video" {...p} />;
    const CheckCircle2 = (p) => <IconWrapper name="check-circle" {...p} />;
    const ChevronRight = (p) => <IconWrapper name="caret-right" {...p} />;
    const Loader2 = (p) => <IconWrapper name="spinner" className="animate-spin" {...p} />;
    const MessageSquare = (p) => <IconWrapper name="chat-circle" {...p} />;
    const Lock = (p) => <IconWrapper name="lock" {...p} />;
    const Key = (p) => <IconWrapper name="key" {...p} />;
    const LogOut = (p) => <IconWrapper name="sign-out" {...p} />;
    const PlusCircle = (p) => <IconWrapper name="plus-circle" {...p} />;
    const Database = (p) => <IconWrapper name="database" {...p} />;
    const Trash2 = (p) => <IconWrapper name="trash" {...p} />;
    const Award = (p) => <IconWrapper name="medal" {...p} />;
    const Bell = (p) => <IconWrapper name="bell" {...p} />;
    const Users = (p) => <IconWrapper name="users" {...p} />;
    const Book = (p) => <IconWrapper name="book" {...p} />;
    const GraduationCap = (p) => <IconWrapper name="graduation-cap" {...p} />;
    const AlertCircle = (p) => <IconWrapper name="warning-circle" {...p} />;
    const ArrowLeft = (p) => <IconWrapper name="arrow-left" {...p} />;
    const RefreshCw = (p) => <IconWrapper name="arrows-clockwise" {...p} />;
    const UserIcon = (p) => <IconWrapper name="user" {...p} />;
    const ShieldCheck = (p) => <IconWrapper name="shield-check" {...p} />;
    const Coffee = (p) => <IconWrapper name="coffee" {...p} />;
    const CheckSquareOffset = (p) => <IconWrapper name="check-square-offset" {...p} />;
    const Heart = (p) => <IconWrapper name="heart" {...p} />;
    const EnvelopeSimple = (p) => <IconWrapper name="envelope-simple" {...p} />;
    const ToggleLeft = (p) => <IconWrapper name="toggle-left" {...p} />;
    const ToggleRight = (p) => <IconWrapper name="toggle-right" {...p} />;
    const Article = (p) => <IconWrapper name="article" {...p} />;
    const Sparkle = (p) => <IconWrapper name="sparkle" {...p} />;
    const MagnifyingGlass = (p) => <IconWrapper name="magnifying-glass" {...p} />;

    const initialAdmins = [];
    const initialCourses = [];
    const initialParticipants = [];
    const initialEnrollments = [];
    const emptyExam = { minScore: 70, questions: Array.from({length: 10}, () => ({ q: '', options: ['','','',''], answer: 0 })) };

    const normalizeCourses = (coursesArr) => {
        if (!coursesArr) return [];
        return coursesArr.map(c => {
            let exam = c.exam || { minScore: 70, questions: [] };
            if (!exam.questions) exam.questions = [];
            while(exam.questions.length < 10) exam.questions.push({ q: '', options: ['','','',''], answer: 0 });
            if (exam.questions.length > 10) exam.questions = exam.questions.slice(0, 10);
            c.exam = exam;
            return c;
        });
    };

    const generateCertHtml = (pName, cTitle, instName, graduatedAt) => {
      let formattedDate = graduatedAt;
      if (graduatedAt) {
        try {
          const d = new Date(graduatedAt);
          if (!isNaN(d.getTime())) formattedDate = d.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
        } catch (e) {}
      } else {
        formattedDate = new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
      }

      return `<div class="cert-container" style="background: #fff; padding: 15px; border-radius: 10px; max-width: 900px; width: 100%; margin: 0 auto; box-sizing: border-box; text-align: center;"><div class="cert-border" style="border: 4px double #0f172a; padding: 40px 60px; min-height: 480px; position: relative; background-color: #ffffff;"><div class="header-brand" style="margin-bottom: 35px; text-align: center;"><span class="brand-edu" style="font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 28px; letter-spacing: -0.5px; color: #4f46e5;">EduLearn</span><span class="brand-by" style="font-family: 'Playfair Display', serif; font-style: italic; font-weight: 400; font-size: 18px; color: #64748b; margin-left: 6px;">by SenTools</span></div><div class="title" style="color: #0f172a; font-size: 48px; font-weight: 700; text-transform: uppercase; margin-bottom: 20px; letter-spacing: 4px; font-family: 'Playfair Display', serif;">Sertifikat Kelulusan</div><div class="subtitle" style="color: #475569; font-style: italic; font-size: 18px; margin-bottom: 20px; font-family: 'Playfair Display', serif;">Diberikan dengan bangga kepada:</div><div class="name" style="font-size: 42px; color: #1d4ed8; font-weight: 700; margin: 10px 0; border-bottom: 2px solid #cbd5e1; display: inline-block; padding: 0 40px 10px; font-family: 'Playfair Display', serif;">${pName}</div><div class="course-label" style="color: #475569; font-size: 18px; margin: 30px 0 10px; font-style: italic; font-family: 'Playfair Display', serif;">Atas keberhasilannya menyelesaikan kursus:</div><div class="course-name" style="font-size: 32px; color: #0f172a; font-weight: 700; line-height: 1.3; margin-bottom: 20px; font-family: 'Playfair Display', serif;">${cTitle}</div><div class="date-issued" style="color: #64748b; font-size: 16px; margin-bottom: 40px; font-style: italic; font-family: 'Playfair Display', serif;">Diberikan pada: ${formattedDate}</div><div class="footer" style="display: flex; justify-content: space-between; align-items: flex-end; margin-top: 50px; padding-bottom: 30px; font-family: 'Playfair Display', serif;"><div class="signature-block" style="width: 250px; text-align: center;"><div class="signature" style="font-family: 'Great Vibes', cursive; font-size: 36px; color: #0f172a; border-bottom: 1px solid #94a3b8; margin-bottom: 5px; padding-bottom: 5px;">${instName}</div><div class="instructor-name" style="font-size: 16px; font-weight: bold; color: #0f172a;">${instName}</div><div class="instructor-title" style="font-size: 14px; color: #64748b;">Instruktur Utama</div></div><div class="signature-block" style="width: 250px; text-align: center;"><div class="signature" style="font-family: 'Great Vibes', cursive; font-size: 36px; color: #0f172a; border-bottom: 1px solid #94a3b8; margin-bottom: 5px; padding-bottom: 5px;">SenTools</div><div class="instructor-name" style="font-size: 16px; font-weight: bold; color: #0f172a;">Sistem Manajemen</div><div class="instructor-title" style="font-size: 14px; color: #64748b;">EduLearn by SenTools</div></div></div><div class="website" style="position: absolute; bottom: 20px; left: 0; right: 0; text-align: center; color: #64748b; font-family: sans-serif; font-size: 12px; letter-spacing: 1px;">https://s-tools.id/edu/</div></div></div>`;
    };

    function App() {
      const [dbReady, setDbReady] = React.useState(false);
      const [setupError, setSetupError] = React.useState("");
      const [sheetsUrlInput, setSheetsUrlInput] = React.useState(() => localStorage.getItem('edu_sheets_url') || DEFAULT_SHEETS_URL);
      
      const [admins, setAdmins] = React.useState([]);
      const [courses, setCourses] = React.useState([]);
      const [participants, setParticipants] = React.useState([]);
      const [enrollments, setEnrollments] = React.useState([]);
      const [notifications, setNotifications] = React.useState([]);

      const [session, setSession] = React.useState(() => JSON.parse(sessionStorage.getItem('edu_session')) || null);
      const [loginInput, setLoginInput] = React.useState({ username: "", password: "" });
      const [loginError, setLoginError] = React.useState("");
      const [isLoggingIn, setIsLoggingIn] = React.useState(false);
      
      const [appMode, setAppMode] = React.useState('auth'); 
      const [adminTab, setAdminTab] = React.useState("courses"); 
      const [superTab, setSuperTab] = React.useState("dashboard"); 
      
      const [searchInst, setSearchInst] = React.useState("");
      const [searchCourse, setSearchCourse] = React.useState("");
      const [searchPart, setSearchPart] = React.useState("");
      
      const [activeCourse, setActiveCourse] = React.useState(null);
      const [activeModule, setActiveModule] = React.useState(null);
      const [isSidebarOpen, setIsSidebarOpen] = React.useState(false);
      const [commentText, setCommentText] = React.useState("");
      
      const [classroomMode, setClassroomMode] = React.useState('video');
      const [studentAnswers, setStudentAnswers] = React.useState({});
      const [toast, setToast] = React.useState(null);
      const [confirmDialog, setConfirmDialog] = React.useState({ isOpen: false, message: "", onConfirm: null });
      
      const [examModalOpen, setExamModalOpen] = React.useState(false);
      const [examCourseId, setExamCourseId] = React.useState(null);
      const [examForm, setExamForm] = React.useState(emptyExam);

      const [profileForm, setProfileForm] = React.useState({ donationLink: "" });
      
      const [infoInstForm, setInfoInstForm] = React.useState({ text: '', show: false }); 
      const [infoSuperForm, setInfoSuperForm] = React.useState({ instText: '', showInst: false, partText: '', showPart: false }); 

      const [loginMatches, setLoginMatches] = React.useState(null);
      const [currentQuestionIndex, setCurrentQuestionIndex] = React.useState(0);
      const [quotaModal, setQuotaModal] = React.useState({ isOpen: false, adminId: null, name: "", maxCourses: 0, maxParticipants: 0 });
      const [reqLimitModal, setReqLimitModal] = React.useState({ isOpen: false, reason: "" });

      // LOGOUT FUNCTION - Memastikan diletakkan pertama sebelum direferensikan di render
      const handleLogout = () => {
        setSession(null); 
        sessionStorage.removeItem('edu_session'); 
        setLoginMatches(null);
        setAppMode('auth'); 
        setLoginInput({ username: "", password: "" });
        setClassroomMode('video'); 
        setStudentAnswers({}); 
        setExamModalOpen(false);
      };

      // Sinkronisasi Sesi login awal
      React.useEffect(() => {
        if (session) {
          if (session.role === 'super_admin') setAppMode('super_dashboard');
          else if (session.role === 'admin') setAppMode('admin_dashboard');
          else setAppMode('part_dashboard');
        } else {
          setAppMode('auth');
        }
      }, [session]);

      // Ambil data langsung dari GAS saat mount (Tanpa LocalStorage Fallback)
      React.useEffect(() => {
          const fetchUrl = DEFAULT_SHEETS_URL + (DEFAULT_SHEETS_URL.includes('?') ? '&' : '?') + 'nocache=' + Date.now();
          fetch(fetchUrl)
            .then(res => { if(!res.ok) throw new Error("Gagal menyambung ke server cloud"); return res.json(); })
            .then(data => {
                if(data.admins) setAdmins(Array.from(new Map(data.admins.map(a => [a.id, a])).values()));
                if(data.courses) setCourses(normalizeCourses(data.courses));
                if(data.participants) setParticipants(data.participants);
                if(data.enrollments) setEnrollments(data.enrollments);
                if(data.notifications) setNotifications(data.notifications);
                setDbReady(true);
            })
            .catch(e => { 
                setSetupError("Koneksi gagal: Browser memblokir integrasi lembar cloud (CORS) atau server GAS Anda offline.");
            });
      }, []);

      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };
      
      const calcProgress = (enr, crs) => { 
        if (!crs || !crs.modules || crs.modules.length === 0 || !enr) return 0; 
        if (enr.isGraduated) return 100;
        let completedArray = [];
        if (Array.isArray(enr.completedModules)) { completedArray = enr.completedModules; } 
        else if (typeof enr.completedModules === 'string') { try { completedArray = JSON.parse(enr.completedModules); } catch (e) { completedArray = []; } }
        let prog = Math.round((completedArray.length / crs.modules.length) * 100); 
        return prog > 100 ? 100 : prog;
      };
      
      // LOGIKA SINKRONISASI CLOUD ABSOLUT - S-Tools API Integration
      const execDbAction = async (updaterFn) => {
        try {
          const updatedData = updaterFn();
          
          if (updatedData.admins) setAdmins(updatedData.admins);
          if (updatedData.courses) setCourses(updatedData.courses);
          if (updatedData.participants) setParticipants(updatedData.participants);
          if (updatedData.enrollments) setEnrollments(updatedData.enrollments);
          if (updatedData.notifications) setNotifications(updatedData.notifications);

          const payload = {
            admins: updatedData.admins || admins,
            courses: (updatedData.courses || courses).map(c => {
              const copy = { ...c };
              copy.modules_json = JSON.stringify(copy.modules || []);
              copy.exam_json = JSON.stringify(copy.exam || {});
              delete copy.modules; delete copy.exam;
              return copy;
            }),
            participants: updatedData.participants || participants,
            enrollments: (updatedData.enrollments || enrollments).map(enr => ({
              ...enr,
              completedModules_json: JSON.stringify(enr.completedModules || [])
            })),
            notifications: updatedData.notifications || notifications
          };

          const postUrl = DEFAULT_SHEETS_URL + (DEFAULT_SHEETS_URL.includes('?') ? '&' : '?') + 'nocache=' + Date.now();
          await fetch(postUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
          });
        } catch (error) {
          console.error(error);
          showToast("Gagal menyinkronkan data ke Cloud Server.");
        }
      };

      const triggerEmail = (emailAction) => {
          const url = DEFAULT_SHEETS_URL;
          const postUrl = url + (url.includes('?') ? '&' : '?') + 'nocache=' + Date.now();
          fetch(postUrl, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ emailAction }) }).catch(console.error);
      };

      const handleRegisterAdmin = async (e) => {
        e.preventDefault(); const fd = new FormData(e.target); const username = fd.get('username').trim().toLowerCase();
        if (admins.some(a => a.username === username)) return showToast("Username terpakai!");
        const customMaxCourses = parseInt(fd.get('maxCourses')) || 5;
        const customMaxParticipants = parseInt(fd.get('maxParticipants')) || 50;
        
        const newAdminData = { 
          id: `adm_${Date.now()}`, name: fd.get('name'), username, email: fd.get('email').trim().toLowerCase(), password: fd.get('password'), 
          isSuper: false, isActive: true, donationLink: '', info1: '', showInfo1: false, info2: '', showInfo2: false, 
          info3: '', showInfo3: false, maxCourses: customMaxCourses, maxParticipants: customMaxParticipants
        };
        await execDbAction( () => {
            return { admins: [...admins, newAdminData] };
        });
        e.target.reset(); showToast("Instruktur Ditambahkan!");
      };

      const handleToggleActiveAdmin = async (id, currentStatus) => {
        await execDbAction( () => {
            const updatedA = admins.map(a => a.id === id ? { ...a, isActive: !currentStatus } : a);
            return { admins: updatedA };
        }); showToast(!currentStatus ? "Akun Diaktifkan" : "Akun Dinonaktifkan");
      };

      const handleToggleActiveCourse = async (id, currentStatus) => {
        await execDbAction( () => {
            const updatedC = courses.map(c => c.id === id ? { ...c, isActive: !currentStatus } : c);
            return { courses: updatedC };
        }); showToast(!currentStatus ? "Kursus Diaktifkan" : "Kursus Dinonaktifkan");
      };

      const handleCreateCourse = async (e) => {
        e.preventDefault(); const fd = new FormData(e.target); const code = fd.get('code').trim().toUpperCase();
        if (courses.some(c => c.code === code)) return showToast("Kode sudah ada!");
        const myAdmin = admins.find(a => String(a.id) === String(session.data.id));
        if (!myAdmin) return showToast("Sesi tidak valid!");

        if (myAdmin.maxCourses <= 0) {
            setConfirmDialog({ isOpen: true, message: "Pembuatan kelas ditolak! Kuota kelas Anda habis (0). Silakan ajukan penambahan limit atau beli paket ekstra.", onConfirm: null });
            return;
        }

        const courseData = { authorId: session.data.id, code, title: fd.get('title'), instructor: fd.get('inst'), isActive: true, docLink: fd.get('docLink'), modules: [], exam: emptyExam };
        await execDbAction( () => {
            const updatedAdmins = admins.map(a => String(a.id) === String(session.data.id) ? { ...a, maxCourses: a.maxCourses - 1 } : a);
            const updatedCourses = [...courses, { id: `c_${Date.now()}`, ...courseData }];
            return { admins: updatedAdmins, courses: updatedCourses };
        });
        e.target.reset(); showToast("Kursus dibuat & kuota kelas dikurangi 1!");
      };

      const handleCreateModule = async (e) => {
        e.preventDefault(); const fd = new FormData(e.target); const courseId = fd.get('courseId');
        const finalVideoUrl = formatVideoUrl(fd.get('vidUrl'));
        const newModule = { id: `m_${Date.now()}`, title: fd.get('title'), videoUrl: finalVideoUrl, description: fd.get('desc'), comments: [] };
        await execDbAction( () => {
            const updated = courses.map(c => c.id === courseId ? { ...c, modules: [...c.modules, newModule] } : c);
            return { courses: updated };
        }); e.target.reset(); showToast("Materi ditambah!");
      };

      const handleDeleteModule = (courseId, moduleId) => {
        const hasGraduatedStudent = enrollments.some(e => String(e.courseId) === String(courseId) && e.isGraduated);
        if (hasGraduatedStudent) {
            showToast("Akses Ditolak: Ada Siswa Lulus!");
            setConfirmDialog({ isOpen: true, message: "Aksi ditolak! Anda tidak dapat menghapus modul video ini karena sudah ada peserta yang menyelesaikan kelas dan lulus.", onConfirm: null });
            return;
        }
        setConfirmDialog({
            isOpen: true, message: "Hapus materi video ini?",
            onConfirm: async () => {
                setConfirmDialog({ isOpen: false }); 
                await execDbAction( () => {
                    const updated = courses.map(c => c.id === courseId ? { ...c, modules: c.modules.filter(m => m.id !== moduleId) } : c);
                    return { courses: updated };
                }); showToast("Materi dihapus.");
            }
        });
      };

      const handleUpdateAdminInfo = async (type) => {
          let updatedData = {};
          if (session.role === 'super_admin') {
              updatedData = { info1: infoSuperForm.instText, showInfo1: infoSuperForm.showInst, info2: infoSuperForm.partText, showInfo2: infoSuperForm.showPart };
          } else {
              updatedData = { info3: infoInstForm.text, showInfo3: infoInstForm.show };
          }
          await execDbAction( () => {
              const currentUsername = String(session.data.username).trim().toLowerCase();
              const updatedA = admins.map(a => String(a.username).trim().toLowerCase() === currentUsername ? { ...a, ...updatedData } : a);
              return { admins: updatedA };
          }); showToast("Papan Informasi Diperbarui!");
      };

      const handleUpdateProfile = async (e) => {
        e.preventDefault();
        await execDbAction( () => {
            const currentUsername = String(session.data.username).trim().toLowerCase();
            const updatedA = admins.map(a => String(a.username).trim().toLowerCase() === currentUsername ? { ...a, donationLink: profileForm.donationLink } : a);
            return { admins: updatedA };
        }); showToast("Profil diperbarui!");
      };

      const openExamBuilder = (courseId) => {
        const course = courses.find(c => c.id === courseId);
        let currentExam = course.exam ? JSON.parse(JSON.stringify(course.exam)) : JSON.parse(JSON.stringify(emptyExam));
        if (!currentExam.questions) currentExam.questions = [];
        while (currentExam.questions.length < 10) { currentExam.questions.push({ q: '', options: ['','','',''], answer: 0 }); }
        if (currentExam.questions.length > 10) currentExam.questions = currentExam.questions.slice(0, 10);
        setExamCourseId(courseId); setExamForm(currentExam); setExamModalOpen(true);
      };

      const handleSaveExam = async () => {
        await execDbAction( () => {
            const updated = courses.map(c => c.id === examCourseId ? { ...c, exam: examForm } : c);
            return { courses: updated };
        });
        setExamModalOpen(false); showToast("Ujian disimpan!");
      };

      const handleRegisterParticipant = async (e) => {
        e.preventDefault(); const fd = new FormData(e.target); const email = fd.get('email').trim().toLowerCase();
        if (participants.some(p => p.email === email)) return showToast("Email sudah terdaftar!");
        const myAdmin = admins.find(a => String(a.id) === String(session.data.id));
        if (!myAdmin) return showToast("Sesi tidak valid!");

        if (myAdmin.maxParticipants <= 0) {
            setConfirmDialog({ isOpen: true, message: "Pendaftaran ditolak! Kuota pendaftaran siswa Anda saat ini telah habis (0).", onConfirm: null });
            return;
        }

        const partData = { id: `p_${Date.now()}`, name: fd.get('name').trim(), email, accessCode: fd.get('code').trim() };
        const enrData = { id: `e_${Date.now()}`, participantId: partData.id, courseId: fd.get('courseId'), completedModules: [], isGraduated: false, certDownloaded: false, examScore: null, graduatedAt: null };
        const courseObj = courses.find(c => c.id === fd.get('courseId'));
        
        await execDbAction( () => {
            const updatedAdmins = admins.map(a => String(a.id) === String(session.data.id) ? { ...a, maxParticipants: a.maxParticipants - 1 } : a);
            return { admins: updatedAdmins, participants: [...participants, partData], enrollments: [...enrollments, enrData] };
        });
        
        e.target.reset(); showToast("Peserta terdaftar & kuota siswa dikurangi 1!");
        triggerEmail({

        const myEnr = enrollments.find(e => String(e.participantId) === String(session.data.id) && String(e.courseId) === String(activeCourse.id));
        
        let compList = Array.isArray(myEnr.completedModules) ? myEnr.completedModules : [];
        if(typeof myEnr.completedModules === 'string') { try { compList = JSON.parse(myEnr.completedModules); } catch(e) {} }

        if (!compList.includes(activeModule.id)) {
          const newComps = [...compList, activeModule.id];
          await execDbAction( () => {
              const updatedE = enrollments.map(en => String(en.id) === String(myEnr.id) ? { ...en, completedModules: newComps } : en);
              return { enrollments: updatedE };

          if (!isLast) { setActiveModule(cMods[cIdx + 1]); showToast("Lanjut materi."); } else setClassroomMode('exam');
        } else {
          if (!isLast) setActiveModule(cMods[cIdx + 1]); else setClassroomMode('exam');
        }
      };

      const submitExam = async () => {
        let correct = 0; activeCourse.exam.questions.forEach((q, i) => { if(studentAnswers[i] === q.answer) correct++; });
        const finalScore = correct * 10; const isPassed = finalScore >= activeCourse.exam.minScore;
        const myEnr = enrollments.find(e => String(e.participantId) === String(session.data.id) && String(e.courseId) === String(activeCourse.id));
        const todayDateStr = new Date().toISOString(); 
        
        await execDbAction( () => {
                const updatedE = enrollments.map(en => String(en.id) === String(myEnr.id) ? { ...en, examScore: finalScore, isGraduated: isPassed, graduatedAt: isPassed ? todayDateStr : en.graduatedAt } : en);
                return { enrollments: updatedE };

        showToast("Sertifikat berhasil diunduh!");
